/* ═══════════════════════════════════════
   BASE RESET
═══════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;-webkit-text-size-adjust:none;}
body{
  background:#07090f;color:#e2ecf8;
  font-family:'Inter','Segoe UI',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;min-height:100dvh;
}
a{text-decoration:none;color:inherit;}
img,video{display:block;max-width:100%;}
button{font-family:inherit;cursor:pointer;border:none;background:none;}
:focus-visible{outline:2px solid rgba(0,205,235,.5);outline-offset:2px;}
#main-content{max-width:980px;margin:0 auto;padding:12px 12px 0;}

/* ═══════════════════════════════════════
   KEYFRAMES
═══════════════════════════════════════ */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes shine{0%{background-position:-400px 0}100%{background-position:400px 0}}
@keyframes borderSpin{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes crownBob{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-4px) rotate(4deg)}}
@keyframes goldPulse{
  0%,100%{box-shadow:0 4px 18px rgba(255,185,0,.28),inset 0 1px 0 rgba(255,255,255,.2)}
  50%    {box-shadow:0 8px 28px rgba(255,185,0,.45),inset 0 1px 0 rgba(255,255,255,.2)}
}
@keyframes tabBounce{0%{transform:translateY(0) scale(1)}45%{transform:translateY(-5px) scale(1.07)}100%{transform:translateY(-3px) scale(1.02)}}
@keyframes dotPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.2;transform:scale(.65)}}
@keyframes cardPop{from{opacity:0;transform:translateY(14px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes scanMove{0%{top:-6%}100%{top:110%}}
@keyframes popIn{from{opacity:0;transform:translate(-50%,-46%) scale(.84)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
@keyframes popOut{from{opacity:1;transform:translate(-50%,-50%) scale(1)}to{opacity:0;transform:translate(-50%,-46%) scale(.84)}}

/* ═══════════════════════════════════════
   SERIES HEADER
═══════════════════════════════════════ */
.pro-series-header-pro{
  position:relative;border-radius:20px;overflow:hidden;
  background:#0d1220;border:1px solid rgba(255,255,255,.07);
  box-shadow:0 20px 60px rgba(0,0,0,.6);
  margin-bottom:20px;
  animation:fadeUp .6s cubic-bezier(.22,.8,.2,1) both;
}
.pro-series-poster-pro{
  width:100%;height:190px;
  object-fit:cover;object-position:center top;
  display:block;background:#0a0e1a;
}
.smtv-scan{
  position:absolute;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,rgba(0,205,235,.7),transparent);
  animation:scanMove 3.5s linear infinite;
  pointer-events:none;z-index:3;
}
.smtv-poster-fade{
  position:absolute;left:0;right:0;bottom:0;height:90px;
  background:linear-gradient(to bottom,transparent,#0d1220);
  pointer-events:none;z-index:2;
}
.pro-series-meta-pro{
  position:relative;z-index:3;
  padding:8px 16px 18px;text-align:center;
}
.pro-series-back-btn-pro{
  position:absolute;left:12px;top:12px;z-index:10;
  width:38px;height:38px;display:inline-flex;align-items:center;justify-content:center;
  border-radius:10px;background:rgba(7,9,15,.82);
  border:1px solid rgba(255,255,255,.1);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  color:#a0bcd8;font-size:15px;
  transition:background .2s,border-color .2s,transform .2s;
  box-shadow:0 4px 14px rgba(0,0,0,.45);
}
.pro-series-back-btn-pro:hover{
  background:rgba(0,195,225,.12);border-color:rgba(0,195,225,.35);transform:translateX(-2px);
}
.pro-series-title-pro{
  font-family:'Cinzel',serif;
  font-size:clamp(1.15rem,4vw,1.65rem);
  font-weight:800;letter-spacing:.05em;color:#fff;
  text-shadow:0 2px 20px rgba(0,0,0,.6);
  margin:0 0 8px;line-height:1.2;
}
.pro-series-desc-pro{
  font-size:.84rem;color:#7090a8;
  line-height:1.65;max-width:560px;margin:0 auto 14px;
}

/* ═══════════════════════════════════════
   VIP PREMIUM CARD  ← FIXED & COMPACT
═══════════════════════════════════════ */
.smtv-vip-card{
  position:relative;
  max-width:360px;          /* ← smaller than before */
  margin:0 auto 4px;
  padding:1.5px;
  border-radius:16px;
  background:linear-gradient(270deg,#00d0ee,#ffc83a,#00d0ee);
  background-size:300% 300%;
  animation:borderSpin 4s ease infinite, fadeUp .65s cubic-bezier(.22,.8,.2,1) .08s both;
}
.smtv-vip-inner{
  background:linear-gradient(160deg,#0c1a2e,#080f1d);
  border-radius:15px;
  padding:13px 13px 14px;   /* ← tighter padding */
  position:relative;overflow:hidden;
}
.smtv-vip-inner::after{
  content:'';position:absolute;top:-50px;right:-50px;
  width:140px;height:140px;
  background:radial-gradient(circle,rgba(255,196,50,.12),transparent 65%);
  pointer-events:none;
}

/* Title row — compact */
.smtv-vip-title{
  display:flex;align-items:center;gap:7px;
  margin-bottom:11px;
  font-size:.88rem;           /* ← was .98rem */
  font-weight:900;color:#fff;line-height:1.2;
}
.smtv-vip-crown{
  font-size:1rem;flex-shrink:0;  /* ← was 1.2rem */
  animation:crownBob 2.2s ease-in-out infinite;display:inline-block;
}
.smtv-vip-title-text{
  background:linear-gradient(90deg,#ffd84a,#ffee99,#ffd84a);
  background-size:200% auto;animation:shine 2.6s linear infinite;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

/* 2×2 feature grid — compact pills */
.smtv-vip-feats{
  display:grid;grid-template-columns:1fr 1fr;
  gap:6px;margin-bottom:12px;  /* ← tighter gap & margin */
}
.smtv-vip-feat{
  display:flex;align-items:center;justify-content:center;gap:4px;
  padding:7px 5px;             /* ← was 9px 6px */
  border-radius:8px;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);
  font-size:.73rem;             /* ← was .78rem */
  font-weight:700;color:#c8e0f8;
  white-space:nowrap;
  transition:background .2s,border-color .2s,color .2s;
}
.smtv-vip-feat:hover{background:rgba(255,196,50,.1);border-color:rgba(255,196,50,.28);color:#ffd84a;}

/* BECOME VIP button — compact */
.smtv-vip-btn{
  display:flex;align-items:center;justify-content:center;gap:7px;
  width:100%;padding:11px 14px;  /* ← was 14px 16px */
  border-radius:10px;
  font-size:.82rem;              /* ← was .9rem */
  font-weight:900;letter-spacing:.08em;text-transform:uppercase;
  color:#1a0500;text-decoration:none;
  position:relative;overflow:hidden;
  background:linear-gradient(135deg,#ffc83a,#ffde70,#ffb020);
  box-shadow:0 8px 22px rgba(255,185,0,.28),inset 0 1px 0 rgba(255,255,255,.28);
  transition:transform .2s,box-shadow .2s;
  animation:goldPulse 2.8s ease-in-out infinite;
  border:none;cursor:pointer;font-family:'Inter',sans-serif;
}
.smtv-vip-btn::before{
  content:'';position:absolute;top:0;left:-100%;width:55%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.32),transparent);
  animation:shine 2s ease-in-out infinite;
}
.smtv-vip-btn:hover{transform:translateY(-2px);box-shadow:0 14px 32px rgba(255,185,0,.45),inset 0 1px 0 rgba(255,255,255,.28);}
.smtv-vip-btn:active{transform:scale(.97);}

/* ═══════════════════════════════════════
   SEASON TABS
═══════════════════════════════════════ */
.pro-seasons-tabs-pro{
  display:flex;gap:9px;justify-content:center;flex-wrap:wrap;
  margin:18px 0 11px;
  animation:fadeUp .5s cubic-bezier(.22,.8,.2,1) .12s both;
}
.pro-season-tab-pro{
  padding:9px 26px;border-radius:999px;
  border:1.5px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);
  color:#607890;font-size:.86rem;font-weight:800;letter-spacing:.02em;
  transition:all .26s cubic-bezier(.22,.8,.2,1);outline:none;
  position:relative;overflow:hidden;
}
.pro-season-tab-pro:hover:not(.active){
  color:#d0e8ff;border-color:rgba(0,205,235,.32);
  transform:translateY(-1px);background:rgba(0,205,235,.06);
}
.pro-season-tab-pro.active{
  background:linear-gradient(135deg,#1de8ff,#00a8d0);
  border-color:transparent;color:#021820;font-weight:900;
  box-shadow:0 8px 22px rgba(0,200,235,.32),0 0 0 3px rgba(0,200,235,.1);
  animation:tabBounce .35s cubic-bezier(.22,.8,.2,1) both;
}
.pro-season-tab-pro:active{transform:scale(.95);}

/* ═══════════════════════════════════════
   SOURCE BUTTONS
═══════════════════════════════════════ */
.source-selector{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin:0 0 13px;}
.source-btn{
  padding:6px 18px;border-radius:999px;
  border:1.5px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);
  color:#607890;font-size:.81rem;font-weight:800;
  transition:all .2s ease;outline:none;
}
.source-btn:hover:not(.active){color:#d0e8ff;border-color:rgba(0,205,235,.28);background:rgba(0,205,235,.05);transform:translateY(-1px);}
.source-btn.active{background:linear-gradient(135deg,#1de8ff,#00a8d0);border-color:transparent;color:#021820;font-weight:900;box-shadow:0 6px 18px rgba(0,205,235,.25);}
.source-btn:active{transform:scale(.96);}

/* ═══════════════════════════════════════
   EPISODES SECTION LABEL
═══════════════════════════════════════ */
.smtv-ep-label{display:flex;align-items:center;gap:9px;margin:5px 0 11px;}
.smtv-ep-label-bar{width:4px;height:20px;border-radius:3px;flex-shrink:0;background:#1de8ff;box-shadow:0 0 9px rgba(0,205,235,.5);}
.smtv-ep-label-txt{font-size:.82rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#1de8ff;}

/* ═══════════════════════════════════════
   EPISODE ROW
═══════════════════════════════════════ */
.pro-episodes-row-wrap-pro{margin-top:4px;margin-bottom:8px;}
.pro-episodes-row-pro{
  display:flex;gap:9px;overflow-x:auto;
  padding:4px 2px 14px;
  -webkit-overflow-scrolling:touch;
  scroll-snap-type:x proximity;
  scrollbar-width:none;align-items:flex-start;
}
.pro-episodes-row-pro::-webkit-scrollbar{display:none;}

/* ═══════════════════════════════════════
   EPISODE CARD
═══════════════════════════════════════ */
.pro-episode-card-pro{
  flex:0 0 140px;           /* ← slightly smaller card */
  scroll-snap-align:start;
  display:flex;flex-direction:column;
  text-decoration:none;
  border-radius:11px;
  background:#0e1624;
  border:1px solid rgba(255,255,255,.07);
  overflow:hidden;position:relative;
  opacity:0;transform:translateY(14px);
  transition:transform .28s cubic-bezier(.22,.8,.2,1),box-shadow .28s ease,border-color .28s ease;
  will-change:transform;
}
.pro-episode-card-pro.smtv-card-in{animation:cardPop .4s cubic-bezier(.22,.8,.2,1) both;}
.pro-episode-card-pro:hover{
  transform:translateY(-5px) scale(1.01);
  box-shadow:0 14px 30px rgba(0,0,0,.5),0 0 0 1px rgba(0,205,235,.2);
  border-color:rgba(0,205,235,.25);
}
.pro-episode-card-pro:active{transform:scale(.96);}
@media(max-width:420px){.pro-episode-card-pro{flex:0 0 124px;}}
@media(min-width:900px){.pro-episode-card-pro{flex:0 0 165px;}}

/* ── THUMBNAIL: 16:9 aspect fill ── */
.pro-ep-thumb-wrap-pro{
  position:relative;width:100%;padding-top:56.25%;
  overflow:hidden;background:#070b16;flex-shrink:0;display:block;
}
.pro-ep-thumb-pro{
  position:absolute!important;top:0!important;left:0!important;
  width:100%!important;height:100%!important;
  object-fit:cover!important;object-position:center!important;
  display:block!important;background:#070b16;
  transition:transform .32s cubic-bezier(.22,.8,.2,1);
}
.pro-episode-card-pro:hover .pro-ep-thumb-pro{transform:scale(1.06);}

/* Play overlay */
.smtv-play-overlay{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .2s;z-index:3;pointer-events:none;
}
.smtv-play-overlay span{
  width:30px;height:30px;border-radius:50%;
  background:rgba(0,205,235,.9);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 16px rgba(0,205,235,.45);
}
.smtv-play-overlay i{font-size:.6rem;color:#021820;margin-left:2px;}
.pro-episode-card-pro:hover .smtv-play-overlay{opacity:1;}

/* Ep badge */
.pro-ep-num-pro{
  position:absolute;top:5px;left:5px;z-index:2;
  background:rgba(4,7,16,.88);border:1px solid rgba(0,205,235,.28);
  color:#1de8ff;font-size:.6rem;font-weight:900;
  padding:2px 6px;border-radius:4px;letter-spacing:.04em;
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  white-space:nowrap;line-height:1.4;
  max-width:calc(100% - 10px);overflow:hidden;text-overflow:ellipsis;
}

/* ═══════════════════════════════════════
   EPISODE TITLE  ← THE KEY FIX
   Rules:
   • "Episode 1"            → "Ep 1"        (1 line, no wrap)
   • "Episode 1 - Name..."  → "Ep 1" BOLD
                               "Name..."    smaller muted (1 line)
   Card height stays fixed — title area is
   always exactly 2 text rows tall.
═══════════════════════════════════════ */
.pro-ep-title-pro{
  display:flex;
  flex-direction:column;
  padding:6px 7px 8px;
  gap:1px;
  min-height:0;        /* let flexbox decide */
  width:100%;
  overflow:hidden;
}
/* Row 1: "Ep 1" — always 1 line */
.smtv-ep-num-line{
  font-size:.73rem;
  font-weight:800;
  color:#d0e8ff;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  line-height:1.3;
  display:block;
}
/* Row 2: episode name — 1 line, smaller muted text */
.smtv-ep-name-line{
  font-size:.66rem;
  font-weight:500;
  color:#7090a8;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  line-height:1.3;
  display:block;
}

/* ═══════════════════════════════════════
   HOW TO WATCH
═══════════════════════════════════════ */
.howto-section{margin:22px 0 18px;}
.pro-tutorial-title{
  display:flex;align-items:center;gap:10px;
  font-size:1.15rem;font-weight:800;color:#fff;
  margin:0 0 16px;letter-spacing:.01em;
}
.pro-tutorial-title .smtv-bar{

  background:#1de8ff;box-shadow:0 0 9px rgba(0,205,235,.4);
}

  width:6px;height:6px;border-radius:50%;flex-shrink:0;

}
.smtv-video-card{
  border-radius:13px;overflow:hidden;
  background:#0a0f1c;border:1px solid rgba(255,255,255,.06);
  box-shadow:0 10px 26px rgba(0,0,0,.4);
}
.pro-video-frame-wrap{position:relative;width:100%;height:0;padding-bottom:56.25%;overflow:hidden;}
.pro-video-frame-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:0;display:block;background:#000;}

/* ═══════════════════════════════════════
   WHATSAPP POPUP
═══════════════════════════════════════ */

}
.wa-inner::before{

}
.wa-top{display:flex;align-items:center;gap:11px;margin-bottom:11px;}
.wa-logo{width:42px;height:42px;border-radius:11px;flex-shrink:0;}
.wa-title{font-size:.95rem;font-weight:900;color:#fff;line-height:1.2;}
.wa-title span{display:block;font-size:.74rem;font-weight:500;color:#607890;margin-top:2px;}

  body{padding-bottom:calc(114px + env(safe-area-inset-bottom));}

<div id="wa-backdrop"></div>
<div id="main-content">
  <header></header>
  <script type="text/javascript" src="//www.highperformanceformat.com/c91a82435d260630918ecc80c95125ac/invoke.js"></script>

<!-- ════════════════════════════════════════════
     SMTV ENHANCEMENT ENGINE  v4
════════════════════════════════════════════ -->
<script>
(function(){
  'use strict';

  /* POSTER FX */
  function doPosterFX(){
    document.querySelectorAll('.pro-series-header-pro').forEach(function(h){
      if(h._fx) return; h._fx=true;
      if(!h.querySelector('.smtv-scan')){var s=document.createElement('div');s.className='smtv-scan';h.appendChild(s);}
      if(!h.querySelector('.smtv-poster-fade')){var f=document.createElement('div');f.className='smtv-poster-fade';h.appendChild(f);}
    });
  }

  /* VIP CARD — compact rebuild */
  function doVipCard(){
    document.querySelectorAll('.premium-channel-message').forEach(function(box){
      if(box._vip) return; box._vip=true;
      var aEl=box.querySelector('a');
      var href=(aEl&&aEl.getAttribute('href'))||'/premium.html';
      box.className='smtv-vip-card';
      box.removeAttribute('style');
      box.innerHTML=
        '<div class="smtv-vip-inner">'+
          '<div class="smtv-vip-title">'+
            '<span class="smtv-vip-crown">👑</span>'+
            '<span class="smtv-vip-title-text">SMTV VIP Membership</span>'+
          '</div>'+
          '<div class="smtv-vip-feats">'+
            '<span class="smtv-vip-feat">⚡ No Ads</span>'+
            '<span class="smtv-vip-feat">⬇ Fast DL</span>'+
            '<span class="smtv-vip-feat">🔒 Early Access</span>'+
            '<span class="smtv-vip-feat">🎞 HD Quality</span>'+
          '</div>'+
          '<a class="smtv-vip-btn" href="'+href+'">'+
            '<i class="fa-solid fa-crown"></i> BECOME VIP'+
          '</a>'+
        '</div>';
    });
  }

  /* SEASON TABS */
  function doTabAnim(){
    document.querySelectorAll('.pro-season-tab-pro').forEach(function(tab){
      if(tab._click) return; tab._click=true;
      tab.addEventListener('click',function(){
        document.querySelectorAll('.pro-season-tab-pro').forEach(function(t){
          t.classList.remove('active'); delete t._anim;
        });
        this.classList.add('active');
        this.style.animation='none';
        void this.offsetHeight;
        this.style.animation='';
      });
    });
  }

  /* THUMBNAIL FIX */
  function doThumbs(){
    document.querySelectorAll('.pro-ep-thumb-pro').forEach(function(img){
      if(img._fix) return; img._fix=true;
      var wrap=img.parentElement;
      if(wrap&&wrap.classList.contains('pro-ep-thumb-wrap-pro')){
        wrap.style.height=''; wrap.style.minHeight=''; wrap.style.maxHeight='';
      }
      img.style.setProperty('position','absolute','important');
      img.style.setProperty('top','0','important');
      img.style.setProperty('left','0','important');
      img.style.setProperty('width','100%','important');
      img.style.setProperty('height','100%','important');
      img.style.setProperty('object-fit','cover','important');
    });
  }

  /* EP BADGE */
  function doBadge(){
    document.querySelectorAll('.pro-ep-num-pro').forEach(function(el){
      if(el._b) return; el._b=true;
      var t=(el.textContent||'').trim();
      var m=/[Ee]pisodes*(d+)/.exec(t);
      if(m) el.textContent='Ep '+m[1];
    });
  }

  /* ═══════════════════════════════════════════
     EPISODE TITLE — THE CORE FIX
     
     Cases:
     "Episode 1"              → <b>Ep 1</b>           (num only, 1 row)
     "Episode 1 - The Start"  → <b>Ep 1</b>           (row 1)
                                 <s>The Start</s>      (row 2, muted small)
     
     Title area height is FIXED via flex —
     exactly 2 text rows, never overflows card.
  ═══════════════════════════════════════════ */
  function doTitle(){
    document.querySelectorAll('.pro-ep-title-pro').forEach(function(el){
      if(el._t) return; el._t=true;

      var raw=(el.textContent||'').replace(/<[^>]+>/g,'').trim();

      /* Parse "Episode N" or "Episode N - Name" */
      var m=raw.match(/^[Ee]pisodes*(d+)s*[-–—:s]?s*(.*)$/);
      var num=m?m[1]:null;
      var name=m?(m[2]||'').trim():'';

      if(num&&name){
        /* Has both number AND name */
        el.innerHTML=
          '<span class="smtv-ep-num-line">Ep '+num+'</span>'+
          '<span class="smtv-ep-name-line">'+name+'</span>';
      } else if(num){
        /* Number only — just "Ep 1", vertically centered */
        el.innerHTML='<span class="smtv-ep-num-line">Ep '+num+'</span>';
      } else {
        /* Fallback: raw text, 1 line */
        el.innerHTML='<span class="smtv-ep-num-line">'+raw+'</span>';
      }

      /* Force correct layout via setProperty (beats series.js inline styles) */
      el.style.setProperty('display','flex','important');
      el.style.setProperty('flex-direction','column','important');
      el.style.setProperty('padding','6px 7px 8px','important');
      el.style.setProperty('gap','1px','important');
      el.style.setProperty('overflow','hidden','important');
      el.style.setProperty('width','100%','important');
      el.style.setProperty('min-height','0','important');
      el.style.setProperty('white-space','normal','important');
    });
  }

  /* PLAY OVERLAY */
  function doPlayOverlay(){
    document.querySelectorAll('.pro-ep-thumb-wrap-pro').forEach(function(wrap){
      if(wrap._pl) return; wrap._pl=true;
      if(!wrap.querySelector('.smtv-play-overlay')){
        var d=document.createElement('div');
        d.className='smtv-play-overlay';
        d.innerHTML='<span><i class="fa-solid fa-play"></i></span>';
        wrap.appendChild(d);
      }
    });
  }

  /* CARD STAGGER ANIMATION */
  function doCardAnim(){
    document.querySelectorAll('.pro-episode-card-pro').forEach(function(card,i){
      if(card._an) return; card._an=true;
      card.style.animationDelay=(i*0.055)+'s';
      requestAnimationFrame(function(){
        requestAnimationFrame(function(){card.classList.add('smtv-card-in');});
      });
    });
  }

  /* EPISODES LABEL */
  function doEpLabel(){
    document.querySelectorAll('.pro-episodes-row-wrap-pro').forEach(function(wrap){
      if(wrap._lbl) return; wrap._lbl=true;
      if(!wrap.querySelector('.smtv-ep-label')){
        var lbl=document.createElement('div');
        lbl.className='smtv-ep-label';
        lbl.innerHTML='<span class="smtv-ep-label-bar"></span><span class="smtv-ep-label-txt">Episodes</span>';
        wrap.insertBefore(lbl,wrap.firstChild);
      }
    });
  }

  /* HOW TO WATCH TITLE FIX */
  function doHowTo(){
    document.querySelectorAll('.pro-tutorial-title').forEach(function(el){
      if(el._ht) return; el._ht=true;
      var txt=(el.textContent||'How to Watch Episodes').trim().replace(/^[-–—|▌s]+/,'').trim();
      el.innerHTML='<span class="smtv-bar"></span>'+txt;
    });
  }

  /* SCROLL LOCK (prevents page jumping on load) */
  function doScrollLock(){
    try{window.scrollTo(0,0);}catch(e){}
    var det=document.getElementById('series-details');
    if(det){
      var o=new MutationObserver(function(){
        if(det.childNodes.length>0){
          try{window.scrollTo({top:0,left:0,behavior:'auto'});}catch(e){window.scrollTo(0,0);}
          o.disconnect();
        }
      });
      o.observe(det,{childList:true,subtree:false});
    }
  }

  /* RUN ALL */
  function runAll(){
    doPosterFX(); doVipCard(); doTabAnim();
    doThumbs(); doBadge(); doTitle();
    doPlayOverlay(); doCardAnim(); doEpLabel(); doHowTo();
  }

  /* Watch for series.js DOM injection */
  var obs=new MutationObserver(function(){ runAll(); });
  obs.observe(document.body,{childList:true,subtree:true});
  setTimeout(function(){obs.disconnect();},14000);

  /* Also run on DOMContentLoaded */
  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded',runAll);
  } else {
    runAll();
  }

  doScrollLock();
})();
</script>

});

<!-- FOOTER NAV -->
<div id="footer-placeholder"></div>
<script>
(async function(){
  var cands=['/includes/footer.html','includes/footer.html','./includes/footer.html','/footer.html','footer.html'];
  var ph=document.getElementById('footer-placeholder');
  function initNav(html){
    try{
      ph.innerHTML=html;
      try{var p=parseInt(getComputedStyle(document.body).paddingBottom)||0;if(p<96)document.body.style.paddingBottom='calc(96px + env(safe-area-inset-bottom))';}catch(e){}
      var nav=ph.querySelector('#smtv-bottom-nav')||ph.querySelector('.smtv-bottom-nav');
      if(!nav)return;
      var items=Array.from(nav.querySelectorAll('.nav-item'));
      items.forEach(function(i){i.classList.remove('active');});
      var up=new URLSearchParams(window.location.search);
      var si=items.find(function(i){return((i.dataset&&(i.dataset.name||'').toLowerCase())==='series');});
      if(up.has('series')&&si)si.classList.add('active');
      else{
        var pp=location.pathname.toLowerCase();
        var bp=items.find(function(i){return(i.getAttribute('href')||'').toLowerCase().includes(pp.split('/').pop());});
        if(bp)bp.classList.add('active');else if(si)si.classList.add('active');
      }
      items.forEach(function(a){
        if(a._si)return;a._si=true;
        a.addEventListener('click',function(e){
          try{e.preventDefault&&e.preventDefault();}catch(x){}
          items.forEach(function(i){i.classList.remove('active');});
          this.classList.add('active');
          var h=this.getAttribute('href');if(h)location.assign(h);
        },{passive:false});
      });
    }catch(e){console.warn('initNav',e);}
  }
  for(var i=0;i<cands.length;i++){
    try{
      var r=await fetch(cands[i],{cache:'no-cache'});
      if(!r.ok)continue;
      var t=await r.text();initNav(t);return;
    }catch(e){continue;}
  }
  ph.innerHTML='<nav class="smtv-bottom-nav" id="smtv-bottom-nav"><a href="/index.html" class="nav-item" data-name="home"><span class="icon-wrap"><i class="fa-solid fa-house"></i></span><span class="label">Home</span></a><a href="/series.html" class="nav-item active" data-name="series"><span class="icon-wrap"><i class="fa-solid fa-film"></i></span><span class="label">Series</span></a><a href="/clips.html" class="nav-item" data-name="clips"><span class="icon-wrap"><i class="fa-solid fa-play-circle"></i></span><span class="label">Clips</span></a><a href="/premium.html" class="nav-item" data-name="premium"><span class="icon-wrap"><i class="fa-solid fa-star"></i></span><span class="label">Premium</span></a><a href="/more.html" class="nav-item" data-name="more"><span class="icon-wrap"><i class="fa-solid fa-circle-info"></i></span><span class="label">More</span></a></nav><style>.smtv-bottom-nav{position:fixed;left:12px;right:12px;bottom:12px;height:64px;display:flex;gap:6px;padding:8px;border-radius:14px;background:rgba(10,10,12,.9);backdrop-filter:blur(12px);align-items:center;z-index:1200;padding-bottom:calc(env(safe-area-inset-bottom)+8px)}.smtv-bottom-nav .nav-item{flex:1;text-align:center;color:#bdbdbd;text-decoration:none;padding:6px;border-radius:10px;transition:color .2s,transform .2s}.smtv-bottom-nav .nav-item.active{color:#fff;transform:translateY(-6px)}.smtv-bottom-nav .icon-wrap{display:inline-flex;width:40px;height:40px;align-items:center;justify-content:center;border-radius:10px}.smtv-bottom-nav .label{display:block;font-size:12px;margin-top:3px}</style>';
  try{document.body.style.paddingBottom='calc(96px + env(safe-area-inset-bottom))';}catch(e){}
})();
</script>
