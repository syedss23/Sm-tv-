<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-WM3KEDD127"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-WM3KEDD127');

  <meta charset="UTF-8">
  <title>SmTv Urdu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Watch Turkish drama series and historical shows in Urdu on SmTv Urdu. All series details and streaming links.">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ═══════════════════════════════════════════════
       DESIGN TOKENS
    ═══════════════════════════════════════════════ */
    :root {
      --bg:         #04080f;
      --bg2:        #07101c;
      --bg3:        #0b1828;
      --border:     rgba(255,255,255,.07);
      --border-hi:  rgba(255,255,255,.12);
      --gold:       #e8a800;
      --gold-lt:    #ffc93c;
      --gold-glow:  rgba(232,168,0,.28);
      --cyan:       #00c8f0;
      --cyan-dim:   rgba(0,200,240,.12);
      --green:      #00d98b;
      --txt:        #d8e8f8;
      --txt-muted:  #4e6880;
      --radius:     16px;
      --rad-sm:     10px;
      --rad-xs:     7px;
    }

    /* ═══════════════════════════════════════════════
       BASE RESET
    ═══════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--txt);
      margin: 0;
      font-family: 'DM Sans', 'Segoe UI', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }

    /* ═══════════════════════════════════════════════
       ANIMATED BACKGROUND
    ═══════════════════════════════════════════════ */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(0,200,240,.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,200,240,.015) 1px, transparent 1px);
      background-size: 52px 52px;
      mask-image: radial-gradient(ellipse 100% 50% at 50% 0%, black, transparent);
    }
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 60% 40% at 90% 10%, rgba(232,168,0,.08) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 10% 80%, rgba(0,200,240,.07) 0%, transparent 60%);
      animation: bg-breathe 12s ease-in-out infinite;
    }
    @keyframes bg-breathe {
      0%,100% { opacity: 1; }
      50%      { opacity: .7; }
    }

    /* ═══════════════════════════════════════════════
       PAGE ANIMATIONS
    ═══════════════════════════════════════════════ */
    @keyframes fade-up   { from{opacity:0;transform:translateY(22px)} to{opacity:1;transform:translateY(0)} }
    @keyframes shimmer   { 0%{background-position:-200% center} 100%{background-position:200% center} }
    @keyframes btn-shine { 0%{left:-100%} 50%,100%{left:150%} }
    @keyframes pulse-ring {
      0%  { box-shadow: 0 0 0 0 var(--gold-glow); }
      70% { box-shadow: 0 0 0 10px transparent; }
      100%{ box-shadow: 0 0 0 0 transparent; }
    }
    @keyframes dot-blink { 0%,100%{opacity:1} 50%{opacity:.3} }
    @keyframes float     { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }

    /* reveal-on-scroll */
    .reveal-item { opacity: 0; transform: translateY(14px); transition: opacity .45s cubic-bezier(.22,.68,0,1.2), transform .45s cubic-bezier(.22,.68,0,1.2); }
    .reveal-item.show { opacity: 1; transform: translateY(0); }

    /* ═══════════════════════════════════════════════
       MAIN CONTENT WRAPPER
    ═══════════════════════════════════════════════ */
    #main-content {
      max-width: 900px;
      margin: 0 auto;
      padding: 14px 14px 0;
      position: relative;
      z-index: 1;
    }

    /* ═══════════════════════════════════════════════
       SERIES HEADER BLOCK
       (class: pro-series-header-pro — used by JS)
    ═══════════════════════════════════════════════ */
    .pro-series-header-pro {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 0;
      padding: 0;
      border-radius: 20px;
      background: transparent;
      box-shadow: none;
      position: relative;
      margin-bottom: 18px;
      animation: fade-up .6s cubic-bezier(.22,.68,0,1.2) both;
    }

    /* ── Poster ── */
    .pro-series-poster-pro {
      width: 100%;
      max-height: 240px;
      border-radius: 18px 18px 0 0;
      object-fit: cover;
      display: block;
      box-shadow: 0 0 0 1px var(--border);
      position: relative;
    }

    /* gradient overlay on bottom of poster */
    .pro-series-header-pro::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      top: 180px;
      height: 80px;
      background: linear-gradient(to bottom, transparent, var(--bg));
      border-radius: 0;
      pointer-events: none;
      z-index: 2;
    }

    /* ── Back button ── */
    .pro-series-back-btn-pro {
      position: absolute;
      left: 12px; top: 12px; z-index: 10;
      width: 38px; height: 38px;
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: var(--rad-sm);
      background: rgba(4,8,15,.75);
      border: 1px solid var(--border-hi);
      backdrop-filter: blur(10px);
      text-decoration: none;
      transition: background .2s, border-color .2s;
    }
    .pro-series-back-btn-pro:hover { background: rgba(0,200,240,.15); border-color: rgba(0,200,240,.35); }

    /* ── Meta area (title + desc + premium msg) ── */
    .pro-series-meta-pro {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 18px 18px;
      padding: 18px 18px 20px;
      text-align: center;
      position: relative; z-index: 3;
    }

    .pro-series-title-pro {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.4em, 5vw, 2em);
      font-weight: 800;
      color: #fff;
      margin: 0 0 8px;
      letter-spacing: -.01em;
      line-height: 1.15;
    }

    .pro-series-desc-pro {
      font-size: .88em;
      color: var(--txt-muted);
      line-height: 1.65;
      max-width: 680px;
      margin: 0 auto 16px;
    }

    /* ═══════════════════════════════════════════════
       PREMIUM CHANNEL MESSAGE
       (class: premium-channel-message — rendered by JS)
    ═══════════════════════════════════════════════ */
    .premium-channel-message {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, rgba(232,168,0,.08), rgba(232,168,0,.03));
      border: 1px solid rgba(232,168,0,.25);
      border-radius: var(--rad-sm);
      padding: 14px 16px;
      font-size: .85em;
      color: var(--txt-muted);
      line-height: 1.6;
      margin-top: 4px;
      position: relative; overflow: hidden;
    }
    .premium-channel-message::before {
      content: '';
      position: absolute; top:0; left:0; right:0; height:2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      background-size: 200% auto;
      animation: shimmer 3s linear infinite;
    }
    .premium-channel-message strong { color: var(--gold); }
    .premium-btn-row { margin-top: 4px; }

    /* .btn-primary used in premium msg by JS */
    .btn-primary {
      display: inline-flex; align-items: center; gap: 7px;
      background: linear-gradient(135deg, var(--gold), var(--gold-lt));
      color: #1a0800; font-weight: 700; font-size: .88em;
      padding: 10px 20px; border-radius: var(--rad-sm);
      box-shadow: 0 4px 18px var(--gold-glow);
      text-decoration: none;
      position: relative; overflow: hidden;
      transition: box-shadow .25s, transform .15s;
    }
    .btn-primary::before {
      content: ''; position: absolute; top:0; left:-100%; width:60%; height:100%;
      background: linear-gradient(90deg,transparent,rgba(255,255,255,.28),transparent);
      animation: btn-shine 2.8s ease-in-out infinite;
    }
    .btn-primary:hover { box-shadow: 0 6px 28px rgba(232,168,0,.45); transform: translateY(-1px); }
    .btn-primary:active { transform: scale(.97); }

    /* ═══════════════════════════════════════════════
       SEASON TABS
       (class: pro-seasons-tabs-pro — rendered by JS)
    ═══════════════════════════════════════════════ */
    .pro-seasons-tabs-pro {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 16px 0 12px;
      padding: 0;
    }

    .pro-season-tab-pro {
      background: var(--bg2);
      border: 1px solid var(--border-hi);
      color: var(--txt-muted);
      padding: 9px 20px;
      border-radius: var(--rad-sm);
      cursor: pointer;
      font-weight: 700;
      font-size: .88em;
      font-family: 'DM Sans', sans-serif;
      letter-spacing: .02em;
      transition: all .22s cubic-bezier(.22,.68,0,1.2);
      outline: none;
      position: relative; overflow: hidden;
    }
    .pro-season-tab-pro::before {
      content: ''; position: absolute; top:0; left:-100%; width:60%; height:100%;
      background: linear-gradient(90deg, transparent, rgba(0,200,240,.12), transparent);
      transition: none;
    }
    .pro-season-tab-pro:hover:not(.active) {
      border-color: rgba(0,200,240,.3);
      color: var(--txt);
      background: rgba(0,200,240,.06);
    }
    .pro-season-tab-pro.active {
      background: linear-gradient(135deg, var(--cyan), #0090b8);
      border-color: transparent;
      color: #031820;
      font-weight: 800;
      transform: translateY(-2px);
      box-shadow: 0 6px 22px rgba(0,200,240,.28);
    }

    /* ═══════════════════════════════════════════════
       SOURCE SELECTOR
       (class: source-selector / source-btn — rendered by JS)
    ═══════════════════════════════════════════════ */
    .source-selector {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin: 8px 0 16px;
      flex-wrap: wrap;
    }

    .source-btn {
      background: var(--bg3);
      border: 1px solid var(--border-hi);
      color: var(--txt-muted);
      padding: 8px 22px;
      border-radius: var(--rad-xs);
      font-size: .85em;
      font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all .22s cubic-bezier(.22,.68,0,1.2);
      outline: none;
    }
    .source-btn:hover:not(.active) {
      border-color: rgba(0,200,240,.3);
      color: var(--txt);
      background: rgba(0,200,240,.06);
    }
    .source-btn.active {
      background: linear-gradient(135deg, var(--cyan), #0090b8);
      border-color: transparent;
      color: #031820;
      font-weight: 800;
      box-shadow: 0 4px 16px rgba(0,200,240,.25);
      transform: translateY(-1px);
    }
    .source-btn:active { transform: scale(.97); }

    /* ═══════════════════════════════════════════════
       EPISODES ROW + LOADING
       (class: pro-episodes-row-wrap-pro — rendered by JS)
    ═══════════════════════════════════════════════ */
    .pro-episodes-row-wrap-pro {
      margin-top: 6px;
      padding-bottom: 8px;
      margin-bottom: 6px;
      transition: min-height .18s ease;
    }
    .pro-episodes-row-wrap-pro.is-loading { opacity: .65; pointer-events: none; }

    /* Section label above cards */
    .pro-episodes-row-wrap-pro::before {
      content: 'Episodes';
      display: block;
      font-size: .7em;
      font-weight: 700;
      letter-spacing: .1em;
      color: var(--cyan);
      text-transform: uppercase;
      margin-bottom: 12px;
      padding-left: 4px;
    }

    /* Horizontal scroller */
    .pro-episodes-row-pro {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding: 6px 4px 14px;
      -webkit-overflow-scrolling: touch;
      scroll-snap-type: x proximity;
      align-items: flex-start;
      scrollbar-width: thin;
      scrollbar-color: rgba(0,200,240,.2) transparent;
    }
    .pro-episodes-row-pro::-webkit-scrollbar { height: 4px; }
    .pro-episodes-row-pro::-webkit-scrollbar-track { background: transparent; }
    .pro-episodes-row-pro::-webkit-scrollbar-thumb { background: rgba(0,200,240,.2); border-radius: 4px; }

    /* ═══════════════════════════════════════════════
       EPISODE CARD
       (class: pro-episode-card-pro — rendered by JS)
    ═══════════════════════════════════════════════ */
    .pro-episode-card-pro {
      scroll-snap-align: start;
      flex: 0 0 148px;
      display: flex;
      flex-direction: column;
      gap: 0;
      align-items: stretch;
      text-decoration: none;
      color: var(--txt);
      border-radius: var(--radius);
      background: var(--bg2);
      border: 1px solid var(--border);
      overflow: hidden;
      min-height: 0;
      transition: transform .22s cubic-bezier(.22,.68,0,1.2), box-shadow .22s ease, border-color .22s ease;
      position: relative;
    }
    .pro-episode-card-pro:hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 12px 32px rgba(0,0,0,.55), 0 0 0 1px rgba(0,200,240,.25);
      border-color: rgba(0,200,240,.3);
    }
    .pro-episode-card-pro:active { transform: scale(.97); }

    /* shimmer top line on hover */
    .pro-episode-card-pro::before {
      content: '';
      position: absolute; top:0; left:0; right:0; height:2px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      opacity: 0;
      transition: opacity .22s;
    }
    .pro-episode-card-pro:hover::before { opacity: 1; }

    @media (max-width: 420px) {
      .pro-episode-card-pro { flex: 0 0 130px; }
    }
    @media (min-width: 900px) {
      .pro-episode-card-pro { flex: 0 0 180px; }
    }

    /* ── Thumbnail ── */
    .pro-ep-thumb-wrap-pro {
      width: 100%;
      aspect-ratio: 16/10;
      overflow: hidden;
      position: relative;
      background: var(--bg3);
      display: block;
      flex-shrink: 0;
    }

    .pro-ep-thumb-pro {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .3s ease;
    }
    .pro-episode-card-pro:hover .pro-ep-thumb-pro { transform: scale(1.06); }

    /* Episode number badge */
    .pro-ep-num-pro {
      position: absolute;
      bottom: 6px; left: 6px;
      background: rgba(4,8,15,.85);
      border: 1px solid var(--border-hi);
      color: var(--cyan);
      font-size: .68em;
      font-weight: 800;
      padding: 2px 7px;
      border-radius: 5px;
      backdrop-filter: blur(6px);
      letter-spacing: .04em;
    }

    /* Play button overlay */
    .pro-ep-thumb-wrap-pro::after {
      content: '▶';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(.8);
      width: 32px; height: 32px;
      background: rgba(0,200,240,.85);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .65em; color: #031820;
      line-height: 32px; text-align: center;
      opacity: 0;
      transition: opacity .22s, transform .22s;
    }
    .pro-episode-card-pro:hover .pro-ep-thumb-wrap-pro::after {
      opacity: 1;
      transform: translate(-50%,-50%) scale(1);
    }

    /* ── Episode title ── */
    .pro-ep-title-pro {
      font-size: .78em;
      font-weight: 600;
      color: var(--txt);
      padding: 8px 10px 10px;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ═══════════════════════════════════════════════
       TUTORIAL SECTION
       (rendered by JS inside episodes wrap)
    ═══════════════════════════════════════════════ */
    .pro-tutorial-title {
      font-family: 'Playfair Display', serif;
      font-size: 1em;
      font-weight: 700;
      color: #fff;
      margin: 24px 0 10px 2px;
      display: flex; align-items: center; gap: 8px;
    }
    .pro-tutorial-title::before {
      content: '';
      width: 14px; height: 2px;
      background: var(--cyan); border-radius: 2px; display: inline-block;
    }

    .pro-video-frame-wrap {
      position: relative;
      width: 100%; height: 0;
      padding-bottom: 56.25%;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border-hi);
      background: var(--bg2);
      box-shadow: 0 8px 28px rgba(0,0,0,.55);
    }
    .pro-video-frame-wrap iframe {
      position: absolute; top:0; left:0; width:100%; height:100%;
      border: 0; display: block; background: #000;
    }

    /* legacy classes used by JS */
    .pro-tutorial-wrap { padding: 0; }
    .pro-tutorial-hero {
      display: flex; flex-direction: column; gap: 6px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px; margin-bottom: 14px;
    }
    .pro-tutorial-hero h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.1em; font-weight: 700; color: #fff; margin: 0;
    }
    .pro-tutorial-hero p { font-size: .85em; color: var(--txt-muted); margin: 0; }
    .pro-tutorial-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px; margin-bottom: 20px;
    }
    .pro-tutorial-card .small-title {
      font-family: 'Playfair Display', serif;
      font-size: .95em; font-weight: 700; color: #fff; margin: 0 0 10px;
    }
    .pro-tutorial-card .pro-video-frame-wrap { margin-top: 0; }

    /* ═══════════════════════════════════════════════
       LOADING STATE
    ═══════════════════════════════════════════════ */
    .episodes-loading {
      display: flex; align-items: center; gap: 10px;
      padding: 20px 4px;
      color: var(--txt-muted); font-size: .88em;
    }
    .loading-dots span {
      display: inline-block; width: 6px; height: 6px;
      border-radius: 50%; background: var(--cyan);
      animation: dot-blink 1.2s ease-in-out infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: .2s; }
    .loading-dots span:nth-child(3) { animation-delay: .4s; }

    /* ═══════════════════════════════════════════════
       WHATSAPP POPUP
    ═══════════════════════════════════════════════ */
    #whatsappPopup {
      font-family: 'DM Sans', sans-serif !important;
      background: var(--bg2) !important;
      border: 1px solid var(--border-hi) !important;
      border-radius: 18px !important;
      box-shadow: 0 20px 60px rgba(0,0,0,.7) !important;
      padding: 24px !important;
      color: var(--txt) !important;
    }
    #whatsappPopup strong { color: #fff; }
    #whatsappPopup div[style*="margin-bottom:16px"] { color: var(--txt-muted) !important; font-size: .9em; }

    /* ═══════════════════════════════════════════════
       SAFE AREA + FOOTER
    ═══════════════════════════════════════════════ */
    @media (max-width: 600px) {
      body { padding-bottom: calc(120px + env(safe-area-inset-bottom)); }
    }

    /* ═══════════════════════════════════════════════
       MISC UTILITIES
    ═══════════════════════════════════════════════ */
    :focus { outline: none; }
    a { text-decoration: none; color: inherit; }

    /* Fade-in for #series-details on first paint */
    #series-details { animation: fade-up .5s cubic-bezier(.22,.68,0,1.2) .1s both; }
  </style>

  <!-- series.js (ALL LOGIC UNTOUCHED - renders header + episodes) -->
  <script defer src="series.js"></script>
</head>
<body>
  <div id="main-content">
    <header><!-- back button added by JS --></header>

    <!-- inline ad/legacy script kept as-is -->
    <script type="text/javascript" src="//www.highperformanceformat.com/c91a82435d260630918ecc80c95125ac/invoke.js"></script>

    <!-- main mount — JS renders everything here -->
    <div id="series-details" aria-live="polite"></div>
  </div>

  <!-- dynamic meta/title updater (unchanged) -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('series');
      if(!slug) return;
      fetch('/series.json').then(res => res.json()).then(seriesArr => {
        const meta = Array.isArray(seriesArr) ? seriesArr.find(s => s.slug === slug) : null;
        if (meta && meta.title) {
          document.title = `${meta.title} – SmTv Urdu`;
          const metaDesc = document.querySelector('meta[name="description"]');
          if (metaDesc) metaDesc.setAttribute('content', `${meta.title} - Watch all episodes of ${meta.title} in Urdu on SmTv Urdu. Turkish historical drama complete series.`);
        }
      }).catch(()=>{/* ignore */});
    });
  </script>

  <!-- WhatsApp Popup (markup unchanged, CSS upgraded above) -->
  <div id="whatsappPopup" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); max-width:340px; width:90vw; z-index:99999;">
    <div style="display:flex; align-items:center; gap:12px; margin-bottom:10px;">
      <img src="favicon.png" alt="Logo" style="width:40px;height:40px;border-radius:10px;">
      <strong style="font-size:1.1em">Stay Updated!</strong>
    </div>
    <div style="margin-bottom:16px;">Get instant notifications for new episodes. Join our WhatsApp Channel.</div>

  <!-- Prevent auto-scroll caused by focus (unchanged) -->
  <script>
    (function(){
      try { window.scrollTo(0,0); } catch(e){}
      document.addEventListener('focusin', function(ev){
        const x = window.scrollX || 0;
        const y = window.scrollY || 0;
        setTimeout(function(){ try { window.scrollTo(x,y); } catch(e){} }, 0);
      }, true);
      const details = document.getElementById('series-details');
      if (details) {
        const obs = new MutationObserver((mutations) => {
          if (details.childNodes.length > 0) {
            try { window.scrollTo({ top: 0, left: 0, behavior: 'auto' }); } catch(e){}
            obs.disconnect();
          }
        });
        obs.observe(details, { childList: true, subtree: false });

    })();

  <!-- FOOTER: robust include loader (ALL LOGIC UNTOUCHED) -->
  <div id="footer-placeholder"></div>

  <script>
  (async function loadFooterRobust(){
    const candidates = ['/includes/footer.html','includes/footer.html','./includes/footer.html','/footer.html','footer.html'];
    const placeholder = document.getElementById('footer-placeholder');

    function initNav(html) {
      try {
        placeholder.innerHTML = html;
        try {
          const curPad = parseInt(getComputedStyle(document.body).paddingBottom) || 0;
          const minPad = 96;
          if (curPad < minPad) document.body.style.paddingBottom = 'calc(96px + env(safe-area-inset-bottom))';
        } catch(e){}
        const nav = placeholder.querySelector('#smtv-bottom-nav') || placeholder.querySelector('.smtv-bottom-nav');
        if (!nav) return;
        const items = Array.from(nav.querySelectorAll('.nav-item'));
        items.forEach(i => i.classList.remove('active'));
        let seriesItem = items.find(i => ((i.dataset && (i.dataset.name || '').toLowerCase()) === 'series'));
        if (!seriesItem) {
          seriesItem = items.find(i => {
            const href = (i.getAttribute && i.getAttribute('href') || '').toLowerCase();
            return href && href.includes('series');
          });
        }
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('series') && seriesItem) {
          seriesItem.classList.add('active');
        } else {
          const path = location.pathname.toLowerCase();
          const byPath = items.find(i => (i.getAttribute('href')||'').toLowerCase().includes(path.split('/').pop()));
          if (byPath) byPath.classList.add('active'); else if (seriesItem) seriesItem.classList.add('active');
        }
        items.forEach(a => {
          if (a._smtvInit) return;
          a._smtvInit = true;
          a.addEventListener('click', function(e){
            try { e.preventDefault && e.preventDefault(); } catch(err){}
            items.forEach(i => i.classList.remove('active'));
            this.classList.add('active');
            try { localStorage.setItem('smtv_last_nav', this.dataset.name || this.getAttribute('href')); } catch(e){}
            const href = this.getAttribute('href');
            if (href) location.assign(href);
          }, { passive: false });
        });
      } catch (e) { console.warn('initNav error', e); }
    }

    for (const cand of candidates) {
      try {
        const res = await fetch(cand, { cache: 'no-cache' });
        if (!res.ok) continue;
        const text = await res.text();
        if (text.includes('smtv-bottom-nav') || text.includes('smtv-bottom')) {
          initNav(text);
          return;
        } else { initNav(text); return; }
      } catch (e) { continue; }
    }

    // fallback inline nav (unchanged)
    placeholder.innerHTML = `
      <nav class="smtv-bottom-nav" id="smtv-bottom-nav" role="navigation" aria-label="Main">
        <a href="/index.html" class="nav-item" data-name="home"><span class="icon-wrap"><i class="fa-solid fa-house"></i></span><span class="label">Home</span></a>
        <a href="/series.html" class="nav-item active" data-name="series"><span class="icon-wrap"><i class="fa-solid fa-film"></i></span><span class="label">Series</span></a>
        <a href="/clips.html" class="nav-item" data-name="clips"><span class="icon-wrap"><i class="fa-solid fa-play-circle"></i></span><span class="label">Clips</span></a>
        <a href="/premium.html" class="nav-item" data-name="premium"><span class="icon-wrap"><i class="fa-solid fa-star"></i></span><span class="label">Premium</span></a>
        <a href="/more.html" class="nav-item" data-name="more"><span class="icon-wrap"><i class="fa-solid fa-circle-info"></i></span><span class="label">More</span></a>
      </nav>
      <style>
        .smtv-bottom-nav{position:fixed;left:12px;right:12px;bottom:12px;height:64px;display:flex;gap:6px;padding:8px;border-radius:14px;background:rgba(10,10,12,0.9);align-items:center;z-index:1200;padding-bottom:calc(env(safe-area-inset-bottom) + 8px);}
        .smtv-bottom-nav .nav-item{flex:1;text-align:center;color:#bdbdbd;text-decoration:none;padding:6px;border-radius:10px;}
        .smtv-bottom-nav .nav-item.active{color:#fff;transform:translateY(-6px);}
        .smtv-bottom-nav .icon-wrap{display:inline-flex;width:40px;height:40px;align-items:center;justify-content:center;border-radius:10px;}
        .smtv-bottom-nav .label{display:block;font-size:12px;margin-top:3px;}
      </style>
    `;
    try { document.body.style.paddingBottom = 'calc(96px + env(safe-area-inset-bottom))'; } catch(e){}
  })();
  </script>
