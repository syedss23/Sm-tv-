<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>SmTv Urdu</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<style>
body {
  background:#04080f;
  color:#d8e8f8;
  font-family:sans-serif;
}

/* ===== EPISODE CARD ===== */
.pro-episode-card-pro {
  width:150px;
  border-radius:12px;
  overflow:hidden;
  background:#07101c;
  text-decoration:none;
  color:#fff;
}

/* ===== THUMBNAIL FIX ===== */
.pro-ep-thumb-wrap-pro {
  position:relative;
  width:100%;
  height:95px;
  overflow:hidden;
  background:#0a1624;
}

.pro-ep-thumb-pro {
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;

  /* IMPORTANT FIX */
  transform:translateZ(0);
  backface-visibility:hidden;
}

/* hover zoom */
.pro-episode-card-pro:hover .pro-ep-thumb-pro {
  transform:scale(1.08);
  transition:.3s;
}

/* PLAY ICON */
.ep-play-overlay {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#00c8f0;
  color:#000;
  width:30px;
  height:30px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  opacity:0;
}

.pro-episode-card-pro:hover .ep-play-overlay {
  opacity:1;
}

/* TITLE */
.pro-ep-title-pro {
  padding:8px;
  font-size:12px;
}
</style>

</head>

<body>

<div id="series-details"></div>

<!-- ===== DEMO DATA (SIMULATION) ===== -->
<script>
const data = [
  {title:"Episode 1", img:"https://picsum.photos/300/200?1"},
  {title:"Episode 2", img:"https://picsum.photos/300/200?2"},
  {title:"Episode 3", img:"https://picsum.photos/300/200?3"}
];

const container = document.getElementById("series-details");

data.forEach(ep=>{
  container.innerHTML += `
    <a class="pro-episode-card-pro">
      <div class="pro-ep-thumb-wrap-pro">
        <img class="pro-ep-thumb-pro"
             src="${ep.img}"
             loading="lazy"
             onerror="this.src='https://via.placeholder.com/300x200?text=No+Image'">

        <div class="ep-play-overlay">▶</div>
      </div>
      <div class="pro-ep-title-pro">${ep.title}</div>
    </a>
  `;
});
</script>

<!-- ===== FINAL PATCH SCRIPT (SAFE) ===== -->
<script>
(function(){

  const target = document.getElementById('series-details');
  if(!target) return;

  const obs = new MutationObserver(()=>{

    /* SAFE PLAY ICON (NO DUPLICATE) */
    document.querySelectorAll('.pro-ep-thumb-wrap-pro').forEach(wrap=>{
      if(wrap.dataset.done) return;
      wrap.dataset.done = "1";

      if(!wrap.querySelector('.ep-play-overlay')){
        const pl = document.createElement('div');
        pl.className = 'ep-play-overlay';
        pl.innerText = '▶';
        wrap.appendChild(pl);
      }
    });

    /* FORCE IMAGE RENDER FIX */
    document.querySelectorAll('.pro-ep-thumb-pro').forEach(img=>{
      if(img.dataset.fixed) return;
      img.dataset.fixed = "1";

      img.style.opacity="0.99";
      setTimeout(()=>img.style.opacity="1",50);
    });

  });

  obs.observe(target,{childList:true,subtree:true});

  /* STOP OBSERVER AFTER LOAD */
  setTimeout(()=>obs.disconnect(),5000);

})();
</script>

</body>
</html>
