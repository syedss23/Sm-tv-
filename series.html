  <meta charset="UTF-8">
  <title>SmTv Urdu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Watch Turkish drama series and historical shows in Urdu on SmTv Urdu. All series details and streaming links.">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:         #04080f;
      --bg2:        #07101c;
      --bg3:        #0b1828;
      --bg4:        #0e1f30;
      --border:     rgba(255,255,255,.07);
      --border-hi:  rgba(255,255,255,.12);
      --gold:       #e8a800;
      --gold-lt:    #ffc93c;
      --gold-dim:   #b07f00;
      --gold-glow:  rgba(232,168,0,.28);
      --gold-glow2: rgba(232,168,0,.12);
      --cyan:       #00c8f0;
      --cyan-dim:   rgba(0,200,240,.12);
      --cyan-glow:  rgba(0,200,240,.28);
      --green:      #00d98b;
      --red:        #ff4d6d;
      --txt:        #d8e8f8;
      --txt-muted:  #4e6880;
      --txt-soft:   #7a99b0;
      --radius:     16px;
      --rad-sm:     10px;
      --rad-xs:     7px;
      --transition: cubic-bezier(.22,.68,0,1.2);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--txt);
      font-family: 'DM Sans', 'Segoe UI', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
      min-height: 100dvh;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(0,200,240,.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,200,240,.018) 1px, transparent 1px);
      background-size: 52px 52px;
      mask-image: radial-gradient(ellipse 100% 60% at 50% 0%, black 30%, transparent);
    }
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 70% 50% at 85% 8%, rgba(232,168,0,.1) 0%, transparent 65%),
        radial-gradient(ellipse 55% 45% at 8% 75%, rgba(0,200,240,.08) 0%, transparent 65%),
        radial-gradient(ellipse 40% 30% at 50% 50%, rgba(0,0,0,.3) 0%, transparent 100%);
      animation: bg-breathe 14s ease-in-out infinite;
    }
    @keyframes bg-breathe { 0%,100%{opacity:1} 50%{opacity:.65} }

    @keyframes fade-up     { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fade-in     { from{opacity:0} to{opacity:1} }
    @keyframes shimmer     { 0%{background-position:-200% center} 100%{background-position:200% center} }
    @keyframes btn-shine   { 0%{left:-100%} 55%,100%{left:150%} }
    @keyframes dot-blink   { 0%,100%{opacity:1} 50%{opacity:.25} }
    @keyframes float       { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
    @keyframes spin-slow   { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    @keyframes pulse-glow  { 0%,100%{box-shadow:0 0 0 0 var(--gold-glow)} 50%{box-shadow:0 0 22px 4px var(--gold-glow2)} }
    @keyframes card-in     { from{opacity:0;transform:translateY(16px) scale(.97)} to{opacity:1;transform:translateY(0) scale(1)} }
    @keyframes premium-in  { from{opacity:0;transform:translateY(12px) scale(.98)} to{opacity:1;transform:translateY(0) scale(1)} }
    @keyframes scan-line   { 0%{top:-10%} 100%{top:110%} }
    @keyframes gradient-shift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
    @keyframes particle-float {
      0%   { transform:translateY(0) translateX(0) scale(1); opacity:.6; }
      33%  { transform:translateY(-8px) translateX(4px) scale(1.1); opacity:1; }
      66%  { transform:translateY(-4px) translateX(-3px) scale(.9); opacity:.7; }
      100% { transform:translateY(0) translateX(0) scale(1); opacity:.6; }
    }
    @keyframes pulse-ring {
      0%  { box-shadow:0 0 0 0 rgba(232,168,0,.4); }
      70% { box-shadow:0 0 0 8px rgba(232,168,0,0); }
      100%{ box-shadow:0 0 0 0 rgba(232,168,0,0); }
    }

    .reveal-item { opacity:0; transform:translateY(16px); transition:opacity .5s var(--transition),transform .5s var(--transition); }
    .reveal-item.show { opacity:1; transform:translateY(0); }

    #main-content { max-width:900px; margin:0 auto; padding:14px 14px 0; position:relative; z-index:1; }

    /* ── SERIES HEADER ── */
    .pro-series-header-pro {
      display:flex; flex-direction:column; align-items:stretch;
      text-align:center; gap:0; padding:0; border-radius:22px;
      background:transparent; box-shadow:none; position:relative;
      margin-bottom:22px; animation:fade-up .65s var(--transition) both; overflow:hidden;
    }

    /* ── POSTER: reduced height + contain so full image shows ── */
    .pro-series-poster-pro {
      width:100%;
      height:200px;                  /* reduced from 260px */
      border-radius:22px 22px 0 0;
      object-fit:contain;            /* full poster visible, no crop */
      object-position:center;
      display:block;
      flex-shrink:0;
      background:#0a0a0f;            /* dark bg behind poster */
    }

    .poster-gradient-overlay {
      position:absolute; left:0; right:0; top:120px; height:100px;
      background:linear-gradient(to bottom, transparent, var(--bg2));
      pointer-events:none; z-index:2;
    }
    .poster-scan {
      position:absolute; left:0; right:0; top:0; height:40px;
      background:linear-gradient(to bottom, rgba(0,200,240,.04), transparent);
      animation:scan-line 6s linear infinite; pointer-events:none; z-index:3;
    }

    .pro-series-back-btn-pro {
      position:absolute; left:12px; top:12px; z-index:10;
      width:40px; height:40px;
      display:inline-flex; align-items:center; justify-content:center;
      border-radius:var(--rad-sm); background:rgba(4,8,15,.82);
      border:1px solid var(--border-hi);
      backdrop-filter:blur(12px) saturate(1.4); -webkit-backdrop-filter:blur(12px) saturate(1.4);
      text-decoration:none; transition:background .22s,border-color .22s,transform .18s;
      box-shadow:0 4px 16px rgba(0,0,0,.4);
    }
    .pro-series-back-btn-pro:hover { background:rgba(0,200,240,.18); border-color:rgba(0,200,240,.4); transform:translateX(-2px); }
    .pro-series-back-btn-pro i { color:var(--txt); font-size:.9em; }

    .pro-series-meta-pro {
      width:100%; background:var(--bg2); border:1px solid var(--border); border-top:none;
      border-radius:0 0 22px 22px; padding:20px 20px 24px;
      text-align:center; position:relative; z-index:3;
    }
    .pro-series-meta-pro::before {
      content:''; position:absolute; top:0; left:10%; right:10%; height:1px;
      background:linear-gradient(90deg, transparent, var(--border-hi), transparent);
    }
    .pro-series-title-pro {
      font-family:'Playfair Display',serif; font-size:clamp(1.5em,5.5vw,2.1em);
      font-weight:800; color:#fff; margin:0 0 10px; letter-spacing:-.015em;
      line-height:1.15; text-shadow:0 2px 20px rgba(0,0,0,.5);
    }
    .pro-series-desc-pro { font-size:.875em; color:var(--txt-soft); line-height:1.7; max-width:640px; margin:0 auto 18px; }

    .series-stats-row { display:flex; align-items:center; justify-content:center; gap:12px; flex-wrap:wrap; margin-bottom:18px; }
    .series-stat-badge { display:inline-flex; align-items:center; gap:5px; padding:5px 12px; border-radius:100px; font-size:.75em; font-weight:700; letter-spacing:.04em; border:1px solid; }
    .stat-badge-cyan  { background:rgba(0,200,240,.08); border-color:rgba(0,200,240,.2); color:var(--cyan); }
    .stat-badge-gold  { background:rgba(232,168,0,.08); border-color:rgba(232,168,0,.2); color:var(--gold); }
    .stat-badge-green { background:rgba(0,217,139,.08); border-color:rgba(0,217,139,.2); color:var(--green); }

    /* ═══════════════════════════════════════════════
       PREMIUM SECTION — COMPACT HIGH-CTR PREMIUM UPSELL
       • Crown icon
       • "Get Premium" CTA — NO WhatsApp logo
       • NO "12K+ joined"
       • Features: No Ads, Fast Download, Early Access, HD
       • "See details" link to /premium.html
    ═══════════════════════════════════════════════ */
    .premium-channel-message {
      position:relative; overflow:hidden; border-radius:14px;
      background:linear-gradient(145deg,#0f1d2e 0%,#091523 100%);
      padding:1.5px; margin-top:6px;
      animation:premium-in .6s var(--transition) .3s both;
    }
    /* Animated gradient border */
    .premium-channel-message::before {
      content:''; position:absolute; inset:0; border-radius:14px; padding:1.5px;
      background:linear-gradient(135deg,var(--gold-dim),var(--gold),var(--gold-lt),var(--gold-dim));
      background-size:300% 300%; animation:gradient-shift 4s ease infinite;
      -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
      mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
      -webkit-mask-composite:xor; mask-composite:exclude;
      pointer-events:none; z-index:0;
    }
    .premium-channel-message::after {
      content:''; position:absolute; top:-40px; right:-40px;
      width:120px; height:120px;
      background:radial-gradient(circle,rgba(232,168,0,.2) 0%,transparent 65%);
      pointer-events:none; z-index:0;
    }
    .pcm-inner {
      position:relative; z-index:1; border-radius:13px;
      background:linear-gradient(145deg,#0f1d2e 0%,#08121e 100%);
      padding:14px 16px; display:flex; gap:14px; align-items:center;
    }
    /* Floating particles */
    .pcm-particles { position:absolute; inset:0; pointer-events:none; overflow:hidden; border-radius:13px; }
    .pcm-particle  { position:absolute; width:3px; height:3px; border-radius:50%; background:var(--gold); opacity:.4; }
    .pcm-particle:nth-child(1){ top:20%;left:8%;  animation:particle-float 3.2s ease-in-out infinite; }
    .pcm-particle:nth-child(2){ top:65%;left:15%; animation:particle-float 4.1s ease-in-out infinite .6s; }
    .pcm-particle:nth-child(3){ top:35%;right:12%;animation:particle-float 3.7s ease-in-out infinite 1.2s; background:var(--cyan); }
    .pcm-particle:nth-child(4){ top:75%;right:20%;animation:particle-float 2.9s ease-in-out infinite .3s; }

    .pcm-icon-wrap {
      flex-shrink:0; width:44px; height:44px; border-radius:11px;
      background:linear-gradient(145deg,rgba(232,168,0,.22),rgba(232,168,0,.07));
      border:1px solid rgba(232,168,0,.35);
      display:flex; align-items:center; justify-content:center; font-size:1.3em;
      box-shadow:0 4px 16px rgba(232,168,0,.2),inset 0 1px 0 rgba(255,255,255,.06);
      animation:float 3s ease-in-out infinite,pulse-ring 3s ease-in-out infinite;
    }
    .pcm-content { flex:1; min-width:0; }
    .pcm-headline { font-size:.88em; font-weight:800; color:#fff; line-height:1.3; margin-bottom:3px; letter-spacing:-.01em; }
    .pcm-headline .gold-word {
      background:linear-gradient(90deg,var(--gold),var(--gold-lt));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      background-clip:text; background-size:200% auto; animation:shimmer 2.5s linear infinite;
    }
    .pcm-sub { font-size:.74em; color:var(--txt-muted); line-height:1.4; margin-bottom:8px; }
    .pcm-features { display:flex; gap:5px; flex-wrap:wrap; }
    .pcm-feature {
      font-size:.65em; font-weight:700; padding:2px 8px; border-radius:100px;
      letter-spacing:.03em; white-space:nowrap; display:flex; align-items:center; gap:3px;
    }
    .pcm-feature-gold  { background:linear-gradient(135deg,rgba(232,168,0,.14),rgba(232,168,0,.06)); border:1px solid rgba(232,168,0,.25); color:var(--gold-lt); }
    .pcm-feature-cyan  { background:linear-gradient(135deg,rgba(0,200,240,.1),rgba(0,200,240,.03));  border:1px solid rgba(0,200,240,.2);   color:var(--cyan); }
    .pcm-feature-green { background:linear-gradient(135deg,rgba(0,217,139,.1),rgba(0,217,139,.03)); border:1px solid rgba(0,217,139,.2);   color:var(--green); }

    .pcm-cta-wrap { flex-shrink:0; display:flex; flex-direction:column; align-items:center; gap:6px; }
    /* CTA button — NO WhatsApp logo, premium gold style */
    .pcm-cta-btn {
      display:inline-flex; align-items:center; justify-content:center; gap:6px;
      background:linear-gradient(135deg,var(--gold) 0%,var(--gold-lt) 60%,#ffdc70 100%);
      background-size:200% auto; color:#1a0800;
      font-weight:900; font-size:.78em; font-family:'DM Sans',sans-serif;
      letter-spacing:.05em; text-transform:uppercase;
      padding:10px 16px; border-radius:var(--rad-sm);
      box-shadow:0 4px 20px var(--gold-glow),inset 0 1px 0 rgba(255,255,255,.3);
      text-decoration:none; position:relative; overflow:hidden;
      transition:box-shadow .25s,transform .15s; white-space:nowrap;
      border:none; cursor:pointer;
    }
    .pcm-cta-btn::before {
      content:''; position:absolute; top:0; left:-100%; width:60%; height:100%;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);
      animation:btn-shine 2s ease-in-out infinite;
    }
    .pcm-cta-btn:hover { box-shadow:0 6px 28px rgba(232,168,0,.6); transform:translateY(-2px) scale(1.03); }
    .pcm-cta-btn:active { transform:scale(.95); }
    .pcm-more-link {
      font-size:.66em; color:var(--txt-muted); text-decoration:none;
      letter-spacing:.02em; transition:color .2s; white-space:nowrap;
      display:flex; align-items:center; gap:3px;
    }
    .pcm-more-link:hover { color:var(--gold); }
    .pcm-more-link i { font-size:.85em; }

    @media (max-width:520px) {
      .pcm-inner { flex-direction:column; align-items:flex-start; gap:12px; padding:12px 14px; }
      .pcm-cta-wrap { width:100%; flex-direction:row; align-items:center; justify-content:space-between; }
      .pcm-cta-btn { flex:1; justify-content:center; }
    }

    /* ── SEASON TABS ── */
    .pro-seasons-tabs-pro { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin:20px 0 14px; padding:0; }
    .pro-season-tab-pro {
      background:var(--bg2); border:1px solid var(--border-hi); color:var(--txt-muted);
      padding:9px 22px; border-radius:100px; cursor:pointer; font-weight:700; font-size:.85em;
      font-family:'DM Sans',sans-serif; letter-spacing:.03em;
      transition:all .22s var(--transition); outline:none; position:relative; overflow:hidden;
    }
    .pro-season-tab-pro:hover:not(.active) { border-color:rgba(0,200,240,.35); color:var(--txt); background:rgba(0,200,240,.07); transform:translateY(-1px); }
    .pro-season-tab-pro.active { background:linear-gradient(135deg,var(--cyan) 0%,#0090b8 100%); border-color:transparent; color:#021018; font-weight:800; transform:translateY(-2px); box-shadow:0 6px 24px var(--cyan-glow); }
    .pro-season-tab-pro:active { transform:scale(.96); }

    /* ── SOURCE SELECTOR ── */
    .source-selector { display:flex; gap:8px; justify-content:center; margin:0 0 18px; flex-wrap:wrap; }
    .source-btn { background:var(--bg3); border:1px solid var(--border-hi); color:var(--txt-muted); padding:7px 20px; border-radius:var(--rad-xs); font-size:.83em; font-weight:700; font-family:'DM Sans',sans-serif; cursor:pointer; transition:all .22s var(--transition); outline:none; }
    .source-btn:hover:not(.active) { border-color:rgba(0,200,240,.35); color:var(--txt); background:rgba(0,200,240,.07); }
    .source-btn.active { background:linear-gradient(135deg,var(--cyan) 0%,#0090b8 100%); border-color:transparent; color:#021018; font-weight:800; box-shadow:0 4px 16px var(--cyan-glow); transform:translateY(-1px); }
    .source-btn:active { transform:scale(.96); }

    /* ── EPISODES ROW ── */
    .pro-episodes-row-wrap-pro { margin-top:6px; padding-bottom:10px; margin-bottom:8px; transition:opacity .2s ease; }
    .pro-episodes-row-wrap-pro.is-loading { opacity:.55; pointer-events:none; }
    .pro-episodes-row-wrap-pro::before { display:none !important; }

    .episodes-section-label { display:flex; align-items:center; gap:10px; font-size:.7em; font-weight:800; letter-spacing:.12em; color:var(--cyan); text-transform:uppercase; margin-bottom:14px; padding-left:2px; }
    .episodes-section-label::after { content:''; flex:1; height:1px; background:linear-gradient(to right,rgba(0,200,240,.25),transparent); }

    .pro-episodes-row-pro { display:flex; gap:12px; overflow-x:auto; padding:4px 2px 16px; -webkit-overflow-scrolling:touch; scroll-snap-type:x proximity; align-items:flex-start; scrollbar-width:thin; scrollbar-color:rgba(0,200,240,.22) transparent; }
    .pro-episodes-row-pro::-webkit-scrollbar { height:4px; }
    .pro-episodes-row-pro::-webkit-scrollbar-track { background:transparent; }
    .pro-episodes-row-pro::-webkit-scrollbar-thumb { background:rgba(0,200,240,.22); border-radius:4px; }

    /* ── EPISODE CARD ── */
    .pro-episode-card-pro {
      scroll-snap-align:start; flex:0 0 150px;
      display:flex; flex-direction:column; gap:0; align-items:stretch;
      text-decoration:none; color:var(--txt); border-radius:14px;
      background:var(--bg2); border:1px solid var(--border);
      overflow:hidden; min-height:0;
      transition:transform .26s var(--transition),box-shadow .26s ease,border-color .26s ease;
      position:relative;
    }
    .pro-episode-card-pro:hover { transform:translateY(-6px) scale(1.025); box-shadow:0 16px 40px rgba(0,0,0,.6),0 0 0 1px rgba(0,200,240,.3); border-color:rgba(0,200,240,.35); }
    .pro-episode-card-pro:active { transform:scale(.97); }
    .pro-episode-card-pro::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--cyan),transparent); opacity:0; transition:opacity .22s; z-index:4; }
    .pro-episode-card-pro:hover::before { opacity:1; }

    @media (max-width:420px) { .pro-episode-card-pro { flex:0 0 132px; } }
    @media (min-width:900px) { .pro-episode-card-pro { flex:0 0 178px; } }

    /* ── THUMBNAIL WRAP — black box fix ── */
    .pro-ep-thumb-wrap-pro {
      width:100%; aspect-ratio:16/10; overflow:hidden; position:relative;
      /* dark navy gradient — NOT black — so placeholder looks good */
      background:linear-gradient(160deg,#0d1e30 0%,#0a1624 50%,#080e18 100%);
      display:block; flex-shrink:0;
    }
    /* subtle shimmer skeleton */
    .pro-ep-thumb-wrap-pro::before {
      content:''; position:absolute; inset:0; z-index:1;
      background:linear-gradient(90deg,transparent 0%,rgba(0,200,240,.04) 40%,rgba(255,255,255,.03) 50%,transparent 100%);
      background-size:200% 100%; animation:shimmer 2s ease-in-out infinite; pointer-events:none;
    }
    /* THE img fix — absolute fill, object-fit:cover, above skeleton */
    .pro-ep-thumb-pro {
      width:100% !important; height:100% !important;
      object-fit:cover !important; object-position:center !important;
      display:block !important; position:absolute !important;
      top:0 !important; left:0 !important; z-index:2;
      transition:transform .32s ease;
    }
    .pro-episode-card-pro:hover .pro-ep-thumb-pro { transform:scale(1.08); }

    .pro-ep-num-pro {
      position:absolute; bottom:6px; left:6px; z-index:3;
      background:rgba(4,8,15,.88); border:1px solid var(--border-hi);
      color:var(--cyan); font-size:.67em; font-weight:800;
      padding:2px 8px; border-radius:5px;
      backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); letter-spacing:.05em;
    }

    .ep-play-overlay {
      position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%) scale(.75);
      width:34px; height:34px; background:rgba(0,200,240,.88); border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      color:#021018; font-size:.65em; opacity:0;
      transition:opacity .22s,transform .22s; z-index:4; pointer-events:none;
      box-shadow:0 0 18px var(--cyan-glow);
    }
    .pro-episode-card-pro:hover .ep-play-overlay { opacity:1; transform:translate(-50%,-50%) scale(1); }

    /* ── EPISODE TITLE ──
       Shows "Episode 1" by default.
       If json has "title" field, shows e.g. "Episode 1 — The Beginning"
       Two lines max, ellipsis on overflow.
    ── */
    .pro-ep-title-pro {
      font-size:.77em; font-weight:600; color:var(--txt);
      padding:9px 10px 11px; line-height:1.45;
      display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
    }
    /* The episode number part: slightly muted */
    .ep-title-num { color:var(--txt-muted); font-weight:700; }
    /* The custom title part: brighter */
    .ep-title-name { color:var(--txt); }

    /* ── TUTORIAL SECTION ── */
    .pro-tutorial-title { font-family:'Playfair Display',serif; font-size:1.05em; font-weight:700; color:#fff; margin:28px 0 12px 2px; display:flex; align-items:center; gap:10px; }

<body>

  <!-- ═══════════════════════════════════════════
       PATCH SCRIPT
       Fixes: poster, thumbnails, premium section,
       episode title display, card animations
  ═══════════════════════════════════════════ -->
  <script>
  (function patchPosterAndCards() {
    const observer = new MutationObserver(() => {

      /* ── 1. POSTER FIX ──
         Full poster visible: contain + 200px height + dark bg
      */
      const poster = document.querySelector('.pro-series-poster-pro');
      if (poster && !poster._patched) {
        poster._patched = true;
        poster.style.cssText += ';width:100%;height:200px;object-fit:contain;object-position:center;display:block;background:#0a0a0f;';
        const header = poster.closest('.pro-series-header-pro');
        if (header && !header.querySelector('.poster-gradient-overlay')) {
          const grad = document.createElement('div');
          grad.className = 'poster-gradient-overlay';
          header.appendChild(grad);
          const scan = document.createElement('div');
          scan.className = 'poster-scan';
          header.appendChild(scan);
        }
      }

      /* ── 2. THUMBNAIL BLACK BOX FIX ──
         img is forced to fill wrapper completely.
         onerror hides broken images gracefully.
      */
      document.querySelectorAll('.pro-ep-thumb-wrap-pro').forEach(wrap => {
        if (wrap._patched) return;
        wrap._patched = true;
        wrap.style.background = '';

        const img = wrap.querySelector('.pro-ep-thumb-pro, img');
        if (img) {
          img.style.cssText +=
            ';width:100%!important;height:100%!important;' +
            'object-fit:cover!important;object-position:center!important;' +
            'display:block!important;position:absolute!important;' +
            'top:0!important;left:0!important;z-index:2;';
          if (!img._errPatched) {
            img._errPatched = true;
            img.addEventListener('error', function(){ this.style.display='none'; });
          }
        }

        if (!wrap.querySelector('.ep-play-overlay')) {
          const pl = document.createElement('div');
          pl.className = 'ep-play-overlay';
          pl.innerHTML = '▶';
          wrap.appendChild(pl);
        }
      });

      /* ── 3. EPISODE TITLE DISPLAY ──
         series.js already renders:
           <div class="pro-ep-title-pro">Episode 1</div>          ← no title in json
           <div class="pro-ep-title-pro">The Beginning</div>      ← title set in json
         
         We enhance the display so it always shows:
           "Ep 1"  (if no custom title)
           "Ep 1 — The Beginning"  (if title in json)
         
         We detect if the text is just "Episode N" (default)
         or a custom title, and style them accordingly.
         This works WITHOUT touching series.js.
      */
      document.querySelectorAll('.pro-ep-title-pro').forEach(titleEl => {
        if (titleEl._titlePatched) return;
        titleEl._titlePatched = true;

        const raw = titleEl.textContent.trim();
        // series.js sets title = ep.title || ('Episode ' + epNum)
        // So if it starts with "Episode " followed by just a number, it's the default
        const defaultMatch = raw.match(/^Episode\s+(\d+)$/i);

        if (defaultMatch) {
          // No custom title — just style the number nicely
          titleEl.innerHTML = `<span class="ep-title-num">Episode ${defaultMatch[1]}</span>`;
        } else {
          // Has custom title from json — could be "The Beginning" or "Episode 1 — The Beginning"
          // series.js sets it as ep.title directly, so raw IS the title text
          // Check if it already contains "Episode N" prefix
          const withEpMatch = raw.match(/^Episode\s+(\d+)\s*[—\-]\s*(.+)$/i);
          if (withEpMatch) {
            titleEl.innerHTML =
              `<span class="ep-title-num">Ep ${withEpMatch[1]}</span>` +
              `<span class="ep-title-name"> — ${withEpMatch[2]}</span>`;
          } else {
            // Pure custom title (e.g. "The Beginning") — wrap as name only
            titleEl.innerHTML = `<span class="ep-title-name">${raw}</span>`;
          }
        }
      });

      /* ── 4. CARD ENTRANCE STAGGER ── */
      document.querySelectorAll('.pro-episode-card-pro').forEach((card, i) => {
        if (card._animated) return;
        card._animated = true;
        card.style.animationDelay = `${i * 0.05}s`;
        card.classList.add('card-animate');
      });

      /* ── 5. EPISODES SECTION LABEL ── */
      document.querySelectorAll('.pro-episodes-row-wrap-pro').forEach(wrap => {
        if (wrap._labelDone) return;
        wrap._labelDone = true;
        const lbl = document.createElement('div');
        lbl.className = 'episodes-section-label';
        lbl.textContent = 'Episodes';
        wrap.insertBefore(lbl, wrap.firstChild);
      });

      /* ── 6. PREMIUM SECTION — CORRECT VERSION ──
         Crown icon, "Get Premium" CTA, NO WhatsApp logo,
         NO "12K+ joined", premium features listed.
      */
      document.querySelectorAll('.premium-channel-message').forEach(pcm => {
        if (pcm._upgraded) return;
        pcm._upgraded = true;
        if (pcm.querySelector('.pcm-inner')) return;

        pcm.innerHTML = `
          <div class="pcm-inner">
            <div class="pcm-particles">
              <div class="pcm-particle"></div>
              <div class="pcm-particle"></div>
              <div class="pcm-particle"></div>
              <div class="pcm-particle"></div>
            </div>
            <div class="pcm-icon-wrap">👑</div>
            <div class="pcm-content">
              <div class="pcm-headline">
                Watch <span class="gold-word">Premium</span> — Upgrade Now
              </div>
              <div class="pcm-sub">Ad-free episodes, fast downloads &amp; early access.</div>
              <div class="pcm-features">
                <span class="pcm-feature pcm-feature-gold">⚡ No Ads</span>
                <span class="pcm-feature pcm-feature-cyan">⬇ Fast Download</span>
                <span class="pcm-feature pcm-feature-green">🔓 Early Access</span>
                <span class="pcm-feature pcm-feature-gold">🎬 HD Quality</span>
              </div>
            </div>
            <div class="pcm-cta-wrap">
              <a href="/premium.html" class="pcm-cta-btn">
                <i class="fa-solid fa-crown"></i>
                Get Premium
              </a>
              <a href="/premium.html" class="pcm-more-link">
                See details <i class="fa-solid fa-chevron-right"></i>
              </a>
            </div>
          </div>
        `;
      });
    });

    observer.observe(document.body, { childList: true, subtree: true });
    setTimeout(() => observer.disconnect(), 8000);
  })();
  </script>

  <!-- DYNAMIC META/TITLE UPDATER (unchanged) -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('series');
      if (!slug) return;
      fetch('/series.json')
        .then(res => res.json())
        .then(seriesArr => {
          const meta = Array.isArray(seriesArr) ? seriesArr.find(s => s.slug === slug) : null;
          if (meta && meta.title) {
            document.title = `${meta.title} – SmTv Urdu`;
            const metaDesc = document.querySelector('meta[name="description"]');
            if (metaDesc) metaDesc.setAttribute('content',
              `${meta.title} - Watch all episodes of ${meta.title} in Urdu on SmTv Urdu. Turkish historical drama complete series.`);
          }
        }).catch(() => {});
    });
  </script>

  <!-- WHATSAPP POPUP -->

    </div>
    <div style="text-align:center;">

                onmouseover="this.style.color='#ff4d6d';this.style.borderColor='rgba(255,77,109,.3)'"

  <script>
    window.addEventListener('DOMContentLoaded', function() {
      const popup    = document.getElementById('whatsappPopup');
      const backdrop = document.getElementById('wa-backdrop');
      const closeBtn = document.getElementById('closeWhatsAppPopup');
      function showPopup() { if(popup) popup.style.display='block'; if(backdrop) backdrop.classList.add('show'); }
      function hidePopup() { if(popup) popup.style.display='none'; if(backdrop) backdrop.classList.remove('show'); }
      setTimeout(showPopup, 2200);
      if (closeBtn) closeBtn.addEventListener('click', hidePopup);
      if (backdrop) backdrop.addEventListener('click', hidePopup);
    });
  </script>

  <!-- PREVENT AUTO-SCROLL (unchanged) -->
  <script>
    (function(){
      try { window.scrollTo(0,0); } catch(e){}
      document.addEventListener('focusin', function(){
        const x = window.scrollX||0, y = window.scrollY||0;
        setTimeout(function(){ try{window.scrollTo(x,y);}catch(e){} }, 0);
      }, true);
      const details = document.getElementById('series-details');
      if (details) {
        const obs = new MutationObserver(() => {
          if (details.childNodes.length > 0) {
            try{window.scrollTo({top:0,left:0,behavior:'auto'});}catch(e){window.scrollTo(0,0);}
            obs.disconnect();
          }
        });
        obs.observe(details, { childList:true, subtree:false });
      }
    })();
  </script>

  <!-- REVEAL ON SCROLL -->
  <script>
    (function(){
      const io = new IntersectionObserver((entries) => {
        entries.forEach(e => { if(e.isIntersecting){ e.target.classList.add('show'); io.unobserve(e.target); } });
      }, { threshold:0.12 });
      function observeReveal() { document.querySelectorAll('.reveal-item:not(.show)').forEach(el => io.observe(el)); }
      observeReveal();
      const mo = new MutationObserver(observeReveal);
      const sd = document.getElementById('series-details');
      if (sd) mo.observe(sd, { childList:true, subtree:true });
    })();
  </script>

  <!-- FOOTER -->
  <div id="footer-placeholder"></div>
  <script>
  (async function loadFooterRobust(){
    const candidates = ['/includes/footer.html','includes/footer.html','./includes/footer.html','/footer.html','footer.html'];
    const placeholder = document.getElementById('footer-placeholder');
    function initNav(html) {
      try {
        placeholder.innerHTML = html;
        try { const curPad=parseInt(getComputedStyle(document.body).paddingBottom)||0; if(curPad<96) document.body.style.paddingBottom='calc(96px + env(safe-area-inset-bottom))'; } catch(e){}
        const nav = placeholder.querySelector('#smtv-bottom-nav')||placeholder.querySelector('.smtv-bottom-nav');
        if (!nav) return;
        const items = Array.from(nav.querySelectorAll('.nav-item'));
        items.forEach(i => i.classList.remove('active'));
        let seriesItem = items.find(i => ((i.dataset&&(i.dataset.name||'').toLowerCase())==='series'));
        if (!seriesItem) seriesItem = items.find(i => { const href=(i.getAttribute&&i.getAttribute('href')||'').toLowerCase(); return href&&href.includes('series'); });
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('series')&&seriesItem) { seriesItem.classList.add('active'); }
        else { const path=location.pathname.toLowerCase(); const byPath=items.find(i=>(i.getAttribute('href')||'').toLowerCase().includes(path.split('/').pop())); if(byPath) byPath.classList.add('active'); else if(seriesItem) seriesItem.classList.add('active'); }
        items.forEach(a => {
          if (a._smtvInit) return; a._smtvInit=true;
          a.addEventListener('click', function(e){ try{e.preventDefault&&e.preventDefault();}catch(err){} items.forEach(i=>i.classList.remove('active')); this.classList.add('active'); try{localStorage.setItem('smtv_last_nav',this.dataset.name||this.getAttribute('href'));}catch(e){} const href=this.getAttribute('href'); if(href) location.assign(href); }, {passive:false});
        });
      } catch(e){ console.warn('initNav error',e); }
    }
    for (const cand of candidates) {
      try { const res=await fetch(cand,{cache:'no-cache'}); if(!res.ok) continue; const text=await res.text(); initNav(text); return; } catch(e){ continue; }
    }
    placeholder.innerHTML = `
      <nav class="smtv-bottom-nav" id="smtv-bottom-nav" role="navigation" aria-label="Main">
        <a href="/index.html" class="nav-item" data-name="home"><span class="icon-wrap"><i class="fa-solid fa-house"></i></span><span class="label">Home</span></a>
        <a href="/series.html" class="nav-item active" data-name="series"><span class="icon-wrap"><i class="fa-solid fa-film"></i></span><span class="label">Series</span></a>
        <a href="/clips.html" class="nav-item" data-name="clips"><span class="icon-wrap"><i class="fa-solid fa-play-circle"></i></span><span class="label">Clips</span></a>
        <a href="/premium.html" class="nav-item" data-name="premium"><span class="icon-wrap"><i class="fa-solid fa-star"></i></span><span class="label">Premium</span></a>
        <a href="/more.html" class="nav-item" data-name="more"><span class="icon-wrap"><i class="fa-solid fa-circle-info"></i></span><span class="label">More</span></a>
      </nav>
      <style>
        .smtv-bottom-nav{position:fixed;left:12px;right:12px;bottom:12px;height:64px;display:flex;gap:6px;padding:8px;border-radius:14px;background:rgba(10,10,12,0.9);backdrop-filter:blur(12px);align-items:center;z-index:1200;padding-bottom:calc(env(safe-area-inset-bottom) + 8px);}
        .smtv-bottom-nav .nav-item{flex:1;text-align:center;color:#bdbdbd;text-decoration:none;padding:6px;border-radius:10px;transition:color .2s,transform .2s;}
        .smtv-bottom-nav .nav-item.active{color:#fff;transform:translateY(-6px);}
        .smtv-bottom-nav .icon-wrap{display:inline-flex;width:40px;height:40px;align-items:center;justify-content:center;border-radius:10px;}
        .smtv-bottom-nav .label{display:block;font-size:12px;margin-top:3px;}
      </style>
    `;
    try { document.body.style.paddingBottom='calc(96px + env(safe-area-inset-bottom))'; } catch(e){}
  })();
  </script>
