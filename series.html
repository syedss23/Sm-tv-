<!DOCTYPE html>
<html lang="en">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-WM3KEDD127"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-WM3KEDD127');
  </script>

  <meta charset="UTF-8">
  <title>SmTv Urdu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Watch Turkish drama series and historical shows in Urdu on SmTv Urdu.">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --bg:#04080f;
      --bg2:#07101c;
      --border:rgba(255,255,255,.07);
      --cyan:#00c8f0;
      --txt:#d8e8f8;
      --txt-muted:#4e6880;
    }

    * {
      box-sizing:border-box;
      margin:0;
      padding:0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background:var(--bg);
      color:var(--txt);
      font-family:'Segoe UI',sans-serif;
      overflow-x:hidden;
    }

    #main-content {
      max-width:900px;
      margin:auto;
      padding:14px;
    }

    /* HEADER */
    .pro-series-header-pro {
      border-radius:18px;
      background:var(--bg2);
      overflow:hidden;
      margin-bottom:20px;
      box-shadow:0 10px 30px rgba(0,0,0,.5);
    }

    .pro-series-poster-pro {
      width:100%;
      height:200px;
      object-fit:cover;
      display:block;
    }

    .pro-series-meta-pro {
      padding:18px;
      text-align:center;
    }

    .pro-series-title-pro {
      font-size:1.6em;
      font-weight:800;
      margin-bottom:8px;
    }

    .pro-series-desc-pro {
      font-size:.9em;
      color:#7a99b0;
    }

    /* EPISODES */
    .pro-episodes-row-pro {
      display:flex;
      gap:12px;
      overflow-x:auto;
      padding-bottom:10px;
    }

    .pro-episode-card-pro {
      flex:0 0 140px;
      background:var(--bg2);
      border-radius:12px;
      overflow:hidden;
      text-decoration:none;
      color:#fff;
      border:1px solid var(--border);
      transition:transform .2s;
    }

    /* 🔥 FIXED (NO SCALE) */
    .pro-episode-card-pro:hover {
      transform:translateY(-4px);
    }

    .pro-ep-thumb-wrap-pro {
      height:90px;
      background:#0a1624;
      position:relative;
      overflow:hidden;
    }

    .pro-ep-thumb-pro {
      width:100%;
      height:100%;
      object-fit:cover;

      /* 🔥 FIX */
      backface-visibility:hidden;
      transform:translateZ(0);
    }

    .pro-ep-num-pro {
      position:absolute;
      bottom:6px;
      left:6px;
      background:#000;
      padding:2px 6px;
      font-size:11px;
      border-radius:4px;
    }

    .pro-ep-title-pro {
      padding:8px;
      font-size:.8em;
      text-align:center;
    }

    /* WHATSAPP */
    #whatsappPopup {
      display:none;
      position:fixed;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      background:#111;
      padding:20px;
      border-radius:14px;
      z-index:9999;
    }

    @media (max-width:600px){
      body{
        padding-bottom:120px;
      }
    }
  </style>

  <script defer src="series.js"></script>
</head>

<body>

<div id="main-content">
  <header></header>

  <script src="//www.highperformanceformat.com/c91a82435d260630918ecc80c95125ac/invoke.js"></script>

  <div id="series-details"></div>
</div>

<!-- SAFE PATCH -->
<script>
(function(){
  const obs = new MutationObserver(() => {

    document.querySelectorAll('.pro-ep-thumb-wrap-pro').forEach(wrap=>{
      if(wrap._done) return;
      wrap._done=true;

      let play=document.createElement('div');
      play.textContent='▶';
      play.style.position='absolute';
      play.style.top='50%';
      play.style.left='50%';
      play.style.transform='translate(-50%,-50%)';
      play.style.opacity='0.8';
      play.style.fontSize='14px';

      wrap.appendChild(play);
    });

  });

  obs.observe(document.body,{childList:true,subtree:true});
})();
</script>

<!-- NO AUTO SCROLL BUG -->
<script>
(function(){
  window.scrollTo(0,0);

  document.addEventListener('focusin',()=>{
    let x=window.scrollX,y=window.scrollY;
    setTimeout(()=>window.scrollTo(x,y),0);
  },true);
})();
</script>

</body>
</html>
