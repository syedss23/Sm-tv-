<!DOCTYPE html>
<html lang="en">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-WM3KEDD127"></script>

    window.dataLayer=window.dataLayer||[];
    function gtag(){dataLayer.push(arguments);}
    gtag('js',new Date());

  <meta charset="UTF-8">
  <title>SmTv Urdu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Watch Turkish drama series and historical shows in Urdu on SmTv Urdu.">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800;900&family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600;1,700&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    /* ─── BASE ─────────────────────────────────── */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;-webkit-text-size-adjust:none;}
    body{
      background:#07090f;
      color:#e2ecf8;
      font-family:'Inter','Segoe UI',system-ui,sans-serif;
      -webkit-font-smoothing:antialiased;
      overflow-x:hidden;
      min-height:100dvh;
    }
    a{text-decoration:none;color:inherit;}
    img{display:block;max-width:100%;}
    button{font-family:inherit;cursor:pointer;border:none;background:none;}
    :focus{outline:none;}
    #main-content{max-width:980px;margin:0 auto;padding:12px 12px 0;}

    /* ─── ANIMATIONS ─────────────────────────── */
    @keyframes fadeUp{
      from{opacity:0;transform:translateY(22px)}
      to{opacity:1;transform:translateY(0)}
    }
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes popIn{
      from{opacity:0;transform:translate(-50%,-46%) scale(.86)}
      to{opacity:1;transform:translate(-50%,-50%) scale(1)}
    }
    @keyframes popOut{
      from{opacity:1;transform:translate(-50%,-50%) scale(1)}
      to{opacity:0;transform:translate(-50%,-46%) scale(.86)}
    }
    @keyframes shimmerSlide{
      0%{background-position:-600px 0}
      100%{background-position:600px 0}
    }
    @keyframes goldPulse{
      0%,100%{box-shadow:0 8px 28px rgba(255,196,50,.25),0 0 0 1px rgba(255,196,50,.15),inset 0 1px 0 rgba(255,255,255,.25)}
      50%{box-shadow:0 14px 44px rgba(255,196,50,.55),0 0 0 3px rgba(255,196,50,.1),inset 0 1px 0 rgba(255,255,255,.25)}
    }
    @keyframes crownBounce{
      0%,100%{transform:translateY(0) rotate(-5deg) scale(1)}
      50%{transform:translateY(-5px) rotate(5deg) scale(1.1)}
    }
    @keyframes scanLine{0%{top:-4%}100%{top:108%}}
    @keyframes tabPop{
      0%{transform:translateY(0) scale(1)}
      40%{transform:translateY(-4px) scale(1.06)}
      100%{transform:translateY(-3px) scale(1)}
    }
    @keyframes dotBlink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.25;transform:scale(.75)}}
    @keyframes cardSlideIn{
      from{opacity:0;transform:translateY(16px)}
      to{opacity:1;transform:translateY(0)}
    }
    @keyframes featPop{
      0%{opacity:0;transform:scale(.8) translateY(6px)}
      100%{opacity:1;transform:scale(1) translateY(0)}
    }
    @keyframes borderRotate{
      0%{background-position:0% 50%}
      50%{background-position:100% 50%}
      100%{background-position:0% 50%}
    }

    .reveal{
      opacity:0;transform:translateY(16px);
      transition:opacity .55s cubic-bezier(.22,.8,.2,1),transform .55s cubic-bezier(.22,.8,.2,1);
    }
    .reveal.visible{opacity:1;transform:translateY(0);}

    /* ─── SERIES HEADER ─────────────────────── */
    .pro-series-header-pro{
      position:relative;border-radius:20px;overflow:hidden;
      background:#0d1220;border:1px solid rgba(255,255,255,.07);
      box-shadow:0 20px 60px rgba(0,0,0,.6);margin-bottom:22px;
      animation:fadeUp .65s cubic-bezier(.22,.8,.2,1) both;
    }
    .pro-series-poster-pro{
      width:100%;height:210px;object-fit:cover;object-position:center top;
      display:block;background:#0a0e1a;
    }
    .poster-scan{
      position:absolute;left:0;right:0;height:3px;
      background:linear-gradient(to right,transparent,rgba(0,205,235,.6),transparent);
      animation:scanLine 3.5s linear infinite;pointer-events:none;z-index:3;
    }
    .poster-fade{
      position:absolute;left:0;right:0;bottom:0;height:120px;
      background:linear-gradient(to bottom,transparent,#0d1220);
      pointer-events:none;z-index:2;
    }
    .pro-series-meta-pro{position:relative;z-index:3;padding:14px 18px 22px;text-align:center;}
    .pro-series-back-btn-pro{
      position:absolute;left:12px;top:12px;z-index:10;
      width:40px;height:40px;display:inline-flex;align-items:center;justify-content:center;
      border-radius:10px;background:rgba(7,9,15,.84);border:1px solid rgba(255,255,255,.1);
      backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);color:#a0bcd8;font-size:16px;
      transition:background .2s,border-color .2s,transform .2s;box-shadow:0 4px 14px rgba(0,0,0,.45);
    }
    .pro-series-back-btn-pro:hover{
      background:rgba(0,195,225,.12);border-color:rgba(0,195,225,.35);transform:translateX(-2px);
    }
    .pro-series-title-pro{
      font-family:'Cinzel',serif;font-size:clamp(1.3rem,4.5vw,1.8rem);font-weight:800;
      letter-spacing:.06em;color:#fff;text-shadow:0 2px 18px rgba(0,0,0,.55);
      margin:0 0 10px;line-height:1.2;
    }
    .pro-series-desc-pro{
      font-size:.88rem;color:#7a9ab8;line-height:1.65;max-width:600px;margin:0 auto 18px;
    }

    /* ─── PREMIUM CARD — top-level upgrade ─── */
    .premium-channel-message{
      position:relative;overflow:hidden;max-width:460px;margin:0 auto 4px;
      padding:18px 16px 20px;border-radius:20px;
      background:linear-gradient(155deg,#0e1d34 0%,#091423 60%,#0b1e38 100%);
      box-shadow:0 20px 56px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.05);
      animation:fadeUp .7s cubic-bezier(.22,.8,.2,1) .1s both;
    }
    /* animated gradient border */
    .premium-channel-message::before{
      content:'';position:absolute;inset:0;border-radius:20px;padding:1.5px;
      background:linear-gradient(270deg,#ffd84a,#ffb83a,#ffd84a,#1de8ff,#ffd84a);
      background-size:300% 300%;animation:borderRotate 4s ease infinite;
      -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
      -webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;
    }
    /* golden glow corner */
    .premium-channel-message::after{
      content:'';position:absolute;top:-50px;right:-50px;width:160px;height:160px;
      background:radial-gradient(circle,rgba(255,196,50,.18),transparent 65%);
      pointer-events:none;z-index:0;
    }
    .pcm-inner{position:relative;z-index:1;}
    .pcm-head{
      display:flex;align-items:center;justify-content:center;gap:9px;
      font-size:1rem;font-weight:900;margin-bottom:14px;letter-spacing:.03em;
      background:linear-gradient(90deg,#ffd84a,#ffef9a,#ffd84a);
      background-size:200% auto;animation:shimmerSlide 2.5s linear infinite;
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    }
    .pcm-crown{
      display:inline-block;font-size:1.2rem;animation:crownBounce 2.4s ease-in-out infinite;
      -webkit-text-fill-color:initial;
    }
    .pcm-features{
      display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:18px;
    }
    .pcm-feat{
      display:inline-flex;align-items:center;gap:6px;font-size:.73rem;font-weight:700;
      padding:6px 13px;border-radius:999px;letter-spacing:.03em;white-space:nowrap;
      border:1px solid rgba(255,255,255,.1);color:#cce8ff;
      background:rgba(255,255,255,.04);
      transition:all .22s ease;
      animation:featPop .4s cubic-bezier(.22,.8,.2,1) both;
    }
    .pcm-feat:nth-child(1){animation-delay:.05s;}
    .pcm-feat:nth-child(2){animation-delay:.1s;}
    .pcm-feat:nth-child(3){animation-delay:.15s;}
    .pcm-feat:nth-child(4){animation-delay:.2s;}
    .pcm-feat:hover{
      background:rgba(255,196,50,.1);border-color:rgba(255,196,50,.3);color:#ffd84a;
      transform:translateY(-1px);
    }

    /* BECOME VIP button — premium look */
    .join-btn{
      display:flex;align-items:center;justify-content:center;gap:8px;
      width:100%;padding:15px 20px;border-radius:14px;
      font-size:.92rem;font-weight:900;letter-spacing:.12em;text-transform:uppercase;
      color:#1a0800;text-decoration:none;position:relative;overflow:hidden;
      background:linear-gradient(135deg,#ffd84a 0%,#ffcf40 35%,#ffb020 70%,#ffd84a 100%);
      background-size:200% auto;
      box-shadow:0 12px 32px rgba(255,186,40,.35),0 0 0 1px rgba(255,196,50,.2),inset 0 1px 0 rgba(255,255,255,.35);
      transition:transform .2s,box-shadow .2s;
      animation:goldPulse 2.8s ease-in-out infinite;
    }
    /* shine sweep */
    .join-btn::after{
      content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.38),transparent);
      animation:shimmerSlide 2.2s ease-in-out infinite;
    }
    .join-btn:hover{
      transform:translateY(-2px);
      box-shadow:0 18px 44px rgba(255,186,40,.5),0 0 0 1px rgba(255,196,50,.3),inset 0 1px 0 rgba(255,255,255,.35);
    }
    .join-btn:active{transform:scale(.97);}
    .join-btn i{font-size:1rem;flex-shrink:0;}

    /* ─── SEASON TABS ──────────────────────── */
    .pro-seasons-tabs-pro{
      display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:20px 0 10px;
      animation:fadeUp .55s cubic-bezier(.22,.8,.2,1) .15s both;
    }
    .pro-season-tab-pro{
      padding:10px 26px;border-radius:999px;
      border:1.5px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);
      color:#6a8aaa;font-size:.9rem;font-weight:800;
      transition:all .26s cubic-bezier(.22,.8,.2,1);outline:none;
    }
    .pro-season-tab-pro:hover:not(.active){
      color:#d8eeff;border-color:rgba(0,205,230,.3);background:rgba(0,205,230,.05);transform:translateY(-1px);
    }
    .pro-season-tab-pro.active{
      background:linear-gradient(135deg,#1de8ff,#00b4e0);border-color:transparent;
      color:#021c26;font-weight:900;
      box-shadow:0 10px 28px rgba(0,205,235,.3);
      animation:tabPop .35s cubic-bezier(.22,.8,.2,1) both;
    }
    .pro-season-tab-pro:active{transform:scale(.96);}

    /* ─── SOURCE SELECTOR ──────────────────── */
    .source-selector{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:0 0 14px;}
    .source-btn{
      padding:8px 20px;border-radius:999px;border:1.5px solid rgba(255,255,255,.07);
      background:rgba(255,255,255,.03);color:#6888a8;font-size:.83rem;font-weight:800;
      transition:all .22s ease;outline:none;
    }
    .source-btn:hover:not(.active){
      color:#d8eeff;border-color:rgba(0,205,230,.25);background:rgba(0,205,230,.05);transform:translateY(-1px);
    }
    .source-btn.active{
      background:linear-gradient(135deg,#1de8ff,#00b4e0);border-color:transparent;
      color:#021c26;font-weight:900;box-shadow:0 8px 22px rgba(0,205,235,.25);
    }
    .source-btn:active{transform:scale(.96);}

    /* ─── EPISODES LABEL — italic cyan serif ─ */
    .episodes-label{
      display:flex;align-items:center;gap:10px;
      font-family:'Cormorant Garamond',serif;
      font-style:italic;font-size:1.05rem;font-weight:700;
      letter-spacing:.08em;text-transform:uppercase;color:#1de8ff;
      margin:6px 0 12px 0;
    }
    .episodes-label::after{
      content:'';flex:1;height:1px;
      background:linear-gradient(to right,rgba(0,205,235,.35),transparent);
    }

    /* ─── EPISODE ROW ──────────────────────── */
    .pro-episodes-row-wrap-pro{margin-top:4px;padding-bottom:6px;margin-bottom:8px;}
    .pro-episodes-row-pro{
      display:flex;gap:12px;overflow-x:auto;
      padding:4px 2px 16px;-webkit-overflow-scrolling:touch;
      scroll-snap-type:x proximity;scrollbar-width:none;
      align-items:flex-start;
    }
    .pro-episodes-row-pro::-webkit-scrollbar{display:none;}

    /* ─── EPISODE CARD — matches screenshot ─ */
    .pro-episode-card-pro{
      /* WIDTH: keeps natural thumbnail size */
      flex:0 0 160px;
      scroll-snap-align:start;
      display:flex;flex-direction:column;
      text-decoration:none;color:#e0ecff;
      border-radius:12px;
      background:#0f1724;
      border:1px solid rgba(255,255,255,.07);
      box-shadow:0 6px 20px rgba(0,0,0,.4);
      overflow:hidden;
      position:relative;
      opacity:0;transform:translateY(14px);
      transition:
        transform .26s cubic-bezier(.22,.8,.2,1),
        box-shadow .26s ease,
        border-color .26s ease;
    }
    .pro-episode-card-pro.card-visible{
      opacity:1;transform:translateY(0);
      transition:
        opacity .4s ease,
        transform .4s cubic-bezier(.22,.8,.2,1),
        box-shadow .26s ease,
        border-color .26s ease;
    }
    .pro-episode-card-pro:hover{
      transform:translateY(-5px);
      box-shadow:0 16px 36px rgba(0,0,0,.55),0 0 0 1px rgba(0,205,235,.22);
      border-color:rgba(0,205,235,.28);
    }
    .pro-episode-card-pro:active{transform:scale(.96);}

    @media(max-width:420px){.pro-episode-card-pro{flex:0 0 142px;}}
    @media(min-width:900px){.pro-episode-card-pro{flex:0 0 185px;}}

    /* ─── THUMBNAIL — full width, 16:9 ratio, 
       object-fit:cover so no black bars ─────  */
    .pro-ep-thumb-wrap-pro{
      width:100%;
      /* 16:9 gives same landscape look as screenshot */
      aspect-ratio:16/9;
      overflow:hidden;
      position:relative;
      background:#070c18;
      display:block;
      flex-shrink:0;
    }
    .pro-ep-thumb-pro{
      /* fill full area, crop to fit — no black space */
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      object-position:center;
      display:block;
      transition:transform .32s cubic-bezier(.22,.8,.2,1);
    }
    .pro-episode-card-pro:hover .pro-ep-thumb-pro{transform:scale(1.05);}

    /* play overlay */
    .ep-play-icon{
      position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
      opacity:0;transition:opacity .2s ease;z-index:3;pointer-events:none;
    }
    .ep-play-icon span{
      width:32px;height:32px;border-radius:50%;background:rgba(0,205,235,.9);
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 0 18px rgba(0,205,235,.5);
    }
    .ep-play-icon i{font-size:.75rem;color:#021c26;margin-left:2px;}
    .pro-episode-card-pro:hover .ep-play-icon{opacity:1;}

    /* EP BADGE — compact, no stretch */
    .pro-ep-num-pro{
      position:absolute;top:6px;left:6px;z-index:2;
      background:rgba(5,8,18,.88);
      border:1px solid rgba(0,205,235,.3);
      color:#1de8ff;
      font-size:.66rem;font-weight:900;
      padding:2px 7px;border-radius:6px;
      letter-spacing:.04em;
      backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
      line-height:1.4;width:fit-content;white-space:nowrap;
      display:inline-block;
    }

    /* TITLE — below thumbnail 
       "Ep 1" bold white on line 1
       "— Khalid ibn al walid... Part 1" dim on line 2  */
    .pro-ep-title-pro{
      padding:8px 8px 10px;
      display:flex;flex-direction:column;gap:2px;
    }
    .ep-num-part{
      font-size:.82rem;font-weight:800;color:#fff;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
      line-height:1.3;display:block;
    }
    .ep-name-part{
      font-size:.74rem;font-weight:500;color:#6a8eae;
      font-style:normal;
      display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
      overflow:hidden;line-height:1.35;display:block;
    }

    /* ─── HOW TO WATCH — exactly like screenshot */
    .howto-section{margin:26px 0 20px;}

    .pro-tutorial-title{
      display:flex;align-items:center;gap:11px;
      font-family:'Cormorant Garamond',serif;font-style:italic;
      font-size:1.5rem;font-weight:700;color:#fff;
      margin:0 0 16px;letter-spacing:.02em;line-height:1.2;
    }
    .pro-tutorial-title .title-bar{
      width:4px;height:28px;border-radius:3px;flex-shrink:0;
      background:linear-gradient(180deg,#1de8ff,#0090c0);
      box-shadow:0 0 12px rgba(0,205,235,.4);
    }

    /* process block wrapper */
    .process-block{
      margin-bottom:18px;
      animation:cardSlideIn .5s cubic-bezier(.22,.8,.2,1) both;
    }
    .process-block:nth-child(2){animation-delay:.1s;}
    .process-block:nth-child(3){animation-delay:.2s;}

    /* "● OLD PROCESS" label — matches screenshot exactly */
    .process-label{
      display:flex;align-items:center;gap:8px;
      font-size:.73rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;
      color:#7fa6c8;margin-bottom:9px;
    }
    .process-dot{
      width:7px;height:7px;border-radius:50%;flex-shrink:0;background:#1de8ff;
      box-shadow:0 0 8px rgba(0,205,235,.6);
      animation:dotBlink 2s ease-in-out infinite;
      display:inline-block;
    }

    /* video card — dark, matches screenshot */
    .process-video-card{
      border-radius:14px;overflow:hidden;
      background:#0a0f1c;
      border:1px solid rgba(255,255,255,.06);
      box-shadow:0 10px 28px rgba(0,0,0,.45);
    }
    .pro-video-frame-wrap{
      position:relative;width:100%;height:0;padding-bottom:56.25%;overflow:hidden;
    }
    .pro-video-frame-wrap iframe{
      position:absolute;inset:0;width:100%;height:100%;border:0;display:block;background:#000;
    }

    /* ─── WHATSAPP POPUP ──────────────────── */
    #wa-backdrop{
      display:none;position:fixed;inset:0;
      background:rgba(0,0,0,.66);backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px);z-index:99998;
    }
    #wa-backdrop.open{display:block;animation:fadeIn .3s ease both;}

    #whatsappPopup{
      display:none;position:fixed;top:50%;left:50%;
      transform:translate(-50%,-50%);
      width:min(340px,calc(100vw - 28px));
      z-index:99999;border-radius:22px;overflow:hidden;
    }
    #whatsappPopup.open{display:block;animation:popIn .4s cubic-bezier(.22,.8,.2,1) both;}
    #whatsappPopup.closing{animation:popOut .26s cubic-bezier(.22,.8,.2,1) both;}

    .wa-inner{
      background:linear-gradient(160deg,#101a2c,#0c1320);
      border:1px solid rgba(255,255,255,.09);border-radius:22px;
      padding:22px 20px 20px;position:relative;overflow:hidden;
    }
    .wa-inner::before{
      content:'';position:absolute;top:0;left:0;right:0;height:2px;
      background:linear-gradient(90deg,#25d366,#1de8ff,#25d366);
      background-size:400px 2px;animation:shimmerSlide 2s linear infinite;
    }
    .wa-top-row{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
    .wa-logo{width:44px;height:44px;border-radius:12px;flex-shrink:0;box-shadow:0 4px 14px rgba(0,0,0,.4);}
    .wa-title{font-size:1.05rem;font-weight:900;color:#fff;line-height:1.2;}
    .wa-title span{display:block;font-size:.78rem;font-weight:500;color:#6a8aaa;margin-top:2px;}
    .wa-body{font-size:.86rem;color:#8fa8c4;line-height:1.65;margin-bottom:16px;}
    .wa-body strong{color:#e2ecf8;}
    .wa-join-btn{
      display:flex;align-items:center;justify-content:center;gap:9px;width:100%;
      padding:13px 18px;border-radius:13px;
      background:linear-gradient(135deg,#25d366,#1aaa50);color:#fff;
      font-weight:800;font-size:.9rem;text-decoration:none;
      box-shadow:0 8px 22px rgba(37,211,102,.3);transition:transform .2s,box-shadow .2s;
    }
    .wa-join-btn:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(37,211,102,.4);}
    .wa-join-btn:active{transform:scale(.97);}
    .wa-dismiss{
      display:block;width:100%;margin-top:11px;padding:7px;border-radius:9px;
      background:none;border:1px solid rgba(255,255,255,.08);color:#5a7898;
      font-size:.82rem;font-weight:700;transition:color .2s,border-color .2s;cursor:pointer;
    }
    .wa-dismiss:hover{color:#ff7090;border-color:rgba(255,112,144,.28);}

    @media(max-width:600px){body{padding-bottom:calc(120px + env(safe-area-inset-bottom));}}
  </style>

  <script defer src="series.js"></script>
</head>
<body>

  <div id="wa-backdrop"></div>

  <div id="main-content">
    <header></header>
    <script type="text/javascript" src="//www.highperformanceformat.com/c91a82435d260630918ecc80c95125ac/invoke.js"></script>
    <div id="series-details" aria-live="polite"></div>
  </div>

  <!-- ═══ ALL ENHANCEMENTS ══════════════════════════ -->
  <script>
  (function(){

    /* ── EPISODE TITLE FORMAT ──────────────────────
       "Episode 1"               → line1: "Ep 1"
       "Episode 1 - Name"        → line1: "Ep 1"  line2: "Name"
       "Episode 1 Name"          → line1: "Ep 1"  line2: "Name"
    ─────────────────────────────────────────────── */
    function formatEpTitles(){
      document.querySelectorAll('.pro-ep-title-pro').forEach(function(el){
        if(el.dataset.fmt) return;
        el.dataset.fmt='1';
        var raw=(el.textContent||'').trim();
        if(!raw) return;

        // Just "Episode N" with nothing after
        var plain=/^Episodes+(d+)s*$/i.exec(raw);
        if(plain){
          el.innerHTML='<span class="ep-num-part">Ep '+plain[1]+'</span>';
          return;
        }

        // "Episode N - Name" or "Episode N – Name" or "Episode N Name"
        var split=/^Episodes+(d+)s*[-–—:]s*(.+)$/i.exec(raw);
        if(split){
          el.innerHTML=
            '<span class="ep-num-part">Ep '+split[1]+'</span>'+
            '<span class="ep-name-part">'+split[2].trim()+'</span>';
          return;
        }

        var spaceplit=/^Episodes+(d+)s+(.+)$/i.exec(raw);
        if(spaceplit){
          el.innerHTML=
            '<span class="ep-num-part">Ep '+spaceplit[1]+'</span>'+
            '<span class="ep-name-part">'+spaceplit[2].trim()+'</span>';
          return;
        }

        el.innerHTML='<span class="ep-num-part">'+raw+'</span>';
      });
    }

    /* ── PLAY OVERLAY ON THUMBNAILS ────────────── */
    function addPlayIcons(){
      document.querySelectorAll('.pro-ep-thumb-wrap-pro').forEach(function(wrap){
        if(wrap.dataset.pi) return;
        wrap.dataset.pi='1';
        if(!wrap.querySelector('.ep-play-icon')){
          var d=document.createElement('div');
          d.className='ep-play-icon';
          d.innerHTML='<span><i class="fa-solid fa-play"></i></span>';
          wrap.appendChild(d);
        }
      });
    }

    /* ── THUMBNAIL: force object-fit cover on img ─ */
    function fixThumbnails(){
      document.querySelectorAll('.pro-ep-thumb-pro').forEach(function(img){
        if(img.dataset.fixed) return;
        img.dataset.fixed='1';
        /* ensure it fills regardless of natural size */
        img.style.cssText='position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;display:block;';
      });
    }

    /* ── CARD STAGGER ANIMATION ────────────────── */
    function animateCards(){
      document.querySelectorAll('.pro-episode-card-pro').forEach(function(card,i){
        if(card.dataset.animated) return;
        card.dataset.animated='1';
        setTimeout(function(){card.classList.add('card-visible');},40+i*55);
      });
    }

    /* ── PREMIUM CARD ──────────────────────────── */
    function upgradePremium(){
      document.querySelectorAll('.premium-channel-message').forEach(function(box){
        if(box.dataset.upg) return;
        box.dataset.upg='1';
        var link=box.querySelector('a');
        var href='/premium.html';
        if(link) href=link.getAttribute('href')||href;
        box.innerHTML=
          '<div class="pcm-inner">'+
            '<div class="pcm-head"><span class="pcm-crown">👑</span> SMTV VIP Membership</div>'+
            '<div class="pcm-features">'+
              '<span class="pcm-feat">⚡ No Ads</span>'+
              '<span class="pcm-feat">⬇ Fast Download</span>'+
              '<span class="pcm-feat">🔓 Early Access</span>'+
              '<span class="pcm-feat">🎞 HD Quality</span>'+
            '</div>'+
            '<a class="join-btn" href="'+href+'">'+
              '<i class="fa-solid fa-crown"></i> BECOME VIP'+
            '</a>'+
          '</div>';
      });
    }

    /* ── EPISODES LABEL ────────────────────────── */
    function addEpisodesLabel(){
      document.querySelectorAll('.pro-episodes-row-wrap-pro').forEach(function(wrap){
        if(wrap.dataset.lbl) return;
        wrap.dataset.lbl='1';
        if(!wrap.querySelector('.episodes-label')){
          var lbl=document.createElement('div');
          lbl.className='episodes-label reveal';
          lbl.textContent='Episodes';
          wrap.insertBefore(lbl,wrap.firstChild);
        }
      });
    }

    /* ── HOW TO WATCH SECTION ──────────────────────
       Rebuilds to exactly match screenshot:
       • Italic serif heading + cyan left bar
       • cyan dot + "OLD PROCESS" / "NEW PROCESS" label
       • dark video card below
    ─────────────────────────────────────────────── */
    function fixHowToSection(){
      document.querySelectorAll('.pro-tutorial-title').forEach(function(titleEl){
        if(titleEl.dataset.fixed) return;
        titleEl.dataset.fixed='1';
        var text=(titleEl.textContent||'How to Watch Episodes').trim();
        titleEl.innerHTML='<span class="title-bar"></span>'+text;
      });

      document.querySelectorAll('.pro-tutorial-card').forEach(function(card){
        if(card.dataset.fixed) return;
        card.dataset.fixed='1';

        /* get label text */
        var smallTitle=card.querySelector('.small-title');
        var rawLabel=(smallTitle?smallTitle.textContent:'OLD PROCESS').trim().toUpperCase();
        var isNew=/new/i.test(rawLabel);
        var dotColor=isNew?'#00e896':'#1de8ff';
        var dotShadow=isNew?'rgba(0,232,150,.6)':'rgba(0,205,235,.6)';

        /* build wrapper */
        var block=document.createElement('div');
        block.className='process-block';
        block.innerHTML=
          '<div class="process-label">'+
            '<span class="process-dot" style="background:'+dotColor+';box-shadow:0 0 8px '+dotShadow+';animation-delay:'+(isNew?'.5s':'0s')+'"></span>'+
            rawLabel+
          '</div>'+
          '<div class="process-video-card"></div>';

        var vidCard=block.querySelector('.process-video-card');
        if(smallTitle) smallTitle.remove();

        /* move iframe wrapper into dark card */
        var vfw=card.querySelector('.pro-video-frame-wrap');
        if(vfw){
          vidCard.appendChild(vfw);
        }

        card.parentNode.insertBefore(block,card);
        card.remove();
      });
    }

    /* ── POSTER EFFECTS ────────────────────────── */
    function addPosterEffects(){
      document.querySelectorAll('.pro-series-header-pro').forEach(function(h){
        if(h.dataset.fx) return;
        h.dataset.fx='1';
        if(!h.querySelector('.poster-scan')){
          var s=document.createElement('div');s.className='poster-scan';h.appendChild(s);
        }
        if(!h.querySelector('.poster-fade')){
          var f=document.createElement('div');f.className='poster-fade';h.appendChild(f);
        }
      });
    }

    /* ── SCROLL REVEAL ─────────────────────────── */
    var revealObs=new IntersectionObserver(function(entries){
      entries.forEach(function(e){
        if(e.isIntersecting){e.target.classList.add('visible');revealObs.unobserve(e.target);}
      });
    },{threshold:.08});

    function addReveal(){
      document.querySelectorAll(
        '.pro-series-header-pro,.premium-channel-message,.pro-seasons-tabs-pro,'+
        '.source-selector,.episodes-label,.process-block,.howto-section,.pro-tutorial-title'
      ).forEach(function(el){
        if(el.dataset.rv) return;
        el.dataset.rv='1';
        if(!el.classList.contains('reveal')){el.classList.add('reveal');}
        revealObs.observe(el);
      });
    }

    /* ── RUN EVERYTHING ────────────────────────── */
    function runAll(){
      formatEpTitles();
      addPlayIcons();
      fixThumbnails();
      animateCards();
      upgradePremium();
      addEpisodesLabel();
      fixHowToSection();
      addPosterEffects();
      addReveal();
    }

    var sd=document.getElementById('series-details');
    if(sd){
      var obs=new MutationObserver(runAll);
      obs.observe(sd,{childList:true,subtree:true});
      setTimeout(function(){obs.disconnect();runAll();},16000);
    }
    document.addEventListener('DOMContentLoaded',runAll);
  })();
  </script>

  <!-- ── DYNAMIC META ─────────────────────────── -->
  <script>
    document.addEventListener('DOMContentLoaded',function(){
      var slug=new URLSearchParams(window.location.search).get('series');
      if(!slug) return;
      fetch('/series.json').then(function(r){return r.json();}).then(function(arr){
        var m=Array.isArray(arr)?arr.find(function(s){return s.slug===slug;}):null;
        if(m&&m.title){
          document.title=m.title+' – SmTv Urdu';
          var d=document.querySelector('meta[name="description"]');
          if(d) d.setAttribute('content',m.title+' - Watch all episodes in Urdu on SmTv Urdu.');
        }
      }).catch(function(){});
    });
  </script>

  <!-- ── WHATSAPP POPUP ───────────────────────── -->
  <div id="whatsappPopup">
    <div class="wa-inner">
      <div class="wa-top-row">
        <img src="favicon.png" alt="SmTv Urdu" class="wa-logo" width="44" height="44" loading="lazy">
        <div class="wa-title">
          Stay Updated on SmTv!
          <span>New episodes every week</span>
        </div>
      </div>
      <p class="wa-body">Get <strong>instant episode alerts</strong> before anyone else. Totally free, forever.</p>
      <a href="https://whatsapp.com/channel/0029Va9zAvvAYlUNRuzWqh0k"
         target="_blank" rel="noopener noreferrer" class="wa-join-btn">
        <i class="fa-brands fa-whatsapp"></i> Join WhatsApp Channel
      </a>
      <button class="wa-dismiss" id="closeWaPopup">✕ No thanks</button>
    </div>
  </div>

  <script>
  (function(){
    var popup=document.getElementById('whatsappPopup');
    var backdrop=document.getElementById('wa-backdrop');
    var close=document.getElementById('closeWaPopup');
    function open(){popup.classList.remove('closing');popup.classList.add('open');backdrop.classList.add('open');}
    function shut(){
      popup.classList.add('closing');backdrop.classList.remove('open');
      setTimeout(function(){popup.classList.remove('open','closing');},280);
    }
    window.addEventListener('DOMContentLoaded',function(){
      setTimeout(open,2500);
      if(close) close.addEventListener('click',shut);
      if(backdrop) backdrop.addEventListener('click',shut);
    });
  })();
  </script>

  <!-- ── SCROLL FIX ──────────────────────────── -->
  <script>
  (function(){
    try{window.scrollTo(0,0);}catch(e){}
    document.addEventListener('focusin',function(){
      var x=window.scrollX||0,y=window.scrollY||0;
      setTimeout(function(){try{window.scrollTo(x,y);}catch(e){}},0);
    },true);
    var det=document.getElementById('series-details');
    if(det){
      var o=new MutationObserver(function(){
        if(det.childNodes.length>0){
          try{window.scrollTo({top:0,left:0,behavior:'auto'});}catch(e){window.scrollTo(0,0);}
          o.disconnect();
        }
      });
      o.observe(det,{childList:true,subtree:false});
    }
  })();
  </script>

  <!-- ── FOOTER LOADER ─────────────────────── -->
  <div id="footer-placeholder"></div>
  <script>
  (async function(){
    var cands=['/includes/footer.html','includes/footer.html','./includes/footer.html','/footer.html','footer.html'];
    var ph=document.getElementById('footer-placeholder');
    function initNav(html){
      try{
        ph.innerHTML=html;
        try{var p=parseInt(getComputedStyle(document.body).paddingBottom)||0;if(p<96)document.body.style.paddingBottom='calc(96px + env(safe-area-inset-bottom))';}catch(e){}
        var nav=ph.querySelector('#smtv-bottom-nav')||ph.querySelector('.smtv-bottom-nav');
        if(!nav) return;
        var items=Array.from(nav.querySelectorAll('.nav-item'));
        items.forEach(function(i){i.classList.remove('active');});
        var si=items.find(function(i){return(i.dataset.name||'').toLowerCase()==='series';});
        if(!si) si=items.find(function(i){return(i.getAttribute('href')||'').toLowerCase().includes('series');});
        if(new URLSearchParams(window.location.search).has('series')&&si)si.classList.add('active');
        else{
          var pp=location.pathname.toLowerCase().split('/').pop();
          var bp=items.find(function(i){return(i.getAttribute('href')||'').toLowerCase().includes(pp);});
          if(bp)bp.classList.add('active');else if(si)si.classList.add('active');
        }
        items.forEach(function(a){
          if(a.dataset.bound)return;a.dataset.bound='1';
          a.addEventListener('click',function(e){
            try{e.preventDefault();}catch(x){}
            items.forEach(function(i){i.classList.remove('active');});
            this.classList.add('active');
            var h=this.getAttribute('href');if(h)location.assign(h);
          },{passive:false});
        });
      }catch(e){console.warn('initNav',e);}
    }
    for(var i=0;i<cands.length;i++){
      try{var r=await fetch(cands[i],{cache:'no-cache'});if(!r.ok)continue;initNav(await r.text());return;}catch(e){continue;}
    }
    ph.innerHTML=`
      <nav class="smtv-bottom-nav" id="smtv-bottom-nav" role="navigation" aria-label="Main">
        <a href="/index.html"   class="nav-item" data-name="home">    <span class="icon-wrap"><i class="fa-solid fa-house"></i></span>      <span class="label">Home</span></a>
        <a href="/series.html"  class="nav-item active" data-name="series">  <span class="icon-wrap"><i class="fa-solid fa-film"></i></span>       <span class="label">Series</span></a>
        <a href="/clips.html"   class="nav-item" data-name="clips">   <span class="icon-wrap"><i class="fa-solid fa-play-circle"></i></span> <span class="label">Clips</span></a>
        <a href="/premium.html" class="nav-item" data-name="premium"> <span class="icon-wrap"><i class="fa-solid fa-star"></i></span>        <span class="label">Premium</span></a>
        <a href="/more.html"    class="nav-item" data-name="more">    <span class="icon-wrap"><i class="fa-solid fa-circle-info"></i></span> <span class="label">More</span></a>
      </nav>
      <style>
        .smtv-bottom-nav{position:fixed;left:12px;right:12px;bottom:12px;height:66px;display:flex;gap:6px;padding:8px;border-radius:18px;background:rgba(9,11,18,.92);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.07);box-shadow:0 16px 48px rgba(0,0,0,.55);align-items:center;z-index:1200;padding-bottom:calc(env(safe-area-inset-bottom)+8px);}
        .smtv-bottom-nav .nav-item{flex:1;text-align:center;color:#5a7898;text-decoration:none;padding:6px;border-radius:12px;transition:color .22s,transform .22s,background .22s;}
        .smtv-bottom-nav .nav-item.active{color:#fff;background:rgba(0,205,235,.1);transform:translateY(-4px);}
        .smtv-bottom-nav .icon-wrap{display:inline-flex;width:38px;height:38px;align-items:center;justify-content:center;border-radius:10px;}
        .smtv-bottom-nav .label{display:block;font-size:11px;margin-top:2px;font-weight:600;}
      </style>`;
    try{document.body.style.paddingBottom='calc(96px + env(safe-area-inset-bottom))';}catch(e){}
  })();
  </script>
