  <!-- Watch Now Shortlink Handler -->
  <script>
  (function(){
    let fc=null;
    fetch('/config.json',{cache:'no-cache'}).then(r=>r.ok?r.json():null).then(c=>{if(c)fc=c.redirectionFeatures;}).catch(()=>{});
    const t=setInterval(()=>{
      const btns=document.querySelectorAll('.ep-watch-btn');
      if(!btns.length)return;clearInterval(t);
      btns.forEach(btn=>{
        const orig=btn.getAttribute('href');
        btn.addEventListener('click',async function(e){
          if(!fc||!fc.shortlink||fc.sponsorPopup)return;
          e.preventDefault();
          try{
            const u=new URL(orig,window.location.origin);const p=new URLSearchParams(u.search);
            let jf=`episode-data/${p.get('series')}-s${p.get('season')}`;
            const lg=p.get('lang');if(lg&&lg!=='dub')jf+=`-${lg}`;jf+='.json';
            const res=await fetch(jf);if(!res.ok){location.href=orig;return;}
            const eps=await res.json();
            const ep=eps.find(x=>String(x.ep)===String(p.get('ep')));
            location.href=(ep&&ep.shortlink)?ep.shortlink:orig;
          }catch(err){location.href=orig;}
        });
      });
    },100);
    setTimeout(()=>clearInterval(t),5000);
  })();
  </script>

    document.getElementById('sidebarSubtitles')?.addEventListener('click',function(e){e.preventDefault();document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebar-overlay').classList.remove('active');document.body.style.overflow='';document.getElementById('pill-sub').click();});

  <div id="footer-placeholder"></div>
  <script>
  (async function(){
    if(document.readyState!=='complete')await new Promise(r=>window.addEventListener('load',r,{once:true}));
    try{
      const res=await fetch('/includes/footer.html');if(!res.ok)throw 0;
      document.getElementById('footer-placeholder').innerHTML=await res.text();
      const nav=document.getElementById('smtv-bottom-nav');if(!nav)return;
      const items=Array.from(nav.querySelectorAll('.nav-item'));
      const path=window.location.pathname.toLowerCase();
      let m=items.find(a=>{const n=(a.dataset.name||'').toLowerCase();if(n==='home'&&(path==='/'||path.includes('index')))return true;return n&&path.includes(n);});
      if(!m){const l=localStorage.getItem('smtv_last_nav');if(l)m=items.find(a=>a.dataset.name===l);}
      if(m)m.classList.add('active');
      items.forEach(a=>{a.addEventListener('click',function(){items.forEach(i=>i.classList.remove('active'));this.classList.add('active');try{localStorage.setItem('smtv_last_nav',this.dataset.name);}catch(e){}const href=this.getAttribute('href');setTimeout(()=>{if(location.pathname.toLowerCase()!==new URL(href,location.origin).pathname.toLowerCase())location.href=href;},200);},{passive:true});});
      try{const p=parseInt(getComputedStyle(document.body).paddingBottom)||0;if(p<96)document.body.style.paddingBottom='calc(96px + env(safe-area-inset-bottom))';}catch(e){}
    }catch(e){}
  })();
  </script>
