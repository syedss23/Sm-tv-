  <style>
/* ╔══════════════════════════════════════════════╗
   ║  RESET & BASE                                ║
   ╚══════════════════════════════════════════════╝ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;-webkit-text-size-adjust:none;}
body{
  background:#07090f;
  color:#e2ecf8;
  font-family:'Inter','Segoe UI',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
  min-height:100dvh;
}
a{text-decoration:none;color:inherit;}
img,video{display:block;max-width:100%;}
button{font-family:inherit;cursor:pointer;border:none;background:none;}
:focus-visible{outline:2px solid rgba(0,205,235,.5);outline-offset:2px;}
#main-content{max-width:980px;margin:0 auto;padding:12px 12px 0;}

/* ╔══════════════════════════════════════════════╗
   ║  KEYFRAMES                                   ║
   ╚══════════════════════════════════════════════╝ */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(24px)}
  to  {opacity:1;transform:translateY(0)}
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

@keyframes shine{
  0%  {background-position:-400px 0}
  100%{background-position:400px 0}
}
@keyframes goldPulse{
  0%,100%{box-shadow:0 6px 24px rgba(255,185,0,.3),inset 0 1px 0 rgba(255,255,255,.25)}
  50%    {box-shadow:0 12px 40px rgba(255,185,0,.55),inset 0 1px 0 rgba(255,255,255,.25)}
}
@keyframes crownBob{
  0%,100%{transform:translateY(0) rotate(-5deg)}
  50%    {transform:translateY(-5px) rotate(5deg)}
}
@keyframes borderSpin{
  0%  {background-position:0% 50%}
  50% {background-position:100% 50%}
  100%{background-position:0% 50%}
}
@keyframes scanMove{0%{top:-6%}100%{top:110%}}
@keyframes tabBounce{
  0%  {transform:translateY(0) scale(1)}
  45% {transform:translateY(-5px) scale(1.07)}
  100%{transform:translateY(-3px) scale(1.02)}
}
@keyframes dotPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.2;transform:scale(.65)}}
@keyframes cardPop{
  from{opacity:0;transform:translateY(16px) scale(.97)}
  to  {opacity:1;transform:translateY(0) scale(1)}
}
@keyframes featIn{
  from{opacity:0;transform:translateY(8px)}
  to  {opacity:1;transform:translateY(0)}
}
@keyframes popIn{
  from{opacity:0;transform:translate(-50%,-46%) scale(.84)}
  to  {opacity:1;transform:translate(-50%,-50%) scale(1)}
}
@keyframes popOut{
  from{opacity:1;transform:translate(-50%,-50%) scale(1)}
  to  {opacity:0;transform:translate(-50%,-46%) scale(.84)}
}

/* ╔══════════════════════════════════════════════╗
   ║  SERIES HEADER                               ║
   ╚══════════════════════════════════════════════╝ */
.pro-series-header-pro{
  position:relative;border-radius:20px;overflow:hidden;
  background:#0d1220;border:1px solid rgba(255,255,255,.07);
  box-shadow:0 20px 60px rgba(0,0,0,.6);
  margin-bottom:22px;
  animation:fadeUp .6s cubic-bezier(.22,.8,.2,1) both;
}
.pro-series-poster-pro{
  width:100%;height:200px;
  object-fit:cover;object-position:center top;
  display:block;background:#0a0e1a;
}
.smtv-scan{
  position:absolute;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent 0%,rgba(0,205,235,.7) 50%,transparent 100%);
  animation:scanMove 3.5s linear infinite;
  pointer-events:none;z-index:3;
}
.smtv-poster-fade{
  position:absolute;left:0;right:0;bottom:0;height:100px;
  background:linear-gradient(to bottom,transparent,#0d1220);
  pointer-events:none;z-index:2;
}
.pro-series-meta-pro{
  position:relative;z-index:3;
  padding:10px 18px 20px;
  text-align:center;
}
.pro-series-back-btn-pro{
  position:absolute;left:12px;top:12px;z-index:10;
  width:40px;height:40px;display:inline-flex;align-items:center;justify-content:center;
  border-radius:10px;background:rgba(7,9,15,.82);
  border:1px solid rgba(255,255,255,.1);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  color:#a0bcd8;font-size:16px;
  transition:background .2s,border-color .2s,transform .2s;
  box-shadow:0 4px 14px rgba(0,0,0,.45);
}
.pro-series-back-btn-pro:hover{
  background:rgba(0,195,225,.12);
  border-color:rgba(0,195,225,.35);
  transform:translateX(-2px);
}
.pro-series-title-pro{
  font-family:'Cinzel',serif;
  font-size:clamp(1.25rem,4.5vw,1.75rem);
  font-weight:800;letter-spacing:.06em;
  color:#fff;text-shadow:0 2px 20px rgba(0,0,0,.6);
  margin:0 0 9px;line-height:1.2;
}
.pro-series-desc-pro{
  font-size:.87rem;color:#7090a8;
  line-height:1.65;max-width:580px;
  margin:0 auto 16px;
}

/* ╔══════════════════════════════════════════════╗
   ║  VIP PREMIUM CARD                            ║
   ║  ─────────────────────────────────────────── ║
   ║  Title:    👑 SMTV VIP Membership            ║
   ║  Grid 2×2: [No Ads] [Fast Download]          ║
   ║            [Early Access] [HD Quality]        ║
   ║  Button:   BECOME VIP (gold)                 ║
   ╚══════════════════════════════════════════════╝ */
.smtv-vip-card{
  position:relative;
  max-width:440px;
  margin:0 auto 4px;
  padding:2px; /* border space */
  border-radius:20px;
  background:linear-gradient(270deg,#00d0ee,#ffc83a,#00d0ee);
  background-size:300% 300%;
  animation:borderSpin 4s ease infinite, fadeUp .65s cubic-bezier(.22,.8,.2,1) .08s both;
}
.smtv-vip-inner{
  background:linear-gradient(160deg,#0c1a2e 0%,#080f1d 100%);
  border-radius:18px;
  padding:18px 16px 18px;
  position:relative;
  overflow:hidden;
}
/* Corner glow */
.smtv-vip-inner::after{
  content:'';position:absolute;
  top:-60px;right:-60px;
  width:180px;height:180px;
  background:radial-gradient(circle,rgba(255,196,50,.14),transparent 65%);
  pointer-events:none;
}

/* Title row */
.smtv-vip-title{
  display:flex;align-items:center;gap:9px;
  margin-bottom:14px;
  font-size:.98rem;font-weight:900;
  color:#fff;line-height:1.2;
}
.smtv-vip-crown{
  font-size:1.2rem;flex-shrink:0;
  animation:crownBob 2.2s ease-in-out infinite;
  display:inline-block;
}
.smtv-vip-title-text{
  background:linear-gradient(90deg,#ffd84a 0%,#ffee99 50%,#ffd84a 100%);
  background-size:200% auto;
  animation:shine 2.6s linear infinite;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}

/* ── THE KEY FIX: 2-column grid with SHORT labels ── */
.smtv-vip-feats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-bottom:16px;
}
.smtv-vip-feat{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:5px;
  padding:9px 6px;
  border-radius:10px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.09);
  font-size:.78rem;
  font-weight:700;
  color:#c8e0f8;
  text-align:center;
  white-space:nowrap; /* NEVER WRAP */
  transition:background .2s,border-color .2s,color .2s;
  animation:featIn .4s ease both;
}
.smtv-vip-feat:nth-child(1){animation-delay:.05s}
.smtv-vip-feat:nth-child(2){animation-delay:.10s}
.smtv-vip-feat:nth-child(3){animation-delay:.15s}
.smtv-vip-feat:nth-child(4){animation-delay:.20s}
.smtv-vip-feat:hover{
  background:rgba(255,196,50,.1);
  border-color:rgba(255,196,50,.28);
  color:#ffd84a;
}

/* BECOME VIP button */
.smtv-vip-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:14px 16px;border-radius:12px;
  font-size:.9rem;font-weight:900;letter-spacing:.1em;
  text-transform:uppercase;color:#1a0500;
  text-decoration:none;position:relative;overflow:hidden;
  background:linear-gradient(135deg,#ffc83a 0%,#ffde70 40%,#ffb020 100%);
  box-shadow:0 10px 28px rgba(255,185,0,.32),inset 0 1px 0 rgba(255,255,255,.3);
  transition:transform .2s,box-shadow .2s;
  animation:goldPulse 2.8s ease-in-out infinite;
  border:none;cursor:pointer;font-family:'Inter',sans-serif;
}
.smtv-vip-btn::before{
  content:'';position:absolute;
  top:0;left:-100%;width:55%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);
  animation:shine 2s ease-in-out infinite;
}
.smtv-vip-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 16px 40px rgba(255,185,0,.5),inset 0 1px 0 rgba(255,255,255,.3);
}
.smtv-vip-btn:active{transform:scale(.97);}

/* ╔══════════════════════════════════════════════╗
   ║  SEASON TABS                                 ║
   ╚══════════════════════════════════════════════╝ */
.pro-seasons-tabs-pro{
  display:flex;gap:10px;justify-content:center;flex-wrap:wrap;
  margin:20px 0 12px;
  animation:fadeUp .5s cubic-bezier(.22,.8,.2,1) .12s both;
}
.pro-season-tab-pro{
  padding:10px 28px;border-radius:999px;
  border:1.5px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.04);
  color:#607890;
  font-size:.88rem;font-weight:800;letter-spacing:.02em;
  transition:all .26s cubic-bezier(.22,.8,.2,1);outline:none;
  position:relative;overflow:hidden;
}
.pro-season-tab-pro::after{
  content:'';position:absolute;inset:0;border-radius:999px;
  background:rgba(0,205,235,.07);opacity:0;
  transition:opacity .22s;
}
.pro-season-tab-pro:hover:not(.active){
  color:#d0e8ff;
  border-color:rgba(0,205,235,.32);
  transform:translateY(-1px);
}
.pro-season-tab-pro:hover:not(.active)::after{opacity:1;}
.pro-season-tab-pro.active{
  background:linear-gradient(135deg,#1de8ff 0%,#00a8d0 100%);
  border-color:transparent;
  color:#021820;font-weight:900;
  box-shadow:0 8px 24px rgba(0,200,235,.35),0 0 0 3px rgba(0,200,235,.12);
  animation:tabBounce .35s cubic-bezier(.22,.8,.2,1) both;
}
.pro-season-tab-pro:active{transform:scale(.95);}

/* ╔══════════════════════════════════════════════╗
   ║  SOURCE BUTTONS                              ║
   ╚══════════════════════════════════════════════╝ */
.source-selector{
  display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:0 0 14px;
}
.source-btn{
  padding:7px 20px;border-radius:999px;
  border:1.5px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.03);
  color:#607890;font-size:.82rem;font-weight:800;
  transition:all .2s ease;outline:none;
}
.source-btn:hover:not(.active){
  color:#d0e8ff;border-color:rgba(0,205,235,.28);
  background:rgba(0,205,235,.05);transform:translateY(-1px);
}
.source-btn.active{
  background:linear-gradient(135deg,#1de8ff,#00a8d0);
  border-color:transparent;color:#021820;font-weight:900;
  box-shadow:0 6px 20px rgba(0,205,235,.28);
}
.source-btn:active{transform:scale(.96);}

/* ╔══════════════════════════════════════════════╗
   ║  EPISODES SECTION LABEL                      ║
   ╚══════════════════════════════════════════════╝ */
.smtv-ep-label{
  display:flex;align-items:center;gap:10px;
  margin:6px 0 12px;
}
.smtv-ep-label-bar{
  width:4px;height:22px;border-radius:3px;flex-shrink:0;
  background:#1de8ff;box-shadow:0 0 10px rgba(0,205,235,.55);
}
.smtv-ep-label-txt{
  font-size:.85rem;font-weight:800;letter-spacing:.08em;
  text-transform:uppercase;color:#1de8ff;
}

/* ╔══════════════════════════════════════════════╗
   ║  EPISODE ROW                                 ║
   ╚══════════════════════════════════════════════╝ */
.pro-episodes-row-wrap-pro{margin-top:4px;margin-bottom:8px;}
.pro-episodes-row-pro{
  display:flex;gap:10px;overflow-x:auto;
  padding:4px 2px 16px;
  -webkit-overflow-scrolling:touch;
  scroll-snap-type:x proximity;
  scrollbar-width:none;
  align-items:flex-start;
}
.pro-episodes-row-pro::-webkit-scrollbar{display:none;}

/* ╔══════════════════════════════════════════════╗
   ║  EPISODE CARD                                ║
   ║  ─ thumbnail fills full width (16:9)         ║
   ║  ─ "Ep N" badge on thumbnail                 ║
   ║  ─ title below: one line, ellipsis           ║
   ╚══════════════════════════════════════════════╝ */
.pro-episode-card-pro{
  flex:0 0 155px;
  scroll-snap-align:start;
  display:flex;flex-direction:column;
  text-decoration:none;
  border-radius:12px;
  background:#0e1624;
  border:1px solid rgba(255,255,255,.07);
  overflow:hidden;
  position:relative;
  opacity:0;
  transform:translateY(14px);
  transition:
    transform .28s cubic-bezier(.22,.8,.2,1),
    box-shadow .28s ease,
    border-color .28s ease;
  will-change:transform;
}
.pro-episode-card-pro.smtv-card-in{
  animation:cardPop .4s cubic-bezier(.22,.8,.2,1) both;
}
.pro-episode-card-pro:hover{
  transform:translateY(-5px) scale(1.01);
  box-shadow:0 14px 32px rgba(0,0,0,.55),0 0 0 1px rgba(0,205,235,.22);
  border-color:rgba(0,205,235,.28);
}
.pro-episode-card-pro:active{transform:scale(.96);}

@media(max-width:420px){.pro-episode-card-pro{flex:0 0 136px;}}
@media(min-width:900px){.pro-episode-card-pro{flex:0 0 178px;}}

/* ── THUMBNAIL WRAPPER: 16:9, fills complete ── */
.pro-ep-thumb-wrap-pro{
  position:relative;
  width:100%;
  padding-top:56.25%; /* 16:9 = 9/16 = 56.25% */
  overflow:hidden;
  background:#070b16;
  flex-shrink:0;
  display:block;
}
/* The actual image — absolutely fills the padded box */
.pro-ep-thumb-pro{
  position:absolute !important;
  top:0 !important;
  left:0 !important;
  width:100% !important;
  height:100% !important;
  object-fit:cover !important;
  object-position:center !important;
  display:block !important;
  transition:transform .32s cubic-bezier(.22,.8,.2,1);
  background:#070b16;
}
.pro-episode-card-pro:hover .pro-ep-thumb-pro{transform:scale(1.06);}

/* Play overlay */
.smtv-play-overlay{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .2s;z-index:3;pointer-events:none;
}
.smtv-play-overlay span{
  width:32px;height:32px;border-radius:50%;
  background:rgba(0,205,235,.9);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 18px rgba(0,205,235,.5);
}
.smtv-play-overlay i{font-size:.65rem;color:#021820;margin-left:2px;}
.pro-episode-card-pro:hover .smtv-play-overlay{opacity:1;}

/* ── EP BADGE (Ep 1) top-left on thumbnail ── */
.pro-ep-num-pro{
  position:absolute;
  top:6px;left:6px;
  z-index:2;
  background:rgba(4,7,16,.88);
  border:1px solid rgba(0,205,235,.3);
  color:#1de8ff;
  font-size:.62rem;font-weight:900;
  padding:2px 7px;border-radius:5px;
  letter-spacing:.04em;
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  white-space:nowrap;
  line-height:1.4;
  display:inline-block;
  width:fit-content;
  /* Never let the badge expand or wrap */
  max-width:calc(100% - 12px);
  overflow:hidden;
  text-overflow:ellipsis;
}

/* ── EPISODE TITLE: one line, natural ellipsis ── */
.pro-ep-title-pro{
  padding:8px 8px 10px;
  font-size:.77rem;
  font-weight:600;
  color:#b8cfea;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  display:block;
  line-height:1.4;
  /* Ensures it stretches full card width for correct clipping */
  width:100%;
}

/* ╔══════════════════════════════════════════════╗
   ║  HOW TO WATCH SECTION                        ║
   ╚══════════════════════════════════════════════╝ */
.howto-section{margin:24px 0 20px;}

.pro-tutorial-title{
  display:flex;align-items:center;gap:10px;
  font-size:1.25rem;font-weight:800;color:#fff;
  margin:0 0 18px;letter-spacing:.01em;
}
.pro-tutorial-title .smtv-bar{
  width:4px;height:24px;border-radius:3px;flex-shrink:0;
  background:#1de8ff;box-shadow:0 0 10px rgba(0,205,235,.45);
}

.smtv-process-block{margin-bottom:18px;}
.smtv-process-label{
  display:flex;align-items:center;gap:7px;
  font-size:.68rem;font-weight:800;
  letter-spacing:.12em;text-transform:uppercase;
  color:#607890;margin-bottom:8px;
}
.smtv-dot{
  width:7px;height:7px;border-radius:50%;flex-shrink:0;
  background:#1de8ff;box-shadow:0 0 7px rgba(0,205,235,.55);
  animation:dotPulse 2s ease-in-out infinite;
}
.smtv-video-card{
  border-radius:14px;overflow:hidden;
  background:#0a0f1c;border:1px solid rgba(255,255,255,.06);
  box-shadow:0 10px 28px rgba(0,0,0,.45);
}
.pro-video-frame-wrap{
  position:relative;width:100%;height:0;padding-bottom:56.25%;overflow:hidden;
}
.pro-video-frame-wrap iframe{
  position:absolute;inset:0;width:100%;height:100%;border:0;display:block;background:#000;
}

/* ╔══════════════════════════════════════════════╗
   ║  WHATSAPP POPUP                              ║
   ╚══════════════════════════════════════════════╝ */
#wa-backdrop{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.65);
  backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px);
  z-index:99998;
}
#wa-backdrop.open{display:block;animation:fadeIn .3s ease both;}
#whatsappPopup{
  display:none;position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:min(340px,calc(100vw - 28px));
  z-index:99999;border-radius:22px;
}
#whatsappPopup.open{display:block;animation:popIn .4s cubic-bezier(.22,.8,.2,1) both;}
#whatsappPopup.closing{animation:popOut .26s cubic-bezier(.22,.8,.2,1) both;}
.wa-inner{
  background:linear-gradient(160deg,#101a2c,#0c1320);
  border:1px solid rgba(255,255,255,.09);
  border-radius:22px;padding:22px 20px 20px;
  position:relative;overflow:hidden;
}
.wa-inner::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,#25d366,#1de8ff,#25d366);
  background-size:400px 2px;animation:shine 2s linear infinite;
}
.wa-top{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.wa-logo{width:44px;height:44px;border-radius:12px;flex-shrink:0;}
.wa-title{font-size:1rem;font-weight:900;color:#fff;line-height:1.2;}
.wa-title span{display:block;font-size:.77rem;font-weight:500;color:#607890;margin-top:2px;}
.wa-body{font-size:.85rem;color:#8fa8c4;line-height:1.65;margin-bottom:16px;}
.wa-body strong{color:#e2ecf8;}
.wa-btn{
  display:flex;align-items:center;justify-content:center;gap:9px;
  width:100%;padding:13px 18px;border-radius:13px;
  background:linear-gradient(135deg,#25d366,#1aaa50);color:#fff;
  font-weight:800;font-size:.88rem;text-decoration:none;
  box-shadow:0 8px 22px rgba(37,211,102,.3);
  transition:transform .2s,box-shadow .2s;
}
.wa-btn:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(37,211,102,.4);}
.wa-dismiss{
  display:block;width:100%;margin-top:10px;padding:7px;border-radius:9px;
  background:none;border:1px solid rgba(255,255,255,.08);color:#607890;
  font-size:.8rem;font-weight:700;cursor:pointer;
  transition:color .2s,border-color .2s;
}
.wa-dismiss:hover{color:#ff7090;border-color:rgba(255,112,144,.28);}

@media(max-width:600px){
  body{padding-bottom:calc(116px + env(safe-area-inset-bottom));}
}
  </style>

  <script defer src="series.js"></script>
</head>
<body>

<div id="wa-backdrop"></div>

<div id="main-content">
  <header></header>
  <script type="text/javascript" src="//www.highperformanceformat.com/c91a82435d260630918ecc80c95125ac/invoke.js"></script>
  <div id="series-details" aria-live="polite"></div>
</div>

<!-- ════════════════════════════════════════════
     SMTV ENHANCEMENT ENGINE
     Runs after series.js injects HTML.
     Each function is self-contained & idempotent.
════════════════════════════════════════════ -->
<script>
(function(){
  'use strict';

  /* ── POSTER: scan line + fade overlay ──────── */
  function doPosterFX(){
    document.querySelectorAll('.pro-series-header-pro').forEach(function(h){
      if(h._fx) return; h._fx=true;
      if(!h.querySelector('.smtv-scan')){
        var s=document.createElement('div'); s.className='smtv-scan'; h.appendChild(s);
      }
      if(!h.querySelector('.smtv-poster-fade')){
        var f=document.createElement('div'); f.className='smtv-poster-fade'; h.appendChild(f);
      }
    });
  }

  /* ── VIP CARD: rebuild with correct 2×2 grid ─
     Short text only — NO wrapping possible:
     "No Ads"  "Fast DL"  "Early Access"  "HD"
  ─────────────────────────────────────────────── */
  function doVipCard(){
    document.querySelectorAll('.premium-channel-message').forEach(function(box){
      if(box._vip) return; box._vip=true;

      /* Grab original VIP link if present */
      var aEl=box.querySelector('a');
      var href=(aEl && aEl.getAttribute('href')) || '/premium.html';

      /* Completely replace inner HTML */
      box.classList.add('smtv-vip-card');
      box.style.cssText=''; /* clear any inline styles */
      box.innerHTML=
        '<div class="smtv-vip-inner">'+
          '<div class="smtv-vip-title">'+
            '<span class="smtv-vip-crown">👑</span>'+
            '<span class="smtv-vip-title-text">SMTV VIP Membership</span>'+
          '</div>'+
          '<div class="smtv-vip-feats">'+
            /* 4 items, grid forces 2-per-row: short text = never wraps */
            '<span class="smtv-vip-feat">⚡ No Ads</span>'+
            '<span class="smtv-vip-feat">⬇ Fast DL</span>'+
            '<span class="smtv-vip-feat">🔒 Early Access</span>'+
            '<span class="smtv-vip-feat">🎞 HD Quality</span>'+
          '</div>'+
          '<a class="smtv-vip-btn" href="'+href+'">'+
            '<i class="fa-solid fa-crown"></i> BECOME VIP'+
          '</a>'+
        '</div>';
    });
  }

  /* ── SEASON TABS: re-trigger active animation ─ */
  function doTabAnim(){
    document.querySelectorAll('.pro-season-tab-pro.active').forEach(function(tab){
      if(tab._anim) return; tab._anim=true;
      tab.style.animation='none';
      void tab.offsetHeight; /* reflow */
      tab.style.animation='';
    });
    /* Click handler: re-run bounce on new active */
    document.querySelectorAll('.pro-season-tab-pro').forEach(function(tab){
      if(tab._click) return; tab._click=true;
      tab.addEventListener('click',function(){
        document.querySelectorAll('.pro-season-tab-pro').forEach(function(t){
          t.classList.remove('active');
          delete t._anim;
        });
        this.classList.add('active');
      });
    });
  }

  /* ── THUMBNAIL: guarantee full fill ─────────── */
  function doThumbs(){
    document.querySelectorAll('.pro-ep-thumb-pro').forEach(function(img){
      if(img._fix) return; img._fix=true;

      /* Remove any height set by series.js on the wrapper */
      var wrap=img.parentElement;
      if(wrap && wrap.classList.contains('pro-ep-thumb-wrap-pro')){
        /* Remove inline height — CSS padding-top:56.25% handles it */
        wrap.style.height='';
        wrap.style.minHeight='';
        wrap.style.maxHeight='';
      }

      /* Ensure img fills via !important inline style as backup */
      img.style.setProperty('position','absolute','important');
      img.style.setProperty('top','0','important');
      img.style.setProperty('left','0','important');
      img.style.setProperty('width','100%','important');
      img.style.setProperty('height','100%','important');
      img.style.setProperty('object-fit','cover','important');
      img.style.setProperty('object-position','center','important');
    });
  }

  /* ── EP BADGE: "Episode 1" → "Ep 1" ────────── */
  function doBadge(){
    document.querySelectorAll('.pro-ep-num-pro').forEach(function(el){
      if(el._b) return; el._b=true;
      var t=(el.textContent||'').trim();
      var m=/[Ee]pisodes*(d+)/.exec(t);
      if(m) el.textContent='Ep '+m[1];
    });
  }

  /* ── EP TITLE: single line + ellipsis ────────── */
  function doTitle(){
  document.querySelectorAll('.pro-ep-title-pro').forEach(function(el){
    if(el._t) return; el._t=true;

    var raw = (el.textContent || '').trim();

    var m = raw.match(/^Episodes+(d+)s*[-–—:]?s*(.*)$/i);
    if(m){
      var num  = m[1];
      var name = (m[2]||'').trim();

      if(name){
        // Has a title name → "Ep 1 — The Beginning"
        el.textContent = 'Ep ' + num + ' — ' + name;
      } else {
        // No name → keep full "Episode 1"
        el.textContent = 'Episode ' + num;
      }
    }

    // 2-line clamp via setProperty
    el.style.setProperty('white-space',        'normal',     'important');
    el.style.setProperty('overflow',           'hidden',     'important');
    el.style.setProperty('display',            '-webkit-box','important');
    el.style.setProperty('-webkit-line-clamp', '2',          'important');
    el.style.setProperty('-webkit-box-orient', 'vertical',   'important');
    el.style.setProperty('word-break',         'break-word', 'important');
    el.style.setProperty('min-height',         '2.8em',      'important');
  });
  }
  /* ── PLAY OVERLAY on thumbs ──────────────────── */
  function doPlayOverlay(){
    document.querySelectorAll('.pro-ep-thumb-wrap-pro').forEach(function(wrap){
      if(wrap._pl) return; wrap._pl=true;
      if(!wrap.querySelector('.smtv-play-overlay')){
        var d=document.createElement('div');
        d.className='smtv-play-overlay';
        d.innerHTML='<span><i class="fa-solid fa-play"></i></span>';
        wrap.appendChild(d);
      }
    });
  }

  /* ── CARD STAGGER ANIMATION ──────────────────── */
  function doCardAnim(){
    document.querySelectorAll('.pro-episode-card-pro').forEach(function(card,i){
      if(card._an) return; card._an=true;
      card.style.animationDelay=(i*0.06)+'s';
      /* Use rAF so browser has painted the initial state */
      requestAnimationFrame(function(){
        requestAnimationFrame(function(){
          card.classList.add('smtv-card-in');
        });
      });
    });
  }

  /* ── EPISODES LABEL ──────────────────────────── */
  function doEpLabel(){
    document.querySelectorAll('.pro-episodes-row-wrap-pro').forEach(function(wrap){
      if(wrap._lbl) return; wrap._lbl=true;
      if(!wrap.querySelector('.smtv-ep-label')){
        var lbl=document.createElement('div');
        lbl.className='smtv-ep-label';
        lbl.innerHTML='<span class="smtv-ep-label-bar"></span><span class="smtv-ep-label-txt">Episodes</span>';
        wrap.insertBefore(lbl, wrap.firstChild);
      }
    });
  }

  /* ── HOW TO WATCH ─────────────────────────────
     Makes the title have the left cyan bar,
     and wraps each video in a dark card with label.
  ─────────────────────────────────────────────── */
  function doHowTo(){
    /* Fix title */
    document.querySelectorAll('.pro-tutorial-title').forEach(function(el){
      if(el._ht) return; el._ht=true;
      var txt=(el.textContent||'How to Watch Episodes').trim()
        .replace(/^[-–—|▌s]+/,'').trim();
      el.innerHTML='<span class="smtv-bar"></span>'+txt;
    });

    /* Fix process cards */
    document.querySelectorAll('.pro-tutorial-card, .tutorial-card').forEach(function(card){
      if(card._ht) return; card._ht=true;

      var labelEl=card.querySelector('.small-title, .process-label, [class*="label"], .tutorial-label');
      var rawLabel=((labelEl && labelEl.textContent)||'OLD PROCESS').trim().toUpperCase();
      var isNew=/new/i.test(rawLabel);

      var block=document.createElement('div');
      block.className='smtv-process-block';
      block.innerHTML=
        '<div class="smtv-process-label">'+
          '<span class="smtv-dot" style="'+(isNew?'background:#00e896;box-shadow:0 0 7px rgba(0,232,150,.6)':'')+';"></span>'+
          rawLabel+
        '</div>'+
        '<div class="smtv-video-card"></div>';

      var vidBox=block.querySelector('.smtv-video-card');
      if(labelEl) labelEl.remove();
      var vfw=card.querySelector('.pro-video-frame-wrap');
      if(vfw) vidBox.appendChild(vfw);

      card.parentNode.insertBefore(block, card);
      card.remove();
    });
  }

  /* ════════════════════════════════════════════
     RUN ALL — called whenever DOM changes
  ════════════════════════════════════════════ */
  function runAll(){
    doPosterFX();
    doVipCard();
    doTabAnim();
    doThumbs();
    doBadge();
    doTitle();
    doPlayOverlay();
    doCardAnim();
    doEpLabel();
    doHowTo();
  }

  /* MutationObserver on #series-details */
  var sd=document.getElementById('series-details');
  if(sd){
    var obs=new MutationObserver(function(){ runAll(); });
    obs.observe(sd, {childList:true, subtree:true, attributes:false});
    /* Disconnect after 20s to avoid memory waste */
    setTimeout(function(){ obs.disconnect(); runAll(); }, 20000);
  }

  /* Also run on DOMContentLoaded + a couple safety delays */
  document.addEventListener('DOMContentLoaded', runAll);
  setTimeout(runAll, 400);
  setTimeout(runAll, 1000);
  setTimeout(runAll, 2500);
})();
</script>

<!-- Dynamic page title from series.json -->
<script>
document.addEventListener('DOMContentLoaded',function(){
  var slug=new URLSearchParams(window.location.search).get('series');
  if(!slug) return;
  fetch('/series.json')
    .then(function(r){return r.json();})
    .then(function(arr){
      var m=Array.isArray(arr)?arr.find(function(s){return s.slug===slug;}):null;
      if(m&&m.title){
        document.title=m.title+' – SmTv Urdu';
        var d=document.querySelector('meta[name="description"]');
        if(d) d.setAttribute('content',m.title+' - Watch all episodes in Urdu on SmTv Urdu.');
      }
    }).catch(function(){});
});
</script>

    </a>
    <button class="wa-dismiss" id="closeWaPopup">✕ No thanks</button>
  </div>

<script>
(function(){
  var popup=document.getElementById('whatsappPopup');
  var bg=document.getElementById('wa-backdrop');
  var btn=document.getElementById('closeWaPopup');
  function open(){ popup.classList.remove('closing'); popup.classList.add('open'); bg.classList.add('open'); }
  function close(){
    popup.classList.add('closing'); bg.classList.remove('open');
    setTimeout(function(){ popup.classList.remove('open','closing'); }, 280);
  }
  window.addEventListener('DOMContentLoaded',function(){
    setTimeout(open, 2500);
    if(btn) btn.addEventListener('click', close);
    if(bg)  bg.addEventListener('click', close);
  });
})();
</script>

<!-- Scroll position fix -->
<script>
(function(){
  try{ window.scrollTo(0,0); }catch(e){}
  document.addEventListener('focusin',function(){
    var x=window.scrollX||0, y=window.scrollY||0;
    setTimeout(function(){ try{ window.scrollTo(x,y); }catch(e){} }, 0);
  },true);
  var det=document.getElementById('series-details');
  if(det){
    var o=new MutationObserver(function(){
      if(det.childNodes.length>0){
        try{ window.scrollTo({top:0,left:0,behavior:'auto'}); }catch(e){ window.scrollTo(0,0); }
        o.disconnect();
      }
    });
    o.observe(det,{childList:true,subtree:false});
  }
})();
</script>

<!-- Footer loader -->
<div id="footer-placeholder"></div>
<script>
(async function(){
  var cands=['/includes/footer.html','includes/footer.html','./includes/footer.html','/footer.html','footer.html'];
  var ph=document.getElementById('footer-placeholder');
  function initNav(html){
    try{
      ph.innerHTML=html;
      try{ var p=parseInt(getComputedStyle(document.body).paddingBottom)||0; if(p<96) document.body.style.paddingBottom='calc(96px + env(safe-area-inset-bottom))'; }catch(e){}
      var nav=ph.querySelector('#smtv-bottom-nav')||ph.querySelector('.smtv-bottom-nav');
      if(!nav) return;
      var items=Array.from(nav.querySelectorAll('.nav-item'));
      items.forEach(function(i){ i.classList.remove('active'); });
      var si=items.find(function(i){ return (i.dataset.name||'').toLowerCase()==='series'; });
      if(!si) si=items.find(function(i){ return (i.getAttribute('href')||'').toLowerCase().includes('series'); });
      if(new URLSearchParams(window.location.search).has('series') && si) si.classList.add('active');
      else{
        var pp=location.pathname.toLowerCase().split('/').pop();
        var bp=items.find(function(i){ return (i.getAttribute('href')||'').toLowerCase().includes(pp); });
        if(bp) bp.classList.add('active'); else if(si) si.classList.add('active');
      }
      items.forEach(function(a){
        if(a.dataset.bound) return; a.dataset.bound='1';
        a.addEventListener('click',function(e){
          try{ e.preventDefault(); }catch(x){}
          items.forEach(function(i){ i.classList.remove('active'); });
          this.classList.add('active');
          var h=this.getAttribute('href'); if(h) location.assign(h);
        },{passive:false});
      });
    }catch(e){ console.warn('initNav',e); }
  }
  for(var i=0;i<cands.length;i++){
    try{
      var r=await fetch(cands[i],{cache:'no-cache'});
      if(!r.ok) continue;
      initNav(await r.text()); return;
    }catch(e){ continue; }
  }
  /* Fallback nav */
  ph.innerHTML='<nav class="smtv-bottom-nav" id="smtv-bottom-nav" role="navigation" aria-label="Main">'+
    '<a href="/index.html" class="nav-item" data-name="home"><span class="icon-wrap"><i class="fa-solid fa-house"></i></span><span class="label">Home</span></a>'+
    '<a href="/series.html" class="nav-item active" data-name="series"><span class="icon-wrap"><i class="fa-solid fa-film"></i></span><span class="label">Series</span></a>'+
    '<a href="/clips.html" class="nav-item" data-name="clips"><span class="icon-wrap"><i class="fa-solid fa-play-circle"></i></span><span class="label">Clips</span></a>'+
    '<a href="/premium.html" class="nav-item" data-name="premium"><span class="icon-wrap"><i class="fa-solid fa-star"></i></span><span class="label">Premium</span></a>'+
    '<a href="/more.html" class="nav-item" data-name="more"><span class="icon-wrap"><i class="fa-solid fa-circle-info"></i></span><span class="label">More</span></a>'+
    '</nav>'+
    '<style>'+
    '.smtv-bottom-nav{position:fixed;left:12px;right:12px;bottom:12px;height:64px;display:flex;gap:6px;padding:7px;border-radius:18px;background:rgba(8,10,18,.93);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.07);box-shadow:0 16px 48px rgba(0,0,0,.55);align-items:center;z-index:1200;padding-bottom:calc(env(safe-area-inset-bottom)+7px);}'+
    '.smtv-bottom-nav .nav-item{flex:1;text-align:center;color:#526880;text-decoration:none;padding:5px;border-radius:12px;transition:color .22s,transform .22s,background .22s;}'+
    '.smtv-bottom-nav .nav-item.active{color:#fff;background:rgba(0,205,235,.1);transform:translateY(-4px);}'+
    '.smtv-bottom-nav .icon-wrap{display:inline-flex;width:36px;height:36px;align-items:center;justify-content:center;border-radius:10px;}'+
    '.smtv-bottom-nav .label{display:block;font-size:10.5px;margin-top:2px;font-weight:600;}'+
    '</style>';
  try{ document.body.style.paddingBottom='calc(96px + env(safe-area-inset-bottom))'; }catch(e){}
})();
</script>
