  <style>
    /* ── COLOR TOKENS ── */
    :root {
      --void: #030712;
      --card: #111e30;
      --gold: #d4a827;
      --gold-lt: #f0c84a;
      --cyan: #06b6d4;
      --red: #dc2626;
      --white: #f8f4ee;
      --muted: #64748b;
      --border: rgba(212,168,39,0.15);
      --border-hi: rgba(212,168,39,0.42);
      --ff-d: 'Playfair Display', serif;
      --ff-b: 'DM Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; background: var(--void); }

    body {
      font-family: var(--ff-b);
      background: var(--void);
      color: var(--white);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── CARD IMAGE OVERRIDE (must override style.css) ── */
    .card img {
      max-height: none !important;
      height: auto !important;
      aspect-ratio: 6/8 !important;
      object-fit: cover !important;
      object-position: center top !important;
    }
    #srch-results .card img {
      max-height: none !important;
      height: auto !important;
      aspect-ratio: 6/8 !important;
      object-fit: cover !important;
      object-position: center top !important;
    }

    /* ── SIDEBAR BACKDROP ── */
    #sb-backdrop {
      position: fixed; inset: 0; z-index: 900;
      background: rgba(3,7,18,0.7);
      backdrop-filter: blur(6px);
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
    }
    #sb-backdrop.open { opacity: 1; pointer-events: all; }

    /* ── SIDEBAR ── */
    #sidebar {
      position: fixed; top: 0; left: 0; bottom: 0;
      width: min(300px, 85vw);
      z-index: 1000;
      background: linear-gradient(160deg, #0d1b2e 0%, #060f1c 100%);
      border-right: 1px solid var(--border-hi);
      transform: translateX(-100%);
      transition: transform 0.35s cubic-bezier(0.22,1,0.36,1);
      display: flex; flex-direction: column;
      box-shadow: 4px 0 40px rgba(0,0,0,0.6);
      overflow-y: auto;
    }
    #sidebar.open { transform: translateX(0); }

    .sb-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 18px 16px;
      border-bottom: 1px solid var(--border);
    }
    .sb-logo {
      font-family: var(--ff-d);
      font-size: 1.4rem; font-weight: 800;
      background: linear-gradient(90deg, var(--gold), var(--gold-lt));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .sb-close {
      background: rgba(212,168,39,0.12);
      border: 1px solid var(--border-hi);
      color: var(--gold); font-size: 1.3rem;
      width: 34px; height: 34px;
      border-radius: 8px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.3s;
    }
    .sb-close:hover { background: rgba(212,168,39,0.2); transform: rotate(90deg); }

    .sb-nav { padding: 16px 14px; display: flex; flex-direction: column; gap: 8px; }

    .sb-btn {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 0.95rem; font-weight: 600;
      color: var(--white);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      cursor: pointer;
      transform: translateX(-30px);
      opacity: 0;
    }
    .sb-btn .sb-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      background: rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    .sb-btn:hover { background: rgba(212,168,39,0.1); border-color: var(--border-hi); }
    .sb-btn.tg { border-color: rgba(41,182,246,0.25); }
    .sb-btn.tg .sb-icon { background: rgba(41,182,246,0.15); }
    .sb-btn.tg:hover { background: rgba(41,182,246,0.1); }
    .sb-btn.wa { border-color: rgba(37,211,102,0.25); }
    .sb-btn.wa .sb-icon { background: rgba(37,211,102,0.15); }
    .sb-btn.wa:hover { background: rgba(37,211,102,0.1); }

    #sidebar.open .sb-btn {
      animation: sbSlideIn 0.4s cubic-bezier(0.22,1,0.36,1) forwards;
    }
    #sidebar.open .sb-btn:nth-child(1) { animation-delay: 0.05s; }
    #sidebar.open .sb-btn:nth-child(2) { animation-delay: 0.10s; }
    #sidebar.open .sb-btn:nth-child(3) { animation-delay: 0.15s; }
    #sidebar.open .sb-btn:nth-child(4) { animation-delay: 0.20s; }
    #sidebar.open .sb-btn:nth-child(5) { animation-delay: 0.25s; }

    @keyframes sbSlideIn {
      to { transform: translateX(0); opacity: 1; }
    }

    /* ── HEADER ── */
    #site-header {
      position: sticky; top: 0; z-index: 800;
      display: flex; align-items: center; gap: 10px;
      padding: 0 14px;
      height: 56px;
      background: rgba(3,7,18,0.92);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 2px 24px rgba(0,0,0,0.4);
    }

    .hdr-hamburger {
      background: none; border: none;
      color: var(--white); font-size: 1.3rem;
      cursor: pointer; padding: 6px 8px;
      border-radius: 8px;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .hdr-hamburger:hover { background: rgba(255,255,255,0.08); }

    .hdr-title {
      font-family: var(--ff-d);
      font-size: 1.3rem; font-weight: 800;
      background: linear-gradient(90deg, var(--gold), var(--gold-lt), var(--gold));
      background-size: 200%;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: titleShimmer 4s linear infinite;
      flex: 1; text-align: center;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    @keyframes titleShimmer {
      0%,100% { background-position: 0%; }
      50% { background-position: 100%; }
    }

    .hdr-search-btn {
      background: none; border: none;
      color: var(--white); font-size: 1.15rem;
      cursor: pointer; padding: 7px 9px;
      border-radius: 8px;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
      flex-shrink: 0;
    }
    .hdr-search-btn:hover {
      background: rgba(212,168,39,0.12);
      box-shadow: 0 0 14px rgba(212,168,39,0.35);
      transform: scale(1.08);
    }

    .hdr-premium {
      display: flex; align-items: center; gap: 5px;
      padding: 6px 12px;
      background: linear-gradient(90deg, var(--gold), var(--gold-lt));
      color: #0a0d14; font-size: 0.78rem; font-weight: 700;
      border-radius: 20px; text-decoration: none;
      white-space: nowrap; flex-shrink: 0;
      animation: premiumPulse 2.5s ease-in-out infinite;
    }
    @keyframes premiumPulse {
      0%,100% { box-shadow: 0 0 8px rgba(212,168,39,0.4); }
      50% { box-shadow: 0 0 22px rgba(212,168,39,0.75), 0 0 40px rgba(212,168,39,0.2); }
    }

    /* ── SPONSOR BANNER ── */
    #sponsor-banner {
      margin: 10px 12px;
      padding: 10px 14px;
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(212,168,39,0.10) 0%, rgba(240,200,74,0.06) 100%);
      border: 1px solid var(--border-hi);
      display: flex; align-items: center; gap: 10px;
      position: relative; overflow: hidden;
      animation: sponsorShimmer 3s ease-in-out infinite;
    }
    @keyframes sponsorShimmer {
      0%,100% { border-color: rgba(212,168,39,0.42); }
      50% { border-color: rgba(212,168,39,0.7); box-shadow: 0 0 20px rgba(212,168,39,0.15); }
    }
    #sponsor-banner::before {
      content: '';
      position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(212,168,39,0.08), transparent);
      animation: shimmerSweep 3s ease-in-out infinite;
    }
    @keyframes shimmerSweep {
      0% { left: -100%; }
      100% { left: 200%; }
    }
    .spn-icon { font-size: 1.2rem; flex-shrink: 0; }
    .spn-label {
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.1em;
      color: var(--gold); text-transform: uppercase; display: block;
    }
    .spn-name { font-size: 0.92rem; font-weight: 700; color: var(--white); }
    .spn-info { flex: 1; min-width: 0; }
    .spn-btn {
      padding: 6px 13px;
      background: linear-gradient(90deg, var(--gold), var(--gold-lt));
      color: #0a0d14; font-size: 0.78rem; font-weight: 800;
      border-radius: 20px; text-decoration: none;
      white-space: nowrap; flex-shrink: 0;
      transition: box-shadow 0.2s, transform 0.2s;
    }
    .spn-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(212,168,39,0.5); }

    /* ── HERO CINEMA BANNER ── */
    #hero {
      position: relative; width: 100%;
      height: clamp(240px, 56vw, 420px);
      overflow: hidden;
      background: #060f1c;
    }

    .hero-slide {
      position: absolute; inset: 0;
      opacity: 0;
      transition: opacity 0.8s ease;
      pointer-events: none;
    }
    .hero-slide.active {
      opacity: 1;
      pointer-events: all;
    }

    .hero-bg {
      position: absolute; inset: -10%;
      background-size: cover; background-position: center;
      filter: blur(18px) brightness(0.45) saturate(1.2);
      transform: scale(1.1);
      animation: kenBurns 8s ease-in-out infinite alternate;
    }
    @keyframes kenBurns {
      from { transform: scale(1.1) translateY(0); }
      to   { transform: scale(1.18) translateY(-2%); }
    }

    .hero-thumb {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      height: 78%;
      width: auto;
      max-width: 42%;
      object-fit: contain;
      border-radius: 10px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
      z-index: 1;
    }

    .hero-vignette {
      position: absolute; inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(3,7,18,0.3) 0%,
        rgba(3,7,18,0) 30%,
        rgba(3,7,18,0) 50%,
        rgba(3,7,18,0.75) 80%,
        rgba(3,7,18,0.97) 100%
      );
      z-index: 2;
    }

    .hero-new-badge {
      position: absolute; top: 14px; left: 14px; z-index: 3;
      display: flex; align-items: center; gap: 5px;
      background: var(--red);
      color: #fff; font-size: 0.7rem; font-weight: 700;
      padding: 4px 10px; border-radius: 6px;
      letter-spacing: 0.05em;
    }
    .hero-new-badge::before {
      content: '●';
      animation: blink 1s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

    .hero-content {
      position: absolute; bottom: 16px; left: 0; right: 0;
      z-index: 3; padding: 0 16px;
    }
    .hero-series-name {
      font-size: 0.78rem; font-weight: 600;
      color: var(--cyan); letter-spacing: 0.06em;
      text-transform: uppercase; margin-bottom: 4px;
    }
    .hero-ep-title {
      font-family: var(--ff-d);
      font-size: clamp(1rem, 4vw, 1.4rem);
      font-weight: 700; color: var(--white);
      line-height: 1.25;
      text-shadow: 0 2px 10px rgba(0,0,0,0.6);
      margin-bottom: 10px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .hero-watch-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 20px;
      background: linear-gradient(90deg, var(--gold), var(--gold-lt));
      color: #0a0d14; font-size: 0.85rem; font-weight: 700;
      border-radius: 8px; text-decoration: none;
      border: none; cursor: pointer;
      transition: box-shadow 0.2s, transform 0.2s;
    }
    .hero-watch-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(212,168,39,0.5); }

    /* Hero dots */
    #hero-dots {
      display: flex; justify-content: center; gap: 7px;
      padding: 10px 0 4px;
    }
    .hero-dot {
      width: 6px; height: 6px;
      border-radius: 3px;
      background: rgba(212,168,39,0.3);
      border: none; cursor: pointer;
      transition: background 0.3s, width 0.3s;
    }
    .hero-dot.active { background: var(--gold); width: 18px; }

    /* ── SECTION LABELS ── */
    .section-label {
      font-size: 0.7rem; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--gold); padding: 18px 14px 8px;
      display: flex; align-items: center; gap: 8px;
    }
    .section-label::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, var(--border-hi), transparent);
    }

    /* ── SCHEDULE CARDS ── */
    #schedule-wrap { padding: 0 12px; display: flex; flex-direction: column; gap: 8px; }

    .sched-card {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 14px;
      background: var(--card);
      border-radius: 12px;
      border-left: 3px solid var(--gold);
      border-bottom: 1px solid var(--border);
      transform: translateX(-40px); opacity: 0;
      transition: transform 0.5s cubic-bezier(0.22,1,0.36,1), opacity 0.5s;
    }
    .sched-card.visible { transform: translateX(0); opacity: 1; }
    .sched-card.is-live { border-left-color: var(--red); }

    .sched-thumb {
      width: 48px; height: 48px;
      object-fit: cover; border-radius: 8px;
      flex-shrink: 0;
      border: 1px solid var(--border);
    }
    .sched-info { flex: 1; min-width: 0; }
    .sched-title {
      font-size: 0.9rem; font-weight: 700;
      color: var(--white);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .sched-meta {
      display: flex; align-items: center; gap: 6px;
      flex-wrap: wrap; margin-top: 3px;
    }
    .sched-day { font-size: 0.75rem; font-weight: 600; color: var(--gold); }
    .sched-dot { color: var(--muted); font-size: 0.6rem; }
    .sched-type { font-size: 0.75rem; font-weight: 600; color: var(--cyan); }
    .sched-live {
      font-size: 0.65rem; font-weight: 700; letter-spacing: 0.06em;
      background: var(--red); color: #fff;
      padding: 2px 6px; border-radius: 4px;
    }
    .sched-countdown {
      font-size: 0.7rem; color: var(--gold-lt);
      margin-top: 2px; font-weight: 500;
    }

    /* ── RECOMMENDED ── */
    #rec-scroll {
      display: flex; gap: 10px;
      padding: 4px 12px 12px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    #rec-scroll::-webkit-scrollbar { display: none; }
    #rec-scroll .card { flex: 0 0 130px; width: 130px; }

    /* ── FILTER BAR ── */
    .filter-bar { padding: 4px 12px 8px; }
    .filter-bar .primary { display: flex; gap: 8px; margin-bottom: 8px; }
    .filter-bar .secondary {
      display: flex; gap: 6px; flex-wrap: wrap;
      overflow: hidden; max-height: 0;
      transition: max-height 0.3s ease;
    }
    .filter-bar .secondary.visible { max-height: 80px; }

    /* ── SERIES GRID ── */
    #series-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 10px;
      padding: 0 12px 24px;
    }

    /* ── SKELETONS ── */
    .skeleton {
      background: linear-gradient(90deg, var(--card) 25%, #1a2d45 50%, var(--card) 75%);
      background-size: 200%;
      animation: skeletonSweep 1.5s ease-in-out infinite;
      border-radius: 10px;
      aspect-ratio: 6/8;
    }
    @keyframes skeletonSweep {
      0% { background-position: 200%; }
      100% { background-position: -200%; }
    }

    /* ── CARD FADE-UP ── */
    .card {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.5s, transform 0.5s;
    }
    .card.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── SEARCH OVERLAY ── */
    #search-overlay {
      position: fixed; inset: 0; z-index: 1100;
      background: rgba(3,7,18,0.97);
      backdrop-filter: blur(20px);
      display: flex; flex-direction: column;
      transform: translateY(-100%);
      transition: transform 0.35s cubic-bezier(0.22,1,0.36,1);
    }
    #search-overlay.open { transform: translateY(0); }

    .srch-top {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 14px 10px;
      border-bottom: 1px solid var(--border);
    }
    .srch-input-wrap {
      flex: 1;
      display: flex; align-items: center; gap: 8px;
      background: var(--card);
      border: 1px solid var(--border-hi);
      border-radius: 24px;
      padding: 9px 14px;
    }
    .srch-input-wrap svg { color: var(--gold); flex-shrink: 0; }
    #srch-input {
      flex: 1; background: none; border: none;
      color: var(--white); font-family: var(--ff-b);
      font-size: 1rem; outline: none;
    }
    #srch-input::placeholder { color: var(--muted); }
    #srch-clear {
      background: none; border: none;
      color: var(--muted); cursor: pointer;
      font-size: 1rem; padding: 0 2px;
      transition: color 0.2s;
      display: none;
    }
    #srch-clear.visible { display: block; }
    #srch-clear:hover { color: var(--white); }
    #srch-cancel {
      background: none; border: none;
      color: var(--gold); font-size: 0.9rem;
      font-weight: 600; cursor: pointer;
      white-space: nowrap; padding: 4px 2px;
      font-family: var(--ff-b);
    }

    #srch-status {
      padding: 10px 14px 4px;
      font-size: 0.8rem; color: var(--muted);
    }

    #srch-results {
      flex: 1; overflow-y: auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 10px;
      padding: 8px 12px 24px;
      align-content: start;
    }

    .srch-empty {
      grid-column: 1/-1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; padding: 60px 20px;
      color: var(--muted);
    }
    .srch-empty svg { opacity: 0.3; }
    .srch-empty p { font-size: 0.95rem; text-align: center; }

    /* ── FOOTER PADDING ── */
    body { padding-bottom: calc(80px + env(safe-area-inset-bottom)); }
  </style>

  <script>
  // Footer loader
  (async function loadFooter() {
    try {
      const res = await fetch('/includes/footer.html');
      if (!res.ok) return;
      const html = await res.text();
      const ph = document.getElementById('footer-placeholder');
      ph.innerHTML = html;
      const nav = document.getElementById('smtv-bottom-nav');
      if (!nav) return;
      const items = Array.from(nav.querySelectorAll('.nav-item'));
      const path = window.location.pathname.toLowerCase();
      let matched = items.find(a => {
        const name = (a.dataset.name || '').toLowerCase();
        if (name === 'home' && (path === '/' || path.includes('index'))) return true;
        return name && path.includes(name);
      });
      if (!matched) {
        const last = localStorage.getItem('smtv_last_nav');
        if (last) matched = items.find(a => a.dataset.name === last);
      }
      if (matched) matched.classList.add('active');
      items.forEach(a => {
        a.addEventListener('click', function() {
          items.forEach(i => i.classList.remove('active'));
          this.classList.add('active');
          try { localStorage.setItem('smtv_last_nav', this.dataset.name); } catch(e) {}
        }, { passive: true });
      });
    } catch(e) {}
  })();
  </script>
