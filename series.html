<!DOCTYPE html>
<html lang="en">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-WM3KEDD127"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-WM3KEDD127');
  </script>

  <meta charset="UTF-8">
  <title>SmTv Urdu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Watch Turkish drama series and historical shows in Urdu on SmTv Urdu.">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800;900&family=Cormorant+Garamond&family=DM+Sans&display=swap" rel="stylesheet">

  <style>
    body{background:#04080f;color:#d8e8f8;font-family:'DM Sans',sans-serif;margin:0}
    #main-content{max-width:900px;margin:auto;padding:14px}

    .pro-episodes-row-pro{display:flex;gap:12px;overflow-x:auto;padding-bottom:14px}

    .pro-episode-card-pro{
      flex:0 0 150px;
      background:#07101c;
      border-radius:14px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.08);
      transition:.25s;
    }
    .pro-episode-card-pro:hover{transform:translateY(-6px)}

    /* ✅ FIXED THUMBNAIL */
    .pro-ep-thumb-wrap-pro{
      width:100%;
      height:100px;
      overflow:hidden;
      background:#0a1624;
    }
    .pro-ep-thumb-pro{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .pro-ep-title-pro{
      font-size:.8em;
      padding:10px;
      text-align:center;
    }

    .ep-play-overlay{
      position:absolute;
      top:50%;left:50%;
      transform:translate(-50%,-50%);
      background:#00c8f0;
      color:#000;
      width:30px;height:30px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:.7em;
      opacity:0;
    }
    .pro-episode-card-pro:hover .ep-play-overlay{opacity:1}
  </style>

  <script defer src="series.js"></script>
</head>
<body>

<div id="main-content">
  <div id="series-details"></div>
</div>

<!-- ✅ FIXED PATCH SCRIPT -->
<script>
(function () {
  let done = false;

  const observer = new MutationObserver(() => {
    if (done) return;

    const cards = document.querySelectorAll('.pro-episode-card-pro');
    if (!cards.length) return;

    done = true;

    // play overlay
    document.querySelectorAll('.pro-ep-thumb-wrap-pro').forEach(wrap => {
      if (wrap.querySelector('.ep-play-overlay')) return;
      const el = document.createElement('div');
      el.className = 'ep-play-overlay';
      el.textContent = '▶';
      wrap.appendChild(el);
    });

    // animation
    cards.forEach((c,i)=>{
      c.style.animationDelay = (i*0.05)+'s';
    });

    observer.disconnect();
  });

  observer.observe(document.getElementById('series-details'), {
    childList:true,
    subtree:true
  });
})();
</script>

</body>
</html>
