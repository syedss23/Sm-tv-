<head>

  <meta charset="UTF-8">
  <title>SmTv Urdu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Watch Turkish drama series and historical shows in Urdu on SmTv Urdu.">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous">

  <style>
    /* ─── Reset & Base ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-tap-highlight-color: transparent; }

    body {
      background: #080c14;
      color: #fff;
      font-family: -apple-system, 'Segoe UI', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      overflow-x: hidden;
      padding-bottom: calc(100px + env(safe-area-inset-bottom));
    }
    :focus { outline: none; }

    /* ─── Page wrapper ─────────────────────────────────────── */
    #page { max-width: 480px; margin: 0 auto; }

    /* ─── HERO POSTER ──────────────────────────────────────── */
    .hero-poster {
      width: 100%;
      position: relative;
      overflow: hidden;
      background: #0a0e18;
    }
    .hero-poster img {
      width: 100%;
      display: block;
      object-fit: cover;
      max-height: 320px;
    }
    .hero-poster-fade {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 65%;
      background: linear-gradient(to bottom, transparent 0%, #080c14 100%);
    }

    /* ─── SERIES INFO ──────────────────────────────────────── */
    .series-info {
      padding: 0 18px 8px;
      text-align: center;
    }
    .series-title {
      font-size: 23px;
      font-weight: 900;
      color: #fff;
      font-variant: small-caps;
      line-height: 1.2;
      margin-bottom: 9px;
    }
    .series-desc {
      font-size: 14px;
      color: #7a9ab0;
      line-height: 1.6;
    }

    /* ─── VIP BOX ──────────────────────────────────────────── */
    .vip-box {
      margin: 18px 14px 0;
      border-radius: 16px;
      border: 1.5px solid rgba(190,140,20,0.3);
      background: linear-gradient(155deg, #0d1a28 0%, #0a1420 100%);
      padding: 18px 16px 16px;
      position: relative;
      overflow: hidden;
    }
    .vip-box::before {
      content: '';
      position: absolute;
      top: 0; left: 15%; right: 15%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,195,30,0.45), transparent);
    }
    .vip-title-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .vip-crown { font-size: 20px; }
    .vip-title-text {
      font-size: 15.5px;
      font-weight: 800;
      color: #f5c518;
    }
    .vip-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 15px;
    }
    .vip-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 13px;
      border-radius: 999px;
      font-size: 12.5px;
      font-weight: 700;
    }
    .vip-badge.dark  { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); color: #c8dde8; }
    .vip-badge.teal  { background: rgba(0,155,130,0.1);   border: 1px solid rgba(0,185,155,0.35);   color: #40e0c0; }
    .vip-btn {
      display: block;
      width: 100%;
      padding: 15px 0;
      border-radius: 12px;
      background: linear-gradient(90deg, #f5c518 0%, #f09c18 100%);
      color: #1a0800;
      font-size: 15px;
      font-weight: 900;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      text-align: center;
      text-decoration: none;
      border: none;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(245,197,24,0.22);
      transition: transform 0.15s ease;
    }
    .vip-btn:active { transform: scale(0.97); }

    /* ─── SEASON TABS ──────────────────────────────────────── */
    .seasons-wrap {
      display: flex;
      gap: 12px;
      justify-content: center;
      padding: 22px 14px 0;
      flex-wrap: wrap;
    }
    .season-tab {
      padding: 12px 28px;
      border-radius: 999px;
      border: 1.5px solid rgba(255,255,255,0.09);
      background: rgba(255,255,255,0.04);
      color: #5a7a90;
      font-family: inherit;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.22s cubic-bezier(.4,1.4,.6,1);
    }
    .season-tab.active {
      background: linear-gradient(135deg, #00d4f0 0%, #009ec8 100%);
      color: #041820;
      border-color: transparent;
      box-shadow: 0 8px 28px rgba(0,185,220,0.28);
      transform: translateY(-3px);
    }

    /* ─── SOURCE SELECTOR ──────────────────────────────────── */
    .source-selector {
      display: flex;
      gap: 10px;
      justify-content: center;
      padding: 14px 14px 0;
      flex-wrap: wrap;
    }
    .source-btn {
      padding: 8px 20px;
      border-radius: 999px;
      border: 1.5px solid rgba(0,190,220,0.22);
      background: rgba(0,190,220,0.05);
      color: #4a7a90;
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.18s ease;
    }
    .source-btn.active {
      background: rgba(0,190,220,0.16);
      border-color: rgba(0,190,220,0.5);
      color: #00d4f0;
    }

    /* ─── EPISODES CONTAINER ───────────────────────────────── */
    .episodes-outer {
      margin: 14px 10px 0;
      background: #0d1525;
      border-radius: 18px;
      padding: 12px 0 14px;
      overflow: hidden;
    }
    .episodes-scroll {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding: 4px 14px 6px;
      -webkit-overflow-scrolling: touch;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
      transition: opacity 0.18s ease;
    }
    .episodes-scroll::-webkit-scrollbar { display: none; }
    .episodes-scroll.fade { opacity: 0; }

    /* ─── EPISODE CARD ─────────────────────────────────────── */
    .ep-card {
      scroll-snap-align: start;
      flex: 0 0 148px;
      border-radius: 13px;
      overflow: hidden;
      background: #111d2e;
      border: 1.5px solid rgba(255,255,255,0.07);
      text-decoration: none;
      color: #fff;
      display: flex;
      flex-direction: column;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }
    @media (hover: hover) {
      .ep-card:hover {
        transform: translateY(-6px);
        box-shadow: 0 14px 36px rgba(0,0,0,0.6);
        border-color: rgba(0,190,220,0.3);
      }
    }
    .ep-card:active { transform: scale(0.96); }

    .ep-thumb-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #090f18;
      overflow: hidden;
    }
    .ep-thumb {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .ep-num-badge {
      position: absolute;
      top: 7px; left: 7px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(0,185,215,0.88);
      backdrop-filter: blur(4px);
      color: #02161e;
      font-size: 11.5px;
      font-weight: 900;
      letter-spacing: 0.03em;
    }
    .ep-info {
      padding: 9px 10px 11px;
      line-height: 1.35;
    }
    .ep-lbl  { font-size: 13px; font-weight: 800; color: #00c8e8; }
    .ep-sep  { font-size: 13px; color: #4a6a80; }
    .ep-sub  { font-size: 12.5px; color: #7a9db8; font-weight: 500; }
    .ep-sub2 { font-size: 12px; color: #5a7a90; margin-top: 2px; }

    /* ─── HOW TO WATCH ─────────────────────────────────────── */
    .htw-section { margin: 26px 14px 0; }
    .htw-heading {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-bottom: 10px;
      margin-bottom: 14px;
      border-bottom: 1.5px solid rgba(0,185,215,0.2);
    }
    .htw-dash { width: 22px; height: 3px; background: #00bcd4; border-radius: 2px; flex-shrink: 0; }
    .htw-title {
      font-size: 18px;
      font-style: italic;
      font-weight: 700;
      color: #cce8f5;
    }
    .htw-card {
      border-radius: 14px;
      overflow: hidden;
      background: #d8d5cc;
      margin-bottom: 14px;
    }
    .htw-card-lbl {
      padding: 10px 14px 6px;
      background: #e8e5dc;
      font-size: 12px;
      font-weight: 900;
      color: #111;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .htw-video-wrap {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
    }
    .htw-video-wrap iframe {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      border: 0; display: block;
    }

    /* ─── WHATSAPP POPUP ───────────────────────────────────── */
    #wa-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 9000;
    }
    #wa-popup {
      display: none;
      position: fixed;
      left: 50%;
      bottom: 90px;
      transform: translateX(-50%) translateY(28px);
      width: calc(100% - 24px);
      max-width: 440px;
      z-index: 9001;
      background: #0f1e2e;
      border: 1px solid rgba(0,185,215,0.18);
      border-top: 2.5px solid #00bcd4;
      border-radius: 22px;
      padding: 22px 20px 18px;
      box-shadow: 0 24px 70px rgba(0,0,0,0.75);
      opacity: 0;
      transition: opacity 0.35s ease, transform 0.35s cubic-bezier(.34,1.2,.64,1);
    }
    #wa-popup.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .wa-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .wa-icon {
      width: 48px; height: 48px;
      border-radius: 14px; object-fit: cover; flex-shrink: 0;
      background: #1a2838;
    }
    .wa-popup-title { font-size: 17px; font-weight: 900; color: #fff; }
    .wa-body { font-size: 14px; color: #7090a8; line-height: 1.55; margin-bottom: 18px; }
    .wa-body strong { color: #c0d8e8; }
    .wa-join {
      display: flex; align-items: center; justify-content: center; gap: 9px;
      width: 100%; padding: 14px; border-radius: 12px;
      background: #25d366; color: #fff;
      font-size: 15px; font-weight: 800;
      text-decoration: none; margin-bottom: 10px;
      transition: filter 0.15s;
    }
    .wa-join:active { filter: brightness(0.9); }
    .wa-no {
      display: block; width: 100%; padding: 11px;
      border-radius: 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      color: #5a7888; font-family: inherit;
      font-size: 14px; font-weight: 600;
      cursor: pointer; text-align: center;
      transition: background 0.15s;
    }
    .wa-no:active { background: rgba(255,255,255,0.09); }

    /* ─── BOTTOM NAV (fallback) ────────────────────────────── */
    .smtv-bottom-nav {
      position: fixed;
      left: 12px; right: 12px; bottom: 12px;
      display: flex; align-items: center;
      height: 62px;
      border-radius: 18px;
      background: rgba(6,10,18,0.94);
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.07);
      box-shadow: 0 8px 32px rgba(0,0,0,0.55);
      z-index: 1200;
      padding: 6px 6px calc(6px + env(safe-area-inset-bottom));
      gap: 2px;
    }
    .smtv-bottom-nav .nav-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 2px;
      text-decoration: none; color: #4a6a80;
      border-radius: 12px; height: 100%;
      font-size: 10px; font-weight: 700;
      transition: all 0.22s cubic-bezier(.34,1.4,.64,1);
    }
    .smtv-bottom-nav .nav-item i { font-size: 17px; }
    .smtv-bottom-nav .nav-item.active {
      background: linear-gradient(135deg, #00d4f0, #0096c8);
      color: #041820;
      transform: translateY(-5px);
      box-shadow: 0 10px 28px rgba(0,175,215,0.32);
    }

    /* ─── Animations ───────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .a1 { animation: fadeUp 0.38s ease 0.04s both; }
    .a2 { animation: fadeUp 0.38s ease 0.10s both; }
    .a3 { animation: fadeUp 0.38s ease 0.18s both; }
    .a4 { animation: fadeUp 0.38s ease 0.26s both; }
    .a5 { animation: fadeUp 0.38s ease 0.34s both; }
    .a6 { animation: fadeUp 0.38s ease 0.42s both; }
  </style>

  <script defer src="series.js"></script>
</head>

<div id="page">
  <script type="text/javascript" src="//www.highperformanceformat.com/c91a82435d260630918ecc80c95125ac/invoke.js"></script>

<!-- WhatsApp popup -->

    <img class="wa-icon" src="favicon.png" alt="SmTv"

  <a href="https://whatsapp.com/channel/0029Va9zAvvAYlUNRuzWqh0k"
     target="_blank" rel="noopener" class="wa-join">
    <i class="fa-brands fa-whatsapp" style="font-size:19px;"></i>

  </a>

<!-- ── Scripts ─────────────────────────────────────────────── -->
<script>
/* Page title updater */
document.addEventListener('DOMContentLoaded', function () {
  var slug = new URLSearchParams(location.search).get('series');
  if (!slug) return;
  fetch('/series.json').then(function(r){return r.json();}).then(function(arr){
    var s = Array.isArray(arr) ? arr.find(function(x){return x.slug===slug;}) : null;
    if (s && s.title) {
      document.title = s.title + ' \u2013 SmTv Urdu';
      var m = document.querySelector('meta[name="description"]');
      if (m) m.content = s.title + ' - Watch all episodes in Urdu on SmTv Urdu.';
    }
  }).catch(function(){});
});
</script>

<script>
/* WhatsApp popup */
(function(){
  var pop=document.getElementById('wa-popup'),
      ov =document.getElementById('wa-overlay'),
      no =document.getElementById('wa-no');
  function show(){ov.style.display='block';pop.style.display='block';requestAnimationFrame(function(){requestAnimationFrame(function(){pop.classList.add('show');});});}
  function hide(){pop.classList.remove('show');setTimeout(function(){pop.style.display='none';ov.style.display='none';},350);}
  setTimeout(show, 2500);
  no.addEventListener('click', hide);
  ov.addEventListener('click', hide);
})();
</script>

<script>
/* Scroll lock */
(function(){
  try{window.scrollTo(0,0);}catch(e){}
  document.addEventListener('focusin',function(){var x=window.scrollX,y=window.scrollY;setTimeout(function(){try{window.scrollTo(x,y);}catch(e){}},0);},true);
  var d=document.getElementById('series-details');
  if(d){var o=new MutationObserver(function(){if(d.childNodes.length){try{window.scrollTo({top:0,behavior:'auto'});}catch(e){}o.disconnect();}});o.observe(d,{childList:true});}
})();
</script>

<script>
/* ═══════════════════════════════════════════════════════════
   SERIES RENDERER  —  window.renderSmtvSeries(data)
   Called automatically by slug, OR from your series.js

   Episode fields:
     num      : 1
     title    : "The Beginning"   (optional — shown as "Ep 1 — The Beginning")
     thumb    : "ep1.jpg"
     link     : "watch.html?ep=1"
═══════════════════════════════════════════════════════════ */
(function(){
  'use strict';

  function esc(s){
    return String(s==null?'':s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function buildCard(ep){
    var lbl = 'Ep '+ep.num;
    var thumb = ep.thumb
      ? '<img class="ep-thumb" src="'+esc(ep.thumb)+'" alt="'+esc(lbl)+'" loading="lazy">'
      : '<div style="width:100%;height:100%;background:#0a1020;"></div>';

    var info;
    if(ep.title && ep.title.trim()){
      info = '<div class="ep-info">'
           + '<span class="ep-lbl">'+esc(lbl)+'</span>'
           + '<span class="ep-sep"> \u2014 </span>'
           + '<span class="ep-sub">'+esc(ep.title)+'</span>'
           + '</div>';
    } else {
      info = '<div class="ep-info"><span class="ep-lbl">'+esc(lbl)+'</span></div>';
    }

    return '<a class="ep-card" href="'+esc(ep.link||'#')+'">'
         + '<div class="ep-thumb-wrap">'
         + thumb
         + '<span class="ep-num-badge">'+esc(lbl)+'</span>'
         + '</div>'
         + info
         + '</a>';
  }

  function scrollHTML(eps){ return (eps||[]).map(buildCard).join(''); }

  window.renderSmtvSeries = function(data){
    var mount = document.getElementById('series-details');
    if(!mount) return;

    var seasons    = data.seasons||[];
    var hasPremium = data.premium && data.premium.enabled;
    var hasHTW     = data.howToWatch && data.howToWatch.videos && data.howToWatch.videos.length;
    var html       = '';

    /* 1 ── Hero image */
    var img = data.backdropImage || data.posterImage;
    if(img){
      html += '<div class="hero-poster a1">'
            + '<img src="'+esc(img)+'" alt="'+esc(data.title)+'">'
            + '<div class="hero-poster-fade"></div>'
            + '</div>';
    }

    /* 2 ── Title + description */
    html += '<div class="series-info a2">'
          + '<h1 class="series-title">'+esc(data.title)+'</h1>'
          + (data.description ? '<p class="series-desc">'+esc(data.description)+'</p>' : '')
          + '</div>';

    /* 3 ── VIP box */
    if(hasPremium){
      html += '<div class="vip-box a3">'
            + '<div class="vip-title-row"><span class="vip-crown">&#x1F451;</span>'
            + '<span class="vip-title-text">SMTV VIP Membership</span></div>'
            + '<div class="vip-badges">'
            + '<span class="vip-badge dark">&#x26A1; No Ads</span>'
            + '<span class="vip-badge dark">&#x2193; Fast Download</span>'
            + '<span class="vip-badge teal">&#x1F512; Early Access</span>'
            + '<span class="vip-badge dark">&#x1F3AC; HD Quality</span>'
            + '</div>'
            + '<a href="'+esc(data.premium.link||'premium.html')+'" class="vip-btn">BECOME VIP</a>'
            + '</div>';
    }

    /* 4 ── Season tabs (only if > 1 season) */
    if(seasons.length > 1){
      html += '<div class="seasons-wrap a4" id="stabs">';
      seasons.forEach(function(s,i){
        html += '<button class="season-tab'+(i===0?' active':'')+'" data-i="'+i+'">'
              + esc(s.label||('Season '+(i+1)))+'</button>';
      });
      html += '</div>';
    }

    /* 5 ── Season panels */
    seasons.forEach(function(s,si){
      var hasSrc = s.sources && s.sources.length>1;
      html += '<div id="sp-'+si+'"'+(si>0?' style="display:none"':'')+' class="a5">';

      if(hasSrc){
        html += '<div class="source-selector" id="src-'+si+'">';
        s.sources.forEach(function(src,ri){
          html += '<button class="source-btn'+(ri===0?' active':'')+'" data-si="'+si+'" data-ri="'+ri+'">'+esc(src.label)+'</button>';
        });
        html += '</div>';
      }

      var firstEps = hasSrc ? (s.sources[0].episodes||[]) : (s.episodes||[]);
      html += '<div class="episodes-outer">'
            + '<div class="episodes-scroll" id="es-'+si+'">'+scrollHTML(firstEps)+'</div>'
            + '</div></div>';
    });

    /* 6 ── How to Watch */
    if(hasHTW){
      html += '<div class="htw-section a6">'
            + '<div class="htw-heading"><div class="htw-dash"></div>'
            + '<span class="htw-title">How to Watch Episodes</span></div>';
      data.howToWatch.videos.forEach(function(v){
        html += '<div class="htw-card">'
              + (v.title?'<div class="htw-card-lbl">'+esc(v.title)+'</div>':'')
              + '<div class="htw-video-wrap">'
              + '<iframe src="'+esc(v.embedUrl)+'" allowfullscreen loading="lazy"></iframe>'
              + '</div></div>';
      });
      html += '</div>';
    }

    mount.innerHTML = html;

    /* Wire season tabs */
    document.querySelectorAll('.season-tab').forEach(function(btn){
      btn.addEventListener('click',function(){
        var idx=parseInt(this.dataset.i,10);
        document.querySelectorAll('.season-tab').forEach(function(b){b.classList.remove('active');});
        this.classList.add('active');
        for(var i=0;i<seasons.length;i++){
          var p=document.getElementById('sp-'+i);
          if(p) p.style.display=i===idx?'':'none';
        }
      });
    });

    /* Wire source buttons */
    document.querySelectorAll('.source-btn').forEach(function(btn){
      btn.addEventListener('click',function(){
        var si=parseInt(this.dataset.si,10), ri=parseInt(this.dataset.ri,10);
        var season=data.seasons[si];
        if(!season||!season.sources) return;
        document.querySelectorAll('.source-btn[data-si="'+si+'"]').forEach(function(b){b.classList.remove('active');});
        this.classList.add('active');
        var scroll=document.getElementById('es-'+si);
        if(!scroll) return;
        scroll.classList.add('fade');
        setTimeout(function(){
          scroll.innerHTML=scrollHTML(season.sources[ri].episodes||[]);
          scroll.classList.remove('fade');
        },180);
      });
    });
  };

  /* Auto-load */
  function load(){
    var slug=new URLSearchParams(location.search).get('series');
    if(!slug){ demo(); return; }
    fetch('/series.json')
      .then(function(r){return r.json();})
      .then(function(arr){
        var d=Array.isArray(arr)?arr.find(function(x){return x.slug===slug;}):null;
        d ? window.renderSmtvSeries(d) : demo();
      }).catch(demo);
  }

  function demo(){
    window.renderSmtvSeries({
      title:'Sultan Mehmet Fatih',
      description:'Life and conquests of Sultan Mehmet the Conqueror.',
      backdropImage:'',
      premium:{enabled:true,link:'premium.html'},
      seasons:[
        {
          label:'Season 1',

            ]},

              {num:1,title:'Khalid ibn al walid... Part 1',thumb:'',link:'#'},
              {num:2,title:'',thumb:'',link:'#'},
            ]}
          ]
        },
        {
          label:'Season 2',
          episodes:[
            {num:1,title:'A New Era',thumb:'',link:'#'},
            {num:2,title:'',thumb:'',link:'#'},
          ]
        }
      ],
      howToWatch:{videos:[
        {title:'OLD PROCESS',embedUrl:'https://www.youtube.com/embed/dQw4w9WgXcQ'},
        {title:'NEW PROCESS',embedUrl:'https://www.youtube.com/embed/dQw4w9WgXcQ'}
      ]}
    });
  }

  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded',load);
  } else { load(); }
})();
</script>

<script>
/* Footer loader */
(async function(){
  var ph=document.getElementById('footer-placeholder');
  var paths=['/includes/footer.html','includes/footer.html','./includes/footer.html','/footer.html','footer.html'];

  function initNav(html){
    ph.innerHTML=html;
    try{var cur=parseInt(getComputedStyle(document.body).paddingBottom)||0;if(cur<96)document.body.style.paddingBottom='calc(96px + env(safe-area-inset-bottom))';}catch(e){}
    var nav=ph.querySelector('#smtv-bottom-nav,.smtv-bottom-nav');
    if(!nav)return;
    var items=Array.from(nav.querySelectorAll('.nav-item'));
    items.forEach(function(i){i.classList.remove('active');});
    var si=items.find(function(i){return(i.dataset.name||'').toLowerCase()==='series'||(i.getAttribute('href')||'').includes('series');});
    if(new URLSearchParams(location.search).has('series')&&si)si.classList.add('active');
    items.forEach(function(a){
      if(a._i)return;a._i=true;
      a.addEventListener('click',function(ev){
        ev.preventDefault&&ev.preventDefault();
        items.forEach(function(i){i.classList.remove('active');});
        this.classList.add('active');
        var href=this.getAttribute('href');if(href)location.assign(href);
      });
    });
  }

  for(var i=0;i<paths.length;i++){
    try{var r=await fetch(paths[i],{cache:'no-cache'});if(!r.ok)continue;initNav(await r.text());return;}catch(e){continue;}
  }

  ph.innerHTML=`
    <nav class="smtv-bottom-nav" id="smtv-bottom-nav">
      <a href="/index.html"   class="nav-item" data-name="home"   ><i class="fa-solid fa-house"></i><span>Home</span></a>
      <a href="/series.html"  class="nav-item active" data-name="series" ><i class="fa-solid fa-film"></i><span>Series</span></a>
      <a href="/clips.html"   class="nav-item" data-name="clips"  ><i class="fa-solid fa-circle-play"></i><span>Clips</span></a>
      <a href="/premium.html" class="nav-item" data-name="premium"><i class="fa-solid fa-star"></i><span>Premium</span></a>
      <a href="/more.html"    class="nav-item" data-name="more"   ><i class="fa-solid fa-circle-info"></i><span>More</span></a>
    </nav>`;
  try{document.body.style.paddingBottom='calc(96px + env(safe-area-inset-bottom))';}catch(e){}
})();
</script>
