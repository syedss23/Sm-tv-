  <link rel="stylesheet" href="style.css">
  <style>
    /* ══ TOKENS ══ */
    :root {
      --void:      #030712;
      --surface:   #0d1827;
      --card:      #111e30;
      --card-h:    #16263e;
      --gold:      #d4a827;
      --gold-lt:   #f0c84a;
      --gold-dim:  rgba(212,168,39,0.13);
      --gold-glow: rgba(212,168,39,0.3);
      --cyan:      #06b6d4;
      --red:       #dc2626;
      --white:     #f8f4ee;
      --muted:     #64748b;
      --border:    rgba(212,168,39,0.15);
      --border-hi: rgba(212,168,39,0.42);
      --ff-d: 'Playfair Display', Georgia, serif;
      --ff-b: 'DM Sans', sans-serif;
      --r: 14px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; overflow-x: hidden; }
    body { background: var(--void); color: var(--white); font-family: var(--ff-b); min-height: 100vh; overflow-x: hidden; }
    body::after {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 9999; opacity: 0.4;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
    }
    #ambient {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 75% 50% at 10% 0%, rgba(212,168,39,0.09) 0%, transparent 60%),
        radial-gradient(ellipse 55% 40% at 90% 100%, rgba(6,182,212,0.06) 0%, transparent 55%);
    }

    /* ══ SEARCH OVERLAY ══ */
    #srch-ov {
      position: fixed; inset: 0;
      background: rgba(3,7,18,0.97); backdrop-filter: blur(22px);
      z-index: 500; opacity: 0; pointer-events: none;
      transition: opacity 0.28s ease;
      display: flex; flex-direction: column; padding: 14px 14px 0;
    }
    #srch-ov.on { opacity: 1; pointer-events: all; }
    .srch-top { display: flex; gap: 10px; align-items: center; margin-bottom: 14px; }
    #srch-inp {
      flex: 1; padding: 13px 16px;
      background: var(--surface); border: 1.5px solid var(--border-hi);
      border-radius: var(--r); color: var(--white);
      font-family: var(--ff-b); font-size: 1rem; outline: none;
      caret-color: var(--gold-lt); transition: all 0.25s;
    }
    #srch-inp:focus { border-color: var(--gold-lt); box-shadow: 0 0 0 3px var(--gold-dim); }
    #srch-inp::placeholder { color: var(--muted); }
    #srch-cancel {
      padding: 12px 16px; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--r);
      color: var(--muted); font-family: var(--ff-b); font-size: 0.88rem;
      cursor: pointer; white-space: nowrap; transition: all 0.2s; flex-shrink: 0;
    }
    #srch-cancel:hover { color: var(--gold-lt); border-color: var(--gold); }

    /* FIXED search grid — portrait cards exactly like series grid */
    #srch-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      overflow-y: auto; flex: 1;
      padding-bottom: 20px;
      align-content: start;
    }
    .srch-hint { color: var(--muted); text-align: center; padding: 50px 20px; font-size: 0.9rem; grid-column: 1/-1; }

    /* portrait card — same as .card in series grid */
    .srch-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r); overflow: hidden; text-decoration: none;
      display: flex; flex-direction: column; transition: all 0.3s;
    }
    .srch-card:hover { border-color: var(--border-hi); transform: translateY(-3px); box-shadow: 0 10px 28px rgba(0,0,0,0.5); }
    /* FIXED: portrait aspect ratio so image fills properly */
    .srch-card img {
      width: 100%; aspect-ratio: 2/3;
      object-fit: cover; object-position: center top;
      display: block;
    }
    .srch-card .s-title {
      padding: 9px 10px 11px; font-size: 0.83rem;
      font-weight: 700; color: var(--white); line-height: 1.3;
    }

    /* ══ SIDEBAR OVERLAY ══ */
    #sb-ov {
      position: fixed; inset: 0;
      background: rgba(3,7,18,0.82); backdrop-filter: blur(8px);
      z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    #sb-ov.on { opacity: 1; pointer-events: all; }

    /* ══ SIDEBAR ══ */
    #sidebar {
      position: fixed; top: 0; left: 0; width: 290px; height: 100%;
      background: linear-gradient(170deg, #0c1828 0%, #060e1c 55%, #030712 100%);
      border-right: 1px solid var(--border-hi);
      z-index: 201; transform: translateX(-100%);
      transition: transform 0.42s cubic-bezier(0.22,1,0.36,1);
      display: flex; flex-direction: column; overflow: hidden;
    }
    #sidebar::before {
      content: ''; position: absolute; top: -80px; left: -80px;
      width: 260px; height: 260px;
      background: radial-gradient(circle, rgba(212,168,39,0.11) 0%, transparent 70%);
      pointer-events: none;
    }
    #sidebar.open { transform: translateX(0); }
    .sb-hd {
      display: flex; align-items: center; justify-content: space-between;
      padding: 28px 20px 18px; border-bottom: 1px solid var(--border);
    }
    .sb-logo {
      font-family: var(--ff-d); font-size: 1.35rem; font-weight: 900;
      background: linear-gradient(135deg, var(--gold-lt), var(--cyan));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .sb-x {
      width: 36px; height: 36px; background: rgba(255,255,255,0.04);
      border: 1px solid var(--border-hi); border-radius: 10px;
      color: var(--muted); font-size: 1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: all 0.25s;
    }
    .sb-x:hover { background: var(--gold-dim); color: var(--gold-lt); border-color: var(--gold); transform: rotate(90deg); }
    .sb-nav { padding: 14px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
    .sb-a {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 16px; border-radius: 12px; text-decoration: none;
      color: var(--white); font-weight: 600; font-size: 0.93rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      transition: all 0.3s ease;
      position: relative; overflow: hidden;
      opacity: 0; transform: translateX(-18px);
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    #sidebar.open .sb-a { animation: sbIn 0.36s ease forwards; }
    #sidebar.open .sb-a:nth-child(1){animation-delay:.05s}
    #sidebar.open .sb-a:nth-child(2){animation-delay:.10s}
    #sidebar.open .sb-a:nth-child(3){animation-delay:.15s}
    #sidebar.open .sb-a:nth-child(4){animation-delay:.20s}
    #sidebar.open .sb-a:nth-child(5){animation-delay:.25s}
    @keyframes sbIn { to { opacity:1; transform:translateX(0); } }
    .sb-a:hover {
      background: linear-gradient(135deg, rgba(212,168,39,0.15), rgba(212,168,39,0.08));
      border-color: var(--border-hi); color: var(--gold-lt);
      transform: translateX(4px);
      box-shadow: 0 4px 16px rgba(212,168,39,0.15), 0 0 0 1px rgba(212,168,39,0.2);
    }
    .sb-ico {
      width: 34px; height: 34px; background: rgba(255,255,255,0.06);
      border-radius: 9px; display: flex; align-items: center; justify-content: center;
      font-size: 1rem; flex-shrink: 0; transition: all 0.25s;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .sb-a:hover .sb-ico { background: var(--gold-dim); border-color: var(--border-hi); }
    .sb-a.tg { color: #93c5fd; border-color: rgba(147,197,253,0.15); background: rgba(147,197,253,0.05); }
    .sb-a.tg:hover { background: rgba(41,182,246,0.12); border-color: rgba(41,182,246,0.4); color: #7dd3fc; box-shadow: 0 4px 16px rgba(41,182,246,0.15); }
    .sb-a.wa { color: #86efac; border-color: rgba(134,239,172,0.15); background: rgba(134,239,172,0.05); }
    .sb-a.wa:hover { background: rgba(102,187,106,0.12); border-color: rgba(102,187,106,0.4); color: #4ade80; box-shadow: 0 4px 16px rgba(102,187,106,0.15); }
    .sb-ft { padding: 14px 20px; border-top: 1px solid var(--border); font-size: 0.72rem; color: var(--muted); text-align: center; }

    /* ══ HEADER ══ */
    #site-header {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; gap: 10px;
      padding: 11px 14px;
      background: rgba(3,7,18,0.92); backdrop-filter: blur(24px) saturate(180%);
      border-bottom: 1px solid var(--border);
    }
    #site-header::after {
      content: ''; position: absolute; bottom: 0; left: 8%; right: 8%;
      height: 1px; background: linear-gradient(90deg,transparent,var(--gold-lt),transparent); opacity: 0.35;
    }
    #hamburger {
      width: 40px; height: 40px; background: none;
      border: 1px solid var(--border); border-radius: 10px;
      cursor: pointer; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 5px;
      transition: all 0.3s; flex-shrink: 0;
    }
    #hamburger:hover { border-color: var(--gold); background: var(--gold-dim); }
    .hbl { display: block; height: 2px; border-radius: 2px; background: var(--muted); transition: all 0.3s; }
    .hbl:nth-child(1){width:18px}.hbl:nth-child(2){width:14px}.hbl:nth-child(3){width:10px}
    #hamburger:hover .hbl { background: var(--gold-lt); }
    #hamburger:hover .hbl:nth-child(2){width:18px} #hamburger:hover .hbl:nth-child(3){width:18px}
    #mainTitle {
      flex: 1;
      font-family: var(--ff-d) !important; font-size: 1.28rem !important; font-weight: 900 !important;
      background: linear-gradient(130deg, var(--gold-lt) 0%, #e8d8a8 45%, var(--cyan) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      letter-spacing: 0.06em;
    }
    #header-search-btn {
      width: 38px; height: 38px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 10px;
      color: var(--muted); font-size: 1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.25s; flex-shrink: 0;
    }
    #header-search-btn:hover { border-color: var(--gold); color: var(--gold-lt); background: var(--gold-dim); }
    .premium-cta {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 9px 14px;
      background: linear-gradient(135deg, #f0c84a 0%, #d4a827 55%, #e8b830 100%);
      color: #030712; font-weight: 800; font-size: 0.76rem;
      border-radius: 50px; text-decoration: none; letter-spacing: 0.08em; text-transform: uppercase;
      box-shadow: 0 0 18px rgba(240,200,74,0.55), 0 4px 14px rgba(212,168,39,0.4), inset 0 1px 0 rgba(255,255,255,0.3);
      transition: all 0.25s; flex-shrink: 0;
      animation: premPulse 3s ease-in-out infinite;
    }
    @keyframes premPulse {
      0%,100%{box-shadow:0 0 18px rgba(240,200,74,0.55),0 4px 14px rgba(212,168,39,0.4);}
      50%{box-shadow:0 0 32px rgba(240,200,74,0.85),0 6px 22px rgba(212,168,39,0.65);}
    }
    .premium-cta:hover { transform: translateY(-2px) scale(1.04); }

    /* ══ SPONSOR ══ */
    #sp-bar {
      margin: 10px 14px 0;
      padding: 9px 13px;
      background: linear-gradient(135deg,rgba(212,168,39,0.1) 0%,rgba(6,182,212,0.05) 100%);
      border: 1px solid var(--border-hi); border-radius: var(--r);
      display: flex; align-items: center; gap: 10px;
      position: relative; overflow: hidden;
    }
    #sp-bar::before {
      content: ''; position: absolute; top: 0; left: -80%; width: 50%; height: 100%;
      background: linear-gradient(90deg,transparent,rgba(212,168,39,0.06),transparent);
      animation: scan 4s infinite;
    }
    @keyframes scan { to { left: 200%; } }
    .sp-ico { font-size: 1rem; flex-shrink: 0; }
    .sp-txt { flex: 1; min-width: 0; }
    .sp-lbl { font-size: 0.65rem; color: var(--gold); font-weight: 700; letter-spacing: 0.13em; text-transform: uppercase; display: block; line-height: 1.2; }
    .sp-nm { font-size: 0.86rem; font-weight: 700; color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sp-btn {
      padding: 7px 13px; background: linear-gradient(135deg,var(--gold) 0%,#b8860b 100%);
      color: var(--void); font-size: 0.74rem; font-weight: 800;
      border-radius: 50px; text-decoration: none; white-space: nowrap; flex-shrink: 0;
      box-shadow: 0 3px 12px rgba(212,168,39,0.35); transition: all 0.2s;
    }
    .sp-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(212,168,39,0.55); }

    /* ══ HERO — NEW EPISODES ══ */
    #hero {
      position: relative; width: 100%;
      height: 68vw; max-height: 420px; min-height: 250px;
      overflow: hidden; margin-top: 12px;
    }
    .h-slide { position: absolute; inset: 0; opacity: 0; transition: opacity 0.9s ease; pointer-events: none; }
    .h-slide.on { opacity: 1; pointer-events: all; }
    .h-bg {
      position: absolute; inset: 0;
      background-size: cover; background-position: center top;
      transform: scale(1.07); transition: transform 7s ease;
      filter: brightness(0.5) saturate(1.15);
    }
    .h-slide.on .h-bg { transform: scale(1); }
    .h-vig {
      position: absolute; inset: 0;
      background:
        linear-gradient(to top, rgba(3,7,18,0.97) 0%, rgba(3,7,18,0.6) 38%, rgba(3,7,18,0.1) 65%, transparent 100%),
        linear-gradient(to right, rgba(3,7,18,0.55) 0%, transparent 60%);
    }
    /* badges top-left */
    .h-top-label {
      position: absolute; top: 12px; left: 14px;
      display: flex; align-items: center; gap: 7px; z-index: 5;
    }
    .h-new-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; background: var(--red); color: #fff;
      font-size: 0.62rem; font-weight: 800; border-radius: 6px;
      letter-spacing: 0.12em; text-transform: uppercase;
      box-shadow: 0 2px 12px rgba(220,38,38,0.55);
      animation: rPulse 2s ease-in-out infinite;
    }
    @keyframes rPulse{0%,100%{box-shadow:0 2px 12px rgba(220,38,38,0.5);}50%{box-shadow:0 2px 22px rgba(220,38,38,0.85);}}
    .h-new-badge::before { content:'●'; font-size:0.5rem; animation: blink 1s step-end infinite; }
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
    /* FIXED lang badge — shows real subtitle/dub info */
    .h-lang-badge {
      padding: 4px 10px; background: rgba(0,0,0,0.68);
      color: var(--cyan); font-size: 0.62rem; font-weight: 700;
      border-radius: 6px; border: 1px solid rgba(6,182,212,0.4);
      backdrop-filter: blur(6px); text-transform: uppercase; letter-spacing: 0.06em;
    }
    /* bottom content */
    .h-body {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 0 16px 16px; z-index: 5;
    }
    .h-series { font-size: 0.72rem; color: var(--cyan); font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 4px; }
    .h-title {
      font-family: var(--ff-d);
      font-size: clamp(1.2rem,5.5vw,1.7rem);
      font-weight: 900; color: var(--white); line-height: 1.15;
      text-shadow: 0 2px 24px rgba(0,0,0,0.9); margin-bottom: 12px;
    }
    /* FIXED: removed Info button, only Watch Now. Dots below. */
    .h-btns { display: flex; gap: 9px; margin-bottom: 12px; }
    .h-play {
      display: flex; align-items: center; gap: 7px;
      padding: 10px 26px;
      background: linear-gradient(135deg,var(--gold) 0%,#b8860b 100%);
      color: var(--void); font-weight: 700; font-size: 0.88rem;
      border-radius: 50px; text-decoration: none;
      box-shadow: 0 6px 22px rgba(212,168,39,0.4); transition: all 0.25s;
    }
    .h-play:hover { transform: scale(1.05); box-shadow: 0 10px 32px rgba(212,168,39,0.65); }
    /* dots only — NO arrow buttons */
    #h-dots { display: flex; gap: 7px; align-items: center; }
    .h-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: rgba(255,255,255,0.3); cursor: pointer; transition: all 0.35s;
    }
    .h-dot.on { width: 26px; border-radius: 4px; background: var(--gold-lt); }

    /* ══ SECTION LABEL ══ */
    .sec-lbl { display: flex; align-items: center; gap: 10px; padding: 20px 14px 11px; }
    .sec-lbl-ico { font-size: 1rem; }
    .sec-lbl-txt { font-family: var(--ff-d); font-size: 0.97rem; font-weight: 700; color: var(--gold-lt); letter-spacing: 0.12em; text-transform: uppercase; }
    .sec-lbl-ln { flex: 1; height: 1px; background: linear-gradient(90deg,var(--border-hi),transparent); }

    /* ══ SCHEDULE ══ */
    #sched-list { display: flex; flex-direction: column; gap: 8px; padding: 0 14px 12px; }
    .sc-card {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; background: var(--card);
      border: 1px solid var(--border); border-radius: var(--r);
      transition: all 0.3s; position: relative; overflow: hidden;
      opacity: 0; transform: translateX(-20px);
    }
    .sc-card.vis { animation: scIn 0.4s ease forwards; }
    .sc-card:nth-child(1).vis{animation-delay:.0s}.sc-card:nth-child(2).vis{animation-delay:.08s}.sc-card:nth-child(3).vis{animation-delay:.16s}
    @keyframes scIn { to { opacity:1; transform:translateX(0); } }
    .sc-card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px; background: linear-gradient(180deg,var(--gold-lt),var(--cyan));
      border-radius: 3px 0 0 3px;
    }
    .sc-card:hover { border-color: var(--border-hi); background: var(--card-h); transform: translateX(4px); box-shadow: 0 6px 22px rgba(0,0,0,0.3); }
    .sc-card.live-c::before { background: linear-gradient(180deg,var(--red),#f97316); }
    .sc-card.live-c { border-color: rgba(220,38,38,0.3); }
    .sc-img { width: 48px; height: 48px; border-radius: 9px; object-fit: cover; border: 1px solid var(--border); flex-shrink: 0; }
    .sc-body { flex: 1; min-width: 0; }
    .sc-title { font-weight: 700; font-size: 0.88rem; color: var(--white); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sc-meta { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
    .sc-day { font-size: 0.73rem; font-weight: 700; color: #fcd34d; }
    .sc-dot { opacity: 0.3; font-size: 0.7rem; }
    .sc-time { font-size: 0.73rem; font-weight: 600; color: #93c5fd; }
    .sc-type { font-size: 0.7rem; color: var(--cyan); font-weight: 600; }
    .sc-live { background: var(--red); color: #fff; font-size: 0.58rem; font-weight: 800; padding: 2px 6px; border-radius: 4px; letter-spacing: 0.08em; animation: rPulse 1.5s ease-in-out infinite; }
    .sc-cd { font-size: 0.7rem; color: var(--gold-lt); font-weight: 700; white-space: nowrap; text-align: right; flex-shrink: 0; font-variant-numeric: tabular-nums; }

    /* ══ RECOMMENDED — horizontal scroll ══ */
    #rec-scroll {
      overflow-x: auto; overflow-y: visible; scrollbar-width: none;
      padding: 4px 14px 14px; -webkit-overflow-scrolling: touch;
    }
    #rec-scroll::-webkit-scrollbar { display: none; }
    #rec-inner { display: flex; gap: 11px; width: max-content; }

    .rec-card {
      /* FIXED: portrait card, proper thumbnail */
      width: 130px;
      background: var(--card); border-radius: 12px; border: 1px solid var(--border);
      overflow: hidden; flex-shrink: 0; text-decoration: none;
      display: flex; flex-direction: column;
      transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
      opacity: 0; transform: translateY(14px) scale(0.96);
    }
    .rec-card.vis { animation: rcIn 0.45s ease forwards; }
    .rec-card:nth-child(1).vis{animation-delay:.0s}.rec-card:nth-child(2).vis{animation-delay:.06s}

    .rec-card:hover { border-color: var(--border-hi); transform: translateY(-5px) scale(1.04); box-shadow: 0 14px 32px rgba(0,0,0,0.5), 0 0 20px var(--gold-glow); }

      padding: 7px 8px 9px; font-size: 0.76rem;

    }

    /* ══ FILTER BAR ══ */
    .filter-bar { padding: 14px 14px 11px; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); background: rgba(8,15,30,0.65); }
    .filter-bar .primary { display: flex; gap: 8px; margin-bottom: 10px; }
    .filter-bar .secondary { display: flex; gap: 7px; flex-wrap: wrap; }
    .filter-bar .secondary.hidden { display: none; }
    .pill {
      padding: 8px 15px; border-radius: 50px; border: 1px solid var(--border);
      background: transparent; color: var(--muted);
      font-family: var(--ff-b); font-size: 0.82rem; font-weight: 600;
      cursor: pointer; transition: all 0.25s; display: flex; align-items: center; gap: 6px;
    }
    .pill:hover { border-color: var(--gold); color: var(--gold-lt); background: var(--gold-dim); }
    .pill.active { background: linear-gradient(135deg,var(--gold) 0%,#b8860b 100%); border-color: transparent; color: var(--void); box-shadow: 0 4px 16px rgba(212,168,39,0.35); }
    .filter-bar .secondary .pill { padding: 6px 12px; font-size: 0.78rem; }

    /* ══ SERIES GRID ══ */
    #series-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 12px; padding: 4px 14px 16px; }
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r); overflow: hidden; text-decoration: none;
      display: flex; flex-direction: column;
      transition: all 0.38s cubic-bezier(0.34,1.56,0.64,1);
      position: relative; opacity: 0; transform: translateY(20px);
    }
    .card.vis { animation: rcIn 0.5s ease forwards; }
    .card:hover { border-color: var(--border-hi); transform: translateY(-5px) scale(1.02); box-shadow: 0 18px 42px rgba(0,0,0,0.5), 0 0 20px var(--gold-glow); z-index: 2; }
    .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; object-position: center top; display: block; transition: transform 0.5s; }
    .card:hover img { transform: scale(1.05); }
    .card .title { padding: 10px 11px 13px; font-size: 0.85rem; font-weight: 700; color: var(--white); line-height: 1.35; }
    .card::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg,var(--gold),var(--cyan)); transform: scaleX(0); transform-origin: left; transition: transform 0.35s; }
    .card:hover::after { transform: scaleX(1); }
    .skel { border-radius: var(--r); aspect-ratio: 2/3; background: linear-gradient(110deg,var(--card) 30%,var(--card-h) 50%,var(--card) 70%); background-size: 200% 100%; animation: skl 1.6s infinite; }
    @keyframes skl{0%{background-position:200% 0}100%{background-position:-200% 0}}

    /* ══ UTILS ══ */

(async()=>{try{const r=await fetch('/config.json',{cache:'no-cache'});if(!r.ok)return;const c=await r.json(),f=c.redirectionFeatures,b=document.getElementById('sp-bar');if(!b)return;if(f.shortlink&&!f.sponsorPopup){b.querySelector('.sp-lbl').textContent='Ad Space Available';b.querySelector('.sp-nm').textContent='Reach Thousands Daily!';const btn=b.querySelector('.sp-btn');btn.href='https://t.me/Itz_me_zain1';btn.textContent='Contact 💬';}}catch(e){}})();

(function(){let fc=null;fetch('/config.json',{cache:'no-cache'}).then(r=>r.ok?r.json():null).then(c=>{if(c)fc=c.redirectionFeatures;}).catch(()=>{});const t=setInterval(()=>{const bs=document.querySelectorAll('.h-play[href]');if(!bs.length)return;clearInterval(t);bs.forEach(b=>{const orig=b.getAttribute('href');if(!orig||orig==='#')return;b.addEventListener('click',async e=>{if(!fc?.shortlink||fc?.sponsorPopup)return;e.preventDefault();try{const u=new URL(orig,location.origin),p=new URLSearchParams(u.search),series=p.get('series'),season=p.get('season'),ep=p.get('ep'),lang=p.get('lang');let jf=`episode-data/${series}-s${season}`;if(lang&&lang!=='dub')jf+=`-${lang}`;jf+='.json';const res=await fetch(jf);if(!res.ok){location.href=orig;return;}const eps=await res.json(),found=eps.find(e=>String(e.ep)===String(ep));if(found?.shortlink){location.href=found.shortlink;}else{location.href=orig;}}catch{location.href=orig;}});});},120);setTimeout(()=>clearInterval(t),6000);})();
