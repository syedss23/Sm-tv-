  <style>
    /* ══ TOKENS ══ */
    :root {
      --void:    #030712;
      --card:    #0d1b2e;
      --gold:    #d4a827;
      --gold-lt: #f0c84a;
      --blue:    #1a8fff;
      --blue-lt: #4db3ff;
      --cyan:    #06b6d4;
      --red:     #dc2626;
      --white:   #f8f4ee;
      --muted:   #64748b;
      --ff-d:    'Playfair Display', serif;
      --ff-b:    'DM Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; background: var(--void); }
    body {
      font-family: var(--ff-b);
      background: var(--void);
      color: var(--white);
      min-height: 100vh;
      overflow-x: hidden;
      padding-bottom: calc(84px + env(safe-area-inset-bottom));
    }

    /* ══ SERIES CARD — small portrait (override style.css) ══ */
    .card {
      display: block;
      text-decoration: none;
      border-radius: 10px;
      overflow: hidden;
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.06);
      transition: transform .25s ease, box-shadow .25s ease;
    }
    .card img {
      display: block !important;
      width: 100% !important;
      height: auto !important;
      max-height: none !important;
      aspect-ratio: 2/3 !important;
      object-fit: cover !important;
      object-position: center top !important;
    }
    .card .title {
      font-size: .76rem; font-weight: 600; color: var(--white);
      padding: 5px 7px 7px;
      line-height: 1.3;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .card:active { transform: scale(.96); }

    /* ══ SEARCH RESULTS ══ */
#srch-results {
  flex: 1;
  height: 0;
  overflow-y: auto !important;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  padding: 6px 10px 120px;
  align-content: start;
}

#srch-results .card {
  display: flex !important;
  flex-direction: column !important;
  min-height: 0 !important;
  overflow: hidden !important;
}

#srch-results .card img {
  display: block !important;
  width: 100% !important;
  height: 110px !important;
  min-height: 110px !important;
  max-height: 110px !important;
  aspect-ratio: unset !important;
  object-fit: cover !important;
  object-position: center center !important;
  flex-shrink: 0 !important;
}

#srch-results .card .title {
  display: block !important;
  -webkit-line-clamp: unset !important;
  -webkit-box-orient: unset !important;
  overflow: visible !important;
  white-space: normal !important;
  font-size: .68rem !important;
  font-weight: 600 !important;
  padding: 5px 7px 8px !important;
  color: var(--white) !important;
  background: var(--card) !important;
  line-height: 1.35 !important;
  min-height: auto !important;
  word-break: break-word !important;
}

    /* ══ SIDEBAR BACKDROP ══ */
    #sb-backdrop {
      position: fixed; inset: 0; z-index: 900;
      background: rgba(3,7,18,.72); backdrop-filter: blur(8px);
      opacity: 0; pointer-events: none; transition: opacity .3s;
    }
    #sb-backdrop.open { opacity: 1; pointer-events: all; }

    /* ══ SIDEBAR ══ */
    #sidebar {
      position: fixed; top: 0; left: 0; bottom: 0;
      width: min(300px,86vw); z-index: 1000;
      background: linear-gradient(160deg,#091624,#050d18);
      border-right: 1px solid rgba(26,143,255,.3);
      transform: translateX(-100%);
      transition: transform .36s cubic-bezier(.22,1,.36,1);
      display: flex; flex-direction: column;
      box-shadow: 6px 0 40px rgba(0,0,0,.7);
      overflow-y: auto;
    }
    #sidebar.open { transform: translateX(0); }
    .sb-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px 18px 16px;
      border-bottom: 1px solid rgba(26,143,255,.12);
      background: rgba(26,143,255,.04);
    }
    .sb-logo {
      font-family: var(--ff-d); font-size: 1.4rem; font-weight: 800;
      background: linear-gradient(90deg,var(--gold),var(--gold-lt));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .sb-close {
      background: rgba(26,143,255,.1); border: 1px solid rgba(26,143,255,.4);
      color: var(--blue-lt); font-size: 1.2rem; width: 34px; height: 34px;
      border-radius: 8px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, transform .3s;
    }
    .sb-close:hover { background: rgba(26,143,255,.22); transform: rotate(90deg); }
    .sb-nav { padding: 14px 12px; display: flex; flex-direction: column; gap: 7px; }
    .sb-btn {
      display: flex; align-items: center; gap: 11px;
      padding: 11px 13px; border-radius: 10px;
      text-decoration: none; font-size: .93rem; font-weight: 600; color: var(--white);
      background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.06);
      transition: background .2s, border-color .2s; cursor: pointer;
      transform: translateX(-28px); opacity: 0;
    }
    .sb-icon { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: .95rem; background: rgba(26,143,255,.1); flex-shrink: 0; }
    .sb-btn:hover { background: rgba(26,143,255,.1); border-color: rgba(26,143,255,.4); }
    .sb-btn.tg { border-color: rgba(41,182,246,.2); }
    .sb-btn.tg .sb-icon { background: rgba(41,182,246,.12); }
    .sb-btn.tg:hover { background: rgba(41,182,246,.1); }
    .sb-btn.wa { border-color: rgba(37,211,102,.2); }
    .sb-btn.wa .sb-icon { background: rgba(37,211,102,.12); }
    .sb-btn.wa:hover { background: rgba(37,211,102,.1); }
    #sidebar.open .sb-btn { animation: sbIn .4s cubic-bezier(.22,1,.36,1) forwards; }
    #sidebar.open .sb-btn:nth-child(1){animation-delay:.04s}
    #sidebar.open .sb-btn:nth-child(2){animation-delay:.09s}
    #sidebar.open .sb-btn:nth-child(3){animation-delay:.14s}
    #sidebar.open .sb-btn:nth-child(4){animation-delay:.19s}
    #sidebar.open .sb-btn:nth-child(5){animation-delay:.24s}
    @keyframes sbIn { to { transform: translateX(0); opacity: 1; } }

    /* ══ HEADER ══ */
    #site-header {
      position: sticky; top: 0; z-index: 800;
      display: flex; align-items: center; gap: 8px;
      padding: 0 12px; height: 54px;
      background: rgba(3,7,18,.94); backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(26,143,255,.15);
      box-shadow: 0 2px 20px rgba(0,0,0,.55);
    }
    .hdr-hamburger { background: none; border: none; color: var(--white); font-size: 1.25rem; cursor: pointer; padding: 6px 8px; border-radius: 8px; transition: background .2s; flex-shrink: 0; }
    .hdr-hamburger:hover { background: rgba(255,255,255,.08); }
    .hdr-title {
      font-family: var(--ff-d); font-size: 1.25rem; font-weight: 800;
      background: linear-gradient(90deg,var(--gold),var(--gold-lt),#fff8dc,var(--gold));
      background-size: 250%;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      animation: shimTitle 5s linear infinite;
      flex: 1; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    @keyframes shimTitle { 0%{background-position:0%} 100%{background-position:250%} }
    .hdr-search-btn {
      background: rgba(26,143,255,.08); border: 1px solid rgba(26,143,255,.25);
      color: var(--white); cursor: pointer; padding: 7px 9px; border-radius: 8px;
      display: flex; align-items: center; flex-shrink: 0;
      transition: background .2s, transform .2s, box-shadow .2s;
    }
    .hdr-search-btn:hover { background: rgba(26,143,255,.2); box-shadow: 0 0 18px rgba(26,143,255,.4); transform: scale(1.08); }
    .hdr-premium {
      display: flex; align-items: center; gap: 4px; padding: 5px 11px;
      background: linear-gradient(90deg,var(--gold),var(--gold-lt));
      color: #0a0d14; font-size: .74rem; font-weight: 700;
      border-radius: 20px; text-decoration: none; white-space: nowrap; flex-shrink: 0;
      animation: premPulse 2.5s ease-in-out infinite;
    }
    @keyframes premPulse { 0%,100%{box-shadow:0 0 8px rgba(212,168,39,.4)} 50%{box-shadow:0 0 24px rgba(212,168,39,.82),0 0 44px rgba(212,168,39,.2)} }

    /* ══ SPONSOR BANNER ══ */
    #sponsor-banner {
      margin: 10px 12px; padding: 10px 13px; border-radius: 12px;
      background: linear-gradient(135deg,rgba(212,168,39,.08),rgba(240,200,74,.04));
      border: 1px solid rgba(212,168,39,.35);
      display: flex; align-items: center; gap: 10px;
      position: relative; overflow: hidden;
    }
    #sponsor-banner::after {
      content:''; position:absolute; top:0; left:-130%; width:60%; height:100%;
      background:linear-gradient(90deg,transparent,rgba(212,168,39,.1),transparent);
      animation:spnShim 3s ease-in-out infinite;
    }
    @keyframes spnShim{0%{left:-130%}100%{left:210%}}
    .spn-icon{font-size:1.2rem;flex-shrink:0}
    .spn-info{flex:1;min-width:0}
    .spn-label{font-size:.64rem;font-weight:700;letter-spacing:.1em;color:var(--gold);text-transform:uppercase;display:block}
    .spn-name{font-size:.9rem;font-weight:700;color:var(--white)}
    .spn-btn{
      padding:6px 13px; background:linear-gradient(90deg,var(--gold),var(--gold-lt));
      color:#0a0d14; font-size:.78rem; font-weight:800; border-radius:20px; text-decoration:none;
      white-space:nowrap; flex-shrink:0; position:relative; z-index:1;
      transition:box-shadow .2s,transform .2s;
    }
    .spn-btn:hover{transform:translateY(-1px);box-shadow:0 4px 18px rgba(212,168,39,.5)}

    /* ══ HERO — full-width cinema banner ══ */
    #hero {
      position: relative; width: 100%;
      height: 56vw; min-height: 200px; max-height: 380px;
      overflow: hidden; background: #050d18;
      touch-action: pan-y;
    }
    .hero-slide { position:absolute; inset:0; opacity:0; transition:opacity .85s ease; pointer-events:none; }
    .hero-slide.active { opacity:1; pointer-events:all; }

    /* Blurred bg layer */
    .hero-bg {
      position:absolute; inset:-15%;
      background-size:cover; background-position:center;
      filter:blur(22px) brightness(0.3) saturate(1.4);
      animation:kenBurns 9s ease-in-out infinite alternate;
    }
    @keyframes kenBurns { from{transform:scale(1.08)} to{transform:scale(1.2) translateY(-3%)} }

    /* Hero cover — landscape thumbnail fills full banner, face stays visible */
    .hero-cover {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 20%;
      display: block;
      z-index: 1;
    }

    /* Gradient overlay on top of image */
    .hero-vignette {
      position:absolute; inset:0; z-index:2;
      background: linear-gradient(
        to bottom,
        rgba(3,7,18,.08)  0%,
        rgba(3,7,18,.00) 18%,
        rgba(3,7,18,.00) 42%,
        rgba(3,7,18,.55) 65%,
        rgba(3,7,18,.92) 100%
      );
    }
    .hero-new-badge {
      position:absolute; top:12px; left:12px; z-index:4;
      display:flex; align-items:center; gap:5px;
      background:var(--red); color:#fff; font-size:.68rem; font-weight:700;
      padding:4px 10px; border-radius:6px; letter-spacing:.06em; text-transform:uppercase;
    }
    .hero-new-badge::before { content:'●'; animation:blink 1.1s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.22} }
    .hero-content { position:absolute; bottom:14px; left:0; right:0; z-index:4; padding:0 14px; }
    .hero-series-name { font-size:.72rem; font-weight:600; color:var(--blue-lt); letter-spacing:.08em; text-transform:uppercase; margin-bottom:3px; }
    .hero-ep-title {
      font-family:var(--ff-d); font-size:clamp(.95rem,4vw,1.4rem); font-weight:700; color:var(--white);
      line-height:1.25; text-shadow:0 2px 12px rgba(0,0,0,.9); margin-bottom:10px;
      display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
    }
    .hero-watch-btn {
      display:inline-flex; align-items:center; gap:6px; padding:9px 22px;
      background:linear-gradient(90deg,var(--gold),var(--gold-lt));
      color:#0a0d14; font-size:.85rem; font-weight:700; border-radius:8px;
      text-decoration:none; border:none; cursor:pointer;
      box-shadow:0 2px 14px rgba(212,168,39,.44);
      transition:box-shadow .2s,transform .2s;
    }
    .hero-watch-btn:hover { transform:translateY(-2px); box-shadow:0 6px 24px rgba(212,168,39,.65); }

    #hero-dots { display:flex; justify-content:center; gap:6px; padding:8px 0 2px; }
    .hero-dot { height:5px; border-radius:3px; width:6px; background:rgba(26,143,255,.28); border:none; cursor:pointer; padding:0; transition:background .3s,width .3s; }
    .hero-dot.active { background:var(--blue); width:18px; }

    /* ══ SECTION LABEL ══ */
    .section-label {
      font-size:.68rem; font-weight:700; letter-spacing:.13em; text-transform:uppercase; color:var(--gold);
      padding:16px 14px 8px; display:flex; align-items:center; gap:8px;
    }
    .section-label::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,rgba(212,168,39,.42),transparent); }

    /* ══ SCHEDULE ══ */
    #schedule-wrap { padding:0 12px; display:flex; flex-direction:column; gap:8px; }
    .sched-card {
      display:flex; align-items:center; gap:12px; padding:11px 13px;
      background:linear-gradient(135deg,var(--card),rgba(26,143,255,.04));
      border-radius:12px; border:1px solid rgba(26,143,255,.12); border-left:3px solid var(--gold);
      position:relative; overflow:hidden;
      animation: slideInLeft .45s cubic-bezier(.22,1,.36,1) both;
    }
    .sched-card.is-live { border-left-color:var(--red); }
    .sched-card:hover { box-shadow:0 4px 20px rgba(26,143,255,.15); }
    @keyframes slideInLeft { from{transform:translateX(-32px);opacity:0} to{transform:translateX(0);opacity:1} }
    .sched-card:nth-child(1){animation-delay:.05s}
    .sched-card:nth-child(2){animation-delay:.12s}
    .sched-card:nth-child(3){animation-delay:.19s}
    .sched-thumb { width:48px; height:48px; object-fit:cover; border-radius:8px; flex-shrink:0; border:1px solid rgba(255,255,255,.08); }
    .sched-info { flex:1; min-width:0; }
    .sched-title { font-size:.9rem; font-weight:700; color:var(--white); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .sched-meta { display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin-top:3px; }
    .sched-day { font-size:.74rem; font-weight:600; color:var(--gold); }
    .sched-dot { color:var(--muted); font-size:.55rem; }
    .sched-type { font-size:.74rem; font-weight:600; color:var(--cyan); }
    .sched-live { font-size:.63rem; font-weight:700; letter-spacing:.06em; background:var(--red); color:#fff; padding:2px 6px; border-radius:4px; animation:blink 1s ease-in-out infinite; }
    .sched-countdown { font-size:.7rem; color:rgba(212,168,39,.85); margin-top:2px; font-weight:500; }

    /* ══ RECOMMENDED ══ */
    #rec-scroll { display:flex; gap:10px; padding:2px 12px 12px; overflow-x:auto; scrollbar-width:none; }
    #rec-scroll::-webkit-scrollbar { display:none; }
    #rec-scroll .card { flex:0 0 110px; width:110px; min-width:110px; }

    /* ══ FILTER BAR ══ */
    .filter-bar { padding:4px 12px 0; }
    .filter-bar .primary { display:flex; gap:8px; }
    .pill {
      display:inline-flex; align-items:center; gap:5px; padding:7px 15px;
      border-radius:22px; font-family:var(--ff-b); font-size:.82rem; font-weight:600;
      cursor:pointer; border:none; outline:none; transition:all .25s ease; white-space:nowrap;
    }
    .filter-bar .primary .pill {
      background:rgba(26,143,255,.08); border:1.5px solid rgba(26,143,255,.28); color:rgba(255,255,255,.62);
    }
    .filter-bar .primary .pill.active {
      background:linear-gradient(135deg,rgba(26,143,255,.38),rgba(26,143,255,.18));
      border-color:rgba(26,143,255,.72); color:#fff;
      box-shadow:0 0 18px rgba(26,143,255,.35),inset 0 1px 0 rgba(255,255,255,.15);
    }
    .filter-bar .primary .pill:not(.active):hover { background:rgba(26,143,255,.15); border-color:rgba(26,143,255,.44); color:var(--white); }
    .filter-bar .secondary {
      display:flex; gap:6px; flex-wrap:wrap; padding:0; max-height:0; overflow:hidden;
      transition:max-height .36s ease,padding .36s ease;
    }
    .filter-bar .secondary.visible { max-height:130px; padding:8px 0 8px; }
    .filter-bar .secondary .pill {
      background:rgba(212,168,39,.07); border:1.5px solid rgba(212,168,39,.26);
      color:rgba(255,255,255,.58); padding:6px 12px; font-size:.8rem;
    }
    .filter-bar .secondary .pill.active {
      background:linear-gradient(135deg,rgba(212,168,39,.36),rgba(240,200,74,.18));
      border-color:rgba(212,168,39,.72); color:var(--gold-lt);
      box-shadow:0 0 14px rgba(212,168,39,.3),inset 0 1px 0 rgba(255,255,255,.12);
    }
    .filter-bar .secondary .pill:not(.active):hover { background:rgba(212,168,39,.14); border-color:rgba(212,168,39,.44); color:var(--white); }

    /* ══ SERIES GRID ══ */
    #series-grid {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(110px,1fr));
      gap:10px; padding:4px 12px 24px;
    }
    .skeleton { border-radius:10px; aspect-ratio:2/3; background:linear-gradient(90deg,var(--card) 25%,#1a2d45 50%,var(--card) 75%); background-size:300%; animation:skelShim 1.6s ease-in-out infinite; }
    @keyframes skelShim { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* card fade-up */
    .card-anim { opacity:0; transform:translateY(14px); transition:opacity .45s ease,transform .45s ease; }
    .card-anim.visible { opacity:1; transform:translateY(0); }

    /* ══ SEARCH OVERLAY ══ */
    #search-overlay {
  position:fixed; inset:0; z-index:1100;
  background:rgba(3,7,18,.97); backdrop-filter:blur(22px);
  display:flex; flex-direction:column;
  transform:translateY(-100%); transition:transform .36s cubic-bezier(.22,1,.36,1);
  overflow:hidden;
  touch-action:pan-y;
    }
    #search-overlay.open { transform:translateY(0); }
    .srch-top { display:flex; align-items:center; gap:10px; padding:12px 14px 10px; border-bottom:1px solid rgba(26,143,255,.15); background:rgba(26,143,255,.04); }
    .srch-input-wrap { flex:1; display:flex; align-items:center; gap:8px; background:var(--card); border:1.5px solid rgba(26,143,255,.4); border-radius:24px; padding:9px 13px; }
    .srch-input-wrap svg { color:var(--blue-lt); flex-shrink:0; }
    #srch-input { flex:1; background:none; border:none; color:var(--white); font-family:var(--ff-b); font-size:1rem; outline:none; }
    #srch-input::placeholder { color:var(--muted); }
    #srch-clear { background:none; border:none; color:var(--muted); cursor:pointer; font-size:.95rem; padding:0 2px; transition:color .2s; display:none; }
    #srch-clear.visible { display:block; }
    #srch-clear:hover { color:var(--white); }

  <script>
  (async function(){
    try{
      const res=await fetch('/includes/footer.html');
      if(!res.ok)return;
      document.getElementById('footer-placeholder').innerHTML=await res.text();
      const nav=document.getElementById('smtv-bottom-nav');
      if(!nav)return;
      const items=Array.from(nav.querySelectorAll('.nav-item'));
      const path=window.location.pathname.toLowerCase();
      let m=items.find(a=>{const n=(a.dataset.name||'').toLowerCase();return(n==='home'&&(path==='/'||path.includes('index')))||(n&&path.includes(n));});
      if(!m){const l=localStorage.getItem('smtv_last_nav');if(l)m=items.find(a=>a.dataset.name===l);}
      m?.classList.add('active');
      items.forEach(a=>a.addEventListener('click',function(){
        items.forEach(i=>i.classList.remove('active'));this.classList.add('active');
        try{localStorage.setItem('smtv_last_nav',this.dataset.name);}catch(e){}
      },{passive:true}));
      try{const p=parseInt(getComputedStyle(document.body).paddingBottom)||0;if(p<96)document.body.style.paddingBottom='calc(96px + env(safe-area-inset-bottom))';}catch(e){}
    }catch(e){}
