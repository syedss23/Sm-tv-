<!-- includes/footer.html - SmTv Urdu Bottom Navigation Bar (Professional Animated) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<nav class="smtv-bottom-nav" id="smtv-bottom-nav" role="navigation" aria-label="Main">

  <a href="/index.html" class="nav-item" data-name="home" aria-label="Home">
    <span class="nav-bg-glow"></span>
    <span class="icon-wrap">
      <i class="fa-solid fa-house"></i>
      <span class="ripple"></span>
    </span>
    <span class="label">Home</span>
  </a>

  <a href="seriesbar.html" class="nav-item" data-name="series" aria-label="Series">
    <span class="nav-bg-glow"></span>
    <span class="icon-wrap">
      <i class="fa-solid fa-film"></i>
      <span class="ripple"></span>
    </span>
    <span class="label">Series</span>
  </a>

  <a href="/clips.html" class="nav-item" data-name="clips" aria-label="Clips">
    <span class="nav-bg-glow"></span>
    <span class="icon-wrap">
      <i class="fa-solid fa-circle-play"></i>
      <span class="ripple"></span>
    </span>
    <span class="label">Clips</span>
  </a>

  <a href="/premium.html" class="nav-item" data-name="premium" aria-label="Premium">
    <span class="nav-bg-glow"></span>
    <span class="icon-wrap">
      <i class="fa-solid fa-star"></i>
      <span class="ripple"></span>
    </span>
    <span class="label">Premium</span>
  </a>

  <a href="/more.html" class="nav-item" data-name="more" aria-label="More">
    <span class="nav-bg-glow"></span>
    <span class="icon-wrap">
      <i class="fa-solid fa-bars"></i>
      <span class="ripple"></span>
    </span>
    <span class="label">More</span>
  </a>

</nav>

<style>
/* ── Tokens ── */
:root {
  --nav-h: 68px;
  --nav-r: 20px;
  --c-bg: #0a0c10;
  --c-surface: rgba(18, 20, 26, 0.96);
  --c-border: rgba(255,255,255,0.07);
  --c-muted: rgba(160,168,185,0.75);
  --c-label: rgba(200,208,220,0.85);

  /* Gold accent for Premium feel */
  --gold-a: #f5c842;
  --gold-b: #e6a010;

  /* Teal/Cyan for general active */
  --teal-a: #23d4f5;
  --teal-b: #0da8e0;

  /* Active gradient (teal → cyan) */
  --grad-icon: linear-gradient(135deg, var(--teal-a) 0%, var(--teal-b) 100%);
  --grad-pill: linear-gradient(90deg, var(--teal-a), var(--teal-b));

  --font: 'Exo 2', system-ui, sans-serif;
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
}

/* ── Nav Shell ── */
.smtv-bottom-nav {
  position: fixed;
  left: 14px;
  right: 14px;
  bottom: 14px;
  height: var(--nav-h);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 8px;
  padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 6px);
  background: var(--c-surface);
  border-radius: var(--nav-r);
  border: 1px solid var(--c-border);
  box-shadow:
    0 24px 60px rgba(0,0,0,0.65),
    0 2px 0 rgba(255,255,255,0.04) inset,
    0 0 60px rgba(0,0,0,0.4);
  z-index: 1200;
  backdrop-filter: blur(20px) saturate(1.6);
  font-family: var(--font);
  /* entrance animation */
  animation: navSlideUp 0.55s var(--ease-spring) both;
}

/* subtle top shimmer line */
.smtv-bottom-nav::before {
  content: "";
  position: absolute;
  top: 0; left: 20%; right: 20%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(35,212,245,0.4), transparent);
  border-radius: 100%;
  animation: shimmerLine 3s ease-in-out infinite;
}

/* ── Each Item ── */
.nav-item {
  flex: 1;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  padding: 5px 4px 6px;
  border-radius: 14px;
  text-decoration: none;
  color: var(--c-muted);
  transition: color 0.25s var(--ease-out);
  -webkit-tap-highlight-color: transparent;
  cursor: pointer;
  overflow: hidden;
}

/* hover glow blob */
.nav-bg-glow {
  position: absolute;
  inset: 0;
  border-radius: 14px;
  background: radial-gradient(ellipse at center, rgba(35,212,245,0.08) 0%, transparent 70%);
  opacity: 0;
  transition: opacity 0.3s ease;
  pointer-events: none;
}
.nav-item:hover .nav-bg-glow,
.nav-item:focus-visible .nav-bg-glow { opacity: 1; }

/* ── Icon Wrap ── */
.icon-wrap {
  position: relative;
  width: 42px;
  height: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 12px;
  background: transparent;
  transition:
    background 0.3s var(--ease-out),
    transform  0.35s var(--ease-spring),
    box-shadow 0.3s ease;
  overflow: hidden;
}

.nav-item i {
  font-size: 17px;
  color: inherit;
  transition: color 0.25s ease, transform 0.35s var(--ease-spring);
  position: relative;
  z-index: 1;
}

/* hover lift */
.nav-item:hover { color: #d0dce8; }
.nav-item:hover .icon-wrap { transform: translateY(-3px); }
.nav-item:hover i { transform: scale(1.1); }

/* ── Label ── */
.label {
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: 0.02em;
  opacity: 0.9;
  transition: opacity 0.25s ease, transform 0.3s var(--ease-spring);
}

/* ── ACTIVE STATE ── */
.nav-item.active {
  color: #fff;
}

.nav-item.active .icon-wrap {
  background: var(--grad-icon);
  transform: translateY(-7px) scale(1.05);
  box-shadow:
    0 10px 32px rgba(13, 168, 224, 0.40),
    0 4px 12px rgba(0,0,0,0.5),
    0 0 0 1px rgba(35,212,245,0.25) inset;
}

.nav-item.active i {
  color: #04191f;
  transform: scale(1.08);
}

.nav-item.active .label {
  opacity: 1;
  transform: translateY(-1px);
}

/* ── Animated underline pill ── */
.nav-item.active::after {
  content: "";
  position: absolute;
  bottom: 1px;
  left: 50%;
  transform: translateX(-50%) scaleX(1);
  width: 28px;
  height: 3px;
  border-radius: 100px;
  background: var(--grad-pill);
  box-shadow: 0 0 10px rgba(35,212,245,0.55);
  animation: pillPop 0.4s var(--ease-spring) both;
}

/* Premium star — gold when active */
.nav-item[data-name="premium"].active .icon-wrap {
  background: linear-gradient(135deg, var(--gold-a), var(--gold-b));
  box-shadow:
    0 10px 32px rgba(230,160,16,0.40),
    0 4px 12px rgba(0,0,0,0.5),
    0 0 0 1px rgba(245,200,66,0.25) inset;
}
.nav-item[data-name="premium"].active::after {
  background: linear-gradient(90deg, var(--gold-a), var(--gold-b));
  box-shadow: 0 0 10px rgba(245,200,66,0.55);
}
/* premium icon always has a gold tint for magnetism */
.nav-item[data-name="premium"] i { color: var(--gold-a); }
.nav-item[data-name="premium"].active i { color: #2c1a00; }

/* ── Ripple on click ── */
.ripple {
  position: absolute;
  inset: 0;
  border-radius: inherit;
  pointer-events: none;
}
.ripple::after {
  content: "";
  position: absolute;
  inset: 50%;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  transform: scale(0);
  opacity: 0;
}
.nav-item.ripple-active .ripple::after {
  animation: rippleOut 0.5s ease-out forwards;
}

/* ── Keyframes ── */
@keyframes navSlideUp {
  from { opacity: 0; transform: translateY(30px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0)    scale(1);    }
}

@keyframes pillPop {
  from { opacity: 0; transform: translateX(-50%) scaleX(0.3); }
  to   { opacity: 1; transform: translateX(-50%) scaleX(1);   }
}

@keyframes rippleOut {
  0%   { inset: 30%; opacity: 0.6; transform: scale(0); }
  100% { inset: -20%; opacity: 0;  transform: scale(1); }
}

@keyframes shimmerLine {
  0%, 100% { opacity: 0.4; }
  50%       { opacity: 1;   }
}

/* icon bounce on activate */
@keyframes iconBounce {
  0%  { transform: translateY(-7px) scale(1.05); }
  40% { transform: translateY(-10px) scale(1.12); }
  70% { transform: translateY(-5px)  scale(1.02); }
  100%{ transform: translateY(-7px)  scale(1.05); }
}
.nav-item.active .icon-wrap {
  animation: iconBounce 0.45s var(--ease-spring) both;
}

/* ── Larger screens ── */
@media (min-width: 900px) {
  .smtv-bottom-nav {
    max-width: 860px;
    left: 50%;
    right: auto;
    transform: translateX(-50%);
    bottom: 24px;
    height: 76px;
    padding: 8px 14px;
  }
  .icon-wrap { width: 48px; height: 44px; border-radius: 14px; }
  .nav-item i { font-size: 19px; }
  .label { font-size: 11.5px; }
}
</style>

<script>
(function () {
  const nav = document.getElementById('smtv-bottom-nav');
  if (!nav) return;

  /* ── Mark active by URL ── */
  const path = location.pathname.replace(/\/$/, '') || '/index.html';
  const map = {
    '/index.html': 'home', '/': 'home',
    '/seriesbar.html': 'series', '/series': 'series',
    '/clips.html': 'clips',
    '/premium.html': 'premium',
    '/more.html': 'more',
  };
  const activeName = map[path];
  if (activeName) {
    const el = nav.querySelector(`[data-name="${activeName}"]`);
    if (el) el.classList.add('active');
  }

  /* ── Click: switch active + ripple ── */
  nav.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', function (e) {
      // active state
      nav.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
      this.classList.add('active');

      // ripple
      this.classList.remove('ripple-active');
      void this.offsetWidth; // reflow
      this.classList.add('ripple-active');
      setTimeout(() => this.classList.remove('ripple-active'), 550);
    });
  });
})();
</script>
