<body>

  <div id="wa-backdrop"></div>

  <div id="main-content">
    <header></header>
    <script type="text/javascript" src="//www.highperformanceformat.com/c91a82435d260630918ecc80c95125ac/invoke.js"></script>
    <div id="series-details" aria-live="polite"></div>
  </div>

  <!-- ─── EPISODE TITLE FORMATTER ─────────────────── -->
  <script>
    /**
     * Episode title rules:
     *  "Episode 1"               → "Episode 1"        (no change, short title)
     *  "Episode 1 - The Beginning" → "Ep 1 - The Beginning"  (shortened)
     *  "Episode 1 The Beginning"   → "Ep 1 The Beginning"    (shortened)
     */
    function formatEpTitle(raw) {
      if (!raw) return '';
      var s = String(raw).trim();

      // Only has number, no extra name → keep as-is
      if (/^Episodes+d+s*$/i.test(s)) {
        return { type: 'plain', text: s };
      }

      // Has name after number → shorten "Episode" to "Ep"
      var m = s.match(/^Episodes+(d+)s*([-–—]?s*)(.+)$/i);
      if (m) {
        var numPart  = 'Ep ' + m[1];
        var sep      = m[2].trim() ? ' ' + m[2].trim() + ' ' : ' ';
        var namePart = m[3].trim();
        return { type: 'split', num: numPart, sep: sep, name: namePart };
      }

      // Not "Episode X" at all → show raw
      return { type: 'plain', text: s };
    }

    function applyEpTitles() {
      document.querySelectorAll('.pro-ep-title-pro').forEach(function(el) {
        if (el.dataset.fmt === '1') return;
        el.dataset.fmt = '1';

        var raw = el.textContent.trim();
        var result = formatEpTitle(raw);

        if (result.type === 'plain') {
          el.innerHTML = '<span class="ep-num-part">' + result.text + '</span>';
        } else {
          el.innerHTML =
            '<span class="ep-num-part">' + result.num + '</span>' +
            '<span class="ep-name-part">' + result.sep + result.name + '</span>';
        }
      });
    }

    // Run when series.js finishes injecting cards
    (function() {
      var sd = document.getElementById('series-details');
      if (!sd) { document.addEventListener('DOMContentLoaded', function(){ applyEpTitles(); }); return; }
      var obs = new MutationObserver(function() { applyEpTitles(); });
      obs.observe(sd, { childList: true, subtree: true });
      setTimeout(function() { obs.disconnect(); applyEpTitles(); }, 14000);
    })();
  </script>

  <!-- ─── PREMIUM CARD UPGRADE ─────────────────────── -->
  <script>
    (function() {
      function upgradePremium() {
        document.querySelectorAll('.premium-channel-message').forEach(function(box) {
          if (box.dataset.upg === '1') return;
          box.dataset.upg = '1';

          var link = box.querySelector('a');
          var href = '/premium.html';
          if (link) href = link.getAttribute('href') || href;

          box.innerHTML =
            '<div class="pcm-head">' +
              '<span class="pcm-crown">👑</span>' +
              'SMTV VIP Membership' +
            '</div>' +
            '<div class="pcm-features">' +
              '<span class="pcm-feat">⚡ No Ads</span>' +
              '<span class="pcm-feat">⬇ Fast Download</span>' +
              '<span class="pcm-feat">🔓 Early Access</span>' +

  <script>

  <!-- ─── FOOTER LOADER ────────────────────────────── -->
  <div id="footer-placeholder"></div>
  <script>
  (async function(){
    var cands = ['/includes/footer.html','includes/footer.html','./includes/footer.html','/footer.html','footer.html'];
    var ph = document.getElementById('footer-placeholder');

    function initNav(html) {
      try {
        ph.innerHTML = html;
        try {
          var p = parseInt(getComputedStyle(document.body).paddingBottom)||0;
          if (p < 96) document.body.style.paddingBottom = 'calc(96px + env(safe-area-inset-bottom))';
        } catch(e){}

        var nav = ph.querySelector('#smtv-bottom-nav') || ph.querySelector('.smtv-bottom-nav');
        if (!nav) return;

        var items = Array.from(nav.querySelectorAll('.nav-item'));
        items.forEach(function(i){ i.classList.remove('active'); });

        var si = items.find(function(i){ return (i.dataset.name||'').toLowerCase() === 'series'; });
        if (!si) si = items.find(function(i){ return (i.getAttribute('href')||'').toLowerCase().includes('series'); });

        var hasSlug = new URLSearchParams(window.location.search).has('series');
        if (hasSlug && si) {
          si.classList.add('active');
        } else {
          var pp = location.pathname.toLowerCase().split('/').pop();
          var bp = items.find(function(i){ return (i.getAttribute('href')||'').toLowerCase().includes(pp); });
          if (bp) bp.classList.add('active');
          else if (si) si.classList.add('active');
        }

        items.forEach(function(a){
          if (a.dataset.bound) return;
          a.dataset.bound = '1';
          a.addEventListener('click', function(e){
            try { e.preventDefault(); } catch(x){}
            items.forEach(function(i){ i.classList.remove('active'); });
            this.classList.add('active');
            var h = this.getAttribute('href');
            if (h) location.assign(h);
          }, { passive:false });
        });
      } catch(e) { console.warn('initNav', e); }
    }

    for (var i=0; i<cands.length; i++) {
      try {
        var r = await fetch(cands[i], { cache:'no-cache' });
        if (!r.ok) continue;
        var t = await r.text();
        initNav(t);
        return;
      } catch(e) { continue; }
    }

    ph.innerHTML = `
      <nav class="smtv-bottom-nav" id="smtv-bottom-nav" role="navigation" aria-label="Main">
        <a href="/index.html"   class="nav-item" data-name="home">    <span class="icon-wrap"><i class="fa-solid fa-house"></i></span>      <span class="label">Home</span></a>
        <a href="/series.html"  class="nav-item active" data-name="series">  <span class="icon-wrap"><i class="fa-solid fa-film"></i></span>       <span class="label">Series</span></a>
        <a href="/clips.html"   class="nav-item" data-name="clips">   <span class="icon-wrap"><i class="fa-solid fa-play-circle"></i></span> <span class="label">Clips</span></a>
        <a href="/premium.html" class="nav-item" data-name="premium"> <span class="icon-wrap"><i class="fa-solid fa-star"></i></span>        <span class="label">Premium</span></a>
        <a href="/more.html"    class="nav-item" data-name="more">    <span class="icon-wrap"><i class="fa-solid fa-circle-info"></i></span> <span class="label">More</span></a>
      </nav>
      <style>
        .smtv-bottom-nav{
          position:fixed;left:12px;right:12px;bottom:12px;height:66px;
          display:flex;gap:6px;padding:8px;border-radius:18px;
          background:rgba(9,11,18,.92);
          backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
          border:1px solid rgba(255,255,255,.07);
          box-shadow:0 18px 50px rgba(0,0,0,.5);
          align-items:center;z-index:1200;
          padding-bottom:calc(env(safe-area-inset-bottom) + 8px);
        }
        .smtv-bottom-nav .nav-item{
          flex:1;text-align:center;color:#6a86a8;text-decoration:none;
          padding:6px;border-radius:12px;
          transition:color .22s ease,transform .22s ease,background .22s ease;
        }
        .smtv-bottom-nav .nav-item.active{
          color:#fff;background:rgba(0,205,235,.1);transform:translateY(-4px);
        }
        .smtv-bottom-nav .icon-wrap{
          display:inline-flex;width:38px;height:38px;
          align-items:center;justify-content:center;border-radius:10px;
        }
        .smtv-bottom-nav .label{display:block;font-size:11px;margin-top:2px;font-weight:600;}
      </style>`;

    try { document.body.style.paddingBottom = 'calc(96px + env(safe-area-inset-bottom))'; } catch(e){}
  })();
  </script>

</body>
