<html lang="en">
<head>

  <meta charset="UTF-8">
  <title>SmTv Urdu</title>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
  <meta name="description" content="Watch Turkish drama series and historical shows in Urdu on SmTv Urdu.">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer"/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800;900&family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600;1,700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800;9..40,900&display=swap" rel="stylesheet"/>

  <style>
  /* ═══════════════════════════════════════════════════════════════
     DESIGN TOKENS
  ═══════════════════════════════════════════════════════════════ */
  :root {
    --bg:          #04080f;
    --bg2:         #07101c;
    --bg3:         #0b1828;
    --bg4:         #0e1f30;
    --border:      rgba(255,255,255,.07);
    --border-hi:   rgba(255,255,255,.13);
    --gold:        #e8a800;
    --gold-lt:     #ffc93c;
    --gold-dim:    #b07f00;
    --gold-glow:   rgba(232,168,0,.32);
    --gold-glow2:  rgba(232,168,0,.12);
    --cyan:        #00c8f0;
    --cyan-dim:    rgba(0,200,240,.18);
    --cyan-glow:   rgba(0,200,240,.32);
    --green:       #00d98b;
    --txt:         #d8e8f8;
    --txt-muted:   #4e6880;
    --txt-soft:    #7a99b0;
    --radius:      16px;
    --rad-sm:      10px;
    --rad-xs:      7px;
    --ease:        cubic-bezier(.22,.68,0,1.2);
    --ease-out:    cubic-bezier(.25,.46,.45,.94);
  }

  /* ═══════════════════════════════════════════════════════════════
     RESET
  ═══════════════════════════════════════════════════════════════ */
  *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
  html { scroll-behavior:smooth; -webkit-tap-highlight-color:transparent; }
  body {
    background:var(--bg); color:var(--txt);
    font-family:'DM Sans','Segoe UI',Arial,sans-serif;
    -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
    overflow-x:hidden; min-height:100dvh;
  }
  :focus { outline:none; }
  a { text-decoration:none; color:inherit; }

  /* ═══════════════════════════════════════════════════════════════
     GLOBAL AMBIENT BACKGROUND
  ═══════════════════════════════════════════════════════════════ */
  body::before {
    content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
    background-image:
      linear-gradient(rgba(0,200,240,.016) 1px,transparent 1px),
      linear-gradient(90deg,rgba(0,200,240,.016) 1px,transparent 1px);
    background-size:52px 52px;
    mask-image:radial-gradient(ellipse 100% 60% at 50% 0%,black 30%,transparent);
    -webkit-mask-image:radial-gradient(ellipse 100% 60% at 50% 0%,black 30%,transparent);
  }
  body::after {
    content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
    background:
      radial-gradient(ellipse 70% 50% at 85% 8%,rgba(232,168,0,.08) 0%,transparent 65%),
      radial-gradient(ellipse 55% 45% at 8% 75%,rgba(0,200,240,.065) 0%,transparent 65%);
    animation:bg-breathe 14s ease-in-out infinite;
  }

  /* ═══════════════════════════════════════════════════════════════
     KEYFRAMES
  ═══════════════════════════════════════════════════════════════ */
  @keyframes bg-breathe    { 0%,100%{opacity:1} 50%{opacity:.55} }
  @keyframes fade-up       { from{opacity:0;transform:translateY(28px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fade-up-sm    { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fade-in       { from{opacity:0} to{opacity:1} }
  @keyframes shimmer       { 0%{background-position:-200% center} 100%{background-position:200% center} }
  @keyframes btn-shine     { 0%{left:-100%} 55%,100%{left:150%} }
  @keyframes dot-pulse     { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.25;transform:scale(.7)} }
  @keyframes float         { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
  @keyframes pulse-ring-gold {
    0%   { box-shadow:0 0 0 0 var(--gold-glow); }
    70%  { box-shadow:0 0 0 10px rgba(232,168,0,0); }
    100% { box-shadow:0 0 0 0 rgba(232,168,0,0); }
  }
  @keyframes card-in       { from{opacity:0;transform:translateY(20px) scale(.95)} to{opacity:1;transform:translateY(0) scale(1)} }
  @keyframes premium-in    { from{opacity:0;transform:translateY(16px) scale(.97)} to{opacity:1;transform:translateY(0) scale(1)} }
  @keyframes scan-line     { 0%{top:-12%} 100%{top:112%} }
  @keyframes title-glow    { 0%,100%{text-shadow:0 2px 24px rgba(0,0,0,.7)} 50%{text-shadow:0 2px 24px rgba(0,0,0,.7),0 0 48px rgba(232,168,0,.18)} }
  @keyframes underline-grow{ from{transform:scaleX(0)} to{transform:scaleX(1)} }
  @keyframes howto-slide   { from{opacity:0;transform:translateX(-16px)} to{opacity:1;transform:translateX(0)} }
  @keyframes particle-float {
    0%  { transform:translateY(0) translateX(0);   opacity:.45 }
    33% { transform:translateY(-9px) translateX(4px); opacity:.9 }
    66% { transform:translateY(-4px) translateX(-3px); opacity:.6 }
    100%{ transform:translateY(0) translateX(0);   opacity:.45 }
  }
  @keyframes popup-up      { from{opacity:0;transform:translate(-50%,24px)} to{opacity:1;transform:translate(-50%,0)} }
  @keyframes popup-down    { from{opacity:1;transform:translate(-50%,0)} to{opacity:0;transform:translate(-50%,18px)} }
  @keyframes ep-row-in     { from{opacity:0;transform:translateX(16px)} to{opacity:1;transform:translateX(0)} }

  /* ═══════════════════════════════════════════════════════════════
     SCROLL REVEAL
  ═══════════════════════════════════════════════════════════════ */
  .reveal { opacity:0; transform:translateY(16px); transition:opacity .52s var(--ease-out),transform .52s var(--ease-out); }
  .reveal.show { opacity:1; transform:translateY(0); }

  /* ═══════════════════════════════════════════════════════════════
     LAYOUT
  ═══════════════════════════════════════════════════════════════ */
  #main-content {
    max-width:900px; margin:0 auto;
    padding:14px 14px 0; position:relative; z-index:1;
  }

  /* ═══════════════════════════════════════════════════════════════
     SERIES HEADER CARD
  ═══════════════════════════════════════════════════════════════ */
  .pro-series-header-pro {
    display:flex; flex-direction:column; align-items:stretch;
    border-radius:22px; background:var(--bg2); border:1px solid var(--border);
    position:relative; margin-bottom:22px; overflow:hidden;
    box-shadow:0 10px 40px rgba(0,0,0,.5);
    animation:fade-up .65s var(--ease) both;
  }

  /* Poster */
  .pro-series-poster-pro {
    width:100%; height:210px;
    border-radius:20px 20px 0 0;
    object-fit:cover; object-position:center top;
    display:block; background:#060c16;
    transition:transform 8s ease;
  }
  .pro-series-header-pro:hover .pro-series-poster-pro { transform:scale(1.03); }

  /* Gradient fade at bottom of poster */
  .poster-gradient-overlay {
    position:absolute; left:0; right:0; top:130px; height:100px;
    background:linear-gradient(to bottom,transparent,var(--bg2));
    pointer-events:none; z-index:2;
  }
  /* Scan-line effect over poster */
  .poster-scan {
    position:absolute; left:0; right:0; top:0; height:36px;
    background:linear-gradient(to bottom,rgba(0,200,240,.055),transparent);
    animation:scan-line 7s linear infinite;
    pointer-events:none; z-index:3;
  }

  /* Back button */
  .pro-series-back-btn-pro {
    position:absolute; left:12px; top:12px; z-index:10;
    width:40px; height:40px;
    display:inline-flex; align-items:center; justify-content:center;
    border-radius:var(--rad-sm);
    background:rgba(4,8,15,.85); border:1px solid var(--border-hi);
    backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    transition:background .22s,border-color .22s,transform .2s;
    box-shadow:0 4px 18px rgba(0,0,0,.55);
  }
  .pro-series-back-btn-pro:hover {
    background:rgba(0,200,240,.18); border-color:rgba(0,200,240,.45);
    transform:translateX(-2px);
  }
  .pro-series-back-btn-pro:active { transform:scale(.92); }

  /* Meta block under poster */
  .pro-series-meta-pro {
    width:100%; background:var(--bg2); border-top:1px solid var(--border);
    padding:20px 20px 24px; text-align:center; position:relative; z-index:3;
  }
  .pro-series-meta-pro::before {
    content:''; position:absolute; top:0; left:10%; right:10%; height:1px;
    background:linear-gradient(90deg,transparent,var(--border-hi),transparent);
  }

  /* Series title */
  .pro-series-title-pro {
    font-family:'Cinzel',serif;
    font-size:clamp(1.22em,4.8vw,1.88em);
    font-weight:800; color:#fff;
    margin:0 0 10px; letter-spacing:.05em; line-height:1.2;
    animation:title-glow 5s ease-in-out infinite, fade-up-sm .6s var(--ease) both;
  }

  /* Description */
  .pro-series-desc-pro {
    font-size:.875em; color:var(--txt-soft); line-height:1.7;
    max-width:640px; margin:0 auto 18px;
    animation:fade-up-sm .6s var(--ease) .15s both;
  }

  /* Stat badges row */
  .series-stats-row {
    display:flex; align-items:center; justify-content:center;
    gap:8px; flex-wrap:wrap; margin-bottom:18px;
  }
  .series-stat-badge {
    display:inline-flex; align-items:center; gap:5px;
    padding:5px 12px; border-radius:100px;
    font-size:.73em; font-weight:700; letter-spacing:.04em; border:1px solid;
  }
  .stat-cyan  { background:rgba(0,200,240,.08); border-color:rgba(0,200,240,.22);  color:var(--cyan); }
  .stat-gold  { background:rgba(232,168,0,.08); border-color:rgba(232,168,0,.22);  color:var(--gold); }
  .stat-green { background:rgba(0,217,139,.08); border-color:rgba(0,217,139,.22);  color:var(--green); }

  /* ═══════════════════════════════════════════════════════════════
     PREMIUM VIP BOX  (exact screenshot match)
  ═══════════════════════════════════════════════════════════════ */
  .premium-channel-message {
    position:relative; overflow:hidden;
    border-radius:14px;
    background:linear-gradient(145deg,#0f1d2e,#08121e);
    border:1px solid rgba(232,168,0,.32);
    margin-top:6px;
    animation:premium-in .65s var(--ease) .3s both;
    box-shadow:0 8px 32px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.04);
  }
  /* Shimmering gold top bar */
  .premium-channel-message::before {
    content:''; position:absolute; top:0; left:0; right:0; height:2px;
    background:linear-gradient(90deg,transparent,var(--gold-dim),var(--gold),var(--gold-lt),var(--gold-dim),transparent);
    background-size:200% auto; animation:shimmer 2.5s linear infinite;
  }
  /* Corner glow */
  .premium-channel-message::after {
    content:''; position:absolute; top:-40px; right:-40px;
    width:140px; height:140px;
    background:radial-gradient(circle,rgba(232,168,0,.16) 0%,transparent 65%);
    pointer-events:none;
  }

  /* Floating particles */
  .pcm-particle {
    position:absolute; width:3px; height:3px;
    border-radius:50%; background:var(--gold); opacity:.4;
    pointer-events:none;
  }
  .pcm-particle:nth-child(1){ top:22%;left:7%;   animation:particle-float 3.2s ease-in-out infinite; }
  .pcm-particle:nth-child(2){ top:65%;left:14%;  animation:particle-float 4.1s ease-in-out infinite .6s; }
  .pcm-particle:nth-child(3){ top:38%;right:11%; animation:particle-float 3.7s ease-in-out infinite 1.2s; background:var(--cyan); }
  .pcm-particle:nth-child(4){ top:74%;right:19%; animation:particle-float 2.9s ease-in-out infinite .3s; }

  /* Inner layout — stacked (screenshot layout) */
  .pcm-body {
    position:relative; z-index:1;
    padding:16px 16px 18px; text-align:center;
  }

  /* Crown + title row */
  .pcm-title-row {
    display:flex; align-items:center; justify-content:center;
    gap:8px; margin-bottom:13px;
  }
  .pcm-crown { font-size:1.25em; animation:float 3s ease-in-out infinite; }
  .pcm-title-text {
    font-size:.95em; font-weight:800;
    background:linear-gradient(90deg,var(--gold),var(--gold-lt));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text; background-size:200% auto;
    animation:shimmer 2.5s linear infinite;
    letter-spacing:.02em;
  }

  /* Feature badges */
  .pcm-features {
    display:flex; gap:7px; flex-wrap:wrap;
    justify-content:center; margin-bottom:14px;
  }
  .pcm-feat {
    display:inline-flex; align-items:center; gap:5px;
    font-size:.72em; font-weight:700; padding:5px 12px;
    border-radius:100px; letter-spacing:.03em; white-space:nowrap;
  }
  .pcm-feat-dark  { background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12); color:#c8dde8; }
  .pcm-feat-cyan  { background:rgba(0,200,240,.08);   border:1px solid rgba(0,200,240,.22);   color:var(--cyan); }
  .pcm-feat-green { background:rgba(0,217,139,.08);   border:1px solid rgba(0,217,139,.22);   color:var(--green); }

  /* VIP button */
  .pcm-vip-btn {
    display:block; width:100%;
    padding:15px 0;
    border-radius:var(--rad-sm);
    background:linear-gradient(135deg,var(--gold),var(--gold-lt),#ffdc70);
    color:#1a0800; font-family:'DM Sans',sans-serif;
    font-size:.9em; font-weight:900; letter-spacing:.09em;
    text-transform:uppercase; text-align:center;
    border:none; cursor:pointer; text-decoration:none;
    position:relative; overflow:hidden;
    box-shadow:0 6px 26px var(--gold-glow),inset 0 1px 0 rgba(255,255,255,.3);
    transition:box-shadow .25s,transform .15s;
    animation:pulse-ring-gold 2.8s ease-out infinite;
  }
  /* Shine sweep */
  .pcm-vip-btn::before {
    content:''; position:absolute; top:0; left:-100%; width:60%; height:100%;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);
    animation:btn-shine 2s ease-in-out infinite;
  }
  .pcm-vip-btn:hover { box-shadow:0 8px 32px rgba(232,168,0,.65); transform:translateY(-2px) scale(1.03); }
  .pcm-vip-btn:active { transform:scale(.96); }

  /* ═══════════════════════════════════════════════════════════════
     SEASON TABS
  ═══════════════════════════════════════════════════════════════ */
  .pro-seasons-tabs-pro {
    display:flex; gap:8px; justify-content:center;
    flex-wrap:wrap; margin:22px 0 16px;
  }
  .pro-season-tab-pro {
    background:var(--bg2); border:1px solid var(--border-hi);
    color:var(--txt-muted); padding:10px 24px; border-radius:100px;
    cursor:pointer; font-weight:700; font-size:.88em;
    font-family:'DM Sans',sans-serif; letter-spacing:.03em;
    transition:all .22s var(--ease); outline:none;
    position:relative; overflow:hidden;
  }
  .pro-season-tab-pro:hover:not(.active) {
    border-color:rgba(0,200,240,.38); color:var(--txt);
    background:rgba(0,200,240,.07); transform:translateY(-1px);
  }
  .pro-season-tab-pro.active {
    background:linear-gradient(135deg,var(--cyan),#0090b8);
    border-color:transparent; color:#021018; font-weight:800;
    transform:translateY(-2px);
    box-shadow:0 6px 24px var(--cyan-glow);
  }
  .pro-season-tab-pro:active { transform:scale(.95); }

  /* ═══════════════════════════════════════════════════════════════
     SOURCE SELECTOR
  ═══════════════════════════════════════════════════════════════ */
  .source-selector {
    display:flex; gap:8px; justify-content:center;
    margin:0 0 18px; flex-wrap:wrap;
  }
  .source-btn {
    background:var(--bg3); border:1px solid var(--border-hi);
    color:var(--txt-muted); padding:7px 20px; border-radius:var(--rad-xs);
    font-size:.82em; font-weight:700;
    font-family:'DM Sans',sans-serif; cursor:pointer;
    transition:all .22s var(--ease); outline:none;
  }
  .source-btn:hover:not(.active) {
    border-color:rgba(0,200,240,.38); color:var(--txt);
    background:rgba(0,200,240,.07);
  }
  .source-btn.active {
    background:linear-gradient(135deg,var(--cyan),#0090b8);
    border-color:transparent; color:#021018; font-weight:800;
    box-shadow:0 4px 16px var(--cyan-glow); transform:translateY(-1px);
  }
  .source-btn:active { transform:scale(.95); }

  /* ═══════════════════════════════════════════════════════════════
     EPISODES SECTION
  ═══════════════════════════════════════════════════════════════ */
  .pro-episodes-row-wrap-pro {
    margin-top:6px; padding-bottom:10px; margin-bottom:8px;
  }

  /* "Episodes" label */
  .episodes-section-label {
    display:flex; align-items:center; gap:10px;
    font-family:'Cormorant Garamond',serif;
    font-size:1.06em; font-weight:700; font-style:italic;
    letter-spacing:.07em; color:var(--cyan);
    text-transform:uppercase; margin-bottom:14px;
    animation:howto-slide .5s var(--ease) both;
  }
  .episodes-section-label::after {
    content:''; flex:1; height:1px;
    background:linear-gradient(to right,rgba(0,200,240,.35),transparent);
  }

  /* Horizontal scroll row */
  .pro-episodes-row-pro {
    display:flex; gap:12px; overflow-x:auto;
    padding:4px 2px 16px;
    -webkit-overflow-scrolling:touch;
    scroll-snap-type:x proximity;
    scrollbar-width:thin;
    scrollbar-color:rgba(0,200,240,.22) transparent;
  }
  .pro-episodes-row-pro::-webkit-scrollbar { height:3px; }
  .pro-episodes-row-pro::-webkit-scrollbar-track { background:transparent; }
  .pro-episodes-row-pro::-webkit-scrollbar-thumb { background:rgba(0,200,240,.25); border-radius:4px; }

  /* Row swap animation */
  .pro-episodes-row-pro.row-switching {
    opacity:0; transform:translateX(12px);
    transition:opacity .18s ease, transform .18s ease;
  }
  .pro-episodes-row-pro.row-visible {
    opacity:1; transform:translateX(0);
    transition:opacity .25s ease .06s, transform .25s var(--ease) .06s;
  }

  /* ═══════════════════════════════════════════════════════════════
     EPISODE CARD
  ═══════════════════════════════════════════════════════════════ */
  .pro-episode-card-pro {
    scroll-snap-align:start; flex:0 0 150px;
    display:flex; flex-direction:column; align-items:stretch;
    text-decoration:none; color:var(--txt);
    border-radius:14px; background:var(--bg2); border:1px solid var(--border);
    overflow:hidden; position:relative;
    transition:transform .28s var(--ease), box-shadow .28s ease, border-color .28s ease;
  }
  .pro-episode-card-pro.card-animate { animation:card-in .4s var(--ease) both; }

  @media (max-width:420px) { .pro-episode-card-pro { flex:0 0 132px; } }
  @media (min-width:900px) { .pro-episode-card-pro { flex:0 0 178px; } }

  /* Hover top cyan line */
  .pro-episode-card-pro::before {
    content:''; position:absolute; top:0; left:0; right:0; height:2px;
    background:linear-gradient(90deg,transparent,var(--cyan),transparent);
    opacity:0; transition:opacity .22s; z-index:5; pointer-events:none;
  }
  .pro-episode-card-pro:hover::before { opacity:1; }

  @media (hover:hover) {
    .pro-episode-card-pro:hover {
      transform:translateY(-7px) scale(1.025);
      box-shadow:0 20px 48px rgba(0,0,0,.7),0 0 0 1px rgba(0,200,240,.38);
      border-color:rgba(0,200,240,.4);
    }
  }
  .pro-episode-card-pro:active { transform:scale(.95); }

  /* Thumbnail wrapper — clean, no pseudo overlay */
  .pro-ep-thumb-wrap-pro {
    position:relative; width:100%; height:94px;
    overflow:hidden; display:block; flex-shrink:0;
    background:#0a1624;
  }
  @media (max-width:420px) { .pro-ep-thumb-wrap-pro { height:83px; } }
  @media (min-width:900px) { .pro-ep-thumb-wrap-pro { height:111px; } }

  /* Thumbnail image — always visible, no broken opacity */
  .pro-ep-thumb-pro {
    position:absolute; top:0; left:0; width:100%; height:100%;
    object-fit:cover; object-position:center;
    display:block; z-index:1;
    transition:transform .35s ease;
  }
  .pro-episode-card-pro:hover .pro-ep-thumb-pro { transform:scale(1.08); }

  /* Ep number badge — bottom-left of thumb */
  .pro-ep-num-pro {
    position:absolute; bottom:6px; left:6px; z-index:3;
    background:rgba(4,8,15,.88); border:1px solid var(--border-hi);
    color:var(--cyan); font-size:.67em; font-weight:800;
    padding:2px 9px; border-radius:5px;
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    letter-spacing:.05em;
  }

  /* Play overlay on hover */
  .ep-play-overlay {
    position:absolute; top:50%; left:50%; z-index:4;
    transform:translate(-50%,-50%) scale(.65);
    width:34px; height:34px;
    background:rgba(0,200,240,.92); border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    color:#021018; font-size:.62em;
    opacity:0; pointer-events:none;
    transition:opacity .22s, transform .22s var(--ease);

  <!-- ═══════════════════════════════════════════════════════════

  <script>

  <!-- ═══════════════════════════════════════════════════════════
       WHATSAPP POPUP LOGIC
  ═══════════════════════════════════════════════════════════ -->
  <script>
  (function(){
    var popup    = document.getElementById('whatsappPopup');
    var backdrop = document.getElementById('wa-backdrop');
    var dismiss  = document.getElementById('wa-dismiss');

    function showPopup(){
      backdrop.classList.add('show');
      popup.classList.remove('popup-hide');
      popup.classList.add('popup-show');
    }
    function hidePopup(){
      backdrop.classList.remove('show');
      popup.classList.remove('popup-show');
      popup.classList.add('popup-hide');
      setTimeout(function(){ popup.classList.remove('popup-hide'); }, 300);

  <!-- ═══════════════════════════════════════════════════════════
       PREVENT AUTO-SCROLL ON FOCUS
  ═══════════════════════════════════════════════════════════ -->
  <script>
  (function(){
    try{ window.scrollTo(0,0); }catch(e){}
    document.addEventListener('focusin', function(){
      var x=window.scrollX||0, y=window.scrollY||0;
      setTimeout(function(){ try{ window.scrollTo(x,y); }catch(e){} }, 0);
    }, true);
    var det = document.getElementById('series-details');
    if(det){
      var obs = new MutationObserver(function(){
        if(det.childNodes.length){
          try{ window.scrollTo({top:0,behavior:'auto'}); }catch(e){ window.scrollTo(0,0); }
          obs.disconnect();
        }
      });
      obs.observe(det,{childList:true});
    }
  })();
  </script>

  <!-- ═══════════════════════════════════════════════════════════
       SCROLL REVEAL
  ═══════════════════════════════════════════════════════════ -->
  <script>
  (function(){
    var io = new IntersectionObserver(function(entries){
      entries.forEach(function(e){
        if(e.isIntersecting){ e.target.classList.add('show'); io.unobserve(e.target); }
      });
    },{threshold:0.08});

    function observe(){
      document.querySelectorAll('.reveal:not(.show)').forEach(function(el){ io.observe(el); });
    }
    observe();

    var sd = document.getElementById('series-details');
    if(sd){
      var mo = new MutationObserver(observe);
      mo.observe(sd,{childList:true,subtree:true});
    }
  })();
  </script>

  <!-- ═══════════════════════════════════════════════════════════
       SERIES RENDERER
       ─────────────────────────────────────────────────────────
       Your series.js should call:  window.renderSmtvSeries(data)
       OR this file auto-loads from /series.json by ?series= slug.

       series.json episode shape:
         { num:1, title:"The Beginning", thumb:"ep1.jpg", link:"watch.html?ep=1" }
         (title is optional — omit for plain "Ep 1" cards)
  ═══════════════════════════════════════════════════════════ -->
  <script>
  (function(){
    'use strict';

    /* ── tiny HTML escape ── */
    function esc(s){
      return String(s==null?'':s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    /* ── Build one episode card ── */
    function buildCard(ep, delay){
      var lbl     = 'Ep ' + ep.num;
      var hasTitle = ep.title && String(ep.title).trim();
      var style    = delay ? ' style="animation-delay:' + delay + 's"' : '';

      var thumbHTML = ep.thumb
        ? '<img class="pro-ep-thumb-pro" src="' + esc(ep.thumb) + '" alt="' + esc(lbl) + '" loading="lazy">'
        : '<div style="position:absolute;inset:0;background:#0a1020;"></div>';

      /* Title line: "Ep 1" or "Ep 1 — Subtitle" */
      var titleHTML;
      if(hasTitle){
        titleHTML = '<span class="ep-title-num">' + esc(lbl) + '</span>'
                  + '<span class="ep-title-name"> \u2014 ' + esc(ep.title) + '</span>';
      } else {
        titleHTML = '<span class="ep-title-num">' + esc(lbl) + '</span>';
      }

      return '<a class="pro-episode-card-pro card-animate reveal"' + style
           + ' href="' + esc(ep.link||'#') + '">'
           + '<div class="pro-ep-thumb-wrap-pro">'
           + thumbHTML
           + '<span class="pro-ep-num-pro">' + esc(lbl) + '</span>'
           + '<div class="ep-play-overlay"><i class="fa-solid fa-play" style="margin-left:2px;"></i></div>'
           + '</div>'
           + '<div class="pro-ep-title-pro">' + titleHTML + '</div>'
           + '</a>';
    }

    /* ── Build scroll row from episode array ── */
    function buildRow(eps){
      return (eps||[]).map(function(ep,i){ return buildCard(ep, i*0.055); }).join('');
    }

    /* ── Main renderer ── */
    window.renderSmtvSeries = function(data){
      var mount = document.getElementById('series-details');
      if(!mount) return;

      var seasons    = data.seasons || [];
      var hasPremium = data.premium && data.premium.enabled;
      var hasHTW     = data.howToWatch && data.howToWatch.videos && data.howToWatch.videos.length;
      var html       = '';

      /* ─ 1. Header card ─ */
      html += '<div class="pro-series-header-pro">';

      /* Back button */
      html += '<a class="pro-series-back-btn-pro" href="' + esc(data.backLink||'series.html') + '" aria-label="Back">'
            + '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--cyan)">'
            + '<path d="M19 12H5M12 5l-7 7 7 7"/></svg></a>';

      /* Poster */
      var posterSrc = data.backdropImage || data.posterImage || '';
      if(posterSrc){
        html += '<img class="pro-series-poster-pro" src="' + esc(posterSrc) + '" alt="' + esc(data.title) + '">';
      } else {
        html += '<div class="pro-series-poster-pro" style="height:210px;background:linear-gradient(135deg,#0d1e30,#060c18);"></div>';
      }

      /* Overlays (JS appended below for posterSrc; here we inline them) */
      html += '<div class="poster-gradient-overlay"></div>';
      html += '<div class="poster-scan"></div>';

      /* Meta block */
      html += '<div class="pro-series-meta-pro">';
      html += '<h1 class="pro-series-title-pro">' + esc(data.title) + '</h1>';
      if(data.description){
        html += '<p class="pro-series-desc-pro">' + esc(data.description) + '</p>';
      }

      /* Stat badges */
      if(data.year || data.language || seasons.length){
        html += '<div class="series-stats-row">';
        if(seasons.length) html += '<span class="series-stat-badge stat-cyan"><i class="fa-solid fa-layer-group" style="font-size:.8em"></i>' + seasons.length + ' Season' + (seasons.length>1?'s':'') + '</span>';
        if(data.year)      html += '<span class="series-stat-badge stat-gold"><i class="fa-solid fa-calendar" style="font-size:.8em"></i>' + esc(data.year) + '</span>';
        if(data.language)  html += '<span class="series-stat-badge stat-green"><i class="fa-solid fa-language" style="font-size:.8em"></i>' + esc(data.language) + '</span>';
        html += '</div>';
      }

      /* ─ 2. VIP box ─ */
      if(hasPremium){
        html += '<div class="premium-channel-message reveal">'
              + '<div class="pcm-particle"></div><div class="pcm-particle"></div>'
              + '<div class="pcm-particle"></div><div class="pcm-particle"></div>'
              + '<div class="pcm-body">'
              + '<div class="pcm-title-row">'
              + '<span class="pcm-crown">&#x1F451;</span>'
              + '<span class="pcm-title-text">SMTV VIP Membership</span>'
              + '</div>'
              + '<div class="pcm-features">'
              + '<span class="pcm-feat pcm-feat-dark">&#x26A1; No Ads</span>'
              + '<span class="pcm-feat pcm-feat-dark">&#x2193; Fast Download</span>'
              + '<span class="pcm-feat pcm-feat-cyan">&#x1F512; Early Access</span>'
              + '<span class="pcm-feat pcm-feat-dark">&#x1F3AC; HD Quality</span>'
              + '</div>'
              + '<a href="' + esc(data.premium.link||'premium.html') + '" class="pcm-vip-btn">BECOME VIP</a>'
              + '</div></div>';
      }

      html += '</div>'; /* /meta */
      html += '</div>'; /* /header card */

      /* ─ 3. Season tabs ─ */
      if(seasons.length > 1){
        html += '<div class="pro-seasons-tabs-pro reveal" id="stabs">';
        seasons.forEach(function(s,i){
          html += '<button class="pro-season-tab-pro' + (i===0?' active':'') + '" data-si="' + i + '">'
                + esc(s.label || ('Season '+(i+1))) + '</button>';
        });
        html += '</div>';
      }

      /* ─ 4. Season panels ─ */
      seasons.forEach(function(s, si){
        var hasSrc   = s.sources && s.sources.length > 1;
        var firstEps = hasSrc ? (s.sources[0].episodes||[]) : (s.episodes||[]);

        html += '<div id="sp-' + si + '"' + (si>0?' style="display:none"':'') + ' class="reveal">';

        /* Source selector */
        if(hasSrc){
          html += '<div class="source-selector" id="src-' + si + '">';
          s.sources.forEach(function(src,ri){
            html += '<button class="source-btn' + (ri===0?' active':'') + '" data-si="' + si + '" data-ri="' + ri + '">'
                  + esc(src.label) + '</button>';
          });
          html += '</div>';
        }

        /* Episodes row */
        html += '<div class="pro-episodes-row-wrap-pro">'
              + '<div class="episodes-section-label">Episodes</div>'
              + '<div class="pro-episodes-row-pro row-visible" id="es-' + si + '">'
              + buildRow(firstEps)
              + '</div></div>';

        html += '</div>'; /* /sp */
      });

      /* ─ 5. How to Watch ─ */
      if(hasHTW){
        html += '<h2 class="pro-tutorial-title reveal">How to Watch Episodes</h2>';
        data.howToWatch.videos.forEach(function(v){
          html += '<div class="video-card-wrap reveal">'
                + (v.title ? '<div class="video-card-label">' + esc(v.title) + '</div>' : '')
                + '<div class="pro-video-frame-wrap">'
                + '<iframe src="' + esc(v.embedUrl) + '" allowfullscreen loading="lazy" title="' + esc(v.title||'How to Watch') + '"></iframe>'
                + '</div></div>';
        });
      }

      /* Extra bottom padding so last card isn't behind nav */
      html += '<div style="height:24px;"></div>';

      mount.innerHTML = html;

      /* ── Wire season tabs ── */
      document.querySelectorAll('.pro-season-tab-pro').forEach(function(btn){
        btn.addEventListener('click', function(){
          var idx = parseInt(this.dataset.si, 10);
          document.querySelectorAll('.pro-season-tab-pro').forEach(function(b){ b.classList.remove('active'); });
          this.classList.add('active');
          for(var i=0; i<seasons.length; i++){
            var p = document.getElementById('sp-'+i);
            if(p) p.style.display = (i===idx ? '' : 'none');
          }
        });
      });

      /* ── Wire source buttons ── */
      document.querySelectorAll('.source-btn').forEach(function(btn){
        btn.addEventListener('click', function(){
          var si  = parseInt(this.dataset.si, 10);
          var ri  = parseInt(this.dataset.ri, 10);
          var season = data.seasons[si];
          if(!season || !season.sources) return;

          document.querySelectorAll('.source-btn[data-si="'+si+'"]').forEach(function(b){ b.classList.remove('active'); });
          this.classList.add('active');

          var row = document.getElementById('es-'+si);
          if(!row) return;

          /* Animate out */
          row.classList.remove('row-visible');
          row.classList.add('row-switching');

          setTimeout(function(){
            row.innerHTML = buildRow(season.sources[ri].episodes||[]);
            row.classList.remove('row-switching');
            row.classList.add('row-visible');
            /* re-trigger scroll reveal for new cards */
            row.querySelectorAll('.reveal').forEach(function(el){ el.classList.add('show'); });
          }, 200);
        });
      });

      /* ── Immediately show all reveal items in viewport ── */
      setTimeout(function(){
        document.querySelectorAll('.reveal').forEach(function(el){ el.classList.add('show'); });
      }, 50);
    };

    /* ── Auto-load from /series.json by ?series= slug ── */
    function autoLoad(){
      var slug = new URLSearchParams(location.search).get('series');
      if(!slug){ renderDemo(); return; }
      fetch('/series.json')
        .then(function(r){ return r.json(); })
        .then(function(arr){
          var d = Array.isArray(arr) ? arr.find(function(x){ return x.slug===slug; }) : null;

  <!-- ═══════════════════════════════════════════════════════════
       FOOTER LOADER
  ═══════════════════════════════════════════════════════════ -->
  <script>
  (async function(){
    var paths = ['/includes/footer.html','includes/footer.html','./includes/footer.html','/footer.html','footer.html'];
    var ph    = document.getElementById('footer-placeholder');

    function initNav(html){
      try {
        ph.innerHTML = html;
        try{
          var p = parseInt(getComputedStyle(document.body).paddingBottom)||0;
          if(p<96) document.body.style.paddingBottom='calc(96px + env(safe-area-inset-bottom))';
        }catch(e){}

        var nav   = ph.querySelector('#smtv-bottom-nav,.smtv-bottom-nav');
        if(!nav) return;
        var items = Array.from(nav.querySelectorAll('.nav-item'));
        items.forEach(function(i){ i.classList.remove('active'); });

        var si = items.find(function(i){
          return (i.dataset.name||'').toLowerCase()==='series'
              || (i.getAttribute('href')||'').includes('series');
        });
        if(new URLSearchParams(location.search).has('series') && si) si.classList.add('active');
        else {
          var pp = location.pathname.toLowerCase();
          var bp = items.find(function(i){ return (i.getAttribute('href')||'').toLowerCase().includes(pp.split('/').pop()); });
          if(bp) bp.classList.add('active'); else if(si) si.classList.add('active');
        }

        items.forEach(function(a){
          if(a._si) return; a._si=true;
          a.addEventListener('click', function(e){
            try{ e.preventDefault&&e.preventDefault(); }catch(x){}
            items.forEach(function(i){ i.classList.remove('active'); });
            this.classList.add('active');
            try{ localStorage.setItem('smtv_last_nav', this.dataset.name||this.getAttribute('href')); }catch(e){}
            var h=this.getAttribute('href'); if(h) location.assign(h);
          },{passive:false});
        });
      } catch(e){ console.warn('footer initNav',e); }
    }

    for(var i=0; i<paths.length; i++){
      try{
        var r = await fetch(paths[i],{cache:'no-cache'});
        if(!r.ok) continue;
        initNav(await r.text()); return;
      }catch(e){ continue; }
    }

    /* Fallback inline nav */
    ph.innerHTML = `
      <nav class="smtv-bottom-nav" id="smtv-bottom-nav" role="navigation" aria-label="Main">
        <a href="/index.html"   class="nav-item" data-name="home">
          <span class="icon-wrap"><i class="fa-solid fa-house"></i></span>
          <span class="label">Home</span>
        </a>
        <a href="/series.html"  class="nav-item active" data-name="series">
          <span class="icon-wrap"><i class="fa-solid fa-film"></i></span>
          <span class="label">Series</span>
        </a>
        <a href="/clips.html"   class="nav-item" data-name="clips">
          <span class="icon-wrap"><i class="fa-solid fa-circle-play"></i></span>
          <span class="label">Clips</span>
        </a>
        <a href="/premium.html" class="nav-item" data-name="premium">
          <span class="icon-wrap"><i class="fa-solid fa-star"></i></span>
          <span class="label">Premium</span>
        </a>
        <a href="/more.html"    class="nav-item" data-name="more">
          <span class="icon-wrap"><i class="fa-solid fa-circle-info"></i></span>
          <span class="label">More</span>
        </a>
      </nav>`;
    try{ document.body.style.paddingBottom='calc(96px + env(safe-area-inset-bottom))'; }catch(e){}
  })();
  </script>
