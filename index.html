      border-color: rgba(35,198,237,0.4); color: var(--cyan);
    }

    /* ===== SERIES GRID ===== */
    .series-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr));
      gap: 12px; padding: 16px;
    }
    .card {
      background: var(--dark3); border-radius: var(--card-radius);
      overflow: hidden; text-decoration: none; color: inherit;
      border: 1px solid rgba(255,255,255,0.07);
      box-shadow: 0 3px 14px rgba(0,0,0,0.3);
      transition: all 0.25s ease; display: block;
    }
    .card:hover {
      transform: translateY(-4px); border-color: rgba(35,198,237,0.4);
      box-shadow: var(--glow-cyan), 0 10px 30px rgba(0,0,0,0.5);
    }
    .card img {
      width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block;
      transition: transform 0.3s;
    }
    .card:hover img { transform: scale(1.04); }
    .card .title {
      padding: 8px 10px 10px; font-size: 0.8rem; font-weight: 700;
      color: #e0eaf5; line-height: 1.3;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }

    /* ===== ENTRY ANIMATIONS ===== */
    @keyframes cardEnter {
      from { opacity: 0; transform: translateY(16px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .card, .rec-card, .episode-card-new, .schedule-card {
      animation: cardEnter 0.4s ease both;
    }

    /* ===== SCROLLBAR for containers ===== */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(35,198,237,0.25); border-radius: 4px; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 480px) {
      .recommended-grid { grid-template-columns: repeat(auto-fill, minmax(130px,1fr)); gap: 10px; padding: 4px 12px 14px; }

      .episode-card-new { flex: 0 0 145px; }

    }
    @media (max-width: 360px) {
      .recommended-grid { grid-template-columns: repeat(2, 1fr); }
      .series-grid { grid-template-columns: repeat(2, 1fr); }
    }

  <!-- Watch Now Shortlink Handler -->
  <script>
  (function setupWatchNowHandlers(){
    let featureConfig=null;
    fetch('/config.json',{cache:'no-cache'}).then(r=>r.ok?r.json():null).then(c=>{if(c)featureConfig=c.redirectionFeatures;}).catch(()=>{});
    const id=setInterval(()=>{
      const btns=document.querySelectorAll('.watch-btn-new');
      if(btns.length>0){
        clearInterval(id);
        btns.forEach(btn=>{
          const orig=btn.getAttribute('href');
          btn.addEventListener('click',async function(e){
            if(!featureConfig||!featureConfig.shortlink||featureConfig.sponsorPopup)return;
            e.preventDefault();
            try{
              const url=new URL(orig,window.location.origin);
              const p=new URLSearchParams(url.search);
              const series=p.get('series'),season=p.get('season'),ep=p.get('ep'),lang=p.get('lang');
              let jf=`episode-data/${series}-s${season}`;
              if(lang&&lang!=='dub')jf+=`-${lang}`;
              jf+='.json';
              const r=await fetch(jf);
              if(!r.ok){window.location.href=orig;return;}
              const eps=await r.json();
              const episode=eps.find(e=>String(e.ep)===String(ep));
              if(episode&&episode.shortlink){window.location.href=episode.shortlink;}
              else{window.location.href=orig;}
            }catch(err){window.location.href=orig;}
          });
        });
      }
    },100);
    setTimeout(()=>clearInterval(id),5000);
  })();
  </script>

  <script>
  (async function loadFooterAndInit(){
    if(document.readyState!=='complete'){await new Promise(r=>window.addEventListener('load',r,{once:true}));}
    try{
      const res=await fetch('/includes/footer.html');
      if(!res.ok)throw new Error('Footer not found');
      document.getElementById('footer-placeholder').innerHTML=await res.text();
      const nav=document.getElementById('smtv-bottom-nav');
      if(!nav)return;
      const items=Array.from(nav.querySelectorAll('.nav-item'));
      function clearActive(){items.forEach(i=>i.classList.remove('active'));}
      const path=window.location.pathname.toLowerCase();
      let matched=items.find(a=>{const n=(a.dataset.name||'').toLowerCase();if(n==='home'&&(path==='/'||path.includes('index')))return true;return n&&path.includes(n);});
      if(!matched){const last=localStorage.getItem('smtv_last_nav');if(last)matched=items.find(a=>a.dataset.name===last);}
      if(matched)matched.classList.add('active');
      items.forEach(a=>{a.addEventListener('click',function(e){clearActive();this.classList.add('active');try{localStorage.setItem('smtv_last_nav',this.dataset.name);}catch(e){}const href=this.getAttribute('href');setTimeout(()=>{if(location.pathname.toLowerCase()!==new URL(href,location.origin).pathname.toLowerCase())location.href=href;},200);},{passive:true});});
      try{const curPad=parseInt(getComputedStyle(document.body).paddingBottom)||0;if(curPad<96)document.body.style.paddingBottom='calc(96px + env(safe-area-inset-bottom))';}catch(e){}
    }catch(err){console.warn('Footer error:',err);}
  })();
