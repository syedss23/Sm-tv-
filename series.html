<!DOCTYPE html>
<html lang="en">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-WM3KEDD127"></script>

  <meta charset="UTF-8">
  <title>SmTv Urdu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Watch Turkish drama series and historical shows in Urdu on SmTv Urdu.">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800;900&family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600;1,700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap" rel="stylesheet" />

  <style>
    /* ═══════════════════════════════════════════
       TOKENS
    ═══════════════════════════════════════════ */
    :root {
      --bg:        #04080f;
      --bg2:       #07101c;
      --bg3:       #0b1828;
      --border:    rgba(255,255,255,.07);
      --border-hi: rgba(255,255,255,.13);
      --gold:      #e8a800;
      --gold-lt:   #ffc93c;
      --gold-dim:  #b07f00;
      --gold-glow: rgba(232,168,0,.3);
      --cyan:      #00c8f0;
      --cyan-glow: rgba(0,200,240,.28);
      --green:     #00d98b;
      --txt:       #d8e8f8;
      --txt-muted: #4e6880;
      --txt-soft:  #7a99b0;
      --ease:      cubic-bezier(.22,.68,0,1.2);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--txt);
      font-family: 'DM Sans', 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      min-height: 100dvh;
    }

    /* ── Animated grid background ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(0,200,240,.016) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,200,240,.016) 1px, transparent 1px);
      background-size: 52px 52px;
      mask-image: radial-gradient(ellipse 100% 55% at 50% 0%, black 20%, transparent);
    }
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 65% 45% at 88% 8%,  rgba(232,168,0,.1) 0%, transparent 65%),
        radial-gradient(ellipse 55% 45% at 8%  75%, rgba(0,200,240,.07) 0%, transparent 65%);
      animation: bg-breathe 14s ease-in-out infinite;
    }

    /* ── Keyframes ── */
    @keyframes bg-breathe   { 0%,100%{opacity:1} 50%{opacity:.6} }
    @keyframes fade-up      { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fade-up-sm   { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fade-in      { from{opacity:0} to{opacity:1} }
    @keyframes shimmer      { 0%{background-position:-200% center} 100%{background-position:200% center} }
    @keyframes btn-shine    { 0%{left:-100%} 55%,100%{left:150%} }
    @keyframes dot-blink    { 0%,100%{opacity:1} 50%{opacity:.2} }
    @keyframes float-bell   { 0%,100%{transform:translateY(0) rotate(-4deg)} 50%{transform:translateY(-5px) rotate(4deg)} }
    @keyframes card-in      { from{opacity:0;transform:translateY(16px) scale(.96)} to{opacity:1;transform:translateY(0) scale(1)} }
    @keyframes premium-in   { from{opacity:0;transform:translateY(12px) scale(.98)} to{opacity:1;transform:translateY(0) scale(1)} }
    @keyframes scan-line    { 0%{top:-10%} 100%{top:110%} }
    @keyframes title-glow   { 0%,100%{text-shadow:0 2px 20px rgba(0,0,0,.5)} 50%{text-shadow:0 2px 20px rgba(0,0,0,.5),0 0 36px rgba(232,168,0,.15)} }
    @keyframes underline-in { from{transform:scaleX(0);transform-origin:left} to{transform:scaleX(1);transform-origin:left} }
    @keyframes particle-f   { 0%{transform:translateY(0) translateX(0);opacity:.4} 50%{transform:translateY(-8px) translateX(4px);opacity:.8} 100%{transform:translateY(0) translateX(0);opacity:.4} }
    @keyframes gold-shimmer { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

    /* reveal-on-scroll */
    .reveal-item { opacity:0; transform:translateY(10px); transition:opacity .45s var(--ease), transform .45s var(--ease); }
    .reveal-item.show { opacity:1; transform:translateY(0); }

    /* ── Layout ── */
    #main-content { max-width:900px; margin:0 auto; padding:14px 14px 0; position:relative; z-index:1; }
    #series-details { animation:fade-up .55s var(--ease) .1s both; }

    /* ═══════════════════════════════════════════
       SERIES HEADER
    ═══════════════════════════════════════════ */
    .pro-series-header-pro {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      border-radius: 20px;
      background: transparent;
      position: relative;
      margin-bottom: 22px;
      animation: fade-up .65s var(--ease) both;
      /* NO overflow:hidden — let poster breathe */
      overflow: visible;
    }

    /* ── POSTER — THE DEFINITIVE FIX ──
       series.js outputs: <img class="pro-series-poster-pro" src="..." alt="...">
       No inline styles. So pure CSS wins here.
       object-fit:contain = full image visible, no crop.
       background fills empty areas with a dark tone.
    ── */
    .pro-series-poster-pro {
      width: 100%;
      height: 210px;
      border-radius: 20px 20px 0 0;
      object-fit: contain;
      object-position: center center;
      display: block;
      flex-shrink: 0;
      /* dark warm bg — not black, matches the page */
      background: radial-gradient(ellipse 80% 80% at 50% 40%, #111e30 0%, #060c16 100%);
    }

    /* gradient fade at bottom of poster into meta */
    .smtv-poster-fade {
      position: absolute;
      left: 0; right: 0;
      height: 80px;
      background: linear-gradient(to bottom, transparent, var(--bg2));
      pointer-events: none;
      z-index: 2;
      border-radius: 0;
    }

    /* cinematic scan line */
    .smtv-scan {
      position: absolute;
      left: 0; right: 0;
      top: 0;
      height: 36px;
      background: linear-gradient(to bottom, rgba(0,200,240,.05), transparent);
      animation: scan-line 8s linear infinite;
      pointer-events: none;
      z-index: 3;
      border-radius: 20px 20px 0 0;
      overflow: hidden;
    }

    /* ── Back button ── */
    .pro-series-back-btn-pro {
      position: absolute;
      left: 12px; top: 12px; z-index: 10;
      width: 40px; height: 40px;
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 10px;
      background: rgba(4,8,15,.85);
      border: 1px solid var(--border-hi);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      text-decoration: none;
      transition: background .22s, border-color .22s, transform .18s;
      box-shadow: 0 4px 16px rgba(0,0,0,.55);
    }
    .pro-series-back-btn-pro:hover {
      background: rgba(0,200,240,.18);
      border-color: rgba(0,200,240,.45);
      transform: translateX(-2px);
    }

    /* ── Meta box ── */
    .pro-series-meta-pro {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 20px 20px;
      padding: 22px 20px 24px;
      text-align: center;
      position: relative; z-index: 3;
    }
    /* subtle divider line at top of meta (not ugly top line) */
    .pro-series-meta-pro::before {
      content: '';
      position: absolute; top: 0; left: 12%; right: 12%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,200,240,.2), transparent);
    }

    /* ── Series title — Cinzel, animated glow ── */
    .pro-series-title-pro {
      font-family: 'Cinzel', serif !important;
      font-size: clamp(1.2em, 4.5vw, 1.9em) !important;
      font-weight: 800 !important;
      color: #fff !important;
      margin: 0 0 10px !important;
      letter-spacing: .06em !important;
      line-height: 1.2 !important;
      animation: title-glow 5s ease-in-out infinite, fade-up-sm .6s var(--ease) both;
    }

    .pro-series-desc-pro {
      font-size: .875em;
      color: var(--txt-soft);
      line-height: 1.7;
      max-width: 640px;
      margin: 0 auto 18px;
    }

    /* ═══════════════════════════════════════════
       PREMIUM CHANNEL MESSAGE
       — series.js raw HTML:
         <div class="premium-channel-message">
           <strong>Go Ad-Free!</strong> Get direct access...
           <div class="premium-btn-row"><a href="/premium.html" class="btn-primary">Join Premium</a></div>
         </div>
       Our patch replaces innerHTML entirely.
    ═══════════════════════════════════════════ */
    .premium-channel-message {
      position: relative;
      overflow: hidden;
      border-radius: 16px;
      background: linear-gradient(145deg, #0f1d2e 0%, #08121e 100%);
      border: 1px solid rgba(232,168,0,.28);
      margin-top: 6px;
      animation: premium-in .65s var(--ease) .3s both;
      box-shadow: 0 8px 32px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.04);
    }

    /* gold shimmer top border */
    .premium-channel-message::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold-dim), var(--gold), var(--gold-lt), var(--gold-dim), transparent);
      background-size: 200% auto;
      animation: shimmer 2.5s linear infinite;
    }

    /* ambient corner glow */
    .premium-channel-message::after {
      content: '';
      position: absolute; top: -40px; right: -40px;
      width: 150px; height: 150px;
      background: radial-gradient(circle, rgba(232,168,0,.16) 0%, transparent 65%);
      pointer-events: none;
    }

    /* ── Floating gold particles ── */
    .pcm-particles { position: absolute; inset: 0; pointer-events: none; overflow: hidden; border-radius: 15px; }
    .pcm-particle { position: absolute; width: 3px; height: 3px; border-radius: 50%; background: var(--gold); opacity: .35; }
    .pcm-particle:nth-child(1) { top:20%; left:6%;   animation: particle-f 3.4s ease-in-out infinite; }
    .pcm-particle:nth-child(2) { top:70%; left:12%;  animation: particle-f 4s ease-in-out infinite .5s; }
    .pcm-particle:nth-child(3) { top:30%; right:10%; animation: particle-f 3.7s ease-in-out infinite 1.1s; background:var(--cyan); }
    .pcm-particle:nth-child(4) { top:75%; right:18%; animation: particle-f 2.8s ease-in-out infinite .3s; }

    /* ── TOP ROW: icon + text side by side ── */
    .pcm-top {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 18px 10px;
      position: relative; z-index: 1;
    }

    .pcm-icon {
      flex-shrink: 0;
      width: 50px; height: 50px;
      border-radius: 13px;
      background: linear-gradient(145deg, rgba(232,168,0,.22), rgba(232,168,0,.07));
      border: 1px solid rgba(232,168,0,.35);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5em;
      box-shadow: 0 4px 18px rgba(232,168,0,.2);
      animation: float-bell 3s ease-in-out infinite;
    }

    .pcm-text-col { flex: 1; text-align: left; }

    .pcm-headline {
      font-size: .92em;
      font-weight: 800;
      color: #fff;
      line-height: 1.25;
      margin-bottom: 3px;
    }
    /* animated gold gradient on keyword */
    .pcm-headline .pcm-vip {
      background: linear-gradient(90deg, var(--gold), var(--gold-lt), var(--gold));
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gold-shimmer 2.5s linear infinite;
    }

    .pcm-sub {
      font-size: .75em;
      color: var(--txt-muted);
      line-height: 1.45;
    }

    /* ── Feature pills ── */
    .pcm-pills {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      padding: 0 18px 12px;
      position: relative; z-index: 1;
    }
    .pcm-pill {
      font-size: .68em;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 100px;
      white-space: nowrap;
      letter-spacing: .03em;
    }
    .pcm-pill-gold  { background: rgba(232,168,0,.1);  border: 1px solid rgba(232,168,0,.22);  color: var(--gold-lt); }
    .pcm-pill-cyan  { background: rgba(0,200,240,.08); border: 1px solid rgba(0,200,240,.18);  color: var(--cyan); }
    .pcm-pill-green { background: rgba(0,217,139,.08); border: 1px solid rgba(0,217,139,.18);  color: var(--green); }

    /* ── CTA row ── */
    .pcm-cta {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 4px 18px 18px;
      position: relative; z-index: 1;
    }

    /* JOIN button */
    .pcm-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      flex: 1;
      padding: 12px 18px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-lt) 60%, #ffdc70 100%);
      color: #1a0800;
      font-weight: 900;
      font-size: .84em;
      font-family: 'DM Sans', sans-serif;
      letter-spacing: .04em;
      text-decoration: none;
      position: relative; overflow: hidden;
      box-shadow: 0 4px 22px var(--gold-glow), inset 0 1px 0 rgba(255,255,255,.32);
      transition: box-shadow .22s, transform .15s;
      border: none; cursor: pointer;
    }
    .pcm-btn::before {
      content: '';
      position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.38), transparent);
      animation: btn-shine 2.2s ease-in-out infinite;
    }
    .pcm-btn:hover { box-shadow: 0 7px 28px rgba(232,168,0,.6); transform: translateY(-2px) scale(1.02); }
    .pcm-btn:active { transform: scale(.96); }

    /* live count */
    .pcm-count {
      text-align: center;
      flex-shrink: 0;
    }
    .pcm-count-num {
      font-size: .85em;
      font-weight: 800;
      color: #fff;
      display: block;
    }
    .pcm-count-label {
      font-size: .66em;
      color: var(--txt-muted);
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }
    .pcm-count-label::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      display: inline-block;
      box-shadow: 0 0 6px var(--green);
      animation: dot-blink 1.8s ease-in-out infinite;
    }

    @media (max-width: 440px) {
      .pcm-top { padding: 15px 14px 8px; gap: 12px; }
      .pcm-icon { width: 44px; height: 44px; font-size: 1.3em; }
      .pcm-pills { padding: 0 14px 10px; }
      .pcm-cta { padding: 2px 14px 16px; }
    }

    /* ═══════════════════════════════════════════
       SEASON TABS — pill shape
    ═══════════════════════════════════════════ */
    .pro-seasons-tabs-pro {
      display: flex; gap: 8px; justify-content: center;
      flex-wrap: wrap; margin: 20px 0 14px;
    }
    .pro-season-tab-pro {
      background: var(--bg2); border: 1px solid var(--border-hi);
      color: var(--txt-muted); padding: 9px 22px; border-radius: 100px;
      cursor: pointer; font-weight: 700; font-size: .85em;
      font-family: 'DM Sans', sans-serif; letter-spacing: .03em;
      transition: all .22s var(--ease); outline: none;
    }
    .pro-season-tab-pro:hover:not(.active) {
      border-color: rgba(0,200,240,.35); color: var(--txt);
      background: rgba(0,200,240,.07); transform: translateY(-1px);
    }
    .pro-season-tab-pro.active {
      background: linear-gradient(135deg, var(--cyan), #0090b8);
      border-color: transparent; color: #021018; font-weight: 800;
      transform: translateY(-2px); box-shadow: 0 6px 24px var(--cyan-glow);
    }
    .pro-season-tab-pro:active { transform: scale(.96); }

    /* ═══════════════════════════════════════════
       SOURCE SELECTOR
    ═══════════════════════════════════════════ */
    .source-selector { display: flex; gap: 8px; justify-content: center; margin: 0 0 18px; flex-wrap: wrap; }
    .source-btn {
      background: var(--bg3); border: 1px solid var(--border-hi); color: var(--txt-muted);
      padding: 7px 20px; border-radius: 7px; font-size: .83em; font-weight: 700;
      font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all .22s var(--ease); outline: none;
    }
    .source-btn:hover:not(.active) { border-color: rgba(0,200,240,.35); color: var(--txt); background: rgba(0,200,240,.07); }
    .source-btn.active {
      background: linear-gradient(135deg, var(--cyan), #0090b8); border-color: transparent;
      color: #021018; font-weight: 800; box-shadow: 0 4px 16px var(--cyan-glow); transform: translateY(-1px);
    }
    .source-btn:active { transform: scale(.96); }

    /* ═══════════════════════════════════════════
       EPISODES ROW WRAP
    ═══════════════════════════════════════════ */
    .pro-episodes-row-wrap-pro { margin-top: 6px; padding-bottom: 10px; transition: opacity .2s ease; }
    .pro-episodes-row-wrap-pro.is-loading { opacity: .5; pointer-events: none; }
    /* Kill the default ::before "Episodes" text series.js injects via its own CSS */
    .pro-episodes-row-wrap-pro::before { display: none !important; content: none !important; }

    /* Our custom section label */
    .smtv-ep-label {
      display: flex; align-items: center; gap: 10px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1em; font-weight: 700; font-style: italic;
      letter-spacing: .07em; color: var(--cyan);
      text-transform: uppercase; margin-bottom: 14px; padding-left: 2px;
    }
    .smtv-ep-label::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(to right, rgba(0,200,240,.3), transparent);
    }

    /* Scroll row */
    .pro-episodes-row-pro {
      display: flex; gap: 12px; overflow-x: auto; padding: 4px 2px 16px;
      -webkit-overflow-scrolling: touch; scroll-snap-type: x proximity;
      align-items: flex-start; scrollbar-width: thin;
      scrollbar-color: rgba(0,200,240,.22) transparent;
    }
    .pro-episodes-row-pro::-webkit-scrollbar { height: 4px; }
    .pro-episodes-row-pro::-webkit-scrollbar-track { background: transparent; }
    .pro-episodes-row-pro::-webkit-scrollbar-thumb { background: rgba(0,200,240,.22); border-radius: 4px; }

    /* fade hint on right edge */
    .smtv-row-wrap { position: relative; }
    .smtv-row-wrap::after {
      content: ''; position: absolute; top: 0; right: 0; bottom: 16px; width: 52px;
      background: linear-gradient(to right, transparent, var(--bg));
      pointer-events: none; z-index: 3;
    }

    /* ═══════════════════════════════════════════
       EPISODE CARD
    ═══════════════════════════════════════════ */
    .pro-episode-card-pro {
      scroll-snap-align: start;
      flex: 0 0 150px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      text-decoration: none;
      color: var(--txt);
      border-radius: 14px;
      background: var(--bg2);
      border: 1px solid var(--border);
      overflow: hidden;
      transition: transform .28s var(--ease), box-shadow .28s ease, border-color .28s ease !important;
      position: relative;
    }
    .pro-episode-card-pro:hover {
      transform: translateY(-7px) scale(1.03);
      box-shadow: 0 18px 44px rgba(0,0,0,.65), 0 0 0 1px rgba(0,200,240,.35);
      border-color: rgba(0,200,240,.4);
    }
    .pro-episode-card-pro:active { transform: scale(.96); }

    /* cyan shimmer on top edge */
    .pro-episode-card-pro::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      opacity: 0; transition: opacity .22s; z-index: 5; pointer-events: none;
    }
    .pro-episode-card-pro:hover::before { opacity: 1; }

    /* stagger entrance */
    .smtv-card-in { animation: card-in .45s var(--ease) both; }

    @media (max-width: 420px) { .pro-episode-card-pro { flex: 0 0 132px; } }
    @media (min-width: 900px) { .pro-episode-card-pro { flex: 0 0 178px; } }

    /* ═══════════════════════════════════════════
       THUMBNAIL — ROOT CAUSE FIXED

       series.js generates EXACTLY this (no inline styles on img):
         <div class="pro-ep-thumb-wrap-pro">
           <img class="pro-ep-thumb-pro" src="..." alt="...">
           <span class="pro-ep-num-pro">Ep N</span>
         </div>

       series.js also injects this style into <head>:
         .reveal-item { opacity: 0; transform: translateY(10px); }
         .pro-episode-card-pro { transition: transform .28s ease, opacity .28s ease; }

       The card IS a .reveal-item — so the CARD starts opacity:0.
       series.js adds class "show" via setTimeout which restores opacity.
       The thumbnail was never the bug — it was the card opacity.
       
       But ALSO: if the img hasn't loaded yet, the wrapper shows its
       background. That's why we set a warm non-black background on wrapper.

       FIX STRATEGY:
       1. Fixed pixel height on wrapper (most reliable cross-browser)
       2. img is position:absolute, fills wrapper completely
       3. Warm gradient background on wrapper (not black)
       4. !important on everything to beat style.css conflicts
    ═══════════════════════════════════════════ */
    .pro-ep-thumb-wrap-pro {
      width:     100%      !important;
      height:    94px      !important;  /* 150px × 62.5% = 93.75px */
      display:   block     !important;
      position:  relative  !important;
      overflow:  hidden    !important;
      flex-shrink: 0       !important;
      /* Warm dark gradient — NOT pure black */
      background: linear-gradient(145deg, #0e1e30 0%, #091520 60%, #060f1a 100%) !important;
    }

    /* Skeleton shimmer while image loads */

<!-- ═══════════════════════════════════════════════════════════
     PATCH SCRIPT — runs after every DOM mutation from series.js
     Now that we've READ series.js, we know EXACTLY what it emits.
═══════════════════════════════════════════════════════════ -->
<script>
(function SmTvPatch() {

  /* ─── 1. Fix poster ─── */
  function patchPoster() {
    const img = document.querySelector('.pro-series-poster-pro');
    if (!img || img._sp) return;
    img._sp = true;

    /* Pure CSS handles this, but belt-and-suspenders inline override */
    img.style.setProperty('width',          '100%',             'important');
    img.style.setProperty('height',         '210px',            'important');
    img.style.setProperty('object-fit',     'contain',          'important');
    img.style.setProperty('object-position','center center',    'important');
    img.style.setProperty('display',        'block',            'important');
    img.style.setProperty('border-radius',  '20px 20px 0 0',    'important');

    /* Inject fade overlay + scan line once */
    const hdr = img.closest('.pro-series-header-pro');
    if (hdr && !hdr.querySelector('.smtv-poster-fade')) {
      /* position the overlay at the bottom of the poster */
      const fade = document.createElement('div');
      fade.className = 'smtv-poster-fade';
      /* calculate top = poster height */
      fade.style.cssText = 'position:absolute;left:0;right:0;top:130px;height:80px;background:linear-gradient(to bottom,transparent,#07101c);pointer-events:none;z-index:2;';
      hdr.style.position = 'relative';
      hdr.appendChild(fade);

      const scan = document.createElement('div');
      scan.className = 'smtv-scan';
      hdr.appendChild(scan);
    }
  }

  /* ─── 2. Fix title font (series.js escapes text, no inline styles) ─── */
  function patchTitle() {
    document.querySelectorAll('.pro-series-title-pro:not([data-smtv-font])').forEach(el => {
      el.setAttribute('data-smtv-font', '1');
      el.style.setProperty('font-family', "'Cinzel', serif", 'important');
      el.style.setProperty('letter-spacing', '.06em', 'important');
    });
  }

  /* ─── 3. Fix thumbnails ───
     series.js HTML:
       <div class="pro-ep-thumb-wrap-pro">
         <img class="pro-ep-thumb-pro" src="thumb.jpg" alt="Episode 1">
         <span class="pro-ep-num-pro">Ep 1</span>
       </div>
     No inline styles on the img — CSS with !important handles it.
     JS patch only adds the play overlay element.
  ─── */
  function patchThumbs() {
    document.querySelectorAll('.pro-ep-thumb-wrap-pro:not([data-smtv])').forEach(wrap => {
      wrap.setAttribute('data-smtv', '1');

      /* Ensure no stray inline background:black from anywhere */
      if (wrap.style.backgroundColor === 'black' || wrap.style.backgroundColor === '#000000' ||
          wrap.style.backgroundColor === 'rgb(0,0,0)' || wrap.style.backgroundColor === 'rgb(0, 0, 0)') {
        wrap.style.backgroundColor = '';
      }

      /* Force via setProperty with important to beat ANY conflicting rule */
      wrap.style.setProperty('width',       '100%',     'important');
      wrap.style.setProperty('height',      '94px',     'important');
      wrap.style.setProperty('display',     'block',    'important');
      wrap.style.setProperty('position',    'relative', 'important');
      wrap.style.setProperty('overflow',    'hidden',   'important');
      wrap.style.setProperty('flex-shrink', '0',        'important');

      /* Fix the img */
      const img = wrap.querySelector('.pro-ep-thumb-pro, img');
      if (img) patchThumbImg(img);

      /* Add play overlay */
      if (!wrap.querySelector('.smtv-play')) {
        const pl = document.createElement('div');
        pl.className = 'smtv-play';
        pl.textContent = '▶';
        wrap.appendChild(pl);
      }
    });
  }

  function patchThumbImg(img) {
    if (img._si) return;
    img._si = true;
    img.style.setProperty('position',        'absolute', 'important');
    img.style.setProperty('top',             '0',        'important');
    img.style.setProperty('left',            '0',        'important');
    img.style.setProperty('right',           '0',        'important');
    img.style.setProperty('bottom',          '0',        'important');
    img.style.setProperty('width',           '100%',     'important');
    img.style.setProperty('height',          '100%',     'important');
    img.style.setProperty('object-fit',      'cover',    'important');
    img.style.setProperty('object-position', 'center',   'important');
    img.style.setProperty('display',         'block',    'important');
    img.style.setProperty('z-index',         '2',        '');

    img.addEventListener('error', function() { this.style.opacity = '0'; }, { once: true });
  }

  /* ─── 4. Upgrade premium message ───
     series.js raw output:
       <div class="premium-channel-message">
         <strong>Go Ad-Free!</strong> Get direct access to all episodes by
         joining our <strong>Premium Channel</strong>.
         <div class="premium-btn-row">
           <a href="/premium.html" class="btn-primary" rel="noopener">Join Premium</a>
         </div>
       </div>
     We completely replace innerHTML with our design.
  ─── */
  function patchPremium() {
    document.querySelectorAll('.premium-channel-message:not([data-smtv])').forEach(pcm => {
      pcm.setAttribute('data-smtv', '1');

      pcm.innerHTML = `
        <div class="pcm-particles">
          <div class="pcm-particle"></div>
          <div class="pcm-particle"></div>
          <div class="pcm-particle"></div>
          <div class="pcm-particle"></div>
        </div>
        <div class="pcm-top">
          <div class="pcm-icon">⭐</div>
          <div class="pcm-text-col">
            <div class="pcm-headline">Become a <span class="pcm-vip">SmTv VIP</span> Member</div>
            <div class="pcm-sub">Ad-free episodes, early access &amp; direct streaming — always free to join.</div>
          </div>
        </div>
        <div class="pcm-pills">
          <span class="pcm-pill pcm-pill-gold">⚡ No Ads</span>
          <span class="pcm-pill pcm-pill-cyan">🎬 Early Access</span>
          <span class="pcm-pill pcm-pill-green">🆓 Free to Join</span>
          <span class="pcm-pill pcm-pill-gold">📲 Instant Alerts</span>
        </div>
        <div class="pcm-cta">
          <a href="/premium.html" class="pcm-btn" rel="noopener">
            <i class="fa-solid fa-crown"></i> Join VIP Now
          </a>
          <div class="pcm-count">
            <span class="pcm-count-num">12K+</span>
            <span class="pcm-count-label">members</span>
          </div>
        </div>`;
    });
  }

  /* ─── 5. Episode section label ─── */
  function patchEpLabel() {
    document.querySelectorAll('.pro-episodes-row-wrap-pro:not([data-smtv-lbl])').forEach(wrap => {
      wrap.setAttribute('data-smtv-lbl', '1');
      const lbl = document.createElement('div');
      lbl.className = 'smtv-ep-label';
      lbl.textContent = 'Episodes';
      wrap.insertBefore(lbl, wrap.firstChild);
    });
  }

  /* ─── 6. Episode row fade wrap ─── */
  function patchRowWrap() {
    document.querySelectorAll('.pro-episodes-row-pro:not([data-smtv-w])').forEach(row => {
      row.setAttribute('data-smtv-w', '1');
      if (!row.parentElement.classList.contains('smtv-row-wrap')) {
        const w = document.createElement('div');
        w.className = 'smtv-row-wrap';
        row.parentNode.insertBefore(w, row);
        w.appendChild(row);
      }
    });
  }

  /* ─── 7. Card stagger entrance ─── */
  function patchCards() {
    document.querySelectorAll('.pro-episode-card-pro:not([data-smtv-c])').forEach((card, i) => {
      card.setAttribute('data-smtv-c', '1');
      card.style.animationDelay = `${i * 0.055}s`;
      card.classList.add('smtv-card-in');
    });
  }

  /* ─── 8. Tutorial font ─── */
  function patchTutorial() {
    document.querySelectorAll('.pro-tutorial-title:not([data-smtv-t])').forEach(el => {
      el.setAttribute('data-smtv-t', '1');
      el.style.setProperty('font-family',     "'Cormorant Garamond', serif", 'important');
      el.style.setProperty('font-style',      'italic', 'important');
      el.style.setProperty('font-size',       '1.35em', 'important');
      el.style.setProperty('letter-spacing',  '.03em',  'important');
    });
  }

  /* ─── Master scan ─── */
  function scan() {
    patchPoster();
    patchTitle();
    patchThumbs();
    patchPremium();
    patchEpLabel();
    patchRowWrap();
    patchCards();
    patchTutorial();
  }

  const obs = new MutationObserver(scan);
  obs.observe(document.documentElement, { childList: true, subtree: true });
  scan();
  setTimeout(() => obs.disconnect(), 15000);

})();
</script>

<!-- PREVENT AUTO-SCROLL -->
<script>
(function(){
  try{window.scrollTo(0,0);}catch(e){}
  document.addEventListener('focusin', function(){
    const x=window.scrollX||0, y=window.scrollY||0;
    setTimeout(()=>{ try{window.scrollTo(x,y);}catch(e){} }, 0);
  }, true);
  const det = document.getElementById('series-details');
  if(det){
    const o = new MutationObserver(()=>{
      if(det.childNodes.length > 0){
        try{window.scrollTo({top:0,left:0,behavior:'auto'});}catch(e){window.scrollTo(0,0);}
        o.disconnect();
      }
    });
    o.observe(det, {childList:true, subtree:false});
  }
})();
</script>

<!-- REVEAL ON SCROLL -->
<script>
(function(){
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => { if(e.isIntersecting){ e.target.classList.add('show'); io.unobserve(e.target); } });
  }, {threshold: 0.1});
  function go(){ document.querySelectorAll('.reveal-item:not(.show)').forEach(el => io.observe(el)); }
  go();
  const mo = new MutationObserver(go);
  const sd = document.getElementById('series-details');
  if(sd) mo.observe(sd, {childList:true, subtree:true});
})();
</script>

<div id="footer-placeholder"></div>
<script>
(async function loadFooterRobust(){
  const cands = ['/includes/footer.html','includes/footer.html','./includes/footer.html','/footer.html','footer.html'];
  const ph = document.getElementById('footer-placeholder');

  function initNav(html) {
    try {
      ph.innerHTML = html;
      try{
        const p = parseInt(getComputedStyle(document.body).paddingBottom)||0;
        if(p < 96) document.body.style.paddingBottom = 'calc(96px + env(safe-area-inset-bottom))';
      }catch(e){}
      const nav = ph.querySelector('#smtv-bottom-nav') || ph.querySelector('.smtv-bottom-nav');
      if(!nav) return;
      const items = Array.from(nav.querySelectorAll('.nav-item'));
      items.forEach(i => i.classList.remove('active'));
      let si = items.find(i => ((i.dataset&&(i.dataset.name||'').toLowerCase()) === 'series'));
      if(!si) si = items.find(i => { const h=(i.getAttribute&&i.getAttribute('href')||'').toLowerCase(); return h&&h.includes('series'); });
      const up = new URLSearchParams(window.location.search);
      if(up.has('series') && si) si.classList.add('active');
      else {
        const p = location.pathname.toLowerCase();
        const bp = items.find(i => (i.getAttribute('href')||'').toLowerCase().includes(p.split('/').pop()));
        if(bp) bp.classList.add('active'); else if(si) si.classList.add('active');
      }
      items.forEach(a => {
        if(a._si) return; a._si = true;
        a.addEventListener('click', function(e){
          try{e.preventDefault&&e.preventDefault();}catch(x){}
          items.forEach(i => i.classList.remove('active'));
          this.classList.add('active');
          try{localStorage.setItem('smtv_last_nav', this.dataset.name||this.getAttribute('href'));}catch(e){}
          const h = this.getAttribute('href');
          if(h) location.assign(h);
        }, {passive:false});
      });
    } catch(e){ console.warn('initNav', e); }
  }

  for(const c of cands){
    try{
      const r = await fetch(c, {cache:'no-cache'});
      if(!r.ok) continue;
      const t = await r.text();
      initNav(t);
      return;
    }catch(e){ continue; }
  }

  /* Fallback nav */
  ph.innerHTML = `
    <nav class="smtv-bottom-nav" id="smtv-bottom-nav" role="navigation" aria-label="Main">
      <a href="/index.html" class="nav-item" data-name="home"><span class="icon-wrap"><i class="fa-solid fa-house"></i></span><span class="label">Home</span></a>
      <a href="/series.html" class="nav-item active" data-name="series"><span class="icon-wrap"><i class="fa-solid fa-film"></i></span><span class="label">Series</span></a>
      <a href="/clips.html" class="nav-item" data-name="clips"><span class="icon-wrap"><i class="fa-solid fa-play-circle"></i></span><span class="label">Clips</span></a>
