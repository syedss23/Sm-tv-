<html lang="en">
<head>

  <meta charset="UTF-8">
  <title>SmTv Urdu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Watch Turkish drama series and historical shows in Urdu on SmTv Urdu. All series details and streaming links.">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />

  <style>
    /* ═══════════════════════════════════════════════
       DESIGN TOKENS
    ═══════════════════════════════════════════════ */
    :root {
      --bg:         #04080f;
      --bg2:        #07101c;
      --bg3:        #0b1828;
      --bg4:        #0e1f30;
      --border:     rgba(255,255,255,.07);
      --border-hi:  rgba(255,255,255,.12);
      --gold:       #e8a800;
      --gold-lt:    #ffc93c;
      --gold-dim:   #b07f00;
      --gold-glow:  rgba(232,168,0,.28);
      --gold-glow2: rgba(232,168,0,.12);
      --cyan:       #00c8f0;
      --cyan-dim:   rgba(0,200,240,.12);
      --cyan-glow:  rgba(0,200,240,.28);
      --green:      #00d98b;
      --red:        #ff4d6d;
      --txt:        #d8e8f8;
      --txt-muted:  #4e6880;
      --txt-soft:   #7a99b0;
      --radius:     16px;
      --rad-sm:     10px;
      --rad-xs:     7px;
      --transition: cubic-bezier(.22,.68,0,1.2);
    }

    /* ═══════════════════════════════════════════════
       BASE RESET
    ═══════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--txt);
      font-family: 'DM Sans', 'Segoe UI', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
      min-height: 100dvh;
    }

    /* ═══════════════════════════════════════════════
       ANIMATED BACKGROUND GRID + GLOW
    ═══════════════════════════════════════════════ */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(0,200,240,.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,200,240,.018) 1px, transparent 1px);
      background-size: 52px 52px;
      mask-image: radial-gradient(ellipse 100% 60% at 50% 0%, black 30%, transparent);
    }
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 70% 50% at 85% 8%, rgba(232,168,0,.1) 0%, transparent 65%),
        radial-gradient(ellipse 55% 45% at 8% 75%, rgba(0,200,240,.08) 0%, transparent 65%),
        radial-gradient(ellipse 40% 30% at 50% 50%, rgba(0,0,0,.3) 0%, transparent 100%);
      animation: bg-breathe 14s ease-in-out infinite;
    }
    @keyframes bg-breathe {
      0%,100% { opacity: 1; }
      50%      { opacity: .65; }
    }

    /* ═══════════════════════════════════════════════
       KEYFRAMES
    ═══════════════════════════════════════════════ */
    @keyframes fade-up     { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fade-in     { from{opacity:0} to{opacity:1} }
    @keyframes shimmer     { 0%{background-position:-200% center} 100%{background-position:200% center} }
    @keyframes btn-shine   { 0%{left:-100%} 55%,100%{left:150%} }
    @keyframes dot-blink   { 0%,100%{opacity:1} 50%{opacity:.25} }
    @keyframes float       { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
    @keyframes spin-slow   { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    @keyframes pulse-glow  {
      0%,100% { box-shadow: 0 0 0 0 var(--gold-glow); }
      50%     { box-shadow: 0 0 22px 4px var(--gold-glow2); }
    }
    @keyframes card-in     {
      from { opacity:0; transform:translateY(16px) scale(.97); }
      to   { opacity:1; transform:translateY(0) scale(1); }
    }
    @keyframes premium-in  {
      from { opacity:0; transform:translateY(12px) scale(.98); }
      to   { opacity:1; transform:translateY(0) scale(1); }
    }
    @keyframes badge-pop   {
      0%   { transform: scale(0) rotate(-10deg); opacity:0; }
      60%  { transform: scale(1.15) rotate(2deg); opacity:1; }
      100% { transform: scale(1) rotate(0); opacity:1; }
    }
    @keyframes scan-line {
      0%   { top: -10%; }
      100% { top: 110%; }
    }

    /* reveal-on-scroll */
    .reveal-item {
      opacity: 0;
      transform: translateY(16px);
      transition: opacity .5s var(--transition), transform .5s var(--transition);
    }
    .reveal-item.show { opacity: 1; transform: translateY(0); }

    /* ═══════════════════════════════════════════════
       MAIN CONTENT WRAPPER
    ═══════════════════════════════════════════════ */
    #main-content {
      max-width: 900px;
      margin: 0 auto;
      padding: 14px 14px 0;
      position: relative;
      z-index: 1;
    }

    /* ═══════════════════════════════════════════════
       SERIES HEADER BLOCK — FIXED
    ═══════════════════════════════════════════════ */
    .pro-series-header-pro {
      display: flex;
      flex-direction: column;
      align-items: stretch;           /* ← key fix: was center */
      text-align: center;
      gap: 0;
      padding: 0;
      border-radius: 22px;
      background: transparent;
      box-shadow: none;
      position: relative;
      margin-bottom: 22px;
      animation: fade-up .65s var(--transition) both;
      overflow: hidden;               /* ← clips poster to border-radius */
    }

    /* ── POSTER — FIXED ── */
    .pro-series-poster-pro {
      width: 100%;
      height: 260px;                  /* fixed height instead of max-height */
      border-radius: 22px 22px 0 0;
      object-fit: cover;
      object-position: center top;   /* ← show faces/top of image */
      display: block;
      flex-shrink: 0;
      /* NO box-shadow here — parent clips it */
    }

    /* ── Poster gradient overlay — FIXED positioning ── */
    .poster-gradient-overlay {
      position: absolute;
      left: 0; right: 0;
      top: 160px;                     /* starts fading from this point */
      height: 120px;                  /* taller fade for smooth blend */
      background: linear-gradient(to bottom, transparent, var(--bg2));
      pointer-events: none;
      z-index: 2;
    }

    /* ── Scan-line cinematic effect on poster ── */
    .poster-scan {
      position: absolute;
      left: 0; right: 0;
      top: 0;
      height: 40px;
      background: linear-gradient(to bottom, rgba(0,200,240,.04), transparent);
      animation: scan-line 6s linear infinite;
      pointer-events: none;
      z-index: 3;
    }

    /* ── Back button ── */
    .pro-series-back-btn-pro {
      position: absolute;
      left: 12px; top: 12px; z-index: 10;
      width: 40px; height: 40px;
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: var(--rad-sm);
      background: rgba(4,8,15,.82);
      border: 1px solid var(--border-hi);
      backdrop-filter: blur(12px) saturate(1.4);
      -webkit-backdrop-filter: blur(12px) saturate(1.4);
      text-decoration: none;
      transition: background .22s, border-color .22s, transform .18s;
      box-shadow: 0 4px 16px rgba(0,0,0,.4);
    }
    .pro-series-back-btn-pro:hover {
      background: rgba(0,200,240,.18);
      border-color: rgba(0,200,240,.4);
      transform: translateX(-2px);
    }
    .pro-series-back-btn-pro i { color: var(--txt); font-size: .9em; }

    /* ── Meta area ── */
    .pro-series-meta-pro {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 22px 22px;
      padding: 20px 20px 24px;
      text-align: center;
      position: relative; z-index: 3;
    }

    /* top shimmer line on meta */
    .pro-series-meta-pro::before {
      content: '';
      position: absolute; top:0; left:10%; right:10%; height:1px;
      background: linear-gradient(90deg, transparent, var(--border-hi), transparent);
    }

    .pro-series-title-pro {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.5em, 5.5vw, 2.1em);
      font-weight: 800;
      color: #fff;
      margin: 0 0 10px;
      letter-spacing: -.015em;
      line-height: 1.15;
      text-shadow: 0 2px 20px rgba(0,0,0,.5);
    }

    .pro-series-desc-pro {
      font-size: .875em;
      color: var(--txt-soft);
      line-height: 1.7;
      max-width: 640px;
      margin: 0 auto 18px;
    }

    /* ── Stats/badge row ── */
    .series-stats-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
    .series-stat-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      border-radius: 100px;
      font-size: .75em;
      font-weight: 700;
      letter-spacing: .04em;
      border: 1px solid;
    }
    .stat-badge-cyan {
      background: rgba(0,200,240,.08);
      border-color: rgba(0,200,240,.2);
      color: var(--cyan);
    }
    .stat-badge-gold {
      background: rgba(232,168,0,.08);
      border-color: rgba(232,168,0,.2);
      color: var(--gold);
    }
    .stat-badge-green {
      background: rgba(0,217,139,.08);
      border-color: rgba(0,217,139,.2);
      color: var(--green);
    }

    /* ═══════════════════════════════════════════════
       PREMIUM CHANNEL MESSAGE — COMPLETELY REDESIGNED
    ═══════════════════════════════════════════════ */
    .premium-channel-message {
      position: relative;
      overflow: hidden;
      border-radius: 14px;
      background: linear-gradient(145deg, rgba(18,28,44,1) 0%, rgba(10,18,30,1) 100%);
      border: 1px solid rgba(232,168,0,.3);
      padding: 0;
      margin-top: 6px;
      animation: premium-in .6s var(--transition) .3s both;
      box-shadow:
        0 8px 32px rgba(0,0,0,.5),
        inset 0 1px 0 rgba(255,255,255,.05);
    }

    /* animated shimmer top border */
    .premium-channel-message::before {
      content: '';
      position: absolute; top:0; left:0; right:0; height:2px;
      background: linear-gradient(90deg,
        transparent 0%,
        var(--gold-dim) 25%,
        var(--gold) 50%,
        var(--gold-lt) 60%,
        var(--gold-dim) 75%,
        transparent 100%);
      background-size: 200% auto;
      animation: shimmer 2.5s linear infinite;
    }

    /* gold corner glow */
    .premium-channel-message::after {
      content: '';
      position: absolute;
      top: -30px; right: -30px;
      width: 130px; height: 130px;
      background: radial-gradient(circle, rgba(232,168,0,.18) 0%, transparent 70%);
      pointer-events: none;
    }

    .pcm-inner {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 20px;
      position: relative; z-index: 1;
    }

    .pcm-icon-wrap {
      flex-shrink: 0;
      width: 52px; height: 52px;
      border-radius: 13px;
      background: linear-gradient(145deg, rgba(232,168,0,.18), rgba(232,168,0,.06));
      border: 1px solid rgba(232,168,0,.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4em;
      animation: float 3s ease-in-out infinite, pulse-glow 3s ease-in-out infinite;
      box-shadow: 0 4px 18px rgba(232,168,0,.15);
    }

    .pcm-text { flex: 1; text-align: left; }

    .pcm-headline {
      font-size: .95em;
      font-weight: 800;
      color: #fff;
      line-height: 1.3;
      margin-bottom: 4px;
      letter-spacing: -.01em;
    }
    .pcm-headline span { color: var(--gold); }

    .pcm-sub {
      font-size: .78em;
      color: var(--txt-soft);
      line-height: 1.5;
    }
    .pcm-sub b { color: var(--txt); font-weight: 600; }

    .pcm-badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .pcm-badge {
      font-size: .68em;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 100px;
      background: rgba(232,168,0,.1);
      border: 1px solid rgba(232,168,0,.2);
      color: var(--gold-lt);
      letter-spacing: .03em;
      white-space: nowrap;
    }

    .pcm-cta-col {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    /* ── CTA BUTTON — high CTR design ── */
    .btn-primary {
      display: inline-flex; align-items: center; justify-content: center; gap: 7px;
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-lt) 60%, #ffdc70 100%);
      color: #1a0800;
      font-weight: 800;
      font-size: .82em;
      font-family: 'DM Sans', sans-serif;
      letter-spacing: .02em;
      padding: 11px 20px;
      border-radius: var(--rad-sm);
      box-shadow: 0 4px 22px var(--gold-glow), inset 0 1px 0 rgba(255,255,255,.3);
      text-decoration: none;
      position: relative; overflow: hidden;
      transition: box-shadow .25s, transform .15s;
      white-space: nowrap;
      border: none;
      cursor: pointer;
    }
    .btn-primary::before {
      content: '';
      position: absolute; top:0; left:-100%; width:60%; height:100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.35), transparent);
      animation: btn-shine 2.4s ease-in-out infinite;
    }
    .btn-primary:hover {
      box-shadow: 0 6px 30px rgba(232,168,0,.55);
      transform: translateY(-2px) scale(1.02);
    }
    .btn-primary:active { transform: scale(.96); }

    .pcm-members {
      font-size: .7em;
      color: var(--txt-muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .pcm-members::before {
      content: '●';
      color: var(--green);
      font-size: .8em;
      animation: dot-blink 2s ease-in-out infinite;
    }

    /* ── Mobile layout for premium message ── */
    @media (max-width: 520px) {
      .pcm-inner { flex-direction: column; align-items: flex-start; gap: 14px; }
      .pcm-cta-col { width: 100%; flex-direction: row; align-items: center; justify-content: space-between; }
      .btn-primary { width: auto; }
    }

    /* ═══════════════════════════════════════════════
       SEASON TABS
    ═══════════════════════════════════════════════ */
    .pro-seasons-tabs-pro {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 20px 0 14px;
      padding: 0;
    }

    .pro-season-tab-pro {
      background: var(--bg2);
      border: 1px solid var(--border-hi);
      color: var(--txt-muted);
      padding: 9px 22px;
      border-radius: 100px;           /* pill shape */
      cursor: pointer;
      font-weight: 700;
      font-size: .85em;
      font-family: 'DM Sans', sans-serif;
      letter-spacing: .03em;
      transition: all .22s var(--transition);
      outline: none;
      position: relative; overflow: hidden;
    }
    .pro-season-tab-pro:hover:not(.active) {
      border-color: rgba(0,200,240,.35);
      color: var(--txt);
      background: rgba(0,200,240,.07);
      transform: translateY(-1px);
    }
    .pro-season-tab-pro.active {
      background: linear-gradient(135deg, var(--cyan) 0%, #0090b8 100%);
      border-color: transparent;
      color: #021018;
      font-weight: 800;
      transform: translateY(-2px);
      box-shadow: 0 6px 24px var(--cyan-glow);
    }
    .pro-season-tab-pro:active { transform: scale(.96); }

    /* ═══════════════════════════════════════════════
       SOURCE SELECTOR
    ═══════════════════════════════════════════════ */
    .source-selector {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin: 0 0 18px;
      flex-wrap: wrap;
    }

    .source-btn {
      background: var(--bg3);
      border: 1px solid var(--border-hi);
      color: var(--txt-muted);
      padding: 7px 20px;
      border-radius: var(--rad-xs);
      font-size: .83em;
      font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all .22s var(--transition);
      outline: none;
    }
    .source-btn:hover:not(.active) {
      border-color: rgba(0,200,240,.35);
      color: var(--txt);
      background: rgba(0,200,240,.07);
    }
    .source-btn.active {
      background: linear-gradient(135deg, var(--cyan) 0%, #0090b8 100%);
      border-color: transparent;
      color: #021018;
      font-weight: 800;
      box-shadow: 0 4px 16px var(--cyan-glow);
      transform: translateY(-1px);
    }
    .source-btn:active { transform: scale(.96); }

    /* ═══════════════════════════════════════════════
       EPISODES ROW WRAP
    ═══════════════════════════════════════════════ */
    .pro-episodes-row-wrap-pro {
      margin-top: 6px;
      padding-bottom: 10px;
      margin-bottom: 8px;
      transition: opacity .2s ease;
    }
    .pro-episodes-row-wrap-pro.is-loading {
      opacity: .55;
      pointer-events: none;
    }

    /* Section label */
    .episodes-section-label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: .7em;
      font-weight: 800;
      letter-spacing: .12em;
      color: var(--cyan);
      text-transform: uppercase;
      margin-bottom: 14px;
      padding-left: 2px;
    }
    .episodes-section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, rgba(0,200,240,.25), transparent);
    }

    /* ── OVERRIDE the ::before that was setting "Episodes" label ── */
    .pro-episodes-row-wrap-pro::before { display: none !important; }

    /* Horizontal scroller */
    .pro-episodes-row-pro {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding: 4px 2px 16px;
      -webkit-overflow-scrolling: touch;
      scroll-snap-type: x proximity;
      align-items: flex-start;
      scrollbar-width: thin;
      scrollbar-color: rgba(0,200,240,.22) transparent;
    }
    .pro-episodes-row-pro::-webkit-scrollbar { height: 4px; }
    .pro-episodes-row-pro::-webkit-scrollbar-track { background: transparent; }
    .pro-episodes-row-pro::-webkit-scrollbar-thumb {
      background: rgba(0,200,240,.22);
      border-radius: 4px;
    }

    /* ═══════════════════════════════════════════════
       EPISODE CARD — FIXED THUMBNAIL BG + ENHANCED
    ═══════════════════════════════════════════════ */
    .pro-episode-card-pro {
      scroll-snap-align: start;
      flex: 0 0 150px;
      display: flex;
      flex-direction: column;
      gap: 0;
      align-items: stretch;
      text-decoration: none;
      color: var(--txt);
      border-radius: 14px;
      background: var(--bg2);
      border: 1px solid var(--border);
      overflow: hidden;
      min-height: 0;
      transition:
        transform .26s var(--transition),
        box-shadow .26s ease,
        border-color .26s ease;
      position: relative;
      /* staggered entrance animation handled by JS */
    }
    .pro-episode-card-pro:hover {
      transform: translateY(-6px) scale(1.025);
      box-shadow: 0 16px 40px rgba(0,0,0,.6), 0 0 0 1px rgba(0,200,240,.3);
      border-color: rgba(0,200,240,.35);
    }
    .pro-episode-card-pro:active { transform: scale(.97); }

    /* shimmer top line */
    .pro-episode-card-pro::before {
      content: '';
      position: absolute; top:0; left:0; right:0; height:2px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      opacity: 0;
      transition: opacity .22s;
      z-index: 4;
    }
    .pro-episode-card-pro:hover::before { opacity: 1; }

    @media (max-width: 420px) {
      .pro-episode-card-pro { flex: 0 0 132px; }
    }
    @media (min-width: 900px) {
      .pro-episode-card-pro { flex: 0 0 178px; }
    }

    /* ── THUMBNAIL WRAP — CRITICAL FIX ── */
    .pro-ep-thumb-wrap-pro {
      width: 100%;
      aspect-ratio: 16/10;
      overflow: hidden;
      position: relative;
      /*
        FIX: Remove any background color here.
        The "black box in middle" was caused by a background showing
        through when the image hasn't loaded or has letterboxing.
        We use a subtle gradient placeholder instead.
      */
      background: linear-gradient(160deg, var(--bg3) 0%, var(--bg4) 100%);
      display: block;
      flex-shrink: 0;
    }

    /* skeleton shimmer while image loads */
    .pro-ep-thumb-wrap-pro::before {
      content: '';
      position: absolute; inset: 0; z-index: 1;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(255,255,255,.04) 50%,
        transparent 100%
      );
      background-size: 200% 100%;
      animation: shimmer 1.6s ease-in-out infinite;
      pointer-events: none;
    }

    .pro-ep-thumb-pro {
      width: 100%;
      height: 100%;
      object-fit: cover;          /* fills area, no letterbox */
      object-position: center;
      display: block;
      transition: transform .32s ease;
      position: relative; z-index: 2; /* above skeleton */
    }
    .pro-episode-card-pro:hover .pro-ep-thumb-pro { transform: scale(1.08); }

    /* Episode number badge */
    .pro-ep-num-pro {
      position: absolute;
      bottom: 6px; left: 6px; z-index: 3;
      background: rgba(4,8,15,.88);

  <!-- ═══════════════════════════════════════════
       POSTER FIX PATCH
       Watches for the poster image rendered by series.js
       and ensures it fills correctly with no black bars.
  ═══════════════════════════════════════════ -->
  <script>
  (function patchPosterAndCards() {
    const observer = new MutationObserver(() => {
      // ── Fix poster image ──
      const poster = document.querySelector('.pro-series-poster-pro');
      if (poster && !poster._patched) {
        poster._patched = true;
        poster.style.cssText += ';width:100%;height:260px;object-fit:cover;object-position:center top;display:block;';
        // Inject gradient overlay if missing
        const header = poster.closest('.pro-series-header-pro');
        if (header && !header.querySelector('.poster-gradient-overlay')) {
          const grad = document.createElement('div');
          grad.className = 'poster-gradient-overlay';
          header.appendChild(grad);
          const scan = document.createElement('div');
          scan.className = 'poster-scan';
          header.appendChild(scan);
        }
      }

      // ── Fix episode thumbnail black background ──
      document.querySelectorAll('.pro-ep-thumb-wrap-pro').forEach(wrap => {
        if (wrap._patched) return;
        wrap._patched = true;
        // remove any inline background:#000 or background:black
        wrap.style.background = '';

        // Inject play overlay as real element (removes ::after conflict)
        if (!wrap.querySelector('.ep-play-overlay')) {
          const pl = document.createElement('div');
          pl.className = 'ep-play-overlay';
          pl.innerHTML = '▶';
          wrap.appendChild(pl);
        }
      });

      // ── Stagger card entrance animations ──
      document.querySelectorAll('.pro-episode-card-pro').forEach((card, i) => {
        if (card._animated) return;
        card._animated = true;
        card.style.animationDelay = `${i * 0.045}s`;
        card.classList.add('card-animate');
      });

      // ── Inject section label if missing ──
      document.querySelectorAll('.pro-episodes-row-wrap-pro').forEach(wrap => {
        if (wrap._labelDone) return;
        wrap._labelDone = true;
        const lbl = document.createElement('div');
        lbl.className = 'episodes-section-label';
        lbl.textContent = 'Episodes';
        wrap.insertBefore(lbl, wrap.firstChild);
      });

      // ── Upgrade premium channel message ──
      document.querySelectorAll('.premium-channel-message').forEach(pcm => {
        if (pcm._upgraded) return;
        pcm._upgraded = true;
        // Check if already upgraded (has pcm-inner)
        if (pcm.querySelector('.pcm-inner')) return;

        // Extract the WhatsApp link href from existing content
        const existingLink = pcm.querySelector('a[href]');
        const waHref = existingLink ? existingLink.href : 'https://whatsapp.com/channel/0029Va9zAvvAYlUNRuzWqh0k';

        pcm.innerHTML = `
          <div class="pcm-inner">
            <div class="pcm-icon-wrap">🔔</div>
            <div class="pcm-text">
              <div class="pcm-headline">Never miss an episode — <span>join for free</span></div>
              <div class="pcm-sub">Get <b>instant alerts</b> for new episodes, behind-the-scenes &amp; exclusives on WhatsApp.</div>
              <div class="pcm-badges">
                <span class="pcm-badge">⚡ Instant Alerts</span>
                <span class="pcm-badge">🎬 New Episodes</span>
                <span class="pcm-badge">🆓 100% Free</span>
              </div>
            </div>
            <div class="pcm-cta-col">
              <a href="${waHref}" target="_blank" rel="noopener" class="btn-primary">
                <i class="fa-brands fa-whatsapp" style="font-size:1.1em"></i>
                Join Now
              </a>
              <div class="pcm-members">12K+ joined</div>
            </div>
          </div>
        `;
      });
    });

    observer.observe(document.body, { childList: true, subtree: true });

    // Stop observing after 8 seconds (prevent memory leaks)
    setTimeout(() => observer.disconnect(), 8000);
  })();
  </script>

  <!-- ═══════════════════════════════════════════

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const params = new URLSearchParams(window.location.search);

            if (metaDesc) metaDesc.setAttribute('content',
              `${meta.title} - Watch all episodes of ${meta.title} in Urdu on SmTv Urdu. Turkish historical drama complete series.`);

        }).catch(() => {});

  <script>

      function showPopup() {

  <!-- ═══════════════════════════════════════════
       PREVENT AUTO-SCROLL (unchanged logic)
  ═══════════════════════════════════════════ -->
  <script>
    (function(){
      try { window.scrollTo(0,0); } catch(e){}
      document.addEventListener('focusin', function(){
        const x = window.scrollX || 0;
        const y = window.scrollY || 0;
        setTimeout(function(){ try { window.scrollTo(x,y); } catch(e){} }, 0);
      }, true);
      const details = document.getElementById('series-details');
      if (details) {
        const obs = new MutationObserver(() => {
          if (details.childNodes.length > 0) {
            try { window.scrollTo({ top:0, left:0, behavior:'auto' }); } catch(e){}
            obs.disconnect();
          }
        });
        obs.observe(details, { childList: true, subtree: false });
      }
    })();
  </script>

  <!-- ═══════════════════════════════════════════
       REVEAL ON SCROLL
  ═══════════════════════════════════════════ -->
  <script>
    (function(){
      const io = new IntersectionObserver((entries) => {
        entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('show'); io.unobserve(e.target); } });
      }, { threshold: 0.12 });
      function observeReveal() {
        document.querySelectorAll('.reveal-item:not(.show)').forEach(el => io.observe(el));
      }
      observeReveal();
      // Re-run when series.js injects content
      const mo = new MutationObserver(observeReveal);
      const sd = document.getElementById('series-details');
      if (sd) mo.observe(sd, { childList: true, subtree: true });
    })();
  </script>

  <!-- FOOTER: robust include loader (ALL LOGIC UNTOUCHED) -->
  <div id="footer-placeholder"></div>

  <script>
  (async function loadFooterRobust(){
    const candidates = ['/includes/footer.html','includes/footer.html','./includes/footer.html','/footer.html','footer.html'];
    const placeholder = document.getElementById('footer-placeholder');

    function initNav(html) {
      try {
        placeholder.innerHTML = html;
        try {
          const curPad = parseInt(getComputedStyle(document.body).paddingBottom) || 0;
          const minPad = 96;
          if (curPad < minPad) document.body.style.paddingBottom = 'calc(96px + env(safe-area-inset-bottom))';
        } catch(e){}
        const nav = placeholder.querySelector('#smtv-bottom-nav') || placeholder.querySelector('.smtv-bottom-nav');
        if (!nav) return;
        const items = Array.from(nav.querySelectorAll('.nav-item'));
        items.forEach(i => i.classList.remove('active'));
        let seriesItem = items.find(i => ((i.dataset && (i.dataset.name || '').toLowerCase()) === 'series'));
        if (!seriesItem) {
          seriesItem = items.find(i => {
            const href = (i.getAttribute && i.getAttribute('href') || '').toLowerCase();
            return href && href.includes('series');
          });
        }
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('series') && seriesItem) {
          seriesItem.classList.add('active');
        } else {
          const path = location.pathname.toLowerCase();
          const byPath = items.find(i => (i.getAttribute('href')||'').toLowerCase().includes(path.split('/').pop()));
          if (byPath) byPath.classList.add('active'); else if (seriesItem) seriesItem.classList.add('active');
        }
        items.forEach(a => {
          if (a._smtvInit) return;
          a._smtvInit = true;
          a.addEventListener('click', function(e){
            try { e.preventDefault && e.preventDefault(); } catch(err){}
            items.forEach(i => i.classList.remove('active'));
            this.classList.add('active');
            try { localStorage.setItem('smtv_last_nav', this.dataset.name || this.getAttribute('href')); } catch(e){}
            const href = this.getAttribute('href');
            if (href) location.assign(href);
          }, { passive: false });
        });
      } catch (e) { console.warn('initNav error', e); }
    }

    for (const cand of candidates) {
      try {
        const res = await fetch(cand, { cache: 'no-cache' });
        if (!res.ok) continue;
        const text = await res.text();
        if (text.includes('smtv-bottom-nav') || text.includes('smtv-bottom')) {
          initNav(text); return;
        } else { initNav(text); return; }
      } catch (e) { continue; }
    }

    placeholder.innerHTML = `
      <nav class="smtv-bottom-nav" id="smtv-bottom-nav" role="navigation" aria-label="Main">
        <a href="/index.html" class="nav-item" data-name="home"><span class="icon-wrap"><i class="fa-solid fa-house"></i></span><span class="label">Home</span></a>
        <a href="/series.html" class="nav-item active" data-name="series"><span class="icon-wrap"><i class="fa-solid fa-film"></i></span><span class="label">Series</span></a>
        <a href="/clips.html" class="nav-item" data-name="clips"><span class="icon-wrap"><i class="fa-solid fa-play-circle"></i></span><span class="label">Clips</span></a>
        <a href="/premium.html" class="nav-item" data-name="premium"><span class="icon-wrap"><i class="fa-solid fa-star"></i></span><span class="label">Premium</span></a>
        <a href="/more.html" class="nav-item" data-name="more"><span class="icon-wrap"><i class="fa-solid fa-circle-info"></i></span><span class="label">More</span></a>
      </nav>
      <style>
        .smtv-bottom-nav{position:fixed;left:12px;right:12px;bottom:12px;height:64px;display:flex;gap:6px;padding:8px;border-radius:14px;background:rgba(10,10,12,0.9);backdrop-filter:blur(12px);align-items:center;z-index:1200;padding-bottom:calc(env(safe-area-inset-bottom) + 8px);}
        .smtv-bottom-nav .nav-item{flex:1;text-align:center;color:#bdbdbd;text-decoration:none;padding:6px;border-radius:10px;transition:color .2s,transform .2s;}
        .smtv-bottom-nav .nav-item.active{color:#fff;transform:translateY(-6px);}
        .smtv-bottom-nav .icon-wrap{display:inline-flex;width:40px;height:40px;align-items:center;justify-content:center;border-radius:10px;}
        .smtv-bottom-nav .label{display:block;font-size:12px;margin-top:3px;}
      </style>
    `;
    try { document.body.style.paddingBottom = 'calc(96px + env(safe-area-inset-bottom))'; } catch(e){}
  })();
  </script>
