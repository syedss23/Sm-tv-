  <link rel="stylesheet" href="style.css">
  <style>
    :root {
      --void:       #030712;
      --deep:       #080f1e;
      --surface:    #0d1827;
      --card:       #111e30;
      --card-hover: #162236;
      --gold:       #d4a827;
      --gold-lt:    #f0c84a;
      --gold-glow:  rgba(212,168,39,0.28);
      --gold-dim:   rgba(212,168,39,0.12);
      --cyan:       #06b6d4;
      --red:        #dc2626;
      --white:      #f8f4ee;
      --muted:      #64748b;
      --border:     rgba(212,168,39,0.14);
      --border-hi:  rgba(212,168,39,0.4);
      --shadow-g:   0 0 40px rgba(212,168,39,0.18);
      --ff-d: 'Playfair Display', Georgia, serif;
      --ff-b: 'DM Sans', sans-serif;
      --r: 14px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; overflow-x: hidden; }
    body { background: var(--void); color: var(--white); font-family: var(--ff-b); min-height: 100vh; overflow-x: hidden; }

    /* noise */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9999; opacity: 0.5;
    }
    /* ambient */
    #ambient {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 75% 50% at 10% 0%, rgba(212,168,39,0.09) 0%, transparent 60%),
        radial-gradient(ellipse 55% 40% at 90% 100%, rgba(6,182,212,0.06) 0%, transparent 55%);
    }

    /* ─ SIDEBAR ─ */
    #sb-ov {
      position: fixed; inset: 0;
      background: rgba(3,7,18,0.8); backdrop-filter: blur(8px);
      z-index: 200; opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
    }
    #sb-ov.on { opacity: 1; pointer-events: all; }
    #sidebar {
      position: fixed; top: 0; left: 0;
      width: 288px; height: 100%;
      background: linear-gradient(170deg, #0b1726 0%, #060e1c 55%, #030712 100%);
      border-right: 1px solid var(--border-hi);
      z-index: 201;
      transform: translateX(-100%);
      transition: transform 0.42s cubic-bezier(0.22,1,0.36,1);
      display: flex; flex-direction: column; overflow: hidden;
    }
    #sidebar::before {
      content: '';
      position: absolute; top: -80px; left: -80px;
      width: 260px; height: 260px;
      background: radial-gradient(circle, rgba(212,168,39,0.1) 0%, transparent 70%);
      pointer-events: none;
    }
    #sidebar.open { transform: translateX(0); }
    .sb-hd {
      display: flex; align-items: center; justify-content: space-between;
      padding: 30px 22px 20px;
      border-bottom: 1px solid var(--border);
    }
    .sb-logo {
      font-family: var(--ff-d); font-size: 1.38rem; font-weight: 900;
      background: linear-gradient(135deg, var(--gold-lt), var(--cyan));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .sb-x {
      width: 36px; height: 36px;
      background: rgba(255,255,255,0.04); border: 1px solid var(--border-hi);
      border-radius: 10px; color: var(--muted); font-size: 1rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.25s;
    }
    .sb-x:hover { background: var(--gold-dim); color: var(--gold-lt); border-color: var(--gold); transform: rotate(90deg); }
    .sb-nav { padding: 16px 12px; display: flex; flex-direction: column; gap: 5px; flex: 1; }
    .sb-a {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 16px; border-radius: var(--r); text-decoration: none;
      color: rgba(248,244,238,0.75); font-weight: 500; font-size: 0.94rem;
      border: 1px solid transparent;
      transition: all 0.3s ease;
      position: relative; overflow: hidden;
      opacity: 0; transform: translateX(-20px);
    }
    #sidebar.open .sb-a { animation: sbIn 0.38s ease forwards; }
    #sidebar.open .sb-a:nth-child(1){animation-delay:.06s}
    #sidebar.open .sb-a:nth-child(2){animation-delay:.11s}
    #sidebar.open .sb-a:nth-child(3){animation-delay:.16s}
    #sidebar.open .sb-a:nth-child(4){animation-delay:.21s}
    #sidebar.open .sb-a:nth-child(5){animation-delay:.26s}
    @keyframes sbIn { to { opacity:1; transform:translateX(0); } }
    .sb-a::before {
      content: ''; position: absolute; left: 0; top: 20%; bottom: 20%;
      width: 2.5px;
      background: linear-gradient(180deg, var(--gold-lt), var(--cyan));
      border-radius: 2px; transform: scaleY(0); transition: transform 0.25s;
    }
    .sb-a:hover::before { transform: scaleY(1); }
    .sb-a:hover {
      background: rgba(212,168,39,0.07); border-color: var(--border-hi);
      color: var(--gold-lt); transform: translateX(6px);
    }
    .sb-ico {
      width: 36px; height: 36px; background: var(--surface);
      border-radius: 10px; display: flex; align-items: center; justify-content: center;
      font-size: 1rem; flex-shrink: 0; transition: background 0.25s;
    }
    .sb-a:hover .sb-ico { background: var(--gold-dim); }
    .sb-a.tg { color: rgba(100,200,246,0.85); }
    .sb-a.tg:hover { background: rgba(41,182,246,0.07); border-color: rgba(41,182,246,0.3); color: #7dd3fc; }
    .sb-a.wa { color: rgba(134,239,172,0.85); }
    .sb-a.wa:hover { background: rgba(102,187,106,0.07); border-color: rgba(102,187,106,0.3); color: #86efac; }
    .sb-ft { padding: 14px 22px; border-top: 1px solid var(--border); font-size: 0.73rem; color: var(--muted); text-align: center; }

    /* ─ HEADER ─ */
    #site-header {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px;
      background: rgba(3,7,18,0.9); backdrop-filter: blur(24px) saturate(180%);
      border-bottom: 1px solid var(--border);
    }
    #site-header::after {
      content: ''; position: absolute; bottom: 0; left: 8%; right: 8%;
      height: 1px; background: linear-gradient(90deg,transparent,var(--gold-lt),transparent); opacity: 0.35;
    }
    #hamburger {
      width: 42px; height: 42px; background: none;
      border: 1px solid var(--border); border-radius: 10px;
      cursor: pointer; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 5px;
      transition: all 0.3s; flex-shrink: 0;
    }
    #hamburger:hover { border-color: var(--gold); background: var(--gold-dim); }
    .hbl { display: block; height: 2px; border-radius: 2px; background: var(--muted); transition: all 0.3s; }
    .hbl:nth-child(1){ width:20px; }
    .hbl:nth-child(2){ width:16px; }
    .hbl:nth-child(3){ width:12px; }
    #hamburger:hover .hbl { background: var(--gold-lt); }
    #hamburger:hover .hbl:nth-child(2){ width:20px; }
    #hamburger:hover .hbl:nth-child(3){ width:20px; }
    #mainTitle {
      font-family: var(--ff-d) !important; font-size: 1.32rem !important; font-weight: 900 !important;
      background: linear-gradient(130deg, var(--gold-lt) 0%, #e8d8a8 45%, var(--cyan) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      letter-spacing: 0.06em;
    }
    .premium-cta {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 9px 15px;
      background: linear-gradient(135deg, var(--gold) 0%, #b8860b 100%);
      color: var(--void); font-weight: 700; font-size: 0.77rem;
      border-radius: 50px; text-decoration: none; letter-spacing: 0.09em; text-transform: uppercase;
      box-shadow: 0 4px 18px rgba(212,168,39,0.35), inset 0 1px 0 rgba(255,255,255,0.18);
      transition: all 0.25s;
    }
    .premium-cta:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(212,168,39,0.55); }

    /* ─ SEARCH OVERLAY ─ */
    #srch-ov {
      position: fixed; inset: 0;
      background: rgba(3,7,18,0.97); backdrop-filter: blur(22px);
      z-index: 300; opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
      display: flex; flex-direction: column; padding: 16px;
    }
    #srch-ov.on { opacity: 1; pointer-events: all; }
    .srch-top { display: flex; gap: 10px; margin-bottom: 18px; }
    #srch-inp {
      flex: 1; padding: 14px 16px;
      background: var(--surface); border: 1.5px solid var(--border-hi);
      border-radius: var(--r); color: var(--white);
      font-family: var(--ff-b); font-size: 1rem; outline: none;
      caret-color: var(--gold-lt);
      transition: all 0.25s;
    }
    #srch-inp:focus { border-color: var(--gold-lt); box-shadow: 0 0 0 3px var(--gold-dim); }
    #srch-inp::placeholder { color: var(--muted); }
    #srch-cancel {
      padding: 0 16px; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--r);
      color: var(--muted); font-family: var(--ff-b); font-size: 0.88rem;
      cursor: pointer; transition: all 0.2s;
    }
    #srch-cancel:hover { color: var(--gold-lt); border-color: var(--gold); }
    #srch-grid {
      display: grid; grid-template-columns: repeat(2,1fr); gap: 11px;
      overflow-y: auto; flex: 1; padding-bottom: 80px;
    }
    .srch-hint { color: var(--muted); text-align: center; padding: 50px 20px; font-size: 0.9rem; grid-column:1/-1; }

    /* ─ SEARCH TRIGGER ─ */
    .srch-trigger {
      margin: 14px 16px 0;
      display: flex; align-items: center; gap: 10px;
      padding: 13px 16px; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--r);
      cursor: pointer; transition: all 0.3s; position: relative; overflow: hidden;
    }
    .srch-trigger::before {
      content: ''; position: absolute; top: 0; left: -100%;
      width: 55%; height: 100%;
      background: linear-gradient(90deg,transparent,rgba(212,168,39,0.05),transparent);
      animation: scan 3.5s infinite;
    }
    @keyframes scan { to { left: 200%; } }
    .srch-trigger:hover { border-color: var(--border-hi); background: var(--card); }
    .srch-icon { opacity: 0.45; font-size: 1rem; }
    .srch-placeholder { color: var(--muted); font-size: 0.93rem; flex: 1; }
    .srch-kbd {
      font-size: 0.7rem; padding: 3px 8px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 6px; color: var(--muted); font-family: monospace;
    }

    /* ─ SPONSOR BAR ─ */
    #sp-bar {
      margin: 12px 16px 0;
      padding: 9px 13px;
      background: linear-gradient(135deg,rgba(212,168,39,0.1) 0%,rgba(6,182,212,0.05) 100%);
      border: 1px solid var(--border-hi); border-radius: var(--r);
      display: flex; align-items: center; gap: 10px;
      position: relative; overflow: hidden;
    }
    #sp-bar::before {
      content: ''; position: absolute; top: 0; left: -80%;
      width: 50%; height: 100%;
      background: linear-gradient(90deg,transparent,rgba(212,168,39,0.06),transparent);
      animation: scan 4s infinite;
    }
    .sp-ico { font-size: 1rem; flex-shrink: 0; }
    .sp-txt { flex: 1; min-width: 0; }
    .sp-lbl { font-size: 0.66rem; color: var(--gold); font-weight: 700; letter-spacing: 0.13em; text-transform: uppercase; display: block; line-height: 1; }
    .sp-nm { font-size: 0.86rem; font-weight: 700; color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sp-btn {
      padding: 7px 13px; background: linear-gradient(135deg,var(--gold) 0%,#b8860b 100%);
      color: var(--void); font-size: 0.74rem; font-weight: 800;
      border-radius: 50px; text-decoration: none; white-space: nowrap; flex-shrink: 0;
      box-shadow: 0 3px 12px rgba(212,168,39,0.35); transition: all 0.2s;
    }
    .sp-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(212,168,39,0.55); }

    /* ─ HERO ─ */
    #hero {
      position: relative; width: 100%;
      height: 60vw; max-height: 390px; min-height: 230px;
      overflow: hidden; margin-top: 14px;
    }
    .h-slide { position: absolute; inset: 0; opacity: 0; transition: opacity 1s ease; pointer-events: none; }
    .h-slide.on { opacity: 1; pointer-events: all; }
    .h-bg {
      position: absolute; inset: 0;
      background-size: cover; background-position: center top;
      transform: scale(1.07); transition: transform 7s ease;
      filter: brightness(0.5) saturate(1.15);
    }
    .h-slide.on .h-bg { transform: scale(1); }
    .h-vig {
      position: absolute; inset: 0;
      background:
        linear-gradient(to top, var(--void) 0%, rgba(3,7,18,0.55) 38%, transparent 68%),
        linear-gradient(to right, rgba(3,7,18,0.65) 0%, transparent 55%);
    }
    .h-body {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 0 18px 18px;
    }
    .h-new {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 9px; background: var(--red); color: #fff;
      font-size: 0.62rem; font-weight: 800; border-radius: 5px;
      letter-spacing: 0.12em; text-transform: uppercase;
      margin-bottom: 7px; box-shadow: 0 2px 12px rgba(220,38,38,0.55);
      animation: rPulse 2s ease-in-out infinite;
    }
    @keyframes rPulse{0%,100%{box-shadow:0 2px 12px rgba(220,38,38,0.5);}50%{box-shadow:0 2px 22px rgba(220,38,38,0.85);}}
    .h-new::before { content: '●'; font-size: 0.5rem; animation: blink 1s step-end infinite; }
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
    .h-title {
      font-family: var(--ff-d);
      font-size: clamp(1.25rem,5.5vw,1.75rem);
      font-weight: 900; color: var(--white); line-height: 1.15;
      text-shadow: 0 2px 24px rgba(0,0,0,0.85); margin-bottom: 4px;
    }
    .h-sub { font-size: 0.8rem; color: var(--gold-lt); font-weight: 600; margin-bottom: 14px; letter-spacing: 0.04em; }
    .h-btns { display: flex; gap: 9px; margin-bottom: 14px; }
    .h-play {
      display: flex; align-items: center; gap: 7px;
      padding: 10px 20px;
      background: linear-gradient(135deg,var(--gold) 0%,#b8860b 100%);
      color: var(--void); font-weight: 700; font-size: 0.86rem;
      border-radius: 50px; text-decoration: none;
      box-shadow: 0 6px 22px rgba(212,168,39,0.4); transition: all 0.25s; letter-spacing: 0.02em;
    }
    .h-play:hover { transform: scale(1.05); box-shadow: 0 10px 32px rgba(212,168,39,0.62); }
    .h-info {
      display: flex; align-items: center; gap: 7px;
      padding: 10px 17px;
      background: rgba(248,244,238,0.1); color: var(--white);
      font-weight: 600; font-size: 0.82rem; border-radius: 50px;
      text-decoration: none; border: 1px solid rgba(248,244,238,0.18);
      backdrop-filter: blur(8px); transition: all 0.25s;
    }
    .h-info:hover { background: rgba(248,244,238,0.18); }
    #h-dots { display: flex; gap: 6px; align-items: center; }
    .h-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(255,255,255,0.3); cursor: pointer; transition: all 0.35s;
    }
    .h-dot.on { width: 24px; border-radius: 3px; background: var(--gold-lt); }

    /* ─ SECTION LABEL ─ */
    .sec-lbl {
      display: flex; align-items: center; gap: 10px;
      padding: 20px 16px 11px;
    }
    .sec-lbl-ico { font-size: 1rem; }
    .sec-lbl-txt {
      font-family: var(--ff-d); font-size: 0.98rem; font-weight: 700;
      color: var(--gold-lt); letter-spacing: 0.12em; text-transform: uppercase;
    }
    .sec-lbl-ln { flex: 1; height: 1px; background: linear-gradient(90deg,var(--border-hi),transparent); }

    /* ─ EPISODE CARDS (horizontal row) ─ */
    #ep-scroll { overflow-x: auto; overflow-y: visible; scrollbar-width: none; padding: 2px 16px 14px; -webkit-overflow-scrolling: touch; }
    #ep-scroll::-webkit-scrollbar { display: none; }
    #new-episodes-grid { display: flex; gap: 12px; width: max-content; }

    .ep-card {
      width: 152px; background: var(--card);
      border-radius: var(--r); border: 1px solid var(--border);
      overflow: hidden; flex-shrink: 0; cursor: pointer;
      transition: all 0.38s cubic-bezier(0.34,1.56,0.64,1);
      position: relative; opacity: 0; transform: translateY(18px) scale(0.95);
    }
    .ep-card.vis { animation: epIn 0.5s ease forwards; }
    .ep-card:nth-child(1).vis{animation-delay:.0s}
    .ep-card:nth-child(2).vis{animation-delay:.07s}
    .ep-card:nth-child(3).vis{animation-delay:.14s}
    .ep-card:nth-child(4).vis{animation-delay:.21s}
    .ep-card:nth-child(5).vis{animation-delay:.28s}
    @keyframes epIn { to { opacity:1; transform:translateY(0) scale(1); } }
    .ep-card:hover {
      border-color: var(--border-hi); transform: translateY(-7px) scale(1.03);
      box-shadow: 0 20px 46px rgba(0,0,0,0.55), var(--shadow-g);
    }
    .ep-tw { position: relative; overflow: hidden; height: 106px; }
    .ep-th { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.5s ease; }
    .ep-card:hover .ep-th { transform: scale(1.09); }
    .ep-tg { position: absolute; bottom: 0; left: 0; right: 0; height: 55%; background: linear-gradient(transparent,rgba(8,15,30,0.95)); }
    .ep-nb {
      position: absolute; top: 7px; left: 7px;
      background: var(--gold); color: var(--void);
      font-size: 0.59rem; font-weight: 800; padding: 3px 7px;
      border-radius: 5px; letter-spacing: 0.1em; text-transform: uppercase;
      box-shadow: 0 2px 10px rgba(212,168,39,0.6);
    }
    .ep-lb {
      position: absolute; top: 7px; right: 7px;
      background: rgba(0,0,0,0.72); color: var(--cyan);
      font-size: 0.57rem; font-weight: 700; padding: 3px 7px;
      border-radius: 5px; border: 1px solid rgba(6,182,212,0.3); backdrop-filter: blur(4px);
    }
    .ep-info { padding: 9px 10px 3px; }
    .ep-ser { font-size: 0.67rem; color: var(--cyan); font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ep-ttl { font-size: 0.84rem; font-weight: 700; color: var(--white); line-height: 1.3; }
    .ep-btn {
      display: block; margin: 8px 10px 10px;
      padding: 9px; background: linear-gradient(135deg,#0284c7,#0369a1);
      color: #fff; font-weight: 700; font-size: 0.79rem;
      text-align: center; text-decoration: none; border-radius: 9px;
      transition: all 0.3s; position: relative; overflow: hidden; letter-spacing: 0.03em;
    }
    .ep-btn::after { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg,var(--gold),#b8860b); opacity: 0; transition: opacity 0.3s; }
    .ep-btn:hover::after { opacity: 1; }
    .ep-btn span { position: relative; z-index: 1; }
    .ep-btn:hover { color: var(--void); box-shadow: 0 6px 20px rgba(212,168,39,0.45); transform: translateY(-1px); }

    /* ─ SCHEDULE (vertical) ─ */
    #sched-list { display: flex; flex-direction: column; gap: 8px; padding: 0 16px 12px; }
    .sc-card {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; background: var(--card);
      border: 1px solid var(--border); border-radius: var(--r);
      transition: all 0.3s; position: relative; overflow: hidden;
      opacity: 0; transform: translateX(-22px);
    }
    .sc-card.vis { animation: scIn 0.42s ease forwards; }
    .sc-card:nth-child(1).vis{animation-delay:.0s}
    .sc-card:nth-child(2).vis{animation-delay:.08s}
    .sc-card:nth-child(3).vis{animation-delay:.16s}
    @keyframes scIn { to { opacity:1; transform:translateX(0); } }
    .sc-card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px; background: linear-gradient(180deg,var(--gold-lt),var(--cyan));
      border-radius: 3px 0 0 3px;
    }

    /* ─ FILTER BAR ─ */
    .filter-bar {

      background: linear-gradient(135deg,var(--gold) 0%,#b8860b 100%);

    }
    .filter-bar .secondary .pill { padding: 6px 12px; font-size: 0.78rem; }

    /* ─ SERIES GRID ─ */
    #series-grid {
      display: grid; grid-template-columns: repeat(2,1fr);
      gap: 12px; padding: 4px 16px 16px;
    }
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r); overflow: hidden; text-decoration: none;
      display: flex; flex-direction: column;
      transition: all 0.38s cubic-bezier(0.34,1.56,0.64,1);

    }
    .card.vis { animation: epIn 0.5s ease forwards; }
    .card:hover {

    }
    .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; transition: transform 0.5s; }
    .card:hover img { transform: scale(1.05); }
    .card .title { padding: 11px 12px 13px; font-size: 0.86rem; font-weight: 700; color: var(--white); line-height: 1.35; }
    .card::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg,var(--gold),var(--cyan));

<script>
/* ── Sidebar ── */
const sidebar=document.getElementById('sidebar'),sbOv=document.getElementById('sb-ov');
function openSB(){sidebar.classList.add('open');sbOv.classList.add('on');document.body.style.overflow='hidden';}
function closeSB(){
  sidebar.classList.remove('open');sbOv.classList.remove('on');document.body.style.overflow='';
  sidebar.querySelectorAll('.sb-a').forEach(el=>{el.style.animation='none';el.offsetHeight;el.style.animation='';});
}
document.getElementById('hamburger').addEventListener('click',openSB);
document.getElementById('sidebarClose').addEventListener('click',closeSB);
sbOv.addEventListener('click',closeSB);
document.getElementById('sidebarDubbed').addEventListener('click',e=>{e.preventDefault();closeSB();setTimeout(()=>document.getElementById('pill-dub')?.click(),360);});
document.getElementById('sidebarSubtitles').addEventListener('click',e=>{e.preventDefault();closeSB();setTimeout(()=>document.getElementById('pill-sub')?.click(),360);});

/* ── Search Overlay ── */
const srchOv=document.getElementById('srch-ov'),srchInp=document.getElementById('srch-inp');
document.getElementById('srch-trigger').addEventListener('click',()=>{srchOv.classList.add('on');document.body.style.overflow='hidden';setTimeout(()=>srchInp.focus(),80);});
document.getElementById('srch-cancel').addEventListener('click',()=>{srchOv.classList.remove('on');document.body.style.overflow='';srchInp.value='';document.getElementById('srch-grid').innerHTML='<div class="srch-hint">🔍 Start typing to search...</div>';});

/* ── Sponsor dynamic ── */
(async()=>{try{const r=await fetch('/config.json',{cache:'no-cache'});if(!r.ok)return;const c=await r.json(),f=c.redirectionFeatures,b=document.getElementById('sp-bar');if(!b)return;if(f.shortlink&&!f.sponsorPopup){b.querySelector('.sp-lbl').textContent='Ad Space Available';b.querySelector('.sp-nm').textContent='Reach Thousands Daily!';const btn=b.querySelector('.sp-btn');btn.href='https://t.me/Itz_me_zain1';btn.textContent='Contact 💬';}}catch(e){}})();

/* ── Shortlink handler ── */
(function(){let fc=null;fetch('/config.json',{cache:'no-cache'}).then(r=>r.ok?r.json():null).then(c=>{if(c)fc=c.redirectionFeatures;}).catch(()=>{});const t=setInterval(()=>{const bs=document.querySelectorAll('.ep-btn,.h-play[data-ep]');if(!bs.length)return;clearInterval(t);bs.forEach(b=>{const orig=b.getAttribute('href');b.addEventListener('click',async e=>{if(!fc?.shortlink||fc?.sponsorPopup)return;e.preventDefault();try{const u=new URL(orig,location.origin),p=new URLSearchParams(u.search),series=p.get('series'),season=p.get('season'),ep=p.get('ep'),lang=p.get('lang');let jf=`episode-data/${series}-s${season}`;if(lang&&lang!=='dub')jf+=`-${lang}`;jf+='.json';const res=await fetch(jf);if(!res.ok){location.href=orig;return;}const eps=await res.json(),found=eps.find(e=>String(e.ep)===String(ep));if(found?.shortlink){location.href=found.shortlink;}else{location.href=orig;}}catch{location.href=orig;}});});},120);setTimeout(()=>clearInterval(t),6000);})();

/* ── Footer ── */
(async function(){if(document.readyState!=='complete')await new Promise(r=>window.addEventListener('load',r,{once:true}));try{const res=await fetch('/includes/footer.html');if(!res.ok)return;document.getElementById('footer-placeholder').innerHTML=await res.text();const nav=document.getElementById('smtv-bottom-nav');if(!nav)return;const items=Array.from(nav.querySelectorAll('.nav-item'));const path=location.pathname.toLowerCase();let matched=items.find(a=>{const n=(a.dataset.name||'').toLowerCase();return(n==='home'&&(path==='/'||path.includes('index')))||(n&&path.includes(n));});if(!matched){const l=localStorage.getItem('smtv_last_nav');if(l)matched=items.find(a=>a.dataset.name===l);}if(matched)matched.classList.add('active');items.forEach(a=>a.addEventListener('click',function(e){items.forEach(i=>i.classList.remove('active'));this.classList.add('active');try{localStorage.setItem('smtv_last_nav',this.dataset.name);}catch(e){}const href=this.getAttribute('href');setTimeout(()=>{if(location.pathname.toLowerCase()!==new URL(href,location.origin).pathname.toLowerCase())location.href=href;},200);},{passive:true}));try{const p=parseInt(getComputedStyle(document.body).paddingBottom)||0;if(p<96)document.body.style.paddingBottom='calc(96px + env(safe-area-inset-bottom))';}catch(e){}}catch(e){}})();
