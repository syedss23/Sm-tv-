  <style>
/* ═══════════════════════════════════════
   BASE RESET
═══════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;-webkit-text-size-adjust:none;}
body{background:#07090f;color:#e2ecf8;font-family:'Inter','Segoe UI',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden;min-height:100dvh;}
a{text-decoration:none;color:inherit;}
img,video{display:block;max-width:100%;}
button{font-family:inherit;cursor:pointer;border:none;background:none;}
:focus-visible{outline:2px solid rgba(0,205,235,.5);outline-offset:2px;}
#main-content{max-width:980px;margin:0 auto;padding:12px 12px 0;}

/* ═══════════════════════════════════════
   KEYFRAMES
═══════════════════════════════════════ */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes shine{0%{background-position:-400px 0}100%{background-position:400px 0}}
@keyframes borderSpin{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes crownBob{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-4px) rotate(4deg)}}
@keyframes goldPulse{0%,100%{box-shadow:0 4px 18px rgba(255,185,0,.28),inset 0 1px 0 rgba(255,255,255,.2)}50%{box-shadow:0 8px 28px rgba(255,185,0,.45),inset 0 1px 0 rgba(255,255,255,.2)}}
@keyframes tabBounce{0%{transform:translateY(0) scale(1)}45%{transform:translateY(-5px) scale(1.07)}100%{transform:translateY(-3px) scale(1.02)}}
@keyframes dotPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.15;transform:scale(.5)}}
@keyframes cardPop{from{opacity:0;transform:translateY(14px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes popIn{from{opacity:0;transform:translate(-50%,-46%) scale(.84)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
@keyframes popOut{from{opacity:1;transform:translate(-50%,-50%) scale(1)}to{opacity:0;transform:translate(-50%,-46%) scale(.84)}}

/* ═══════════════════════════════════════
   SERIES HEADER  — no scan
═══════════════════════════════════════ */
.pro-series-header-pro{position:relative;border-radius:20px;overflow:hidden;background:#0d1220;border:1px solid rgba(255,255,255,.07);box-shadow:0 20px 60px rgba(0,0,0,.6);margin-bottom:20px;animation:fadeUp .6s cubic-bezier(.22,.8,.2,1) both;}
.pro-series-poster-pro{width:100%;height:190px;object-fit:cover;object-position:center top;display:block;background:#0a0e1a;}
.smtv-poster-fade{position:absolute;left:0;right:0;bottom:0;height:90px;background:linear-gradient(to bottom,transparent,#0d1220);pointer-events:none;z-index:2;}
.pro-series-meta-pro{position:relative;z-index:3;padding:8px 16px 18px;text-align:center;}
.pro-series-back-btn-pro{position:absolute;left:12px;top:12px;z-index:10;width:38px;height:38px;display:inline-flex;align-items:center;justify-content:center;border-radius:10px;background:rgba(7,9,15,.82);border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);color:#a0bcd8;font-size:15px;transition:background .2s,border-color .2s,transform .2s;box-shadow:0 4px 14px rgba(0,0,0,.45);}
.pro-series-back-btn-pro:hover{background:rgba(0,195,225,.12);border-color:rgba(0,195,225,.35);transform:translateX(-2px);}
.pro-series-title-pro{font-family:'Cinzel',serif;font-size:clamp(1.15rem,4vw,1.65rem);font-weight:800;letter-spacing:.05em;color:#fff;text-shadow:0 2px 20px rgba(0,0,0,.6);margin:0 0 8px;line-height:1.2;}
.pro-series-desc-pro{font-size:.84rem;color:#7090a8;line-height:1.65;max-width:560px;margin:0 auto 14px;}

/* ═══════════════════════════════════════
   VIP CARD  — compact elegant redesign
═══════════════════════════════════════ */
.smtv-vip-card{
  position:relative;max-width:360px;margin:0 auto 4px;
  padding:1.5px;border-radius:16px;
  background:linear-gradient(270deg,#00d0ee,#ffc83a,#00d0ee);
  background-size:300% 300%;
  animation:borderSpin 4s ease infinite, fadeUp .65s cubic-bezier(.22,.8,.2,1) .08s both;
}
.smtv-vip-inner{
  background:linear-gradient(160deg,#0c1a2e,#080f1d);
  border-radius:15px;
  padding:14px 13px 15px;
  position:relative;overflow:hidden;
}
.smtv-vip-inner::after{
  content:'';position:absolute;top:-50px;right:-50px;
  width:140px;height:140px;
  background:radial-gradient(circle,rgba(255,196,50,.10),transparent 65%);
  pointer-events:none;
}

/* Title */
.smtv-vip-title{
  display:flex;align-items:center;gap:8px;
  margin-bottom:12px;
}
.smtv-vip-crown{font-size:1rem;flex-shrink:0;animation:crownBob 2.2s ease-in-out infinite;display:inline-block;}
.smtv-vip-title-text{
  font-size:.9rem;font-weight:900;letter-spacing:.01em;
  background:linear-gradient(90deg,#ffd84a,#ffee99,#ffd84a);
  background-size:200% auto;animation:shine 2.6s linear infinite;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

/* ── FEATURE GRID — compact pill rows ──
   Each pill: small coloured dot + icon emoji + label
   Horizontal layout, 2 per row, slim height
═══════════════════════════════════════ */
.smtv-vip-feats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:7px;
  margin-bottom:13px;
}
.smtv-vip-feat{
  display:flex;
  align-items:center;
  gap:7px;
  padding:8px 10px;
  border-radius:9px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  transition:background .2s,border-color .2s;
  position:relative;
  overflow:hidden;
}
/* Subtle left-border accent per feature */
.smtv-vip-feat::before{
  content:'';
  position:absolute;left:0;top:0;bottom:0;width:2.5px;
  border-radius:9px 0 0 9px;
}
.smtv-vip-feat:nth-child(1)::before{background:#ff7a5a;}
.smtv-vip-feat:nth-child(2)::before{background:#1de8ff;}
.smtv-vip-feat:nth-child(3)::before{background:#a78bfa;}
.smtv-vip-feat:nth-child(4)::before{background:#ffd84a;}

.smtv-vip-feat:hover{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.14);}

.smtv-vip-feat-icon{
  font-size:.88rem;
  flex-shrink:0;
  line-height:1;
}
.smtv-vip-feat-label{
  font-size:.74rem;
  font-weight:700;
  color:#d0e8ff;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* BECOME VIP */
.smtv-vip-btn{
  display:flex;align-items:center;justify-content:center;gap:7px;
  width:100%;padding:11px 14px;border-radius:10px;
  font-size:.84rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase;
  color:#1a0500;text-decoration:none;position:relative;overflow:hidden;
  background:linear-gradient(135deg,#ffc83a,#ffde70,#ffb020);
  box-shadow:0 8px 22px rgba(255,185,0,.28),inset 0 1px 0 rgba(255,255,255,.28);
  transition:transform .2s,box-shadow .2s;
  animation:goldPulse 2.8s ease-in-out infinite;
  border:none;cursor:pointer;font-family:'Inter',sans-serif;
}
.smtv-vip-btn::before{content:'';position:absolute;top:0;left:-100%;width:55%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.32),transparent);animation:shine 2s ease-in-out infinite;}
.smtv-vip-btn:hover{transform:translateY(-2px);box-shadow:0 14px 32px rgba(255,185,0,.45),inset 0 1px 0 rgba(255,255,255,.28);}
.smtv-vip-btn:active{transform:scale(.97);}

/* ═══════════════════════════════════════
   SEASON TABS
═══════════════════════════════════════ */
.pro-seasons-tabs-pro{display:flex;gap:9px;justify-content:center;flex-wrap:wrap;margin:18px 0 11px;animation:fadeUp .5s cubic-bezier(.22,.8,.2,1) .12s both;}
.pro-season-tab-pro{padding:9px 28px;border-radius:999px;border:1.5px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#607890;font-size:.88rem;font-weight:800;letter-spacing:.02em;transition:all .26s cubic-bezier(.22,.8,.2,1);outline:none;position:relative;overflow:hidden;}
.pro-season-tab-pro:hover:not(.active){color:#d0e8ff;border-color:rgba(0,205,235,.32);transform:translateY(-1px);background:rgba(0,205,235,.06);}
.pro-season-tab-pro.active{background:linear-gradient(135deg,#1de8ff,#00a8d0);border-color:transparent;color:#021820;font-weight:900;box-shadow:0 8px 22px rgba(0,200,235,.35),0 0 0 3px rgba(0,200,235,.12);animation:tabBounce .35s cubic-bezier(.22,.8,.2,1) both;}
.pro-season-tab-pro:active{transform:scale(.95);}

/* ═══════════════════════════════════════
   SOURCE BUTTONS
═══════════════════════════════════════ */
.source-selector{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin:0 0 16px;}
.source-btn{padding:7px 22px;border-radius:999px;border:1.5px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);color:#607890;font-size:.84rem;font-weight:800;transition:all .2s ease;outline:none;}
.source-btn:hover:not(.active){color:#d0e8ff;border-color:rgba(0,205,235,.28);background:rgba(0,205,235,.05);transform:translateY(-1px);}
.source-btn.active{background:linear-gradient(135deg,#1de8ff,#00a8d0);border-color:transparent;color:#021820;font-weight:900;box-shadow:0 6px 18px rgba(0,205,235,.28);}
.source-btn:active{transform:scale(.96);}

/* ═══════════════════════════════════════
   EPISODES LABEL
═══════════════════════════════════════ */
.smtv-ep-label{display:flex;align-items:center;gap:12px;margin:4px 0 14px;}
.smtv-ep-label-txt{font-family:'Cinzel',serif;font-size:1.05rem;font-weight:900;font-style:italic;letter-spacing:.1em;text-transform:uppercase;color:#1de8ff;text-shadow:0 0 20px rgba(0,205,235,.4);flex-shrink:0;white-space:nowrap;}
.smtv-ep-label-line{flex:1;height:1.5px;background:linear-gradient(90deg,rgba(0,205,235,.55),rgba(0,205,235,.0));border-radius:2px;}

/* ═══════════════════════════════════════
   EPISODE ROW
═══════════════════════════════════════ */
.pro-episodes-row-wrap-pro{margin-top:4px;margin-bottom:8px;}
.pro-episodes-row-pro{display:flex;gap:10px;overflow-x:auto;padding:4px 2px 14px;-webkit-overflow-scrolling:touch;scroll-snap-type:x proximity;scrollbar-width:none;align-items:flex-start;}
.pro-episodes-row-pro::-webkit-scrollbar{display:none;}

/* ═══════════════════════════════════════
   EPISODE CARD
═══════════════════════════════════════ */
.pro-episode-card-pro{flex:0 0 148px;scroll-snap-align:start;display:flex;flex-direction:column;text-decoration:none;border-radius:13px;background:#0d1422;border:1px solid rgba(255,255,255,.08);overflow:hidden;position:relative;opacity:0;transform:translateY(14px);transition:transform .28s cubic-bezier(.22,.8,.2,1),box-shadow .28s ease,border-color .28s ease;will-change:transform;}
.pro-episode-card-pro.smtv-card-in{animation:cardPop .4s cubic-bezier(.22,.8,.2,1) both;}
.pro-episode-card-pro:hover{transform:translateY(-5px) scale(1.02);box-shadow:0 16px 36px rgba(0,0,0,.55),0 0 0 1px rgba(0,205,235,.22);border-color:rgba(0,205,235,.28);}
.pro-episode-card-pro:active{transform:scale(.96);}
@media(max-width:420px){.pro-episode-card-pro{flex:0 0 130px;}}
@media(min-width:900px){.pro-episode-card-pro{flex:0 0 170px;}}

.pro-ep-thumb-wrap-pro{position:relative;width:100%;padding-top:56.25%;overflow:hidden;background:#060a14;flex-shrink:0;display:block;}
.pro-ep-thumb-pro{position:absolute!important;top:0!important;left:0!important;width:100%!important;height:100%!important;object-fit:cover!important;object-position:center!important;display:block!important;background:#060a14;transition:transform .32s cubic-bezier(.22,.8,.2,1);}
.pro-episode-card-pro:hover .pro-ep-thumb-pro{transform:scale(1.06);}

.smtv-play-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .22s;z-index:3;pointer-events:none;background:rgba(0,0,0,.18);}
.smtv-play-overlay span{width:34px;height:34px;border-radius:50%;background:rgba(0,205,235,.92);display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(0,205,235,.5);}
.smtv-play-overlay i{font-size:.65rem;color:#021820;margin-left:2px;}
.pro-episode-card-pro:hover .smtv-play-overlay{opacity:1;}

.pro-ep-num-pro{position:absolute!important;top:6px!important;left:6px!important;bottom:auto!important;right:auto!important;z-index:4;background:rgba(4,7,18,.82);border:1px solid rgba(0,205,235,.3);color:#1de8ff;font-size:.63rem;font-weight:900;padding:3px 8px;border-radius:6px;letter-spacing:.05em;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);white-space:nowrap;line-height:1.4;max-width:calc(100% - 12px);overflow:hidden;text-overflow:ellipsis;}

.pro-ep-title-pro{padding:7px 8px 10px!important;display:flex!important;flex-direction:column!important;width:100%!important;overflow:visible!important;white-space:normal!important;min-height:0!important;}
.smtv-ep-raw-title{display:block;width:100%;line-height:1.4;color:#c8dff0;font-weight:700;word-break:break-word;overflow-wrap:break-word;white-space:normal;font-size:.75rem;}

/* ═══════════════════════════════════════
   HOW TO WATCH
═══════════════════════════════════════ */
.howto-section{margin:24px 0 20px;}
.pro-tutorial-title{display:flex;align-items:center;gap:11px;padding-bottom:10px;border-bottom:1.5px solid rgba(0,205,235,.3);margin-bottom:0;}
.pro-tutorial-title .smtv-bar{width:4px;height:26px;border-radius:3px;flex-shrink:0;background:#1de8ff;box-shadow:0 0 12px rgba(0,205,235,.6);}
.pro-tutorial-title .smtv-howto-text{font-family:'Cinzel',serif;font-size:1.15rem;font-weight:800;font-style:italic;color:#fff;line-height:1.25;letter-spacing:.01em;}
.smtv-process-label{display:flex;align-items:center;gap:9px;margin:18px 0 10px;}
.smtv-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;background:#1de8ff;box-shadow:0 0 10px rgba(0,205,235,.7),0 0 4px rgba(0,205,235,.4);animation:dotPulse 1.8s ease-in-out infinite;display:inline-block;}
.smtv-process-label-txt{font-size:.78rem;font-weight:900;letter-spacing:.13em;text-transform:uppercase;color:#1de8ff;}
.smtv-video-card{border-radius:13px;overflow:hidden;background:#080c18;border:1px solid rgba(255,255,255,.06);box-shadow:0 10px 28px rgba(0,0,0,.45);}
.pro-video-frame-wrap{position:relative;width:100%;height:0;padding-bottom:56.25%;overflow:hidden;}
.pro-video-frame-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:0;display:block;background:#000;}

/* ═══════════════════════════════════════
   WHATSAPP POPUP
═══════════════════════════════════════ */
#wa-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px);z-index:99998;}
#wa-backdrop.open{display:block;animation:fadeIn .3s ease both;}
#whatsappPopup{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:min(330px,calc(100vw - 28px));z-index:99999;border-radius:20px;}
#whatsappPopup.open{display:block;animation:popIn .4s cubic-bezier(.22,.8,.2,1) both;}
#whatsappPopup.closing{animation:popOut .26s cubic-bezier(.22,.8,.2,1) both;}
.wa-inner{background:linear-gradient(160deg,#101a2c,#0c1320);border:1px solid rgba(255,255,255,.09);border-radius:20px;padding:20px 18px 18px;position:relative;overflow:hidden;}
.wa-inner::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#25d366,#1de8ff,#25d366);background-size:400px 2px;animation:shine 2s linear infinite;}
.wa-top{display:flex;align-items:center;gap:11px;margin-bottom:11px;}
.wa-logo{width:42px;height:42px;border-radius:11px;flex-shrink:0;}
.wa-title{font-size:.95rem;font-weight:900;color:#fff;line-height:1.2;}
.wa-body{font-size:.83rem;color:#8fa8c4;line-height:1.6;margin-bottom:14px;}
.wa-body strong{color:#e2ecf8;}
.wa-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px 16px;border-radius:12px;background:linear-gradient(135deg,#25d366,#1aaa50);color:#fff;font-weight:800;font-size:.9rem;text-decoration:none;box-shadow:0 7px 20px rgba(37,211,102,.28);transition:transform .2s,box-shadow .2s;}
.wa-btn:hover{transform:translateY(-2px);box-shadow:0 11px 26px rgba(37,211,102,.38);}
.wa-dismiss{display:block;width:fit-content;margin:10px auto 0;padding:6px 12px;background:none;border:none;color:#607890;font-size:.8rem;font-weight:700;cursor:pointer;transition:color .2s;border-radius:6px;}
.wa-dismiss:hover{color:#ff7090;}

@media(max-width:600px){body{padding-bottom:calc(114px + env(safe-area-inset-bottom));}}

<div id="wa-backdrop"></div>
<div id="main-content">
  <header></header>
  <script type="text/javascript" src="//www.highperformanceformat.com/c91a82435d260630918ecc80c95125ac/invoke.js"></script>
  <div id="series-details" aria-live="polite"></div>
</div>

<script>
(function(){
  'use strict';

  /* ── POSTER FX — no scan ── */
  function doPosterFX(){
    document.querySelectorAll('.pro-series-header-pro').forEach(function(h){
      if(h._fx)return;h._fx=true;
      if(!h.querySelector('.smtv-poster-fade')){var f=document.createElement('div');f.className='smtv-poster-fade';h.appendChild(f);}
      var sc=h.querySelector('.smtv-scan');if(sc)sc.remove();
    });
  }

  /* ── VIP CARD — compact pill layout ── */
  function doVipCard(){
    document.querySelectorAll('.premium-channel-message').forEach(function(box){
      if(box._vip)return;box._vip=true;
      var aEl=box.querySelector('a');
      var href=(aEl&&aEl.getAttribute('href'))||'/premium.html';
      box.className='smtv-vip-card';box.removeAttribute('style');
      box.innerHTML=
        '<div class="smtv-vip-inner">'+
          '<div class="smtv-vip-title">'+
            '<span class="smtv-vip-crown">👑</span>'+
            '<span class="smtv-vip-title-text">SMTV VIP Membership</span>'+
          '</div>'+
          '<div class="smtv-vip-feats">'+
            '<div class="smtv-vip-feat"><span class="smtv-vip-feat-icon">⚡</span><span class="smtv-vip-feat-label">No Ads</span></div>'+
            '<div class="smtv-vip-feat"><span class="smtv-vip-feat-icon">⬇️</span><span class="smtv-vip-feat-label">Fast Download</span></div>'+
            '<div class="smtv-vip-feat"><span class="smtv-vip-feat-icon">🔒</span><span class="smtv-vip-feat-label">Early Access</span></div>'+
            '<div class="smtv-vip-feat"><span class="smtv-vip-feat-icon">🎞️</span><span class="smtv-vip-feat-label">HD Quality</span></div>'+
          '</div>'+
          '<a class="smtv-vip-btn" href="'+href+'"><i class="fa-solid fa-crown"></i> BECOME VIP</a>'+
        '</div>';
    });
  }

  /* ── SEASON TABS ── */
  function doTabAnim(){
    document.querySelectorAll('.pro-season-tab-pro').forEach(function(tab){
      if(tab._click)return;tab._click=true;
      tab.addEventListener('click',function(){
        document.querySelectorAll('.pro-season-tab-pro').forEach(function(t){t.classList.remove('active');});
        this.classList.add('active');this.style.animation='none';void this.offsetHeight;this.style.animation='';
      });
    });
  }

  /* ── THUMBNAIL FIX ── */
  function doThumbs(){
    document.querySelectorAll('.pro-ep-thumb-pro').forEach(function(img){
      if(img._fix)return;img._fix=true;
      var wrap=img.parentElement;
      if(wrap&&wrap.classList.contains('pro-ep-thumb-wrap-pro')){wrap.style.height='';wrap.style.minHeight='';wrap.style.maxHeight='';}
      img.style.setProperty('position','absolute','important');img.style.setProperty('top','0','important');img.style.setProperty('left','0','important');img.style.setProperty('width','100%','important');img.style.setProperty('height','100%','important');img.style.setProperty('object-fit','cover','important');
    });
  }

  /* ── EP BADGE TOP-LEFT ── */
  function doBadge(){
    document.querySelectorAll('.pro-ep-num-pro').forEach(function(el){
      if(el._b)return;el._b=true;
      el.style.setProperty('top','6px','important');el.style.setProperty('left','6px','important');el.style.setProperty('bottom','auto','important');el.style.setProperty('right','auto','important');
    });
  }

  /* ── EPISODE TITLE — raw JSON, auto font size ── */
  function doTitle(){
    document.querySelectorAll('.pro-ep-title-pro').forEach(function(el){
      if(el._t)return;el._t=true;
      var raw=(el.textContent||'').trim();
      var len=raw.length,fs,fw,fc;
      if(len<=18){fs='.78rem';fw='800';fc='#ddeeff';}
      else if(len<=30){fs='.70rem';fw='700';fc='#c8dff0';}
      else if(len<=45){fs='.62rem';fw='600';fc='#b0ccdf';}
      else{fs='.55rem';fw='500';fc='#9ab8cc';}
      el.innerHTML='<span class="smtv-ep-raw-title">'+raw+'</span>';
      var s=el.querySelector('.smtv-ep-raw-title');
      if(s){s.style.fontSize=fs;s.style.fontWeight=fw;s.style.color=fc;}
      el.style.setProperty('display','flex','important');el.style.setProperty('flex-direction','column','important');el.style.setProperty('padding','7px 8px 10px','important');el.style.setProperty('overflow','visible','important');el.style.setProperty('width','100%','important');el.style.setProperty('white-space','normal','important');el.style.setProperty('min-height','0','important');
    });
  }

  /* ── PLAY OVERLAY ── */
  function doPlayOverlay(){
    document.querySelectorAll('.pro-ep-thumb-wrap-pro').forEach(function(wrap){
      if(wrap._pl)return;wrap._pl=true;
      if(!wrap.querySelector('.smtv-play-overlay')){
        var d=document.createElement('div');d.className='smtv-play-overlay';d.innerHTML='<span><i class="fa-solid fa-play"></i></span>';wrap.appendChild(d);
      }
    });
  }

  /* ── CARD ANIM ── */
  function doCardAnim(){
    document.querySelectorAll('.pro-episode-card-pro').forEach(function(card,i){
      if(card._an)return;card._an=true;
      card.style.animationDelay=(i*0.055)+'s';
      requestAnimationFrame(function(){requestAnimationFrame(function(){card.classList.add('smtv-card-in');});});
    });
  }

  /* ── EPISODES LABEL ── */
  function doEpLabel(){
    document.querySelectorAll('.pro-episodes-row-wrap-pro').forEach(function(wrap){
      if(wrap._lbl)return;wrap._lbl=true;
      if(!wrap.querySelector('.smtv-ep-label')){
        var lbl=document.createElement('div');lbl.className='smtv-ep-label';
        lbl.innerHTML='<span class="smtv-ep-label-txt">Episodes</span><span class="smtv-ep-label-line"></span>';
        wrap.insertBefore(lbl,wrap.firstChild);
      }
    });
  }

  /* ── HOW TO WATCH ── */
  function doHowTo(){
    document.querySelectorAll('.pro-tutorial-title').forEach(function(el){
      if(el._ht)return;el._ht=true;
      var txt=(el.textContent||'How to Watch Episodes').trim().replace(/^[-–—|▌\s]+/,'').trim();
      el.innerHTML='<span class="smtv-bar"></span><span class="smtv-howto-text">'+txt+'</span>';
    });
    document.querySelectorAll('.howto-section').forEach(function(sec){
      if(sec._hw)return;sec._hw=true;
      sec.querySelectorAll('*').forEach(function(node){
        if(node._proc||node.children.length>0)return;
        var t=(node.textContent||'').trim().toUpperCase();
        if(t==='OLD PROCESS'||t==='NEW PROCESS'){
          node._proc=true;
          var w=document.createElement('div');w.className='smtv-process-label';
          w.innerHTML='<span class="smtv-dot"></span><span class="smtv-process-label-txt">'+t+'</span>';
          node.parentNode&&node.parentNode.replaceChild(w,node);
        }
      });
    });
  }

  /* ── SCROLL LOCK ── */
  function doScrollLock(){
    try{window.scrollTo(0,0);}catch(e){}
    var det=document.getElementById('series-details');
    if(det){
      var o=new MutationObserver(function(){
        if(det.childNodes.length>0){try{window.scrollTo({top:0,left:0,behavior:'auto'});}catch(e){window.scrollTo(0,0);}o.disconnect();}
      });
      o.observe(det,{childList:true,subtree:false});
    }
  }

  function runAll(){doPosterFX();doVipCard();doTabAnim();doThumbs();doBadge();doTitle();doPlayOverlay();doCardAnim();doEpLabel();doHowTo();}

  var obs=new MutationObserver(function(){runAll();});
  obs.observe(document.body,{childList:true,subtree:true});
  setTimeout(function(){obs.disconnect();},14000);
  if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',runAll);}else{runAll();}
  doScrollLock();
})();
</script>

<script>
(async function(){
  var cands=['/includes/footer.html','includes/footer.html','./includes/footer.html','/footer.html','footer.html'];
  var ph=document.getElementById('footer-placeholder');
  function initNav(html){
    try{
      ph.innerHTML=html;
      try{var p=parseInt(getComputedStyle(document.body).paddingBottom)||0;if(p<96)document.body.style.paddingBottom='calc(96px + env(safe-area-inset-bottom))';}catch(e){}
      var nav=ph.querySelector('#smtv-bottom-nav')||ph.querySelector('.smtv-bottom-nav');
      if(!nav)return;
      var items=Array.from(nav.querySelectorAll('.nav-item'));
      items.forEach(function(i){i.classList.remove('active');});
      var up=new URLSearchParams(window.location.search);
      var si=items.find(function(i){return((i.dataset&&(i.dataset.name||'').toLowerCase())==='series');});
      if(up.has('series')&&si)si.classList.add('active');
      else{var pp=location.pathname.toLowerCase();var bp=items.find(function(i){return(i.getAttribute('href')||'').toLowerCase().includes(pp.split('/').pop());});if(bp)bp.classList.add('active');else if(si)si.classList.add('active');}
      items.forEach(function(a){
        if(a._si)return;a._si=true;
        a.addEventListener('click',function(e){try{e.preventDefault&&e.preventDefault();}catch(x){}items.forEach(function(i){i.classList.remove('active');});this.classList.add('active');var h=this.getAttribute('href');if(h)location.assign(h);},{passive:false});
      });
    }catch(e){console.warn('initNav',e);}
  }
  for(var i=0;i<cands.length;i++){try{var r=await fetch(cands[i],{cache:'no-cache'});if(!r.ok)continue;var t=await r.text();initNav(t);return;}catch(e){continue;}}
  ph.innerHTML='<nav class="smtv-bottom-nav" id="smtv-bottom-nav"><a href="/index.html" class="nav-item" data-name="home"><span class="icon-wrap"><i class="fa-solid fa-house"></i></span><span class="label">Home</span></a><a href="/series.html" class="nav-item active" data-name="series"><span class="icon-wrap"><i class="fa-solid fa-film"></i></span><span class="label">Series</span></a><a href="/clips.html" class="nav-item" data-name="clips"><span class="icon-wrap"><i class="fa-solid fa-play-circle"></i></span><span class="label">Clips</span></a><a href="/premium.html" class="nav-item" data-name="premium"><span class="icon-wrap"><i class="fa-solid fa-star"></i></span><span class="label">Premium</span></a><a href="/more.html" class="nav-item" data-name="more"><span class="icon-wrap"><i class="fa-solid fa-circle-info"></i></span><span class="label">More</span></a></nav><style>.smtv-bottom-nav{position:fixed;left:12px;right:12px;bottom:12px;height:64px;display:flex;gap:6px;padding:8px;border-radius:14px;background:rgba(10,10,12,.9);backdrop-filter:blur(12px);align-items:center;z-index:1200;padding-bottom:calc(env(safe-area-inset-bottom)+8px)}.smtv-bottom-nav .nav-item{flex:1;text-align:center;color:#bdbdbd;text-decoration:none;padding:6px;border-radius:10px;transition:color .2s,transform .2s}.smtv-bottom-nav .nav-item.active{color:#fff;transform:translateY(-6px)}.smtv-bottom-nav .icon-wrap{display:inline-flex;width:40px;height:40px;align-items:center;justify-content:center;border-radius:10px}.smtv-bottom-nav .label{display:block;font-size:12px;margin-top:3px}</style>';
  try{document.body.style.paddingBottom='calc(96px + env(safe-area-inset-bottom))';}catch(e){}
})();
</script>
