  <style>
    :root{
      --bg:#070b12;
      --bg2:#0c1220;
      --bg3:#111a2b;
      --card:#0e1630;
      --card-2:#121d39;
      --line:rgba(255,255,255,.08);
      --line-2:rgba(255,255,255,.12);
      --text:#eaf2ff;
      --muted:#8fa4c0;
      --soft:#aebed4;
      --cyan:#20d7ff;
      --cyan-2:#39bfff;
      --cyan-glow:rgba(32,215,255,.32);
      --gold:#ffd34d;
      --gold-2:#ffb938;
      --gold-glow:rgba(255,198,76,.3);
      --green:#90f1a7;
      --radius:18px;
      --radius-sm:12px;
      --radius-xs:10px;
      --shadow:0 18px 50px rgba(0,0,0,.45);
      --ease:cubic-bezier(.22,.8,.2,1);
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{
      background:
        radial-gradient(circle at top center, rgba(32,215,255,.08), transparent 30%),
        linear-gradient(180deg,#070b12 0%,#09101a 28%,#0a0f18 100%);
      color:var(--text);
      font-family:'Inter',system-ui,sans-serif;
      overflow-x:hidden;
      -webkit-font-smoothing:antialiased;
    }

    img{max-width:100%;display:block}
    a{text-decoration:none;color:inherit}
    button{font:inherit}
    #main-content{max-width:980px;margin:0 auto;padding:14px 14px 0}

    @keyframes fadeUp{
      from{opacity:0;transform:translateY(18px)}
      to{opacity:1;transform:translateY(0)}
    }
    @keyframes fadeScale{
      from{opacity:0;transform:translateY(12px) scale(.97)}
      to{opacity:1;transform:translateY(0) scale(1)}
    }
    @keyframes glowPulse{
      0%,100%{box-shadow:0 0 0 rgba(32,215,255,0)}
      50%{box-shadow:0 0 24px rgba(32,215,255,.18)}
    }
    @keyframes shine{
      0%{background-position:200% center}
      100%{background-position:-200% center}
    }
    @keyframes floaty{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-3px)}
    }

      box-shadow:var(--shadow);
      margin-bottom:22px;
      animation:fadeUp .65s var(--ease) both;
    }

    .pro-series-header-pro::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at top center, rgba(255,211,77,.08), transparent 26%),

      pointer-events:none;

      left:14px;

      justify-content:center;

<body>
  <div id="wa-backdrop"></div>

  <div id="main-content">
    <header></header>

    <script type="text/javascript" src="//www.highperformanceformat.com/c91a82435d260630918ecc80c95125ac/invoke.js"></script>

    <div id="series-details" aria-live="polite"></div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('series');
      if(!slug) return;
      fetch('/series.json')
        .then(res => res.json())
        .then(seriesArr => {
          const meta = Array.isArray(seriesArr) ? seriesArr.find(s => s.slug === slug) : null;
          if (meta && meta.title) {
            document.title = `${meta.title} – SmTv Urdu`;
            const metaDesc = document.querySelector('meta[name="description"]');
            if (metaDesc) metaDesc.setAttribute('content', `${meta.title} - Watch all episodes in Urdu on SmTv Urdu.`);
          }
        })
        .catch(()=>{});
    });
  </script>

  <script>
    function formatEpisodeCardTitle(title) {
      if (!title) return '';
      const clean = String(title).trim();

      if (/^Episodes+d+$/i.test(clean)) {
        return clean;
      }

      if (/^Episodes+/i.test(clean)) {
        return clean.replace(/^Episodes+/i, 'Ep ');
      }

      return clean;
    }

    function stylizeEpisodeTitles() {
      document.querySelectorAll('.pro-ep-title-pro').forEach(function(el){
        if (el.dataset.formatted === 'true') return;

        const raw = (el.textContent || '').trim();
        if (!raw) return;

        const formatted = formatEpisodeCardTitle(raw);

        if (/^Episodes+d+$/i.test(raw)) {
          el.innerHTML = '<span class="ep-title-num">' + formatted + '</span>';
        } else if (/^Eps+d+/i.test(formatted)) {
          const match = formatted.match(/^(Eps+d+)(.*)$/i);
          if (match) {
            const numberPart = match[1].trim();
            const namePart = (match[2] || '').trim();
            el.innerHTML =
              '<span class="ep-title-num">' + numberPart + '</span>' +
              (namePart ? '<span class="ep-title-name">' + namePart + '</span>' : '');
          } else {
            el.textContent = formatted;
          }
        } else {
          el.textContent = formatted;
        }

        el.dataset.formatted = 'true';
      });
    }

    function enhanceSeriesPage() {
      const observer = new MutationObserver(function() {
        const header = document.querySelector('.pro-series-header-pro');

        if (header && !header.dataset.enhancedHeader) {
          header.dataset.enhancedHeader = 'true';

          const poster = header.querySelector('.pro-series-poster-pro');
          if (poster && poster.parentElement && !poster.parentElement.classList.contains('hero-poster-wrap')) {
            const wrap = document.createElement('div');
            wrap.className = 'hero-poster-wrap';
            poster.parentNode.insertBefore(wrap, poster);
            wrap.appendChild(poster);
          }

          const meta = header.querySelector('.pro-series-title-pro')?.parentElement;
          if (meta && !meta.classList.contains('pro-series-meta-pro')) {
            meta.classList.add('pro-series-meta-pro');
          }

          if (meta && !meta.querySelector('.series-mini-stats')) {
            const stats = document.createElement('div');
            stats.className = 'series-mini-stats';
            stats.innerHTML = '<span>Urdu Dubbed</span><span>HD Streaming</span><span>Mobile Friendly</span>';
            const desc = meta.querySelector('.pro-series-desc-pro');
            if (desc) desc.insertAdjacentElement('afterend', stats);
          }
        }

        document.querySelectorAll('.premium-channel-message').forEach(function(box){
          if (box.dataset.enhancedPremium === 'true') return;
          box.dataset.enhancedPremium = 'true';

          box.innerHTML = `
            <div class="premium-head"><i class="fa-solid fa-crown"></i> SMTV VIP Membership</div>
            <div class="premium-features">
              <span>⚡ No Ads</span>
              <span>⬇ Fast Download</span>
              <span>🔓 Early Access</span>
              <span>🎞 HD Quality</span>
            </div>
            <a class="join-btn" href="/premium.html">Become VIP</a>
          `;
        });

        stylizeEpisodeTitles();
      });

      observer.observe(document.body, { childList:true, subtree:true });
      setTimeout(function(){ observer.disconnect(); }, 15000);

      stylizeEpisodeTitles();
    }

    document.addEventListener('DOMContentLoaded', enhanceSeriesPage);
  </script>

  <div id="whatsappPopup">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
      <img src="favicon.png" alt="Logo" style="width:42px;height:42px;border-radius:12px;">
      <strong style="font-size:1.08rem;">Stay Updated on SmTv</strong>
    </div>
    <div style="margin-bottom:16px;color:#b7c7de;line-height:1.6;font-size:.92rem;">
      Get instant notifications for new episodes before everyone else.
    </div>
    <div style="text-align:center;">
      <a href="https://whatsapp.com/channel/0029Va9zAvvAYlUNRuzWqh0k" target="_blank" rel="noopener noreferrer" style="display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#27d366,#18aa4f);color:#fff;padding:12px 18px;border-radius:12px;font-weight:800;">
        <i class="fa-brands fa-whatsapp"></i> Join WhatsApp
      </a>
      <div style="margin-top:12px;">
        <button id="closeWhatsAppPopup" style="background:none;border:none;color:#ff7f95;font-weight:700;cursor:pointer;">✕ Close</button>
      </div>
    </div>
  </div>

  <script>
    window.addEventListener('DOMContentLoaded', function() {
      const popup = document.getElementById('whatsappPopup');
      const backdrop = document.getElementById('wa-backdrop');
      const closeBtn = document.getElementById('closeWhatsAppPopup');

      setTimeout(function(){
        popup.classList.add('show-popup');
        backdrop.classList.add('show-popup');
      }, 2200);

      function closePopup(){
        popup.classList.remove('show-popup');
        backdrop.classList.remove('show-popup');
      }

      if (closeBtn) closeBtn.addEventListener('click', closePopup);
      if (backdrop) backdrop.addEventListener('click', closePopup);
    });
  </script>

  <script>
    (function(){
      try { window.scrollTo(0,0); } catch(e){}
      document.addEventListener('focusin', function(){
        const x = window.scrollX || 0;
        const y = window.scrollY || 0;
        setTimeout(function(){ try { window.scrollTo(x,y); } catch(e){} }, 0);
      }, true);

      const details = document.getElementById('series-details');
      if (details) {
        const obs = new MutationObserver(() => {
          if (details.childNodes.length > 0) {
            try { window.scrollTo({ top: 0, left: 0, behavior: 'auto' }); } catch(e){}
            obs.disconnect();
          }
        });
        obs.observe(details, { childList: true, subtree: false });
      }
    })();
  </script>

  <div id="footer-placeholder"></div>

  <script>
  (async function loadFooterRobust(){
    const candidates = ['/includes/footer.html','includes/footer.html','./includes/footer.html','/footer.html','footer.html'];
    const placeholder = document.getElementById('footer-placeholder');

    function initNav(html) {
      try {
        placeholder.innerHTML = html;

        try {
          const curPad = parseInt(getComputedStyle(document.body).paddingBottom) || 0;
          if (curPad < 96) document.body.style.paddingBottom = 'calc(96px + env(safe-area-inset-bottom))';
        } catch(e){}

        const nav = placeholder.querySelector('#smtv-bottom-nav') || placeholder.querySelector('.smtv-bottom-nav');
        if (!nav) return;

        const items = Array.from(nav.querySelectorAll('.nav-item'));
        items.forEach(i => i.classList.remove('active'));

        let seriesItem = items.find(i => ((i.dataset && (i.dataset.name || '').toLowerCase()) === 'series'));
        if (!seriesItem) {
          seriesItem = items.find(i => {
            const href = (i.getAttribute && i.getAttribute('href') || '').toLowerCase();
            return href && href.includes('series');
          });
        }

        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('series') && seriesItem) {
          seriesItem.classList.add('active');
        } else {
          const path = location.pathname.toLowerCase();
          const byPath = items.find(i => (i.getAttribute('href') || '').toLowerCase().includes(path.split('/').pop()));
          if (byPath) byPath.classList.add('active');
          else if (seriesItem) seriesItem.classList.add('active');
        }

        items.forEach(a => {
          if (a.dataset.bound === 'true') return;
          a.dataset.bound = 'true';
          a.addEventListener('click', function(e){
            try { e.preventDefault(); } catch(err){}
            items.forEach(i => i.classList.remove('active'));
            this.classList.add('active');
            const href = this.getAttribute('href');
            if (href) location.assign(href);
          }, { passive:false });
        });
      } catch (e) {
        console.warn('initNav error', e);
      }
    }

    for (const cand of candidates) {
      try {
        const res = await fetch(cand, { cache:'no-cache' });
        if (!res.ok) continue;
        const text = await res.text();
        initNav(text);
        return;
      } catch (e) {}
    }

    placeholder.innerHTML = `
      <nav class="smtv-bottom-nav" id="smtv-bottom-nav" role="navigation" aria-label="Main">
        <a href="/index.html" class="nav-item" data-name="home"><span class="icon-wrap"><i class="fa-solid fa-house"></i></span><span class="label">Home</span></a>
        <a href="/series.html" class="nav-item active" data-name="series"><span class="icon-wrap"><i class="fa-solid fa-film"></i></span><span class="label">Series</span></a>
        <a href="/clips.html" class="nav-item" data-name="clips"><span class="icon-wrap"><i class="fa-solid fa-play-circle"></i></span><span class="label">Clips</span></a>
        <a href="/premium.html" class="nav-item" data-name="premium"><span class="icon-wrap"><i class="fa-solid fa-star"></i></span><span class="label">Premium</span></a>
        <a href="/more.html" class="nav-item" data-name="more"><span class="icon-wrap"><i class="fa-solid fa-circle-info"></i></span><span class="label">More</span></a>
      </nav>
      <style>
        .smtv-bottom-nav{
          position:fixed;left:12px;right:12px;bottom:12px;height:66px;
          display:flex;gap:6px;padding:8px;border-radius:18px;
          background:rgba(10,12,18,.88);
          backdrop-filter:blur(16px);
          border:1px solid rgba(255,255,255,.06);
          align-items:center;z-index:1200;
          box-shadow:0 18px 40px rgba(0,0,0,.45);
          padding-bottom:calc(env(safe-area-inset-bottom) + 8px);
        }
        .smtv-bottom-nav .nav-item{
          flex:1;text-align:center;color:#b9c4d2;text-decoration:none;padding:6px;border-radius:12px;
          transition:transform .22s ease,color .22s ease,background .22s ease;
        }
        .smtv-bottom-nav .nav-item.active{
          color:#fff;
          background:rgba(32,215,255,.12);
          transform:translateY(-4px);
        }
        .smtv-bottom-nav .icon-wrap{
          display:inline-flex;width:40px;height:40px;align-items:center;justify-content:center;border-radius:12px;
        }
        .smtv-bottom-nav .label{
          display:block;font-size:12px;margin-top:2px;
        }
      </style>
    `;

    try { document.body.style.paddingBottom = 'calc(96px + env(safe-area-inset-bottom))'; } catch(e){}
  })();
  </script>
</body>
