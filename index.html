  <style>
    :root {
      --bg-void: #020810;
      --bg-deep: #060f1c;
      --bg-card: #0a1628;
      --bg-glass: rgba(10,22,40,0.85);
      --gold: #c9a227;
      --gold-bright: #f0c040;
      --gold-glow: rgba(201,162,39,0.35);
      --cyan: #00bcd4;
      --cyan-dim: rgba(0,188,212,0.15);
      --text-primary: #f0e8d8;
      --text-muted: #7a8fa8;
      --border: rgba(201,162,39,0.18);
      --border-bright: rgba(201,162,39,0.45);
      --red-live: #e53935;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg-void);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── AMBIENT BACKGROUND ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% -10%, rgba(201,162,39,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 110%, rgba(0,188,212,0.05) 0%, transparent 55%),
        radial-gradient(ellipse 100% 80% at 50% 50%, rgba(6,15,28,1) 40%, var(--bg-void) 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* Floating particles */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: var(--gold);
      border-radius: 50%;
      opacity: 0;
      animation: floatUp var(--dur, 8s) var(--delay, 0s) infinite ease-in-out;
    }
    @keyframes floatUp {
      0%   { opacity: 0; transform: translateY(100vh) scale(0.5); }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.2; }
      100% { opacity: 0; transform: translateY(-10vh) scale(1.2); }
    }

    /* ── SIDEBAR ── */
    .sidebar {
      position: fixed;
      top: 0; left: 0;
      height: 100%;
      width: 280px;
      background: linear-gradient(160deg, #060f1c 0%, #030a14 100%);
      border-right: 1px solid var(--border);
      z-index: 1000;
      transform: translateX(-100%);
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(20px);
    }
    .sidebar.open { transform: translateX(0); }

    .sidebar-overlay {
      position: fixed;
      inset: 0;
      background: rgba(2,8,16,0.7);
      backdrop-filter: blur(4px);
      z-index: 999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .sidebar-overlay.active { opacity: 1; pointer-events: all; }

    .sidebar-header-pro {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 24px 20px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-logo-pro {
      font-family: 'Cinzel', serif;
      font-size: 1.3rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--gold-bright), var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.08em;
    }
    .sidebar-close-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 34px;
      height: 34px;
      border-radius: 8px;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .sidebar-close-btn:hover { border-color: var(--gold); color: var(--gold); }

    .sidebar-menu-pro {
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }
    .sidebar-btn-pro {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 18px;
      border-radius: 12px;
      text-decoration: none;
      color: var(--text-primary);
      font-weight: 500;
      font-size: 0.95rem;
      letter-spacing: 0.02em;
      transition: all 0.25s ease;
      border: 1px solid transparent;
      background: rgba(255,255,255,0.02);
    }
    .sidebar-btn-pro:hover {
      background: rgba(201,162,39,0.1);
      border-color: var(--border-bright);
      color: var(--gold-bright);
      transform: translateX(4px);
    }
    .sidebar-btn-pro.telegram-pro { color: #29b6f6; }
    .sidebar-btn-pro.telegram-pro:hover { background: rgba(41,182,246,0.08); border-color: rgba(41,182,246,0.3); color: #29b6f6; }
    .sidebar-btn-pro.whatsapp-pro { color: #66bb6a; }
    .sidebar-btn-pro.whatsapp-pro:hover { background: rgba(102,187,106,0.08); border-color: rgba(102,187,106,0.3); color: #66bb6a; }

    /* ── MAIN CONTENT ── */
    #main-content {
      position: relative;
      z-index: 1;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    #site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: rgba(2,8,16,0.85);
      backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 4px 30px rgba(0,0,0,0.4);
    }
    #site-header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0.5;
    }

    #sidebarToggle {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 40px;
      height: 40px;
      border-radius: 10px;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.25s;
      flex-shrink: 0;
    }
    #sidebarToggle:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-glow); }

    #mainTitle {
      font-family: 'Cinzel', serif !important;
      font-size: 1.35rem !important;
      font-weight: 700 !important;
      background: linear-gradient(135deg, var(--gold-bright) 0%, #e8d5a3 50%, var(--cyan) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.12em;
      text-shadow: none;
    }

    .premium-cta {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      background: linear-gradient(135deg, var(--gold) 0%, #e8a020 100%);
      color: #050d18;
      font-weight: 700;
      font-size: 0.82rem;
      border-radius: 20px;
      text-decoration: none;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      box-shadow: 0 4px 20px rgba(201,162,39,0.4);
      transition: all 0.25s;
      flex-shrink: 0;
    }
    .premium-cta::before { content: '⭐'; font-size: 0.9em; }
    .premium-cta:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(201,162,39,0.6); }

    /* ── SEARCH ── */
    .searchbar-container {
      margin: 18px 16px 0;
      position: relative;
      display: flex;
      align-items: center;
    }
    .search-icon {
      position: absolute;
      left: 14px;
      font-size: 1rem;
      opacity: 0.5;
      pointer-events: none;
      z-index: 1;
    }
    #search {
      width: 100%;
      padding: 13px 16px 13px 42px;
      background: rgba(10,22,40,0.8);
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 0.93rem;
      outline: none;
      transition: all 0.3s;
      backdrop-filter: blur(10px);
    }
    #search::placeholder { color: var(--text-muted); }
    #search:focus {
      border-color: var(--gold);
      background: rgba(10,22,40,0.95);
      box-shadow: 0 0 0 3px rgba(201,162,39,0.12), 0 4px 20px rgba(0,0,0,0.3);
    }

    /* ── SPONSOR BANNER ── */
    .home-sponsor-banner {
      margin: 14px 16px;
      padding: 14px 16px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(201,162,39,0.12) 0%, rgba(0,188,212,0.06) 100%);
      border: 1px solid var(--border-bright);
      backdrop-filter: blur(12px);
      animation: bannerPulse 4s ease-in-out infinite;
      position: relative;
      overflow: hidden;
    }
    .home-sponsor-banner::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(201,162,39,0.08), transparent);
      animation: shimmer 3s infinite;
    }
    @keyframes shimmer { to { left: 200%; } }
    @keyframes bannerPulse {
      0%, 100% { border-color: rgba(201,162,39,0.3); box-shadow: 0 4px 20px rgba(201,162,39,0.1); }
      50%       { border-color: rgba(201,162,39,0.55); box-shadow: 0 6px 30px rgba(201,162,39,0.25); }
    }
    .sponsor-banner-content { display: flex; align-items: center; gap: 12px; position: relative; }
    .sponsor-icon { font-size: 24px; flex-shrink: 0; animation: iconBounce 2.5s ease-in-out infinite; }
    @keyframes iconBounce { 0%,100%{transform:translateY(0) rotate(0deg);} 50%{transform:translateY(-4px) rotate(-5deg);} }
    .sponsor-info { flex: 1; min-width: 0; }
    .sponsor-label { font-size: 9px; color: var(--gold); font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; display: block; margin-bottom: 4px; opacity: 0.9; }
    .sponsor-name { display: flex; align-items: center; gap: 8px; color: #fff; font-size: 15px; font-weight: 700; font-family: 'Inter', sans-serif; }
    .sponsor-mini-logo { width: 26px; height: 26px; border-radius: 7px; object-fit: cover; border: 1px solid var(--border-bright); }
    .sponsor-join-btn {
      padding: 9px 16px;
      background: linear-gradient(135deg, var(--gold) 0%, #e8a020 100%);
      color: #050d18;
      font-size: 12px;
      font-weight: 800;
      border-radius: 20px;
      text-decoration: none;
      white-space: nowrap;
      box-shadow: 0 4px 14px rgba(201,162,39,0.4);
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
      display: inline-block;
      letter-spacing: 0.02em;
    }
    .sponsor-join-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(201,162,39,0.6); }

    /* ── SCHEDULE BAR ── */
    #schedule-bar {
      margin: 0 16px 6px;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    #schedule-bar::-webkit-scrollbar { display: none; }
    .schedule-inner {
      display: flex;
      gap: 10px;
      padding: 2px 0;
    }
    .schedule-entry {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      white-space: nowrap;
      flex-shrink: 0;
      transition: all 0.25s;
      position: relative;
      overflow: hidden;
    }
    .schedule-entry::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: linear-gradient(180deg, var(--gold), var(--cyan));
      border-radius: 3px 0 0 3px;
    }
    .schedule-entry:hover { border-color: var(--border-bright); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.4); }
    .schedule-entry img { width: 32px; height: 32px; border-radius: 8px; object-fit: cover; border: 1px solid var(--border); }
    .sched-title { font-weight: 700; font-size: 0.88rem; color: var(--cyan); font-family: 'Inter', sans-serif; }
    .sched-meta { font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; display: flex; gap: 6px; align-items: center; }
    .sched-day { color: #ffd267; font-weight: 600; }
    .sched-time { color: #9fd3ff; font-weight: 600; }
    .sched-type { color: var(--cyan); font-weight: 600; }
    .countdown { color: var(--gold-bright); font-size: 0.75rem; font-weight: 600; margin-top: 3px; font-variant-numeric: tabular-nums; }

    /* ── SECTION HEADER ── */
    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 24px 20px 16px;
    }
    .section-header h2 {
      font-family: 'Cinzel', serif;
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--gold-bright);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .section-divider {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--border-bright), transparent);
    }
    .section-icon { font-size: 1.1rem; }

    /* ── NEW EPISODES ── */
    .new-episodes-section {
      background: linear-gradient(180deg, rgba(10,22,40,0.5) 0%, transparent 100%);
      border-top: 1px solid var(--border);
      margin: 8px 0 0;
      padding-bottom: 8px;
    }

    #new-episodes-grid {
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      padding: 0 16px 12px;
    }
    #new-episodes-grid::-webkit-scrollbar { display: none; }

    .new-eps-inner { display: flex; gap: 14px; }

    .episode-card-pro {
      flex: 0 0 158px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      animation: cardSlideIn 0.5s ease both;
    }
    @keyframes cardSlideIn {
      from { opacity: 0; transform: translateY(20px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .episode-card-pro:hover {
      border-color: var(--border-bright);
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 16px 40px rgba(0,0,0,0.5), 0 0 20px var(--gold-glow);
    }
    .episode-card-pro:nth-child(1) { animation-delay: 0.05s; }
    .episode-card-pro:nth-child(2) { animation-delay: 0.1s; }
    .episode-card-pro:nth-child(3) { animation-delay: 0.15s; }
    .episode-card-pro:nth-child(4) { animation-delay: 0.2s; }
    .episode-card-pro:nth-child(5) { animation-delay: 0.25s; }

    .episode-img-wrapper {
      position: relative;
      overflow: hidden;
    }
    .episode-img-pro {
      width: 100%;
      height: 105px;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }
    .episode-card-pro:hover .episode-img-pro { transform: scale(1.06); }
    .episode-img-overlay {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 50%;
      background: linear-gradient(transparent, rgba(6,15,28,0.9));
      pointer-events: none;
    }

    .new-badge-pro {
      position: absolute;
      top: 8px; right: 8px;
      background: var(--gold);
      color: #050d18;
      font-size: 0.6rem;
      font-weight: 800;
      padding: 3px 8px;
      border-radius: 6px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      box-shadow: 0 2px 10px rgba(201,162,39,0.5);
    }

    .episode-info {
      padding: 10px 10px 0;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .series-title-pro {
      font-size: 0.7rem;
      color: var(--cyan);
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .episode-title-pro {
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
    }

    .watch-btn-pro {
      display: block;
      margin: 10px 10px 10px;
      padding: 9px 0;
      background: linear-gradient(135deg, #0099ff 0%, #0066cc 100%);
      color: #fff;
      font-weight: 700;
      font-size: 0.82rem;
      text-decoration: none;
      text-align: center;
      border-radius: 10px;
      letter-spacing: 0.04em;
      transition: all 0.25s;
      box-shadow: 0 4px 14px rgba(0,153,255,0.3);
      position: relative;
      overflow: hidden;
    }
    .watch-btn-pro::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--gold) 0%, #e8a020 100%);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .watch-btn-pro:hover::before { opacity: 1; }
    .watch-btn-pro:hover { color: #050d18; box-shadow: 0 6px 20px rgba(201,162,39,0.5); transform: translateY(-1px); }
    .watch-btn-pro span { position: relative; z-index: 1; }

    /* ── FILTER BAR ── */
    .filter-bar {
      margin: 8px 0 4px;
      padding: 16px 16px 12px;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      background: rgba(6,15,28,0.6);
    }
    .filter-bar .primary {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }
    .filter-bar .secondary {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .filter-bar .secondary.hidden { display: none; }

    .pill {
      padding: 8px 20px;
      border-radius: 50px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      letter-spacing: 0.02em;
    }
    .pill:hover { border-color: var(--gold); color: var(--gold); background: rgba(201,162,39,0.08); }
    .pill.active {
      background: linear-gradient(135deg, var(--gold) 0%, #e8a020 100%);
      border-color: transparent;
      color: #050d18;
      box-shadow: 0 4px 14px rgba(201,162,39,0.4);
    }
    .filter-bar .secondary .pill { padding: 6px 14px; font-size: 0.8rem; }

    /* ── SERIES GRID ── */
    #series-grid-header {
      padding: 20px 20px 14px;
      border-bottom: 1px solid var(--border);
    }

    #series-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      padding: 16px;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      animation: cardSlideIn 0.5s ease both;
      position: relative;
    }
    .card:hover {
      border-color: var(--border-bright);
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 12px 35px rgba(0,0,0,0.5), 0 0 16px var(--gold-glow);
    }
    .card img {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }
    .card:hover img { transform: scale(1.05); }
    .card .title {
      padding: 12px 12px 14px;
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      line-height: 1.35;
      background: linear-gradient(180deg, rgba(6,15,28,0) 0%, rgba(6,15,28,0.5) 100%);
    }
    .card::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--gold), var(--cyan));
      transform: scaleX(0);

  <!-- Watch Now shortlink handler -->
  <script>
  (function setupWatchNowHandlers() {
    let featureConfig = null;
    fetch('/config.json', { cache: 'no-cache' })
      .then(r => r.ok ? r.json() : null)
      .then(config => { if (config) featureConfig = config.redirectionFeatures; })
      .catch(() => {});
    const checkInterval = setInterval(() => {
      const watchButtons = document.querySelectorAll('.watch-btn-pro');
      if (watchButtons.length > 0) {
        clearInterval(checkInterval);
        watchButtons.forEach(btn => {
          const originalHref = btn.getAttribute('href');
          btn.addEventListener('click', async function(e) {
            if (!featureConfig || !featureConfig.shortlink || featureConfig.sponsorPopup) return;
            e.preventDefault();
            try {
              const url = new URL(originalHref, window.location.origin);
              const params = new URLSearchParams(url.search);
              const series = params.get('series'), season = params.get('season'),
                    ep = params.get('ep'), lang = params.get('lang');
              let jsonFile = `episode-data/${series}-s${season}`;
              if (lang && lang !== 'dub') jsonFile += `-${lang}`;
              jsonFile += '.json';
              const response = await fetch(jsonFile);
              if (!response.ok) { window.location.href = originalHref; return; }
              const episodes = await response.json();
              const episode = episodes.find(e => String(e.ep) === String(ep));
              if (episode && episode.shortlink) {
                if (typeof gtag !== 'undefined') gtag('event', 'shortlink_redirect_home', { episode: episode.title || 'Episode ' + episode.ep, shortlink_url: episode.shortlink });
                window.location.href = episode.shortlink;
              } else { window.location.href = originalHref; }
            } catch (error) { window.location.href = originalHref; }
          });
        });
      }
    }, 100);
    setTimeout(() => clearInterval(checkInterval), 5000);
  })();
  </script>

  <!-- Footer loader -->
  <script>
  (async function loadFooterAndInit(){
    if (document.readyState !== 'complete') {
      await new Promise(resolve => window.addEventListener('load', resolve, { once: true }));
    }
    try {
      const res = await fetch('/includes/footer.html');
      if (!res.ok) throw new Error('Footer not found: ' + res.status);
      const html = await res.text();
      const ph = document.getElementById('footer-placeholder');
      ph.innerHTML = html;
      const nav = document.getElementById('smtv-bottom-nav');
      if (!nav) return;
      const items = Array.from(nav.querySelectorAll('.nav-item'));
      function clearActive(){ items.forEach(i=>i.classList.remove('active')); }
      const path = window.location.pathname.toLowerCase();
      let matched = items.find(a => {
        const name = (a.dataset.name||'').toLowerCase();
        if (name === 'home' && (path === '/' || path.includes('index'))) return true;
        return name && path.includes(name);
      });
      if (!matched) {
        const last = localStorage.getItem('smtv_last_nav');
        if (last) matched = items.find(a => a.dataset.name === last);
      }
      if (matched) matched.classList.add('active');
      items.forEach(a => {
        a.addEventListener('click', function(e){
          clearActive(); this.classList.add('active');
          try { localStorage.setItem('smtv_last_nav', this.dataset.name); } catch(e){}
          const href = this.getAttribute('href');
          setTimeout(() => {
            if (location.pathname.toLowerCase() !== new URL(href, location.origin).pathname.toLowerCase()) location.href = href;
          }, 200);
        }, { passive: true });
      });
      try {
        const curPad = parseInt(getComputedStyle(document.body).paddingBottom)||0;
        if (curPad < 96) document.body.style.paddingBottom = 'calc(96px + env(safe-area-inset-bottom))';
      } catch(e){}
    } catch(err) { console.warn('Footer load/init error:', err); }
  })();
  </script>
