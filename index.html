  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    :root {
      --void:#030712; --surface:#0d1827; --card:#111e30; --card-h:#16263e;
      --gold:#d4a827; --gold-lt:#f0c84a; --gold-dim:rgba(212,168,39,0.13);
      --gold-glow:rgba(212,168,39,0.3); --cyan:#06b6d4; --red:#dc2626;
      --white:#f8f4ee; --muted:#64748b; --border:rgba(212,168,39,0.15);
      --border-hi:rgba(212,168,39,0.42);
      --ff-d:'Playfair Display',Georgia,serif; --ff-b:'DM Sans',sans-serif; --r:14px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;overflow-x:hidden;}
    body{background:var(--void);color:var(--white);font-family:var(--ff-b);min-height:100vh;overflow-x:hidden;}
    body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:0.4;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");}
    #ambient{position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 75% 50% at 10% 0%,rgba(212,168,39,0.09) 0%,transparent 60%),radial-gradient(ellipse 55% 40% at 90% 100%,rgba(6,182,212,0.06) 0%,transparent 55%);}

    /* ══ SEARCH OVERLAY — complete rewrite ══ */
    #srch-ov {
      position:fixed; inset:0; z-index:600;
      opacity:0; pointer-events:none;
      transition:opacity 0.3s ease;
      display:flex; flex-direction:column;
      background:rgba(3,7,18,0.96); backdrop-filter:blur(24px);
    }
    #srch-ov.on { opacity:1; pointer-events:all; }

    /* Top bar with input */
    .srch-bar {
      display:flex; align-items:center; gap:10px;
      padding:14px 14px 12px;
      background:rgba(13,24,39,0.95);
      border-bottom:1px solid rgba(212,168,39,0.2);
      flex-shrink:0;
    }
    .srch-bar-inner {
      flex:1; display:flex; align-items:center; gap:10px;
      background:rgba(255,255,255,0.06);
      border:1.5px solid rgba(212,168,39,0.35);
      border-radius:50px; padding:10px 18px;
      transition:border-color 0.25s, box-shadow 0.25s;
    }
    .srch-bar-inner:focus-within {
      border-color:var(--gold-lt);
      box-shadow:0 0 0 3px rgba(240,200,74,0.15);
    }
    .srch-bar-icon { font-size:1rem; opacity:0.6; flex-shrink:0; }
    #srch-inp {
      flex:1; background:none; border:none; outline:none;
      color:var(--white); font-family:var(--ff-b); font-size:1rem;
      caret-color:var(--gold-lt);
    }
    #srch-inp::placeholder { color:var(--muted); }
    #srch-clear {
      background:none; border:none; color:var(--muted);
      font-size:1rem; cursor:pointer; padding:2px 4px;
      display:none; transition:color 0.2s;
      flex-shrink:0;
    }
    #srch-clear.show { display:block; }
    #srch-clear:hover { color:var(--gold-lt); }
    #srch-cancel {
      background:none; border:none; color:var(--muted);
      font-family:var(--ff-b); font-size:0.9rem; cursor:pointer;
      padding:8px 4px; white-space:nowrap; transition:color 0.2s; flex-shrink:0;
    }
    #srch-cancel:hover { color:var(--gold-lt); }

    /* Status line */
    .srch-status {
      padding:10px 16px 6px;
      font-size:0.78rem; color:var(--muted);
      flex-shrink:0; min-height:32px;
    }
    .srch-status span { color:var(--gold-lt); font-weight:600; }

    /* Results grid — 2 columns, portrait cards */
    #srch-results {
      flex:1; overflow-y:auto; overflow-x:hidden;
      padding:0 14px 100px;
      /* 2-col grid */
      display:grid !important;
      grid-template-columns:repeat(2,1fr) !important;
      gap:13px !important;
      align-content:start;
    }
    #srch-results::-webkit-scrollbar { width:3px; }
    #srch-results::-webkit-scrollbar-thumb { background:rgba(212,168,39,0.3); border-radius:3px; }

    /* ── SEARCH RESULT CARD ── */
    /* We use a TABLE-CELL trick to force portrait:
       wrapper is display:block with padding-bottom:150% (= 2:3).
       img is position:absolute inside. This bypasses ANY external max-height. */
    .srch-item {
      display:flex; flex-direction:column;
      background:var(--card);
      border:1px solid rgba(212,168,39,0.15);
      border-radius:12px; overflow:hidden;
      text-decoration:none;
      transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1), border-color 0.25s, box-shadow 0.25s;
      animation:srchCardIn 0.35s ease both;
    }
    .srch-item:hover {
      border-color:rgba(212,168,39,0.45);
      transform:translateY(-4px) scale(1.02);
      box-shadow:0 12px 32px rgba(0,0,0,0.5), 0 0 18px rgba(212,168,39,0.2);
    }
    @keyframes srchCardIn {
      from { opacity:0; transform:translateY(12px) scale(0.96); }
      to   { opacity:1; transform:translateY(0) scale(1); }
    }
    /* Portrait image wrapper — padding-bottom trick */
    .srch-img-wrap {
      position:relative;
      width:100%;
      padding-bottom:150%; /* 2:3 portrait ratio */
      overflow:hidden;
      flex-shrink:0;
      background:#0a1220;
    }
    .srch-img-wrap img {
      /* position:absolute beats style.css max-height completely */
      position:absolute !important;
      top:0 !important; left:0 !important;
      width:100% !important; height:100% !important;
      max-height:none !important; min-height:0 !important;
      object-fit:cover !important;
      object-position:center top !important;
      display:block !important;
      border-radius:0 !important;
      transition:transform 0.4s ease;
    }
    .srch-item:hover .srch-img-wrap img { transform:scale(1.06); }
    .srch-item-title {
      padding:9px 10px 11px;
      font-size:0.83rem; font-weight:700;
      color:var(--white); line-height:1.3;
      font-family:var(--ff-b);
    }

    /* Staggered animation delays */
    .srch-item:nth-child(1){animation-delay:0.0s}
    .srch-item:nth-child(2){animation-delay:0.04s}
    .srch-item:nth-child(3){animation-delay:0.08s}
    .srch-item:nth-child(4){animation-delay:0.12s}
    .srch-item:nth-child(5){animation-delay:0.16s}
    .srch-item:nth-child(6){animation-delay:0.20s}
    .srch-item:nth-child(7){animation-delay:0.24s}
    .srch-item:nth-child(8){animation-delay:0.28s}

    /* Empty / hint states */
    .srch-empty {
      grid-column:1/-1;
      display:flex; flex-direction:column; align-items:center;
      padding:60px 20px; color:var(--muted); text-align:center;
    }
    .srch-empty-icon { font-size:3rem; margin-bottom:14px; opacity:0.5; }
    .srch-empty-title { font-size:1rem; font-weight:600; color:rgba(248,244,238,0.5); margin-bottom:6px; }
    .srch-empty-sub { font-size:0.82rem; color:var(--muted); }

    /* ══ SIDEBAR OVERLAY ══ */
    #sb-ov{position:fixed;inset:0;background:rgba(3,7,18,0.82);backdrop-filter:blur(8px);z-index:200;opacity:0;pointer-events:none;transition:opacity 0.3s;}
    #sb-ov.on{opacity:1;pointer-events:all;}

    /* ══ SIDEBAR ══ */
    #sidebar{position:fixed;top:0;left:0;width:290px;height:100%;background:linear-gradient(170deg,#0c1828 0%,#060e1c 55%,#030712 100%);border-right:1px solid var(--border-hi);z-index:201;transform:translateX(-100%);transition:transform 0.42s cubic-bezier(0.22,1,0.36,1);display:flex;flex-direction:column;overflow:hidden;}
    #sidebar::before{content:'';position:absolute;top:-80px;left:-80px;width:260px;height:260px;background:radial-gradient(circle,rgba(212,168,39,0.11) 0%,transparent 70%);pointer-events:none;}
    #sidebar.open{transform:translateX(0);}
    .sb-hd{display:flex;align-items:center;justify-content:space-between;padding:28px 20px 18px;border-bottom:1px solid var(--border);}
    .sb-logo{font-family:var(--ff-d);font-size:1.35rem;font-weight:900;background:linear-gradient(135deg,var(--gold-lt),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .sb-x{width:36px;height:36px;background:rgba(255,255,255,0.04);border:1px solid var(--border-hi);border-radius:10px;color:var(--muted);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.25s;}
    .sb-x:hover{background:var(--gold-dim);color:var(--gold-lt);border-color:var(--gold);transform:rotate(90deg);}
    .sb-nav{padding:14px;display:flex;flex-direction:column;gap:8px;flex:1;}
    .sb-a{display:flex;align-items:center;gap:12px;padding:13px 16px;border-radius:12px;text-decoration:none;color:var(--white);font-weight:600;font-size:0.93rem;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);transition:all 0.3s ease;opacity:0;transform:translateX(-18px);box-shadow:0 2px 8px rgba(0,0,0,0.2);}
    #sidebar.open .sb-a{animation:sbIn 0.36s ease forwards;}
    #sidebar.open .sb-a:nth-child(1){animation-delay:.05s}#sidebar.open .sb-a:nth-child(2){animation-delay:.10s}#sidebar.open .sb-a:nth-child(3){animation-delay:.15s}#sidebar.open .sb-a:nth-child(4){animation-delay:.20s}#sidebar.open .sb-a:nth-child(5){animation-delay:.25s}
    @keyframes sbIn{to{opacity:1;transform:translateX(0);}}
    .sb-a:hover{background:linear-gradient(135deg,rgba(212,168,39,0.15),rgba(212,168,39,0.08));border-color:var(--border-hi);color:var(--gold-lt);transform:translateX(4px);box-shadow:0 4px 16px rgba(212,168,39,0.15);}
    .sb-ico{width:34px;height:34px;background:rgba(255,255,255,0.06);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;transition:all 0.25s;border:1px solid rgba(255,255,255,0.06);}
    .sb-a:hover .sb-ico{background:var(--gold-dim);border-color:var(--border-hi);}
    .sb-a.tg{color:#93c5fd;border-color:rgba(147,197,253,0.15);background:rgba(147,197,253,0.05);}
    .sb-a.tg:hover{background:rgba(41,182,246,0.12);border-color:rgba(41,182,246,0.4);color:#7dd3fc;}
    .sb-a.wa{color:#86efac;border-color:rgba(134,239,172,0.15);background:rgba(134,239,172,0.05);}
    .sb-a.wa:hover{background:rgba(102,187,106,0.12);border-color:rgba(102,187,106,0.4);color:#4ade80;}
    .sb-ft{padding:14px 20px;border-top:1px solid var(--border);font-size:0.72rem;color:var(--muted);text-align:center;}

    /* ══ HEADER ══ */
    #site-header{position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:10px;padding:11px 14px;background:rgba(3,7,18,0.92);backdrop-filter:blur(24px) saturate(180%);border-bottom:1px solid var(--border);}
    #site-header::after{content:'';position:absolute;bottom:0;left:8%;right:8%;height:1px;background:linear-gradient(90deg,transparent,var(--gold-lt),transparent);opacity:0.35;}
    #hamburger{width:40px;height:40px;background:none;border:1px solid var(--border);border-radius:10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;transition:all 0.3s;flex-shrink:0;}
    #hamburger:hover{border-color:var(--gold);background:var(--gold-dim);}
    .hbl{display:block;height:2px;border-radius:2px;background:var(--muted);transition:all 0.3s;}
    .hbl:nth-child(1){width:18px}.hbl:nth-child(2){width:14px}.hbl:nth-child(3){width:10px}
    #hamburger:hover .hbl{background:var(--gold-lt);}
    #hamburger:hover .hbl:nth-child(2){width:18px}#hamburger:hover .hbl:nth-child(3){width:18px}
    #mainTitle{flex:1;font-family:var(--ff-d)!important;font-size:1.28rem!important;font-weight:900!important;background:linear-gradient(130deg,var(--gold-lt) 0%,#e8d8a8 45%,var(--cyan) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:0.06em;}

    /* Search button in header */
    #header-search-btn {
      width:38px; height:38px;
      background:rgba(212,168,39,0.08);
      border:1px solid rgba(212,168,39,0.3);
      border-radius:10px; color:var(--gold-lt);
      font-size:1rem; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:all 0.3s; flex-shrink:0;
      position:relative;
    }
    #header-search-btn::before {
      content:'';position:absolute;inset:0;border-radius:10px;
      background:linear-gradient(135deg,rgba(212,168,39,0.15),transparent);
      opacity:0;transition:opacity 0.3s;
    }
    #header-search-btn:hover { border-color:var(--gold-lt); box-shadow:0 0 16px rgba(212,168,39,0.4); transform:scale(1.08); }
    #header-search-btn:hover::before { opacity:1; }

    .premium-cta{display:inline-flex;align-items:center;gap:5px;padding:9px 14px;background:linear-gradient(135deg,#f0c84a 0%,#d4a827 55%,#e8b830 100%);color:#030712;font-weight:800;font-size:0.76rem;border-radius:50px;text-decoration:none;letter-spacing:0.08em;text-transform:uppercase;box-shadow:0 0 18px rgba(240,200,74,0.55),0 4px 14px rgba(212,168,39,0.4);transition:all 0.25s;flex-shrink:0;animation:premPulse 3s ease-in-out infinite;}
    @keyframes premPulse{0%,100%{box-shadow:0 0 18px rgba(240,200,74,0.55),0 4px 14px rgba(212,168,39,0.4);}50%{box-shadow:0 0 32px rgba(240,200,74,0.85),0 6px 22px rgba(212,168,39,0.65);}}
    .premium-cta:hover{transform:translateY(-2px) scale(1.04);}

    /* ══ SPONSOR ══ */
    #sp-bar{margin:10px 14px 0;padding:9px 13px;background:linear-gradient(135deg,rgba(212,168,39,0.1) 0%,rgba(6,182,212,0.05) 100%);border:1px solid var(--border-hi);border-radius:var(--r);display:flex;align-items:center;gap:10px;position:relative;overflow:hidden;}
    #sp-bar::before{content:'';position:absolute;top:0;left:-80%;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(212,168,39,0.06),transparent);animation:scan 4s infinite;}
    @keyframes scan{to{left:200%;}}
    .sp-ico{font-size:1rem;flex-shrink:0;}
    .sp-txt{flex:1;min-width:0;}
    .sp-lbl{font-size:0.65rem;color:var(--gold);font-weight:700;letter-spacing:0.13em;text-transform:uppercase;display:block;line-height:1.2;}
    .sp-nm{font-size:0.86rem;font-weight:700;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .sp-btn{padding:7px 13px;background:linear-gradient(135deg,var(--gold) 0%,#b8860b 100%);color:var(--void);font-size:0.74rem;font-weight:800;border-radius:50px;text-decoration:none;white-space:nowrap;flex-shrink:0;box-shadow:0 3px 12px rgba(212,168,39,0.35);transition:all 0.2s;}
    .sp-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(212,168,39,0.55);}

    /* ══ HERO ══ */
    #hero{position:relative;width:100%;height:68vw;max-height:420px;min-height:250px;overflow:hidden;margin-top:12px;}
    .h-slide{position:absolute;inset:0;opacity:0;transition:opacity 0.9s ease;pointer-events:none;}
    .h-slide.on{opacity:1;pointer-events:all;}
    .h-bg{position:absolute;inset:0;background-size:cover;background-position:center top;transform:scale(1.06);transition:transform 7s ease;filter:brightness(0.48) saturate(1.15);}
    .h-slide.on .h-bg{transform:scale(1);}
    .h-vig{position:absolute;inset:0;background:linear-gradient(to top,rgba(3,7,18,0.98) 0%,rgba(3,7,18,0.6) 36%,rgba(3,7,18,0.1) 65%,transparent 100%),linear-gradient(to right,rgba(3,7,18,0.55) 0%,transparent 60%);}
    .h-top-label{position:absolute;top:12px;left:14px;display:flex;align-items:center;gap:7px;z-index:5;}
    .h-new-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:var(--red);color:#fff;font-size:0.62rem;font-weight:800;border-radius:6px;letter-spacing:0.12em;text-transform:uppercase;animation:rPulse 2s ease-in-out infinite;}
    @keyframes rPulse{0%,100%{box-shadow:0 2px 12px rgba(220,38,38,0.5);}50%{box-shadow:0 2px 22px rgba(220,38,38,0.85);}}
    .h-new-badge::before{content:'●';font-size:0.5rem;animation:blink 1s step-end infinite;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
    .h-lang-badge{padding:4px 10px;background:rgba(0,0,0,0.68);color:var(--cyan);font-size:0.62rem;font-weight:700;border-radius:6px;border:1px solid rgba(6,182,212,0.4);backdrop-filter:blur(6px);text-transform:uppercase;letter-spacing:0.06em;}
    .h-body{position:absolute;bottom:0;left:0;right:0;padding:0 16px 14px;z-index:5;}
    .h-series{font-size:0.72rem;color:var(--cyan);font-weight:700;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:4px;}
    .h-title{font-family:var(--ff-d);font-size:clamp(1.2rem,5.5vw,1.7rem);font-weight:900;color:var(--white);line-height:1.15;text-shadow:0 2px 24px rgba(0,0,0,0.9);margin-bottom:11px;}
    .h-watch-btn{display:inline-flex;align-items:center;gap:7px;padding:10px 28px;background:linear-gradient(135deg,var(--gold) 0%,#b8860b 100%);color:var(--void);font-weight:700;font-size:0.88rem;border-radius:50px;text-decoration:none;box-shadow:0 6px 22px rgba(212,168,39,0.4);transition:all 0.25s;margin-bottom:12px;}
    .h-watch-btn:hover{transform:scale(1.05);box-shadow:0 10px 32px rgba(212,168,39,0.65);}
    #h-dots{display:flex;gap:7px;align-items:center;}
    .h-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.3);cursor:pointer;transition:all 0.35s;}
    .h-dot.on{width:26px;border-radius:4px;background:var(--gold-lt);}

    /* ══ SECTION LABEL ══ */
    .sec-lbl{display:flex;align-items:center;gap:10px;padding:20px 14px 11px;}
    .sec-lbl-ico{font-size:1rem;}
    .sec-lbl-txt{font-family:var(--ff-d);font-size:0.97rem;font-weight:700;color:var(--gold-lt);letter-spacing:0.12em;text-transform:uppercase;}
    .sec-lbl-ln{flex:1;height:1px;background:linear-gradient(90deg,var(--border-hi),transparent);}

    /* ══ SCHEDULE ══ */
    #sched-list{display:flex;flex-direction:column;gap:8px;padding:0 14px 12px;}
    .sc-card{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);transition:all 0.3s;position:relative;overflow:hidden;opacity:0;transform:translateX(-20px);}
    .sc-card.vis{animation:scIn 0.4s ease forwards;}
    .sc-card:nth-child(1).vis{animation-delay:.0s}.sc-card:nth-child(2).vis{animation-delay:.08s}.sc-card:nth-child(3).vis{animation-delay:.16s}
    @keyframes scIn{to{opacity:1;transform:translateX(0);}}
    .sc-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--gold-lt),var(--cyan));border-radius:3px 0 0 3px;}
    .sc-card:hover{border-color:var(--border-hi);background:var(--card-h);transform:translateX(4px);box-shadow:0 6px 22px rgba(0,0,0,0.3);}
    .sc-card.live-c::before{background:linear-gradient(180deg,var(--red),#f97316);}
    .sc-card.live-c{border-color:rgba(220,38,38,0.3);}
    .sc-img{width:48px;height:48px;border-radius:9px;object-fit:cover;border:1px solid var(--border);flex-shrink:0;}
    .sc-body{flex:1;min-width:0;}
    .sc-title{font-weight:700;font-size:0.88rem;color:var(--white);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .sc-meta{display:flex;flex-wrap:wrap;gap:5px;align-items:center;}

    /* ══ RECOMMENDED ══ */
    #rec-scroll{overflow-x:auto;overflow-y:visible;scrollbar-width:none;padding:4px 14px 14px;-webkit-overflow-scrolling:touch;}
    #rec-scroll::-webkit-scrollbar{display:none;}
    #rec-inner{display:flex;gap:11px;}
    .rec-card{display:flex!important;flex-direction:column!important;width:130px!important;flex-shrink:0!important;background:var(--card)!important;border-radius:12px!important;border:1px solid var(--border)!important;overflow:hidden!important;text-decoration:none!important;transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1);opacity:0;transform:translateY(14px) scale(0.96);}
    .rec-card.vis{animation:rcIn 0.45s ease forwards;}
    .rec-card:nth-child(1).vis{animation-delay:.0s}.rec-card:nth-child(2).vis{animation-delay:.06s}.rec-card:nth-child(3).vis{animation-delay:.12s}.rec-card:nth-child(4).vis{animation-delay:.18s}.rec-card:nth-child(5).vis{animation-delay:.24s}
    @keyframes rcIn{to{opacity:1;transform:translateY(0) scale(1);}}

    .rec-card:hover .rec-img-wrap img{transform:scale(1.06);}
    .rc-title{display:block!important;padding:8px 6px 10px!important;font-size:0.8rem!important;font-weight:700!important;color:#fff!important;line-height:1.25!important;text-align:center!important;word-break:break-word!important;}

    /* ══ FILTER BAR ══ */
    .filter-bar{padding:14px 14px 11px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);background:rgba(8,15,30,0.65);}
    .filter-bar .primary{display:flex;gap:8px;margin-bottom:10px;}

    .pill{padding:8px 15px;border-radius:50px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:var(--ff-b);font-size:0.82rem;font-weight:600;cursor:pointer;transition:all 0.25s;display:flex;align-items:center;gap:6px;}

    /* ══ SERIES GRID ══ */
    #series-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:4px 14px 16px;}
    .card{background:#262838;border-radius:8px;box-shadow:0 1.5px 6px #0003;text-decoration:none;overflow:hidden;display:block;transition:transform .17s,box-shadow .17s,background .17s;opacity:0;transform:translateY(20px);}
    .card.vis{animation:rcIn 0.5s ease forwards;}
    .card:hover{background:#212345;box-shadow:0 4px 18px #0a121c20;transform:translateY(-2px) scale(1.03);}
    .card-img-wrap{display:block;width:100%;overflow:hidden;border-radius:6px 6px 0 0;line-height:0;}
    .card-img-wrap img{
      display:block!important;
      width:100%!important;
      height:auto!important;
      aspect-ratio:6/8!important;
      max-height:none!important;
      min-height:unset!important;
      object-fit:cover!important;
      object-position:center top!important;
      border-radius:6px 6px 0 0!important;
    }
    /* Extra override in case style.css still wins on img */
    #series-grid .card img, #series-grid .card-img-wrap img {
      max-height:none!important;
      height:auto!important;
      aspect-ratio:6/8!important;
    }
    .card .title{padding:10px 4px 12px;color:#fff;font-weight:700;font-size:.95em;text-align:center;word-break:break-word;overflow-wrap:anywhere;}
    .skel{border-radius:8px;aspect-ratio:6/8;background:linear-gradient(110deg,var(--card) 30%,var(--card-h) 50%,var(--card) 70%);background-size:200% 100%;animation:skl 1.6s infinite;}
    @keyframes skl{0%{background-position:200% 0}100%{background-position:-200% 0}}
    /* ══ SEARCH RESULT CARDS ══ */
    .srch-item{background:#262838;border-radius:8px;box-shadow:0 1.5px 6px #0003;text-decoration:none;overflow:hidden;display:block;transition:transform .17s,box-shadow .17s,background .17s;animation:srchCardIn 0.35s ease both;}
    .srch-item:hover{background:#212345;box-shadow:0 4px 18px rgba(10,18,28,0.5);transform:translateY(-2px) scale(1.03);}
    .srch-item-img{
      display:block!important;

      aspect-ratio:6/8!important;
      max-height:none!important;

    #srch-results .srch-item img {

    .srch-item-title{display:block!important;padding:10px 8px 12px!important;color:#fff!important;font-weight:700!important;font-size:.9em!important;text-align:center!important;word-break:break-word!important;overflow-wrap:anywhere!important;}
    @keyframes srchCardIn{from{opacity:0;transform:translateY(12px) scale(0.96);}to{opacity:1;transform:translateY(0) scale(1);}}

    ::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:var(--void)}::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:4px}
    .fu{opacity:0;transform:translateY(16px);animation:fuA 0.5s ease forwards}@keyframes fuA{to{opacity:1;transform:translateY(0)}}
    #footer-placeholder{position:relative;z-index:1;}
    @media(max-width:400px){#mainTitle{font-size:1.08rem!important}.premium-cta{padding:8px 10px;font-size:0.7rem}.rec-card{width:115px!important}}
  </style>

<script>
const sidebar=document.getElementById('sidebar'),sbOv=document.getElementById('sb-ov');
function openSB(){sidebar.classList.add('open');sbOv.classList.add('on');document.body.style.overflow='hidden';}
function closeSB(){sidebar.classList.remove('open');sbOv.classList.remove('on');document.body.style.overflow='';sidebar.querySelectorAll('.sb-a').forEach(el=>{el.style.animation='none';el.offsetHeight;el.style.animation='';});}
document.getElementById('hamburger').addEventListener('click',openSB);

document.getElementById('sidebarDubbed').addEventListener('click',e=>{e.preventDefault();closeSB();setTimeout(()=>document.getElementById('pill-dub')?.click(),360);});

const srchOv=document.getElementById('srch-ov'),srchInp=document.getElementById('srch-inp'),srchClear=document.getElementById('srch-clear');
function openSearch(){srchOv.classList.add('on');document.body.style.overflow='hidden';setTimeout(()=>srchInp.focus(),80);}
function closeSearch(){srchOv.classList.remove('on');document.body.style.overflow='';srchInp.value='';srchClear.classList.remove('show');document.getElementById('srch-status').textContent='';document.getElementById('srch-results').innerHTML='<div class="srch-empty"><div class="srch-empty-icon">🔍</div><div class="srch-empty-title">Search SmTv Urdu</div><div class="srch-empty-sub">Find your favourite Turkish series</div></div>';}
document.getElementById('header-search-btn').addEventListener('click',openSearch);
document.getElementById('srch-cancel').addEventListener('click',closeSearch);
srchClear.addEventListener('click',()=>{srchInp.value='';srchInp.focus();srchClear.classList.remove('show');srchInp.dispatchEvent(new Event('input'));});

(async()=>{try{const r=await fetch('/config.json',{cache:'no-cache'});if(!r.ok)return;const c=await r.json(),f=c.redirectionFeatures,b=document.getElementById('sp-bar');if(!b)return;if(f.shortlink&&!f.sponsorPopup){b.querySelector('.sp-lbl').textContent='Ad Space Available';b.querySelector('.sp-nm').textContent='Reach Thousands Daily!';const btn=b.querySelector('.sp-btn');btn.href='https://t.me/Itz_me_zain1';btn.textContent='Contact 💬';}}catch(e){}})();

(function(){let fc=null;fetch('/config.json',{cache:'no-cache'}).then(r=>r.ok?r.json():null).then(c=>{if(c)fc=c.redirectionFeatures;}).catch(()=>{});const t=setInterval(()=>{const bs=document.querySelectorAll('.h-watch-btn[href]');if(!bs.length)return;clearInterval(t);bs.forEach(b=>{const orig=b.getAttribute('href');if(!orig||orig==='#')return;b.addEventListener('click',async e=>{if(!fc?.shortlink||fc?.sponsorPopup)return;e.preventDefault();try{const u=new URL(orig,location.origin),p=new URLSearchParams(u.search),series=p.get('series'),season=p.get('season'),ep=p.get('ep'),lang=p.get('lang');let jf=`episode-data/${series}-s${season}`;if(lang&&lang!=='dub')jf+=`-${lang}`;jf+='.json';const res=await fetch(jf);if(!res.ok){location.href=orig;return;}const eps=await res.json(),found=eps.find(e=>String(e.ep)===String(ep));if(found?.shortlink){location.href=found.shortlink;}else{location.href=orig;}}catch{location.href=orig;}});});},150);setTimeout(()=>clearInterval(t),8000);})();

(async function(){if(document.readyState!=='complete')await new Promise(r=>window.addEventListener('load',r,{once:true}));try{const res=await fetch('/includes/footer.html');if(!res.ok)return;document.getElementById('footer-placeholder').innerHTML=await res.text();const nav=document.getElementById('smtv-bottom-nav');if(!nav)return;const items=Array.from(nav.querySelectorAll('.nav-item'));const path=location.pathname.toLowerCase();let matched=items.find(a=>{const n=(a.dataset.name||'').toLowerCase();return(n==='home'&&(path==='/'||path.includes('index')))||(n&&path.includes(n));});if(!matched){const l=localStorage.getItem('smtv_last_nav');if(l)matched=items.find(a=>a.dataset.name===l);}if(matched)matched.classList.add('active');items.forEach(a=>a.addEventListener('click',function(e){items.forEach(i=>i.classList.remove('active'));this.classList.add('active');try{localStorage.setItem('smtv_last_nav',this.dataset.name);}catch(e){}const href=this.getAttribute('href');setTimeout(()=>{if(location.pathname.toLowerCase()!==new URL(href,location.origin).pathname.toLowerCase())location.href=href;},200);},{passive:true}));try{const p=parseInt(getComputedStyle(document.body).paddingBottom)||0;if(p<96)document.body.style.paddingBottom='calc(96px + env(safe-area-inset-bottom))';}catch(e){}}catch(e){}})();
