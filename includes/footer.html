<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<nav class="smtv-bottom-nav" id="smtv-bottom-nav" role="navigation" aria-label="Main">

  <a href="/index.html" class="nav-item" data-name="home" aria-label="Home">
    <span class="icon-wrap">
      <span class="icon-bg"></span>
      <i class="fa-solid fa-house"></i>
      <span class="burst"></span>
    </span>
    <span class="label">Home</span>
    <span class="dot"></span>
  </a>

  <a href="/seriesbar.html" class="nav-item" data-name="series" aria-label="Series">
    <span class="icon-wrap">
      <span class="icon-bg"></span>
      <i class="fa-solid fa-film"></i>
      <span class="burst"></span>
    </span>
    <span class="label">Series</span>
    <span class="dot"></span>
  </a>

  <a href="/clips.html" class="nav-item" data-name="clips" aria-label="Clips">
    <span class="icon-wrap">
      <span class="icon-bg"></span>
      <i class="fa-solid fa-circle-play"></i>
      <span class="burst"></span>
    </span>
    <span class="label">Clips</span>
    <span class="dot"></span>
  </a>

  <a href="/premium.html" class="nav-item" data-name="premium" aria-label="Premium">
    <span class="icon-wrap">
      <span class="icon-bg"></span>
      <i class="fa-solid fa-star"></i>
      <span class="burst"></span>
    </span>
    <span class="label">Premium</span>
    <span class="dot"></span>
  </a>

  <a href="/more.html" class="nav-item" data-name="more" aria-label="More">
    <span class="icon-wrap">
      <span class="icon-bg"></span>
      <i class="fa-solid fa-bars"></i>
      <span class="burst"></span>
    </span>
    <span class="label">More</span>
    <span class="dot"></span>
  </a>

</nav>

<style>
/* ─── CSS Variables ─── */
:root {
  --nav-h: 62px;
  --lift: -10px;
  --nav-pad-top: 16px;

  --c-glass:   rgba(15, 18, 26, 0.96);
  --c-border:  rgba(255,255,255,0.06);
  --c-muted:   rgba(148,158,175,0.80);
  --c-white:   #ffffff;

  --teal-a: #1de9ff;
  --teal-b: #0099e6;
  --gold-a: #ffd030;
  --gold-b: #e08800;

  --grad-teal: linear-gradient(135deg, var(--teal-a), var(--teal-b));
  --grad-gold: linear-gradient(135deg, var(--gold-a), var(--gold-b));

  --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease:   cubic-bezier(0.22, 1, 0.36, 1);
  --font: 'Exo 2', system-ui, sans-serif;
}

/* ─── Nav Container ─── */
.smtv-bottom-nav {
  position: fixed;
  left: 12px;
  right: 12px;
  bottom: 12px;
  /* FIX: height includes padding-top so icon has room to rise */
  height: calc(var(--nav-h) + var(--nav-pad-top));
  padding-top: var(--nav-pad-top);
  padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 4px);
  padding-left: 6px;
  padding-right: 6px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 2px;
  overflow: visible;           /* CRITICAL: never clip risen icons */
  background: var(--c-glass);
  border-radius: 20px;
  border: 1px solid var(--c-border);
  box-shadow:
    0 24px 64px rgba(0,0,0,0.72),
    0 1px 0 rgba(255,255,255,0.05) inset,
    0 -1px 0 rgba(255,255,255,0.02) inset;
  backdrop-filter: blur(24px) saturate(1.8);
  -webkit-backdrop-filter: blur(24px) saturate(1.8);
  z-index: 1200;
  font-family: var(--font);
  animation: navIn 0.55s var(--spring) both;
}

/* shimmer top edge */
.smtv-bottom-nav::before {
  content: '';
  position: absolute;
  top: 0; left: 18%; right: 18%;
  height: 1px;
  border-radius: 999px;
  background: linear-gradient(90deg,
    transparent,
    rgba(29,233,255,0.55) 40%,
    rgba(29,233,255,0.55) 60%,
    transparent);
  animation: shimmer 3.5s ease-in-out infinite;
  pointer-events: none;
}

/* ─── Nav Item ─── */
.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  gap: 3px;
  padding: 0 2px 6px;
  min-width: 0;
  text-decoration: none;
  color: var(--c-muted);
  border-radius: 14px;
  -webkit-tap-highlight-color: transparent;
  transition: color 0.28s var(--ease);
  position: relative;
  overflow: visible; /* keep items from clipping icon */
}

/* ─── Icon Wrap ─── */
.icon-wrap {
  position: relative;
  width: 44px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 13px;
  overflow: visible;
  flex-shrink: 0;
  transition: transform 0.42s var(--spring);
  will-change: transform;
}

/* gradient bg that scales in */
.icon-bg {
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: var(--grad-teal);
  opacity: 0;
  transform: scale(0.5);
  transition:
    opacity   0.35s var(--ease),
    transform 0.42s var(--spring);
  pointer-events: none;
}

.nav-item i {
  font-size: 17px;
  color: inherit;
  position: relative;
  z-index: 1;
  transition:
    color     0.28s var(--ease),
    transform 0.42s var(--spring);
  will-change: transform;
}

/* ─── Label ─── */
.label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.04em;
  line-height: 1;
  transition:
    color     0.28s ease,
    transform 0.35s var(--spring);
}

/* ─── Dot ─── */
.dot {
  width: 4px;
  height: 4px;
  border-radius: 999px;
  background: var(--grad-teal);
  margin-top: 1px;
  opacity: 0;
  transform: scaleX(0);
  transform-origin: center;
  transition:
    opacity   0.3s ease,
    transform 0.4s var(--spring),
    width     0.4s var(--spring);
  pointer-events: none;
  box-shadow: 0 0 8px rgba(29,233,255,0.7);
}

/* ─── ACTIVE ─── */
.nav-item.active { color: var(--c-white); }

.nav-item.active .icon-wrap {
  transform: translateY(var(--lift));
}

.nav-item.active .icon-bg {
  opacity: 1;
  transform: scale(1);
}

.nav-item.active i {
  color: #021a22;
  transform: scale(1.1);
}

.nav-item.active .label {
  color: var(--c-white);
  transform: translateY(-1px);
}

.nav-item.active .dot {
  opacity: 1;
  transform: scaleX(1);
  width: 22px;
}

/* glow shadow beneath risen icon */
.nav-item.active .icon-wrap::after {
  content: '';
  position: absolute;
  bottom: -10px;
  left: 50%;
  transform: translateX(-50%);
  width: 38px;
  height: 14px;
  border-radius: 50%;
  background: rgba(29,233,255,0.30);
  filter: blur(7px);
  pointer-events: none;
  animation: shadowPop 0.4s var(--ease) both;
}

/* ─── PREMIUM overrides ─── */
.nav-item[data-name="premium"] i { color: var(--gold-a); }
.nav-item[data-name="premium"] .icon-bg { background: var(--grad-gold); }
.nav-item[data-name="premium"].active i { color: #160900; }
.nav-item[data-name="premium"] .dot {
  background: var(--grad-gold);
  box-shadow: 0 0 8px rgba(255,208,48,0.7);
}
.nav-item[data-name="premium"].active .icon-wrap::after {
  background: rgba(255,208,48,0.30);
}

/* ─── Burst particles ─── */
.burst {
  position: absolute;
  inset: 0;
  border-radius: inherit;
  pointer-events: none;
  overflow: visible;
}
.burst::before,
.burst::after {
  content: '';
  position: absolute;
  inset: 50%;
  border-radius: 50%;
  background: rgba(29,233,255,0.30);
  transform: scale(0);
  opacity: 0;
}
.nav-item[data-name="premium"] .burst::before,
.nav-item[data-name="premium"] .burst::after {
  background: rgba(255,208,48,0.30);
}

.nav-item.burst-play .burst::before {
  animation: burstRing 0.5s ease-out forwards;
}
.nav-item.burst-play .burst::after {
  animation: burstRing 0.5s 0.09s ease-out forwards;
}

/* ─── Hover (non-active) ─── */
.nav-item:not(.active):hover {
  color: rgba(210,225,240,0.95);
}
.nav-item:not(.active):hover .icon-wrap {
  transform: translateY(-3px);
}
.nav-item:not(.active):hover i {
  transform: scale(1.08);
}
.nav-item:not(.active):hover .icon-bg {
  opacity: 0.10;
  transform: scale(1);
}

/* ─── Keyframes ─── */
@keyframes navIn {
  from { opacity:0; transform: translateY(30px) scale(0.95); }
  to   { opacity:1; transform: translateY(0)    scale(1);    }
}

@keyframes shimmer {
  0%,100% { opacity: 0.3; }
  50%      { opacity: 1;   }
}

@keyframes shadowPop {
  from { opacity:0; transform: translateX(-50%) scaleX(0.3); }
  to   { opacity:1; transform: translateX(-50%) scaleX(1);   }
}

@keyframes burstRing {
  0%   { inset: 30%;  opacity: 0.75; transform: scale(0); }
  100% { inset: -65%; opacity: 0;    transform: scale(1); }
}

/* ─── Responsive ─── */
@media (min-width: 900px) {
  .smtv-bottom-nav {
    max-width: 820px;
    left: 50%;
    right: auto;
    transform: translateX(-50%);
    bottom: 28px;
    --nav-h: 68px;
    --nav-pad-top: 18px;
  }
  .icon-wrap { width: 50px; height: 46px; border-radius: 15px; }
  .nav-item i { font-size: 19px; }
  .label { font-size: 11px; }
  .dot { width: 5px; height: 5px; }
  .nav-item.active .dot { width: 26px; }
}
</style>

<script>
(function () {
  'use strict';

  const nav = document.getElementById('smtv-bottom-nav');
  if (!nav) return;

  /* URL path → tab name */
  const routeMap = {
    '':                 'home',
    '/':                'home',
    '/index.html':      'home',
    '/seriesbar.html':  'series',
    '/series':          'series',
    '/clips.html':      'clips',
    '/clips':           'clips',
    '/premium.html':    'premium',
    '/premium':         'premium',
    '/more.html':       'more',
    '/more':            'more',
  };

  /* ── Activate a tab ── */
  function setActive(name, withBurst) {
    nav.querySelectorAll('.nav-item').forEach(item => {
      const hit = item.dataset.name === name;
      item.classList.toggle('active', hit);

      if (hit && withBurst) {
        item.classList.remove('burst-play');
        void item.offsetWidth; // force reflow
        item.classList.add('burst-play');
        setTimeout(() => item.classList.remove('burst-play'), 600);
      }
    });
  }

  /* ── Determine active from URL ── */
  const rawPath = location.pathname;
  const normPath = rawPath.endsWith('/') && rawPath !== '/'
    ? rawPath.slice(0, -1)
    : rawPath;
  const initName = routeMap[normPath] || routeMap[rawPath] || null;
  if (initName) setActive(initName, false);

  /* ── Click ── */
  nav.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', function () {
      setActive(this.dataset.name, true);
    });
  });

  /* ── Touch press feedback ── */
  nav.querySelectorAll('.nav-item').forEach(item => {
    const reset = () => {
      item.style.transform = '';
      item.style.transition = '';
    };
    item.addEventListener('pointerdown', () => {
      item.style.transition = 'transform 0.08s ease';
      item.style.transform  = 'scale(0.94)';
    });
    item.addEventListener('pointerup',     reset);
    item.addEventListener('pointercancel', reset);
    item.addEventListener('pointerleave',  reset);
  });

})();
</script>
