<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<nav class="smtv-nav" id="smtv-bottom-nav" role="navigation" aria-label="Main">

  <a href="/clips.html"    class="nav-item" data-name="clips"   aria-label="Clips">

    </span>
    <span class="nav-label">More</span>

<style>
/* ─── Tokens ─────────────────────────────────────── */
:root {
  --c-bg:        #0b0c10;
  --c-surface:   rgba(18, 20, 27, 0.85);
  --c-border:    rgba(255,255,255,0.06);
  --c-muted:     #6e7180;
  --c-label:     #a0a5b8;
  --c-white:     #ffffff;

  /* Teal/cyan accent family */
  --a1: #22d3ee;   /* cyan-400 */
  --a2: #06b6d4;   /* cyan-500 */
  --a3: #0891b2;   /* cyan-600 */

  --pill-h:       52px;
  --nav-h:        72px;
  --radius-nav:   22px;
  --radius-icon:  14px;

  --ease-spring:  cubic-bezier(.34,1.56,.64,1);
  --ease-out:     cubic-bezier(.22,1,.36,1);
}

/* ─── Reset ──────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ─── Nav Shell ──────────────────────────────────── */
.smtv-nav {
  position: fixed;
  left: 14px; right: 14px;
  bottom: 14px;
  height: var(--nav-h);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 6px;
  padding-bottom: env(safe-area-inset-bottom, 0px);

  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--radius-nav);
  backdrop-filter: blur(20px) saturate(1.6);
  -webkit-backdrop-filter: blur(20px) saturate(1.6);
  box-shadow:
    0 24px 48px rgba(0,0,0,.55),
    0 2px 0 rgba(255,255,255,.04) inset,
    0 0 0 1px rgba(0,0,0,.5);

  z-index: 1200;
  font-family: 'Outfit', system-ui, sans-serif;

  /* mount animation */
  animation: navMount .55s var(--ease-spring) both;
}

@keyframes navMount {
  from { transform: translateY(100px); opacity: 0; }
  to   { transform: translateY(0);     opacity: 1; }
}

/* ─── Aurora glow background ─────────────────────── */
.nav-bg-layer {
  position: absolute;
  inset: 0;
  border-radius: inherit;
  overflow: hidden;
  pointer-events: none;
  z-index: 0;
}

.aurora {
  position: absolute;
  width: 180%;
  height: 180%;
  top: -40%; left: -40%;
  background: conic-gradient(
    from 180deg at 50% 60%,
    rgba(34,211,238,.05) 0deg,
    rgba(6,182,212,.00) 90deg,
    rgba(34,211,238,.05) 180deg,
    transparent 270deg
  );
  animation: auroraSpin 12s linear infinite;
  border-radius: 50%;
}
@keyframes auroraSpin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

/* ─── Sliding pill indicator ─────────────────────── */
.slide-pill {
  position: absolute;
  top: 50%;
  height: var(--pill-h);
  width: 60px;           /* overridden by JS */
  transform: translate(0, -50%);
  border-radius: 16px;
  background: linear-gradient(145deg, var(--a1), var(--a3));
  box-shadow:
    0 0 28px rgba(34,211,238,.35),
    0 0 60px rgba(34,211,238,.12),
    0 6px 20px rgba(0,0,0,.4);
  z-index: 1;
  transition:
    left .38s var(--ease-spring),
    width .38s var(--ease-spring),
    opacity .25s ease;
  opacity: 0;            /* hidden until JS runs */
}

/* Inner shimmer on pill */
.slide-pill::after {
  content: '';
  position: absolute;
  inset: 1px;
  border-radius: inherit;
  background: linear-gradient(
    160deg,
    rgba(255,255,255,.22) 0%,
    transparent 55%
  );
}

/* ─── Nav Item ───────────────────────────────────── */
.nav-item {
  position: relative;
  z-index: 2;
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 6px 4px;
  text-decoration: none;
  color: var(--c-muted);
  border-radius: 16px;
  min-width: 52px;
  transition: color .25s var(--ease-out), transform .3s var(--ease-spring);
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

/* staggered entrance */
.nav-item:nth-child(2) { animation-delay: .04s; }
.nav-item:nth-child(3) { animation-delay: .08s; }
.nav-item:nth-child(4) { animation-delay: .12s; }
.nav-item:nth-child(5) { animation-delay: .16s; }
.nav-item:nth-child(6) { animation-delay: .20s; }

/* ─── Icon Shell ─────────────────────────────────── */
.icon-shell {
  position: relative;
  width: 40px; height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-icon);
  transition: transform .3s var(--ease-spring);
  z-index: 1;
}

.icon-shell i {
  font-size: 18px;
  color: currentColor;
  transition: color .25s ease, transform .3s var(--ease-spring);
  position: relative;
  z-index: 2;
}

/* ─── Ripple ring (tap feedback) ─────────────────── */
.ripple-ring {
  position: absolute;
  inset: 0;
  border-radius: inherit;
  border: 1.5px solid transparent;
  transition: border-color .25s ease;
  pointer-events: none;
}

/* ─── Label ──────────────────────────────────────── */
.nav-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .3px;
  color: currentColor;
  transition: color .25s ease, opacity .25s ease, transform .3s var(--ease-spring);
  opacity: .7;
  transform: translateY(2px);
}

/* ─── HOVER (non-active) ─────────────────────────── */
.nav-item:not(.active):hover {
  color: var(--c-label);
  transform: translateY(-2px);
}
.nav-item:not(.active):hover .icon-shell {
  transform: scale(1.08);
}
.nav-item:not(.active):hover .nav-label {
  opacity: 1;
}

/* ─── ACTIVE state ───────────────────────────────── */
.nav-item.active {
  color: var(--c-white);
  transform: translateY(-5px);
  pointer-events: none;
}
.nav-item.active .nav-label {
  opacity: 1;
  transform: translateY(0);
  font-weight: 600;
  color: var(--c-white);
}
.nav-item.active .icon-shell i {
  color: #0a1a1f;        /* dark icon on bright pill */
  transform: scale(1.1);
}

/* ─── Tap animation ──────────────────────────────── */
.nav-item.tapping {
  transform: scale(0.9) translateY(-2px);
}
.nav-item.tapping .ripple-ring {
  border-color: rgba(34,211,238,.5);
  animation: ringPulse .4s ease forwards;
}
@keyframes ringPulse {
  0%   { transform: scale(1);   opacity: 1; border-color: rgba(34,211,238,.55); }
  60%  { transform: scale(1.5); opacity: .4; }
  100% { transform: scale(1.8); opacity: 0; }
}

/* ─── Active icon bounce ─────────────────────────── */
.nav-item.active .icon-shell {
  animation: iconPop .42s var(--ease-spring);
}
@keyframes iconPop {
  0%   { transform: scale(1); }
  45%  { transform: scale(1.25) rotate(-6deg); }
  70%  { transform: scale(0.92) rotate(4deg); }
  100% { transform: scale(1); }
}

/* ─── Desktop ────────────────────────────────────── */
@media (min-width: 900px) {
  .smtv-nav {
    max-width: 880px;
    left: 50%; right: auto;
    transform: translateX(-50%);
    bottom: 24px;
    height: 78px;
    padding: 0 10px;
    animation: navMountDesktop .55s var(--ease-spring) both;
  }
  @keyframes navMountDesktop {
    from { transform: translateX(-50%) translateY(80px); opacity: 0; }
    to   { transform: translateX(-50%) translateY(0);   opacity: 1; }
  }
  .icon-shell { width: 46px; height: 46px; border-radius: 15px; }
  .icon-shell i { font-size: 20px; }
  .nav-label { font-size: 12px; }
  .slide-pill { height: 58px; }
}
</style>

<script>
(function () {
  const nav   = document.getElementById('smtv-bottom-nav');
  const pill  = document.getElementById('slide-pill');
  const items = nav ? nav.querySelectorAll('.nav-item') : [];

  /* ── Determine active item ── */
  function getActive() {
    const path = location.pathname.replace(/\/$/, '') || '/';
    let match  = null;
    items.forEach(el => {
      const href = el.getAttribute('href').replace(/\/$/, '') || '/';
      if (path === href || (href !== '/' && path.startsWith(href))) {
        match = el;
      }
    });
    return match || items[0];
  }

  /* ── Position pill under element ── */
  function positionPill(el, animate) {
    if (!el || !pill) return;
    const navRect  = nav.getBoundingClientRect();
    const itemRect = el.getBoundingClientRect();

    const left  = itemRect.left - navRect.left;
    const width = itemRect.width;

    pill.style.transition = animate
      ? 'left .38s cubic-bezier(.34,1.56,.64,1), width .38s cubic-bezier(.34,1.56,.64,1), opacity .25s ease'
      : 'none';
    pill.style.left  = left  + 'px';
    pill.style.width = width + 'px';
    pill.style.opacity = '1';
  }

  /* ── Activate an item ── */
  function activate(el, animate) {
    items.forEach(i => i.classList.remove('active'));
    el.classList.add('active');
    positionPill(el, animate);
  }

  /* ── Boot ── */
  if (items.length) {
    const active = getActive();
    activate(active, false);

    /* small delay so layout is stable, then show pill */
    requestAnimationFrame(() => {
      requestAnimationFrame(() => positionPill(active, false));
    });
  }

  /* ── Click handler ── */
  items.forEach(el => {
    el.addEventListener('click', function (e) {
      if (this.classList.contains('active')) return;

      /* tap ripple */
      this.classList.add('tapping');
      setTimeout(() => this.classList.remove('tapping'), 420);

      activate(this, true);
    });
  });

  /* ── Resize: reposition without animation ── */
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      const a = nav.querySelector('.nav-item.active');
      if (a) positionPill(a, false);
    }, 80);
  });
})();
</script>
